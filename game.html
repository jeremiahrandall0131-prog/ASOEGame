function CollectorGame({ save, wager, onEnd, onUpdate }) {
  // Player deck: shuffle owned cards
  const [playerDeck] = React.useState(() => {
    const cards = (save.owned||[]).map(id=>getCollCard(id)).filter(Boolean);
    // Shuffle
    for (let i = cards.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [cards[i],cards[j]]=[cards[j],cards[i]];
    }
    return cards;
  });

  const [playerBoard, setPlayerBoard] = React.useState({}); // posId → card
  const [drawnCard, setDrawnCard] = React.useState(null);
  const [usedCardIds, setUsedCardIds] = React.useState(new Set());
  const [rerollsLeft, setRerollsLeft] = React.useState(Math.min(save.rerolls||0, GAME_REROLL_LIMIT));
  const [rerollsUsed, setRerollsUsed] = React.useState(0);
  const [cpuBoard, setCpuBoard] = React.useState({});   // built turn-by-turn (optimal assignment)
  const [cpuDraftedCards, setCpuDraftedCards] = React.useState([]); // every card the CPU has drafted
  const [lastCpuCard, setLastCpuCard] = React.useState(null);
  const [phase, setPhase] = React.useState('draw'); // draw | place | done
  const [showCpu, setShowCpu] = React.useState(false);
  const [selectedPos, setSelectedPos] = React.useState(null);
  const [confirmQuit, setConfirmQuit] = React.useState(false);

  // The CPU draws from the player's overall DECK LEVEL — the game's canonical deck tier
  // (deckTierLabel, based on the deck's average Overall), NOT the tier of whatever card the
  // player happened to draw this round. A Mythic-level deck always faces a Mythic CPU, even
  // on rounds the player plays a lower-tier card.
  const deckLevel = React.useMemo(() => deckTierLabel(save.owned), [save.owned]);

  // CPU drafts a card from the deck-level tier's full pool — never duplicating a character
  // already on either board, except infinitely-duplicatable (unlimited) characters.
  function cpuDraftCard(playerBoardNow, cpuDraftedNow) {
    const all = getCollCards();
    const taken = new Set([
      ...Object.values(playerBoardNow).filter(Boolean).map(c=>c.charId),
      ...cpuDraftedNow.map(c=>c.charId),
    ]);
    const usable = c => c.unlimited || !taken.has(c.charId);
    let pool = all.filter(c => c.tier === deckLevel && usable(c));
    if (!pool.length) pool = all.filter(usable);            // fallback: any tier
    if (!pool.length) return null;
    return pool[Math.floor(Math.random()*pool.length)];
  }

  // Assign a set of cards to positions to MAXIMISE total score (greedy seed + pairwise-swap
  // local search — optimal for boards this small). The CPU always fields this best lineup,
  // re-optimising (repositioning) every time it drafts a new card.
  function optimalAssign(cards) {
    const pids = COLL_POS.map(p => p.id);
    const pairs = [];
    cards.forEach((c, ci) => pids.forEach(pid => pairs.push({ ci, pid, s: c.scores?.[pid] || 0 })));
    pairs.sort((a, b) => b.s - a.s);
    const assign = {}; const usedC = new Set(), usedP = new Set();
    for (const pr of pairs) { if (usedC.has(pr.ci) || usedP.has(pr.pid)) continue; assign[pr.pid] = cards[pr.ci]; usedC.add(pr.ci); usedP.add(pr.pid); }
    let improved = true;
    while (improved) {
      improved = false;
      const ps = Object.keys(assign);
      for (let i = 0; i < ps.length; i++) for (let j = i + 1; j < ps.length; j++) {
        const p1 = ps[i], p2 = ps[j], c1 = assign[p1], c2 = assign[p2];
        if (((c1.scores?.[p2] || 0) + (c2.scores?.[p1] || 0)) > ((c1.scores?.[p1] || 0) + (c2.scores?.[p2] || 0))) {
          assign[p1] = c2; assign[p2] = c1; improved = true;
        }
      }
    }
    return assign;
  }

  function drawFate() {
    const available = playerDeck.filter(c => !usedCardIds.has(c.id) && !Object.values(playerBoard).some(pc=>pc?.id===c.id));
    if (!available.length) { setPhase('done'); return; }
    const card = available[Math.floor(Math.random()*available.length)];
    setDrawnCard(card);
    setPhase('place');
  }

  function doReroll() {
    if (rerollsLeft <= 0 || rerollsUsed >= GAME_REROLL_LIMIT) return;
    const available = playerDeck.filter(c => !usedCardIds.has(c.id) && c.id !== drawnCard?.id && !Object.values(playerBoard).some(pc=>pc?.id===c.id));
    if (!available.length) return;
    const card = available[Math.floor(Math.random()*available.length)];
    setDrawnCard(card);
    setRerollsLeft(r=>r-1);
    setRerollsUsed(r=>r+1);
  }

  function placeCard(posId) {
    if (!drawnCard || playerBoard[posId]) return;
    setPlayerBoard({ ...playerBoard, [posId]: drawnCard });
    setUsedCardIds(new Set([...usedCardIds, drawnCard.id]));
    setDrawnCard(null);
    setSelectedPos(null);
    setPhase('arrange'); // let the player reposition, then confirm to pass the turn
  }

  // Reposition during the arrange step: tap a placed card to pick it up, then tap another
  // slot to move it (into an empty slot) or swap it (with the card already there).
  function handleReposition(posId) {
    if (phase !== 'arrange') return;
    if (selectedPos === null) { if (playerBoard[posId]) setSelectedPos(posId); return; }
    if (selectedPos === posId) { setSelectedPos(null); return; }
    const nb = { ...playerBoard };
    const moving = nb[selectedPos], target = nb[posId];
    nb[posId] = moving;
    if (target) nb[selectedPos] = target; else delete nb[selectedPos];
    setPlayerBoard(nb);
    setSelectedPos(null);
  }

  // End the player's turn: the CPU drafts from the deck-level pool and re-fields its optimal
  // lineup, then play returns to the player (or finishes when the board is full).
  function confirmTurn() {
    if (phase !== 'arrange') return;
    const cpuCard = cpuDraftCard(playerBoard, cpuDraftedCards);
    if (cpuCard) {
      const drafted = [...cpuDraftedCards, cpuCard];
      setCpuDraftedCards(drafted);
      setCpuBoard(optimalAssign(drafted));
      setLastCpuCard(cpuCard);
    }
    setSelectedPos(null);
    if (Object.keys(playerBoard).length >= COLL_POS.length) setPhase('done');
    else setPhase('draw');
  }

  function calcScore(board) {
    // No cap: elite cards can score above 10 in a position, so a strong board
    // total can legitimately exceed 100. Displays handle the larger numbers.
    return Math.round(COLL_POS.reduce((sum, pos) => {
      const card = board[pos.id];
      return sum + (card?.scores?.[pos.id] || 0);
    }, 0) * 10) / 10;
  }

  const playerScore = calcScore(playerBoard);
  const cpuScore = calcScore(cpuBoard);

  function handleFinish() {
    const isWin = playerScore > cpuScore;
    const margin = playerScore - cpuScore;
    let goldEarned = 5; // completion gold
    if (isWin) {
      if (margin >= 10) goldEarned = 30;
      else if (margin >= 5) goldEarned = 15;
      else goldEarned = 10;
    }
    // Graduated score bonus — rewards how well your cards fit their positions
    // (the new spiky scoring puts a typical board ~45-70 and a perfect court at 100).
    if (playerScore >= 100) goldEarned += 500;       // a perfect court
    else if (playerScore >= 90) goldEarned += 150;
    else if (playerScore >= 80) goldEarned += 75;
    else if (playerScore >= 70) goldEarned += 40;
    else if (playerScore >= 60) goldEarned += 20;
    let finalGold = (save.gold||0) + goldEarned;
    if (isWin) finalGold += wager;
    else finalGold -= wager;
    finalGold = Math.max(0, finalGold);

    // Update stats
    const cardPlays = { ...(save.stats?.cardPlays||{}) };
    const cardScores = { ...(save.stats?.cardScores||{}) };
    Object.entries(playerBoard).forEach(([posId, card]) => {
      if (!card) return;
      cardPlays[card.id] = (cardPlays[card.id]||0) + 1;
      cardScores[card.id] = (cardScores[card.id]||0) + (card.scores?.[posId]||0);
    });
    const currentStreak = isWin ? (save.stats?.winStreak || 0) + 1 : 0;
    const maxWinStreak = Math.max(save.stats?.maxWinStreak || 0, currentStreak);
    const newSave = {
      ...save,
      gold: finalGold,
      rerolls: Math.max(0, (save.rerolls||0) - rerollsUsed),
      stats: {
        ...(save.stats||{}),
        games: (save.stats?.games||0)+1,
        wins: (save.stats?.wins||0)+(isWin?1:0),
        totalScore: (save.stats?.totalScore||0)+playerScore,
        winStreak: currentStreak,
        maxWinStreak,
        cardPlays, cardScores,
      }
    };
    saveCollSave(newSave);
    onUpdate(newSave);
    const result = { isWin, playerScore, cpuScore, goldEarned, playerBoard, cpuBoard, wager, margin, rerollsUsed };
    const collUnlocked = checkCollectorAchievements(newSave, result);
    collUnlocked.forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id })));
    onEnd(result);
  }

  // Quitting mid-game forfeits any Gold wagered on this game (the wager is otherwise only
  // settled win/lose at the end, so an early exit must still cost the player their bet).
  function handleQuit() {
    if (wager > 0) {
      const newSave = { ...save, gold: Math.max(0, (save.gold||0) - wager) };
      saveCollSave(newSave);
      onUpdate(newSave);
    }
    onEnd(null);
  }

  const filledPositions = Object.keys(playerBoard).length;
  const T = window.COLLECTOR_TIERS || {};

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)', position:'relative' }}>
      {confirmQuit && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.82)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:'#120d06', border:'1px solid rgba(255,215,0,0.35)', borderRadius:14, padding:'28px 24px', maxWidth:270, width:'85%', textAlign:'center', boxShadow:'0 8px 40px rgba(0,0,0,0.9)' }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.15rem', fontWeight:700, color:'#f0c84a', marginBottom:8 }}>Quit Game?</div>
            <div style={{ fontSize:'0.78rem', color:'var(--text2)', marginBottom:22, lineHeight:1.5 }}>{wager > 0 ? `All progress will be lost — and your ${wager}G wager forfeited.` : 'All progress will be lost.'}</div>
            <div style={{ display:'flex', gap:10 }}>
              <button className="btn btn-ghost" style={{ flex:1, fontSize:'0.8rem' }} onClick={() => setConfirmQuit(false)}>Keep Playing</button>
              <button style={{ flex:1, padding:'9px 4px', fontSize:'0.8rem', fontFamily:'Cinzel,serif', fontWeight:700, background:'#7a1010', color:'#fff', border:'1px solid #b01a1a', borderRadius:7, cursor:'pointer', letterSpacing:'0.06em' }} onClick={handleQuit}>QUIT</button>
            </div>
          </div>
        </div>
      )}
      {/* Header */}
      <div className="nav-bar">
        <div className="nav-side">
          <button onClick={() => setConfirmQuit(true)} style={{ width:30, height:30, borderRadius:'50%', background:'#8b1212', border:'2px solid #c0282a', color:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1rem', fontWeight:900, padding:0, lineHeight:1 }}>✕</button>
        </div>
        <div style={{ flex:1, textAlign:'center' }}>
          <div className="nav-title">COLLECTOR MODE</div>
          <div style={{ fontSize:'0.6rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>
            {filledPositions}/{COLL_POS.length} PLACED · {rerollsLeft} REROLL{rerollsLeft!==1?'S':''} LEFT
          </div>
        </div>
        <div className="nav-side" style={{ justifyContent:'flex-end' }}>
          <button className="btn btn-ghost btn-sm" onClick={() => setShowCpu(s=>!s)} style={{ fontSize:'0.55rem' }}>{showCpu?'My Board':'CPU Board'}</button>
        </div>
      </div>

      {/* Score display */}
      <div style={{ display:'flex', background:'var(--bg2)', borderBottom:'1px solid var(--border)', padding:'6px 12px', gap:12, alignItems:'center' }}>
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>YOUR SCORE</div>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:'var(--gold)', fontWeight:700 }}>{playerScore}</div>
        </div>
        <div style={{ fontSize:'0.65rem', color:'var(--text2)' }}>vs</div>
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>CPU SCORE</div>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:'#e05555', fontWeight:700 }}>{cpuScore}</div>
        </div>
        {wager > 0 && <div style={{ fontSize:'0.6rem', color:'var(--gold)' }}>🎲 {wager}G</div>}
      </div>

      {/* Music volume */}
      <div style={{ display:'flex', justifyContent:'flex-end', alignItems:'center', gap:8, padding:'3px 12px', background:'var(--bg2)', borderBottom:'1px solid var(--border)' }}>
        <span style={{ fontSize:'0.5rem', color:'var(--text2)', fontFamily:'Cinzel,serif', letterSpacing:'0.1em' }}>MUSIC</span>
        <VolumeBar />
      </div>

      {/* Board */}
      <div className="scroll" style={{ flex:1, padding:'10px 12px' }}>
        {!showCpu ? (
          <>
            {/* Drawn card */}
            {phase === 'draw' && (
              <div style={{ textAlign:'center', padding:'14px 0' }}>
                {lastCpuCard && (
                  <div style={{ fontSize:'0.62rem', color:'var(--text2)', marginBottom:10, lineHeight:1.5 }}>
                    🤖 CPU drafted <span style={{ color:(T[lastCpuCard.tier]||{}).color||'#e05555', fontWeight:700 }}>{lastCpuCard.name}</span>
                    <span style={{ color:'var(--text2)' }}> ({(T[lastCpuCard.tier]||{}).label})</span>
                  </div>
                )}
                <button className="btn btn-gold" style={{ width:'100%', padding:'14px', fontSize:'0.85rem', letterSpacing:'0.1em' }} onClick={drawFate}>
                  🃏 DRAW FATE
                </button>
                {filledPositions > 0 && filledPositions === COLL_POS.length && (
                  <button className="btn btn-gold" style={{ width:'100%', marginTop:8 }} onClick={handleFinish}>Finish Game</button>
                )}
              </div>
            )}
            {phase === 'place' && drawnCard && (
              <div className="card" style={{ marginBottom:10, borderColor:(T[drawnCard.tier]||{}).color||'var(--gold)' }}>
                <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginBottom:6 }}>FATE DREW:</div>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.8rem', color:(T[drawnCard.tier]||{}).color||'var(--gold)', fontWeight:700 }}>{drawnCard.name}</div>
                    <div style={{ fontSize:'0.6rem', color:'var(--text2)' }}>{drawnCard.houses?.[0]} · Overall: {drawnCard.overall}</div>
                    <CollTierBadge tier={drawnCard.tier} />
                  </div>
                  {rerollsLeft > 0 && rerollsUsed < GAME_REROLL_LIMIT && (
                    <button className="btn btn-ghost btn-sm" style={{ fontSize:'0.6rem' }} onClick={doReroll}>
                      🎲 Reroll ({rerollsLeft})
                    </button>
                  )}
                </div>
                {/* Character score profile — highest open position highlighted */}
                {(() => {
                  const bestOpen = COLL_POS.filter(p => !playerBoard[p.id])
                    .sort((a,b)=>(drawnCard.scores?.[b.id]||0)-(drawnCard.scores?.[a.id]||0))[0];
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'2px 10px', marginTop:8, paddingTop:8, borderTop:'1px solid var(--border)' }}>
                      {COLL_POS.map(p => {
                        const sc = drawnCard.scores?.[p.id] || 0;
                        const isBest = bestOpen && bestOpen.id === p.id;
                        return (
                          <div key={p.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:'0.55rem',
                            background:isBest?'rgba(212,168,48,0.14)':'transparent', borderRadius:3, padding:'1px 4px' }}>
                            <span style={{ color:isBest?'var(--gold)':'var(--text2)', fontFamily:'Cinzel,serif' }}>{p.label}</span>
                            <span style={{ color: sc>=9?'#ffd700':sc>=7?(T[drawnCard.tier]||{}).color:'var(--text)', fontWeight:700 }}>{Math.floor(sc*10)/10}</span>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
                <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginTop:8, fontStyle:'italic' }}>
                  Select a position below to place this card ↓ (best fit highlighted)
                </div>
              </div>
            )}
            {/* Position grid */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
              {COLL_POS.map(pos => {
                const placed = playerBoard[pos.id];
                const canPlace = phase === 'place' && drawnCard && !placed;
                const canArrange = phase === 'arrange';
                const isSelected = canArrange && selectedPos === pos.id;
                const clickable = canPlace || canArrange;
                const onClickSlot = canPlace ? () => placeCard(pos.id) : canArrange ? () => handleReposition(pos.id) : undefined;
                const score = placed ? (placed.scores?.[pos.id]||0) : null;
                const ct = placed ? (T[placed.tier]||{color:'#888'}) : null;
                const borderColor = isSelected ? '#fff' : canPlace ? 'var(--gold)' : placed ? ct.color : 'var(--border)';
                return (
                  <div key={pos.id} onClick={onClickSlot}
                    style={{ border:`2px solid ${borderColor}`,
                      borderRadius:6, padding:'8px 10px', cursor:clickable?'pointer':'default',
                      background: isSelected ? 'rgba(255,255,255,0.14)' : canPlace ? 'rgba(212,168,48,0.08)' : placed ? ct.bg : 'var(--bg2)',
                      boxShadow: isSelected ? '0 0 8px rgba(255,255,255,0.4)' : 'none',
                      transition:'all 0.15s' }}>
                    <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:2 }}>{pos.label}</div>
                    {placed ? (
                      <>
                        <div style={{ fontSize:'0.65rem', color:ct.color, fontWeight:700 }}>{placed.name}</div>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:2 }}>
                          <CollTierBadge tier={placed.tier} />
                          <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>{Math.floor(score*10)/10}</span>
                        </div>
                      </>
                    ) : canPlace ? (
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                        <span style={{ fontSize:'0.6rem', color:'var(--gold)', fontStyle:'italic' }}>← Place</span>
                        <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, fontSize:'0.95rem',
                          color: (drawnCard.scores?.[pos.id]||0)>=9?'#ffd700':(drawnCard.scores?.[pos.id]||0)>=7?'var(--gold)':'var(--text2)' }}>
                          {Math.floor((drawnCard.scores?.[pos.id]||0)*10)/10}
                        </span>
                      </div>
                    ) : (
                      <div style={{ fontSize:'0.65rem', color: (canArrange && selectedPos) ? 'var(--gold)' : 'var(--text2)', fontStyle:'italic' }}>{(canArrange && selectedPos) ? '↳ move here' : '— Empty —'}</div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          /* CPU Board */
          <div>
            <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:10 }}>
              CPU Board · {Object.keys(cpuBoard).length}/{COLL_POS.length} drafted · The CPU draws from your deck level ({(T[deckLevel]||{}).label||deckLevel}) and always fields its optimal lineup.
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
              {COLL_POS.map(pos => {
                const card = cpuBoard[pos.id];
                const ct = card ? (T[card.tier]||{color:'#888',bg:'#111'}) : null;
                const score = card ? (card.scores?.[pos.id]||0) : null;
                return (
                  <div key={pos.id} style={{ border:`2px solid ${card?ct.color:'var(--border)'}`, borderRadius:6, padding:'8px 10px', background: card?ct.bg:'var(--bg2)' }}>
                    <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:2 }}>{pos.label}</div>
                    {card ? (
                      <>
                        <div style={{ fontSize:'0.65rem', color:ct.color, fontWeight:700 }}>{card.name}</div>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:2 }}>
                          <CollTierBadge tier={card.tier} />
                          <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>{Math.floor(score*10)/10}</span>
                        </div>
                      </>
                    ) : (
                      <div style={{ fontSize:'0.65rem', color:'var(--text2)', fontStyle:'italic' }}>— Empty —</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Bottom action */}
      {phase === 'arrange' && !showCpu && (
        <div style={{ padding:'10px 12px', borderTop:'1px solid var(--border)', background:'var(--bg2)' }}>
          <div style={{ fontSize:'0.58rem', color:'var(--text2)', textAlign:'center', marginBottom:6, fontStyle:'italic' }}>
            {selectedPos ? 'Tap another slot to move/swap — or tap the same card to cancel.' : 'Tap any placed card to reposition it, then confirm your lineup.'}
          </div>
          <button className="btn btn-gold" style={{ width:'100%', padding:'13px', fontSize:'0.85rem', letterSpacing:'0.08em' }} onClick={confirmTurn}>
            ✓ CONFIRM LINEUP — END TURN
          </button>
        </div>
      )}
      {phase === 'done' && (
        <div style={{ padding:'10px 12px', borderTop:'1px solid var(--border)', background:'var(--bg2)' }}>
          <button className="btn btn-gold" style={{ width:'100%', padding:'14px', fontSize:'0.9rem' }} onClick={handleFinish}>
            ⚔ Finish & See Results
          </button>
        </div>
      )}
    </div>
  );
}

              <div style={{ fontSize:'0.6rem', color:'var(--text2)' }}>YOUR SCORE</div>

// ─── Collector Hub ────────────────────────────────────────────────────────────

function CollectorHub({ onHome }) {
  const [save, setSave] = React.useState(() => loadCollSave());
  const [tab, setTab] = React.useState('deck');
  const [screen, setScreen] = React.useState('hub'); // hub | tutorial | startingPull | wager | game | result | winpull
  const [gameWager, setGameWager] = React.useState(0);
  const [gameResult, setGameResult] = React.useState(null);
  const [winPullCards, setWinPullCards] = React.useState([]);
  const [showTutorial, setShowTutorial] = React.useState(false);

  function handleUpdate(newSave) { setSave(newSave); }

  React.useEffect(() => {
    AudioManager.startCollectorMusic();
  }, []);

  React.useEffect(() => {
    if (!save.tutorialSeen) {
      const needsPull = !save.owned || save.owned.length === 0;
      if (needsPull) setScreen('tutorial');
      else setScreen('hub');
    }
  }, []);

  function handleTutorialDone() {
    if (!save.owned || save.owned.length === 0) {
      setScreen('startingPull');
    } else {
      const newSave = { ...save, tutorialSeen: true };
      saveCollSave(newSave);
      setSave(newSave);
      setScreen('hub');
    }
    setShowTutorial(false);
  }

  function handleStartingPullDone(cardIds) {
    const newSave = { ...save, tutorialSeen: true, owned: cardIds };
    saveCollSave(newSave);
    setSave(newSave);
    setScreen('hub');
  }

  function handlePlay() {
    if (!save.owned || save.owned.length < 10) {
      alert('You need at least 10 cards in your deck to play!');
      return;
    }
    setScreen('wager');
  }

  function handleStartGame(wager) {
    setGameWager(wager);
    setScreen('game');
  }

  function handleGameEnd(result) {
    if (!result) { setScreen('hub'); return; }
    setGameResult(result);
    setScreen('result');
  }

  function handleWinPull() {
    const cpuBoardCards = Object.values(gameResult.cpuBoard||{}).filter(Boolean);
    const pullCards = genWinPullCards(cpuBoardCards, save);
    setWinPullCards(pullCards);
    setScreen('winpull');
  }

  function handlePickWinPull(card) {
    const newSave = { ...save, owned: [...(save.owned||[]), card.id] };
    saveCollSave(newSave);
    setSave(newSave);
    setScreen('hub');
    setGameResult(null);
  }

  const HUB_TABS = [
    { id:'deck',  label:'My Deck' },
    { id:'index', label:'Card Index' },
    { id:'stats', label:'Card Stats' },
    { id:'store', label:'Store' },
    { id:'daily', label:'Daily' },
  ];

  const deckTier = deckTierLabel(save.owned);
  const T = window.COLLECTOR_TIERS || {};
  // Tick every second so the HUD daily countdowns update live.
  const [, setNowTick] = React.useState(0);
  React.useEffect(() => { const iv = setInterval(() => setNowTick(t => t + 1), 1000); return () => clearInterval(iv); }, []);
  const pullCountdown = timeUntil24h(save.lastDailyPull);
  const rewardCountdown = timeUntil24h(save.lastDailyReward);

  if (screen === 'tutorial' || showTutorial) return <CollectorTutorial onDone={handleTutorialDone} onBack={() => { setShowTutorial(false); setScreen('hub'); onHome(); }} />;
  if (screen === 'startingPull') return <CollectorStartingPull onDone={handleStartingPullDone} />;
  if (screen === 'wager') return <CollectorWager save={save} onStart={handleStartGame} onCancel={() => setScreen('hub')} />;
  if (screen === 'game') return <CollectorGame save={save} wager={gameWager} onEnd={handleGameEnd} onUpdate={handleUpdate} />;
  if (screen === 'result' && gameResult) return <CollectorGameResult result={gameResult} save={save} onWinPull={handleWinPull} onHome={() => { setScreen('hub'); setGameResult(null); }} />;
  if (screen === 'winpull') return <CollectorWinPull winPullCards={winPullCards} onPick={handlePickWinPull} onSkip={() => setScreen('hub')} />;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      {/* Nav bar */}
      <div className="nav-bar">
        <div className="nav-side">
          <button className="btn btn-ghost btn-sm" onClick={onHome}>← Home</button>
        </div>
        <div style={{ flex:1, textAlign:'center' }}>
          <div className="nav-title">COLLECTOR</div>
          <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>
            DECK: <CollTierBadge tier={deckTier} /> · {save.owned?.length||0} CARDS
          </div>
        </div>
        <div className="nav-side" style={{ justifyContent:'flex-end', gap:8 }}>
          <VolumeBar />
          <button className="btn btn-ghost btn-sm" style={{ fontSize:'0.55rem' }} onClick={() => setShowTutorial(true)}>?</button>
        </div>
      </div>

      {/* Gold / Rerolls / Daily indicators */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 12px', background:'var(--bg2)', borderBottom:'1px solid var(--border)' }}>
        <div style={{ fontFamily:'Cinzel,serif', color:'var(--gold)', fontSize:'0.75rem' }}>🪙 {save.gold||0} Gold</div>
        <div style={{ fontFamily:'Cinzel,serif', color:'var(--text2)', fontSize:'0.7rem' }}>🎲 {save.rerolls||0} Rerolls</div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          {[{ icon:'🃏', label:'Pull', ms:pullCountdown, color:'#4caf50' },
            { icon:'🪙', label:'Reward', ms:rewardCountdown, color:'var(--gold)' }].map((d,i) => {
            const ready = d.ms <= 0;
            return (
              <span key={i} style={{
                fontSize:'0.55rem', fontFamily:'Cinzel,serif', whiteSpace:'nowrap',
                color: ready ? d.color : 'var(--text2)',
                border: ready ? `1px solid ${d.color}` : '1px solid transparent',
                borderRadius:4, padding: ready ? '2px 6px' : '2px 0',
                animation: ready ? 'glow 2s ease-in-out infinite' : 'none',
              }}>
                {d.icon} {ready ? `${d.label.toUpperCase()} READY` : formatCountdownShort(d.ms)}
              </span>
            );
          })}
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display:'flex', gap:2, padding:'6px 8px', background:'var(--bg2)', borderBottom:'1px solid var(--border)', overflowX:'auto' }}>
        {HUB_TABS.map(t => (
          <button key={t.id} className={`btn btn-${tab===t.id?'gold':'ghost'} btn-sm`} style={{ whiteSpace:'nowrap', fontSize:'0.6rem', flex:1 }} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{ flex:1, overflow:'hidden', padding:'10px 12px' }}>
        {tab === 'deck'  && <CollectorMyDeck save={save} onUpdate={handleUpdate} />}
        {tab === 'index' && <CollectorCardIndex save={save} />}
        {tab === 'stats' && <CollectorCardStats save={save} />}
        {tab === 'store' && <CollectorStore save={save} onUpdate={handleUpdate} />}
        {tab === 'daily' && <CollectorDailySection save={save} onUpdate={handleUpdate} />}
      </div>

      {/* Play button */}
      <div style={{ padding:'10px 12px', background:'var(--bg2)', borderTop:'1px solid var(--border)' }}>
        <button className="btn btn-gold" style={{ width:'100%', padding:'14px', fontSize:'0.9rem', letterSpacing:'0.12em' }} onClick={handlePlay}>
          ⚔ PLAY ⚔
        </button>
      </div>
    </div>
  );
}

  let _sessionId = null, _sessionUnsub = null;
  const _listeners = [];

  function init() {
    if (typeof firebase === 'undefined') return;
    if (!firebase.apps.length) firebase.initializeApp(_config);
    _auth = firebase.auth();
    _db = firebase.firestore();
    _auth.getRedirectResult().catch(() => {});
    _auth.onAuthStateChanged(user => {
      _user = user;
      _listeners.forEach(fn => fn(user));
      if (user) { _claimSession(); _pullAll(); }
      else { _releaseSession(); }
    });
  }

  // ── Single active session ──────────────────────────────────────────────────
  // Only one device may be signed in at a time. On sign-in we claim the session by writing a
  // fresh id to saves/<uid>_session and listening for changes; if another device later claims
  // it, this device is signed out. (Stored in the existing `saves` collection — with no
  // saveId field the save-sync ignores it, so no extra Firestore rules are required.)
  function _sessionDocRef() { return _db.collection('saves').doc(`${_user.uid}_session`); }
  function _newSessionId() { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10); }
  async function _claimSession() {
    if (!_user || !_db) return;
    const sid = _newSessionId();
    _sessionId = sid;
    try { await _sessionDocRef().set({ uid: _user.uid, sessionId: sid, updatedAt: Date.now() }); } catch (e) {}
    if (_sessionUnsub) { try { _sessionUnsub(); } catch (e) {} _sessionUnsub = null; }
    try {
      _sessionUnsub = _sessionDocRef().onSnapshot(doc => {
        const d = doc.data();
        if (d && d.sessionId && _sessionId && d.sessionId !== _sessionId) {
          _releaseSession();
          window.dispatchEvent(new CustomEvent('asoe-session-ended'));
          signOut();
        }
      }, () => {});
    } catch (e) {}
  }
  function _releaseSession() {
    if (_sessionUnsub) { try { _sessionUnsub(); } catch (e) {} _sessionUnsub = null; }
    _sessionId = null;
  }

  function onAuthChange(fn) { _listeners.push(fn); }
  function getUser() { return _user; }
  function signIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    return _auth.signInWithPopup(provider);
  }
  function signOut() { return _auth.signOut(); }

  function _docId(saveId) { return `${_user.uid}_${saveId}`; }

  async function _pullAll() {
    if (!_user || !_db) return;
    try {
      const snap = await _db.collection('saves').where('uid', '==', _user.uid).get();
      snap.forEach(doc => {
        const data = doc.data();
        const saveId = data.saveId;
        if (!saveId) return;
        if (data.deleted) { removeLocalSaveData(saveId); return; } // deleted on another device → drop locally
        // Ensure save slot exists locally
        const meta = getSaveMeta();
        if (!meta.find(s => s.id === saveId)) {
          meta.push({ id: saveId, created: data.createdAt || Date.now(), lastPlayed: data.updatedAt || Date.now(), name: data.saveName || `Save ${saveId}` });
          setSaveMeta(meta);
        }
        for (const key of SYNC_KEYS) {
          if (data[key] !== undefined && data[key] !== null) {
            const val = typeof data[key] === 'string' ? data[key] : JSON.stringify(data[key]);
            localStorage.setItem(sk(saveId, key), val);
          }
        }
        if (data.dailyCompletions) {
          for (const [dateKey, completed] of Object.entries(data.dailyCompletions)) {
            localStorage.setItem(sk(saveId, `daily_${dateKey}`), JSON.stringify(completed));
          }
        }
      });
      await _pullCollector();
      window.dispatchEvent(new CustomEvent('asoe-cloud-sync'));
    } catch(e) { console.warn('FirebaseSync pull failed', e); }
  }

  async function pushCollector() {
    if (!_user || !_db) return;
    try {
      const sid = getActiveSaveId() || 1;
      const raw = localStorage.getItem(collKey());
      if (!raw) return;
      const data = JSON.parse(raw);
      // Per-save cloud doc so one save's collection never overwrites another's.
      await _db.collection('collector').doc(_docId(sid)).set({ uid: _user.uid, saveId: sid, updatedAt: Date.now(), ...data }, { merge: true });
    } catch(e) { console.warn('FirebaseSync collector push failed', e); }
  }

  async function _pullCollector() {
    if (!_user || !_db) return;
    try {
      const sid = getActiveSaveId() || 1;
      const localKey = collKey();
      const doc = await _db.collection('collector').doc(_docId(sid)).get();
      if (doc.exists) {
        const { uid, saveId, updatedAt, ...data } = doc.data();
        const local = JSON.parse(localStorage.getItem(localKey) || '{}');
        // Cloud wins if it has a later updatedAt, otherwise keep local
        if (!local.updatedAt || updatedAt > (local.updatedAt || 0)) {
          localStorage.setItem(localKey, JSON.stringify({ ...collDefaultSave(), ...data }));
        }
      }
    } catch(e) { console.warn('FirebaseSync collector pull failed', e); }
  }

  async function pushSave(saveId) {
    if (!_user || !_db || !saveId) return;
    try {
      const meta = getSaveMeta().find(s => s.id === saveId);
      const payload = { uid: _user.uid, saveId, deleted: false, updatedAt: Date.now(), createdAt: meta?.created || Date.now(), saveName: meta?.name || `Save ${saveId}` };
      for (const key of SYNC_KEYS) {
        const raw = localStorage.getItem(sk(saveId, key));
        if (raw !== null) {
          try { payload[key] = JSON.parse(raw); } catch { payload[key] = raw; }
        }
      }
      // Firestore forbids nested arrays — serialize complex objects as JSON strings
      if (Array.isArray(payload.history)) payload.history = JSON.stringify(payload.history.slice(-50));
      if (payload.chaosCompletions != null && typeof payload.chaosCompletions === 'object') payload.chaosCompletions = JSON.stringify(payload.chaosCompletions);
      const dateKey = getDailyDateKey();
      const dailyRaw = localStorage.getItem(sk(saveId, `daily_${dateKey}`));
      if (dailyRaw) {
        payload.dailyCompletions = {};
        try { payload.dailyCompletions[dateKey] = JSON.parse(dailyRaw); } catch {}
      }
      await _db.collection('saves').doc(_docId(saveId)).set(payload, { merge: true });
    } catch(e) { console.warn('FirebaseSync push failed', e); }
  }

  // Tombstone a deleted save in the cloud so every other signed-in device drops it on its
  // next pull, and clear its cloud collector data.
  async function deleteSave(saveId) {
    if (!_user || !_db || !saveId) return;
    try {
      await _db.collection('saves').doc(_docId(saveId)).set({ uid: _user.uid, saveId, deleted: true, deletedAt: Date.now() });
      await _db.collection('collector').doc(_docId(saveId)).delete();
    } catch(e) { console.warn('FirebaseSync delete failed', e); }
  }

  return { init, signIn, signOut, getUser, onAuthChange, pushSave, pushCollector, deleteSave };
})();

// ─── Daily Challenges ─────────────────────────────────────────────────────────
function getDailyDateKey() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function makeDailyRng(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return () => { s = Math.imul(s ^ (s >>> 16), 0x45d9f3b); s = Math.imul(s ^ (s >>> 16), 0x45d9f3b); return (s >>> 0) / 0xffffffff; };
}

function buildDailyChallenges(dateKey) {
  const rng = makeDailyRng(parseInt(dateKey, 10));
  const t1 = 30 + Math.floor(rng() * 16); // 30-45 classic
  const t2 = 50 + Math.floor(rng() * 22); // 50-71 empire
  const t3 = 32 + Math.floor(rng() * 10); // 32-41 classic heir constraint
  const t4 = 255 + Math.floor(rng() * 90); // 255-344 dynasty
  const cpuMode = rng() < 0.5 ? 'classic' : 'empire';
  const cpuModeLabel = cpuMode === 'classic' ? 'Classic' : 'Empire Fate';
  return [
    {
      id: 'c_score', label: `Classic ≥${t1}pts`, diff: 1,
      desc: `Score at least ${t1} points in Classic Mode (solo)`,
      check: (h) => (h.modeKey==='classic' || h.modeKey==='classic-hard') && !h.isVersus && !h.isCPU && calcScore((h.boards||[])[0]||h.board||[]) >= t1,
    },
    {
      id: 'cpu_beat', label: `Beat CPU (${cpuModeLabel})`, diff: 2,
      desc: `Win a vs-CPU game in ${cpuModeLabel} Mode`,
      check: (h) => h.modeKey===cpuMode && h.isCPU && calcScore((h.boards||[])[0]||h.board||[]) > calcScore((h.boards||[])[1]||h.board2||[]),
    },
    {
      id: 'e_score', label: `Empire ≥${t2}pts`, diff: 2,
      desc: `Score at least ${t2} points in Empire Fate Mode (solo)`,
      check: (h) => h.modeKey==='empire' && !h.isVersus && !h.isCPU && calcScore((h.boards||[])[0]||h.board||[]) >= t2,
    },
    {
      id: 'c_heir', label: `Cursed Heir (≥${t3})`, diff: 3,
      desc: `Score ${t3}+ in Classic with the Heir slot scoring under 5`,
      check: (h) => (h.modeKey==='classic'||h.modeKey==='classic-hard') && !h.isVersus && calcScore((h.boards||[])[0]||h.board||[]) >= t3 &&
        getSlotScore(((h.boards||[])[0]||h.board||[]).find(s=>s.positionId==='heir')||{}) < 5,
    },
    {
      id: 'dyn_score', label: `Dynasty ≥${t4}`, diff: 4,
      desc: `Score at least ${t4} total in Dynasty Mode`,
      check: (h) => { if (h.modeKey!=='dynasty' || h.isVersus || h.isCPU) return false;
        const b = (h.boards||[])[0]||h.board||[];
        // Use the same category-aware scoring the game displays (incomplete pairs score 0)
        return b.reduce((sum,sl)=>sum+getDynastySlotScore(sl,b),0) >= t4; },
    },
    {
      id: 'chaos_win', label: 'Chaos Victory', diff: 3,
      desc: 'Win any rung on the Chaos Ladder',
      check: (h) => h.modeKey==='chaos' && h.isWin,
    },
  ];
}

function getDailyChallengeState(saveId) {
  const dateKey = getDailyDateKey();
  const storageKey = sk(saveId, `daily_${dateKey}`);
  const completed = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const allChallenges = buildDailyChallenges(dateKey);
  // Pick 5 from 6 templates using the rng
  const rng = makeDailyRng(parseInt(dateKey, 10) + 1);
  const indices = [0,1,2,3,4,5];
  for(let i=indices.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
  const challenges = indices.slice(0,5).map(i => allChallenges[i]);
  return { dateKey, storageKey, challenges, completed };
}

function markDailyChallengeComplete(saveId, challengeId) {
  const dateKey = getDailyDateKey();
  const storageKey = sk(saveId, `daily_${dateKey}`);
  const completed = JSON.parse(localStorage.getItem(storageKey) || '[]');
  if (!completed.includes(challengeId)) {
    completed.push(challengeId);
    localStorage.setItem(storageKey, JSON.stringify(completed));
  }
}

function checkDailyChallenges(gameResult, saveId) {
  if (!saveId) return [];
  const { challenges, completed } = getDailyChallengeState(saveId);
  const newlyDone = [];
  for (const ch of challenges) {
    if (completed.includes(ch.id)) continue;
    try {
      if (ch.check(gameResult)) {
        markDailyChallengeComplete(saveId, ch.id);
        newlyDone.push(ch.id);
      }
    } catch(e) {}
  }
  return newlyDone;
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    function onAch(e) {
      const ach = (window.ACHIEVEMENTS || []).find(a => a.id === e.detail);
      if (!ach) return;
      const key = Date.now() + Math.random();
      setToasts(ts => [...ts, { key, ach }]);
      setTimeout(() => setToasts(ts => ts.filter(t => t.key !== key)), 3600);
    }
    window.addEventListener('asoe-achievement', onAch);
    return () => window.removeEventListener('asoe-achievement', onAch);
  }, []);
  if (!toasts.length) return null;
  return (
    <div style={{ position: 'fixed', top: 58, left: 0, right: 0, zIndex: 500, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, pointerEvents: 'none' }}>
      {toasts.map(({ key, ach }) => (
        <div key={key} className="ach-toast">
          <span style={{ fontSize: '1.3rem', lineHeight: 1, flexShrink: 0 }}>{ach.icon || '🏆'}</span>
          <div>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.65rem', color: 'var(--gold)', letterSpacing: '0.1em', marginBottom: 2 }}>ACHIEVEMENT UNLOCKED</div>
            <div style={{ fontSize: '0.78rem', color: 'var(--text)', fontWeight: 600 }}>{ach.name}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  // Resume an in-progress game if the page was reloaded mid-game (e.g. a phone discarded the
  // backgrounded tab); otherwise open on the account/login screen, then the opening tutorial.
  const bootRef = useRef();
  if (!bootRef.current) {
    const l = loadLive();
    let b = { screen: 'account' };
    if (l && l.screen === 'game' && l.gameConfig) b = { screen: 'game', gameConfig: l.gameConfig };
    else if (l && l.screen === 'chaosGame' && l.chaosRungId != null) {
      const rung = (window.CHAOS_RUNGS || []).find(r => r.id === l.chaosRungId);
      if (rung) b = { screen: 'chaosGame', currentChaosRung: rung };
    }
    else if (l && l.screen === 'collector') b = { screen: 'collector' };
    bootRef.current = b;
  }
  const boot = bootRef.current;
  const [screen, setScreen] = useState(boot.screen);
  const [homeInitialView, setHomeInitialView] = useState(null);
  const [gameConfig, setGameConfig] = useState(boot.gameConfig || null);
  const [gameResult, setGameResult] = useState(null);
  const [newAchievements, setNewAchievements] = useState([]);
  const [saveId, setSaveId] = useState(() => getActiveSaveId());
  const [chaosProgress, setChaosProgress] = useState(() => {
    const id = getActiveSaveId();
    const v = parseInt(localStorage.getItem(sk(id, 'chaosProgress')) || '0', 10);
    return isNaN(v) ? 0 : Math.min(v, 50);
  });
  const [currentChaosRung, setCurrentChaosRung] = useState(boot.currentChaosRung || null);
  const [chaosEndResult, setChaosEndResult] = useState(null);
  const [syncKey, setSyncKey] = useState(0);
  const [sessionEnded, setSessionEnded] = useState(false);

  useEffect(() => {
    FirebaseSync.init();
    function onSync() {
      // Re-read chaos progress and force HomeScreen refresh after cloud pull
      const id = getActiveSaveId();
      if (id) {
        const v = parseInt(localStorage.getItem(sk(id, 'chaosProgress')) || '0', 10);
        setChaosProgress(isNaN(v) ? 0 : Math.min(v, 50));
      }
      setSaveId(getActiveSaveId()); // a pull may have added or removed saves
      setSyncKey(k => k + 1);
    }
    function onSessionEnded() { setSessionEnded(true); }
    window.addEventListener('asoe-cloud-sync', onSync);
    window.addEventListener('asoe-session-ended', onSessionEnded);
    return () => { window.removeEventListener('asoe-cloud-sync', onSync); window.removeEventListener('asoe-session-ended', onSessionEnded); };
  }, []);

  // Keep a resume snapshot of any in-progress game; clear it once the game ends or the
  // player leaves to a non-game screen (home, results, ladder, etc.).
  useEffect(() => {
    if (screen === 'game' && gameConfig) saveLive({ screen, gameConfig });
    else if (screen === 'chaosGame' && currentChaosRung) saveLive({ screen, chaosRungId: currentChaosRung.id });
    else if (screen === 'collector') saveLive({ screen });
    else clearLive();
  }, [screen, gameConfig, currentChaosRung]);

  function handleSaveChange(newId, goTo) {
    if (goTo) setHomeInitialView(goTo);
    setSaveId(newId);
    if (newId) {
      setActiveSaveId(newId);
      touchSave(newId);
      const v = parseInt(localStorage.getItem(sk(newId, 'chaosProgress')) || '0', 10);
      setChaosProgress(isNaN(v) ? 0 : Math.min(v, 50));
    } else {
      setChaosProgress(0);
    }
  }

  function handleStart({ mode, showScores, numPlayers, cpuPlayers, wildcardPositions }) {
    if (saveId) touchSave(saveId);
    if (mode === 'dynasty') AudioManager.startDynastyMusic();
    else AudioManager.startGameMusic();
    setGameConfig({ mode, showScores, numPlayers: numPlayers || 1, cpuPlayers: cpuPlayers || [false], wildcardPositions: wildcardPositions || false });
    setScreen('game');
  }

  function handleChaosChallenge(rung) {
    AudioManager.startGameMusic();
    setCurrentChaosRung(rung);
    setScreen('chaosGame');
  }

  function handleChaosGameEnd(result) {
    if (!result) { setScreen('ladder'); return; }
    let achUnlocked = [];
    let playerBoard = [], isWin = false, newProgress = chaosProgress;
    try {
      playerBoard = (result.boards || [])[0] || result.board || [];
      const playerScore = calcScore(playerBoard);
      isWin = playerScore > result.opponentScore;
      if (isWin && currentChaosRung) {
        if (currentChaosRung.id === chaosProgress + 1) {
          newProgress = chaosProgress + 1;
          localStorage.setItem(sk(saveId, 'chaosProgress'), String(newProgress));
          setChaosProgress(newProgress);
          achUnlocked = checkChaosAchievements(currentChaosRung, newProgress, saveId) || [];
        }
        const existing = JSON.parse(localStorage.getItem(sk(saveId, 'chaosCompletions')) || '{}');
        if (!existing[currentChaosRung.id]) {
          existing[currentChaosRung.id] = { board: playerBoard, date: Date.now() };
          localStorage.setItem(sk(saveId, 'chaosCompletions'), JSON.stringify(existing));
        }
      }
      achUnlocked.forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id })));
      try { checkDailyChallenges({ modeKey: 'chaos', isWin, boards: [playerBoard], board: playerBoard }, saveId); } catch(e) {}
      try { FirebaseSync.pushSave(saveId); } catch(e) {}
    } catch(e) { console.error('handleChaosGameEnd error:', e); }
    setChaosEndResult({ ...result, board: playerBoard, isWin, newProgress });
    setNewAchievements(achUnlocked);
    setScreen('chaosEnd');
  }

  function handleGameEnd(result) {
    // Returning to the carousel (not the title/main menu) after a game; quitting too.
    if (!result) { applyNavMusic(); setHomeInitialView('modes'); setScreen('home'); return; }
    let unlocked = [];
    // A completed game legitimizes the save: make sure it's registered in the save list and
    // marked as the most-recently-played slot so CONTINUE/LOAD reliably show it.
    if (saveId) {
      const meta = getSaveMeta();
      if (!meta.find(s => s.id === saveId)) {
        meta.push({ id: saveId, created: Date.now(), lastPlayed: Date.now(), name: `Save ${saveId}` });
        setSaveMeta(meta); setActiveSaveId(saveId);
      } else touchSave(saveId);
    }
    try {
      const histKey = sk(saveId, 'history');
      const existing = JSON.parse(localStorage.getItem(histKey) || '[]');
      const np = gameConfig.numPlayers || 1;
      const cp = gameConfig.cpuPlayers || [false];
      const boards = result.boards || [result.board, result.board2].filter(Boolean);
      const entry = {
        modeKey: gameConfig.mode, numPlayers: np, cpuPlayers: cp,
        isVersus: np > 1 && cp.slice(1).some(c => !c),
        isCPU: np > 1 && cp.slice(1).every(c => c),
        showScores: gameConfig.showScores, boards,
        board: boards[0] || null, board2: boards[1] || null, date: Date.now(),
      };
      existing.push(entry);
      localStorage.setItem(histKey, JSON.stringify(existing));
      if (entry.board && !entry.isVersus && !entry.isCPU) {
        const avgKey = sk(saveId, 'p1Averages');
        const avgs = JSON.parse(localStorage.getItem(avgKey) || '{}');
        const mk = entry.modeKey;
        const prev = avgs[mk] || { count: 0, sum: 0 };
        avgs[mk] = { count: prev.count + 1, sum: prev.sum + calcScore(entry.board) };
        localStorage.setItem(avgKey, JSON.stringify(avgs));
      }
      unlocked = checkAchievements({ modeKey: gameConfig.mode, boards, board: boards[0] || [], board2: boards[1] || [], numPlayers: np, cpuPlayers: cp, isVersus: entry.isVersus, isCPU: entry.isCPU, dynDiscards: result.dynDiscards, rerolls: result.rerolls }, existing, saveId) || [];
      unlocked.forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id })));
      try { checkDailyChallenges({ modeKey: gameConfig.mode, boards, board: boards[0] || [], board2: boards[1] || [], numPlayers: np, cpuPlayers: cp, isVersus: entry.isVersus, isCPU: entry.isCPU, isWin: entry.isCPU ? (calcScore(boards[0]||[]) > calcScore(boards[1]||[])) : false }, saveId); } catch(e) {}
      try { FirebaseSync.pushSave(saveId); } catch(e) {}
      result = { ...result, boards };
    } catch(e) { console.error('handleGameEnd error:', e); }
    setNewAchievements(unlocked);
    setGameResult(result);
    setScreen('end');
  }

  const nav = (s, initView) => () => {
    applyNavMusic();
    if (initView) setHomeInitialView(initView);
    setScreen(s);
  };

  return (
    <>
      <ToastContainer />
      {sessionEnded && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:99999, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
          <div style={{ background:'#120d06', border:'1px solid var(--gold)', borderRadius:14, padding:'28px 24px', maxWidth:320, width:'88%', textAlign:'center', boxShadow:'0 8px 40px rgba(0,0,0,0.9)' }}>
            <div style={{ fontSize:'2.2rem', marginBottom:8 }}>📱</div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.15rem', color:'var(--gold2)', fontWeight:700, marginBottom:8 }}>Signed Out</div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.6, marginBottom:20 }}>Your account was opened on another device. Only one device can be signed in at a time.</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              <button className="btn btn-gold" onClick={() => { setSessionEnded(false); try { FirebaseSync.signIn(); } catch(e){} }}>Sign In Again Here</button>
              <button className="btn btn-ghost" onClick={() => setSessionEnded(false)}>Continue Offline</button>
            </div>
          </div>
        </div>
      )}
      <div key={screen} className="screen-enter" style={{ height: '100%' }}>
      {screen === 'account' && (
        <AccountScreen startup onContinue={() => setScreen('tutorial')} onBack={() => setScreen('tutorial')} />
      )}
      {screen === 'tutorial' && (
        <TutorialScreen onDone={() => setScreen('home')} />
      )}
      {screen === 'home' && (
        <HomeScreen
          key={`${saveId}-${syncKey}`}
          onStart={handleStart}
          onHistory={nav('history')}
          onHowToPlay={nav('howtoplay')}
          onCharIndex={nav('charindex')}
          onAchievements={nav('achievements')}
          onMostPlayed={nav('mostplayed')}
          onLadder={nav('ladder')}
          onCollector={nav('collector')}
          chaosProgress={chaosProgress}
          initialView={homeInitialView}
          saveId={saveId}
          onSaveChange={handleSaveChange}
        />
      )}
      {screen === 'collector' && (
        <CollectorHub onHome={nav('home', 'modes')} />
      )}
      {screen === 'ladder' && (
        <LadderScreen
          onBack={() => { applyNavMusic(); setHomeInitialView('modes'); setScreen('home'); }}
          onChallenge={handleChaosChallenge}
          progress={chaosProgress}
        />
      )}
      {screen === 'chaosGame' && currentChaosRung && (
        <GameScreen
          modeKey="chaos"
          showScores={false}
          chaosRung={currentChaosRung}
          onEnd={handleChaosGameEnd}
        />
      )}
      {screen === 'chaosEnd' && chaosEndResult && currentChaosRung && (
        <ChaosEndScreen
          rung={currentChaosRung}
          board={chaosEndResult.board}
          opponentBoard={chaosEndResult.opponentBoard}
          opponentScore={chaosEndResult.opponentScore}
          isWin={chaosEndResult.isWin}
          progress={chaosEndResult.newProgress}
          totalRungs={50}
          newAchievements={newAchievements}
          onRetry={() => { setScreen('chaosGame'); }}
          onNext={() => {
            const nextRung = (window.CHAOS_RUNGS || []).find(r => r.id === chaosEndResult.newProgress + 1);
            if (nextRung) { setCurrentChaosRung(nextRung); setScreen('chaosGame'); }
            else setScreen('ladder');
          }}
          onLadder={nav('ladder')}
          onHome={nav('home', 'modes')}
        />
      )}
      {screen === 'game' && gameConfig && (
        <GameScreen
          modeKey={gameConfig.mode}
          showScores={gameConfig.showScores}
          numPlayers={gameConfig.numPlayers}
          cpuPlayers={gameConfig.cpuPlayers}
          wildcardPositions={gameConfig.wildcardPositions}
          onEnd={handleGameEnd}
        />
      )}
      {screen === 'end' && gameResult && (
        <EndScreen
          modeKey={gameConfig.mode}
          boards={gameResult.boards}
          numPlayers={gameConfig.numPlayers}
          cpuPlayers={gameConfig.cpuPlayers}
          showScores={gameConfig.showScores}
          newAchievements={newAchievements}
          saveId={saveId}
          onHome={nav('home', 'modes')}
          onPlayAgain={() => { if (gameConfig?.mode === 'dynasty') AudioManager.startDynastyMusic(); else AudioManager.startGameMusic(); setGameResult(null); setNewAchievements([]); setScreen('game'); }}
        />
      )}
      {screen === 'history' && <HistoryScreen key={saveId} saveId={saveId} onBack={nav('home')} />}
      {screen === 'howtoplay' && <HowToPlayScreen onBack={nav('home')} />}
      {screen === 'charindex' && <CharacterIndexScreen onBack={nav('home')} />}
      {screen === 'achievements' && <AchievementsScreen key={saveId} saveId={saveId} onBack={nav('home')} />}
      {screen === 'mostplayed' && <MostPlayedScreen key={saveId} saveId={saveId} onBack={nav('home')} />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
<script>
(function() {
  var el = document.getElementById('app-src');
  if (!el) return;
  var src = el.textContent;
  try {
    var compiled = Babel.transform(src, {
      presets: [['react', { runtime: 'classic' }]]
    }).code;
    var fn = new Function(compiled);
    fn();
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="color:#ff6b6b;padding:20px;font-family:monospace;white-space:pre-wrap">' +
      'Error: ' + e.message + '</div>';
    console.error(e);
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
</body>
