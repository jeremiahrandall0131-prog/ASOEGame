                      {save ? displayName : `Save ${id}`}{isActive ? ' ✓' : ''}
                    </div>
                    {save && (
                      <button onClick={() => { setEditingSlot(id); setEditName(displayName); }}
                        style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: '0.75rem', color: 'var(--text2)', padding: '2px 4px', lineHeight: 1 }}
                        title="Rename">✏</button>
                    )}
                  </div>
                )}
                {/* Info + action row */}
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: save ? 2 : 0 }}>
                  <div>
                    {save ? (<>
                      <div style={{ fontSize: '0.6rem', color: 'var(--text2)' }}>Created: {new Date(save.created).toLocaleDateString()}</div>
                      <div style={{ fontSize: '0.6rem', color: 'var(--text2)' }}>Last played: {new Date(save.lastPlayed).toLocaleDateString()}</div>
                    </>) : (
                      <div style={{ fontSize: '0.62rem', color: 'rgba(255,255,255,0.3)', fontStyle: 'italic' }}>Empty slot</div>
                    )}
                  </div>
                  <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                    {save ? (<>
                      <button className="btn btn-sm btn-gold" style={{ fontSize: '0.7rem', padding: '6px 12px' }}
                        onClick={() => { if (onSaveChange) onSaveChange(id, 'modes'); AudioManager.startMenuMusic(); setView('modes'); }}>
                        Load
                      </button>
                      <button className="btn btn-sm"
                        style={{ fontSize: '0.7rem', padding: '6px 10px', background: 'rgba(180,40,40,0.2)', border: '1px solid #c04040', color: '#e08080' }}
                        onClick={() => {
                          if (!confirm(`Delete "${displayName}"? This cannot be undone.`)) return;
                          const wasActive = getActiveSaveId() === id;
                          deleteSaveSlot(id);
                          setEditingSlot(null);
                          setSaveRev(r => r + 1); // re-render so the deleted slot clears immediately
                          if (wasActive) {
                            const next = getActiveSaveId();
                            if (onSaveChange) onSaveChange(next, 'load-save');
                          }
                        }}>✕</button>
                    </>) : (
                      <button className="btn btn-sm btn-gold" style={{ fontSize: '0.7rem', padding: '6px 12px', opacity: 0.75 }}
                        onClick={() => {
                          createSaveSlot(id);
                          if (onSaveChange) onSaveChange(id, 'name-save');
                        }}>+ New</button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Setup screen (second screen) ─────────────────────────────────────────
  if (view === 'setup') {
    const mode = currentMode;
    const isDynasty = false;
    const TR = ({ label, checked, onChange, indent }) => (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '5px 0', paddingLeft: indent ? 12 : 0, borderLeft: indent ? '2px solid rgba(255,255,255,0.13)' : 'none', marginLeft: indent ? 6 : 0 }}>
        <span style={{ fontSize: indent ? '0.73rem' : '0.8rem', color: '#e8e0cc', fontFamily: 'Cinzel,serif' }}>{label}</span>
        <label className="toggle" style={{ flexShrink: 0, marginLeft: 12 }}>
          <input type="checkbox" checked={checked} onChange={onChange} />
          <span className="toggle-slider" />
        </label>
      </div>
    );
    return (
      <div className="app" style={{ position: 'relative', background: '#000', overflow: 'hidden' }}>
        {/* Full-screen portrait — identical approach to carousel */}
        {mode.img2
          ? <img src={`images/${mode.img2}`} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', objectPosition: 'center top' }} />
          : <div style={{ position: 'absolute', inset: 0, background: '#0a0805' }} />
        }
        {/* Top fade */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '18%', background: 'linear-gradient(to bottom, rgba(0,0,0,0.8), transparent)', pointerEvents: 'none' }} />
        {/* Bottom fade — covers lower 58% so toggles are readable */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '58%', background: 'linear-gradient(to top, rgba(0,0,0,0.98) 75%, transparent)', pointerEvents: 'none' }} />

        <IconSidebar />

        {/* Top bar */}
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10, padding: '10px 14px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <button className="btn btn-ghost btn-sm" style={{ color: '#fff' }} onClick={() => { setNumPlayers(1); setCpuPlayers([false,false,false,false]); setSpVsCpu(false); setMultiMode(false); setPickedMode(null); setView(viewFrom === 'classic-select' || viewFrom === 'empire-select' ? viewFrom : 'modes'); }}>← Back</button>
          <SettingsButton />
        </div>

        {/* Bottom panel — absolutely positioned, no scroll */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 10, padding: '0 18px 16px' }}>
          {/* Mode title */}
          <div style={{ textAlign: 'center', marginBottom: 10 }}>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.05rem', fontWeight: 700, color: '#f0c84a', letterSpacing: '0.1em' }}>{mode.name}</div>
            <div style={{ fontSize: '0.6rem', color: '#a08030', fontFamily: 'Cinzel,serif', marginTop: 2 }}>{mode.sub}</div>
          </div>

          {/* Divider */}
          <div style={{ borderTop: '1px solid rgba(255,215,0,0.2)', marginBottom: 6 }} />

          {/* Show Scores */}
          <TR label="👁 Show Character Scores" checked={showScores} onChange={e => setShowScores(e.target.checked)} />

          {/* Wildcard toggle — Classic (non-random) only */}
          {(mode.key === 'classic' || mode.key === 'classic-hard') && (
            <>
              <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', margin: '4px 0' }} />
              <TR label="🃏 Wildcard Positions" checked={wildcardPositions} onChange={e => setWildcardPositions(e.target.checked)} />
              {wildcardPositions && (
                <div style={{ fontSize: '0.6rem', color: '#a08030', fontFamily: 'Cinzel,serif', paddingLeft: 2, marginBottom: 4, lineHeight: 1.4 }}>
                  Ruler & Heir locked — 3 positions drawn randomly from Empire pool each game
                </div>
              )}
            </>
          )}

          {/* Divider */}
          <div style={{ borderTop: '1px solid rgba(255,255,255,0.08)', margin: '4px 0' }} />

          {/* Single Player */}
          <TR label="🧑 Single Player" checked={!multiMode} onChange={e => { if (e.target.checked) setMultiMode(false); }} />
          {!multiMode && (
            <>
              <TR label="🤖 vs CPU" checked={spVsCpu} onChange={e => setSpVsCpu(e.target.checked)} indent />
              {spVsCpu && (
                <div style={{ paddingLeft: 12, borderLeft: '2px solid rgba(255,255,255,0.13)', marginLeft: 6, marginTop: 2, marginBottom: 2 }}>
                  <div style={{ display: 'flex', gap: 5, margin: '4px 0' }}>
                    {[1,2,3].map(n => (
                      <button key={n} className={`btn btn-sm ${spCpuCount === n ? 'btn-gold' : 'btn-ghost'}`}
                        style={{ flex: 1, padding: '4px 2px', fontSize: '0.72rem' }} onClick={() => setSpCpuCount(n)}>{n} CPU</button>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          {/* Local Multiplayer */}
          <TR label="⚔️ Local Multiplayer" checked={multiMode} onChange={e => { if (e.target.checked) { setMultiMode(true); if (numPlayers < 2) setNumPlayers(2); } }} />
          {multiMode && (
            <div style={{ paddingLeft: 12, borderLeft: '2px solid rgba(255,255,255,0.13)', marginLeft: 6, marginTop: 2 }}>
              <div style={{ display: 'flex', gap: 5, margin: '4px 0 5px' }}>
                {[2,3,4].map(n => (
                  <button key={n} className={`btn btn-sm ${numPlayers === n ? 'btn-gold' : 'btn-ghost'}`}
                    style={{ flex: 1, padding: '4px 2px', fontSize: '0.72rem' }} onClick={() => setNumPlayers(n)}>{n} Players</button>
                ))}
              </div>
              {Array.from({ length: numPlayers - 1 }).map((_, i) => (
                <TR key={i} label={`🤖 Player ${i+2} is CPU`} checked={cpuPlayers[i+1]}
                  onChange={e => { const next = [...cpuPlayers]; next[i+1] = e.target.checked; setCpuPlayers(next); }} indent />
              ))}
            </div>
          )}

          {/* BEGIN */}
          <button
            className="btn btn-gold"
            disabled={isDynasty}
            style={{ width: '100%', padding: '13px', fontSize: '1rem', letterSpacing: '0.12em', marginTop: 10, ...(isDynasty ? { opacity: 0.4, cursor: 'not-allowed' } : {}) }}
            onClick={isDynasty ? undefined : () => {
              const np = multiMode ? numPlayers : (spVsCpu ? 1 + spCpuCount : 1);
              const cp = multiMode ? [false, ...cpuPlayers.slice(1, numPlayers)] : (spVsCpu ? [false, ...Array(spCpuCount).fill(true)] : [false]);
              onStart({ mode: mode.key, showScores, numPlayers: np, cpuPlayers: cp, wildcardPositions: wildcardPositions && (mode.key === 'classic' || mode.key === 'classic-hard') });
            }}
          >⚔ BEGIN ⚔</button>
          {false && null}
        </div>
      </div>
    );
  }

  // ── Sub-screens ───────────────────────────────────────────────────────────
  const SubBar = ({ back, label }) => (
    <div style={{ padding: '12px 14px 6px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <button className="btn btn-ghost btn-sm" onClick={back}>← Back</button>
        {label && <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.7rem', color: 'var(--gold)' }}>{label}</div>}
      </div>
      <SettingsButton />
    </div>
  );

  if (view === 'how-to-play') return (
    <div className="app"><div className="scroll" style={{ flex: 1 }}>
      <SubBar back={() => setView(viewFrom)} label={`${currentMode.name} · HOW TO PLAY`} />
      <HowToPlayScreen embedded onBack={() => setView(viewFrom)} modeKey={currentMode.key} />
    </div></div>
  );
  if (view === 'most-played') return (
    <div className="app"><div className="scroll" style={{ flex: 1 }}>
      <SubBar back={() => setView(viewFrom)} label={`${currentMode.name} · MOST PLAYED`} />
      <MostPlayedScreen embedded onBack={() => setView(viewFrom)} initialModeFilter={['chaos','dynasty'].includes(currentMode.key) ? 'all' : currentMode.key} saveId={saveId} />
    </div></div>
  );
  if (view === 'history') return (
    <div className="app"><div className="scroll" style={{ flex: 1 }}>
      <SubBar back={() => setView(viewFrom)} label={`${currentMode.name} · HISTORY`} />
      <HistoryScreen embedded onBack={() => setView(viewFrom)} initialTab={currentMode.key} saveId={saveId} />
    </div></div>
  );
  if (view === 'char-index') return (
    <div className="app"><div className="scroll" style={{ flex: 1 }}>
      <SubBar back={() => setView('modes')} label="CHARACTER INDEX" />
      <CharacterIndexScreen embedded onBack={() => setView('modes')} />
    </div></div>
  );
  if (view === 'achievements') return (
    <div className="app"><div className="scroll" style={{ flex: 1 }}>
      <SubBar back={() => setView('modes')} label="ACHIEVEMENTS" />
      <AchievementsScreen embedded onBack={() => setView('modes')} saveId={saveId} />
    </div></div>
  );
  if (view === 'daily') return (
    <DailyChallengesScreen saveId={saveId} onBack={() => setView(viewFrom)} />
  );
  if (view === 'account') return (
    <AccountScreen onBack={() => setView(viewFrom)} />
  );

  // ── Classic variant selector ─────────────────────────────────────────────
  if (view === 'classic-select') {
    const cMode = classicModes[classicSubPage] || classicModes[0]; // guard against out-of-range page
    return (
      <div className="app" style={{ position: 'relative', background: '#000', overflow: 'hidden' }}>
        <img src={`images/${cMode.img}`} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', objectPosition: 'center top' }} />
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '18%', background: 'linear-gradient(to bottom, rgba(0,0,0,0.75), transparent)' }} />
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '40%', background: 'linear-gradient(to top, rgba(0,0,0,0.97), transparent)' }} />
        {/* Back button */}
        <button onClick={() => setView('modes')} style={{ position: 'absolute', top: 0, left: 0, zIndex: 10, background: 'rgba(0,0,0,0.72)', border: '0 solid transparent', borderBottomRightRadius: 12, color: '#f0c84a', cursor: 'pointer', padding: '10px 14px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <span style={{ fontSize: '1.6rem' }}>←</span>
          <span style={{ fontSize: '0.55rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.05em', color: '#c0a040' }}>BACK</span>
        </button>
        <div style={{ position: 'absolute', top: 10, right: 10, zIndex: 10 }}><SettingsButton /></div>
        {/* Dots */}
        <div style={{ position: 'absolute', top: 16, left: 0, right: 0, zIndex: 10, display: 'flex', justifyContent: 'center' }}>
          <div style={{ display: 'flex', gap: 7 }}>
            {classicModes.map((_, i) => (
              <div key={i} onClick={() => setClassicSubPage(i)} style={{ width: 8, height: 8, borderRadius: '50%', cursor: 'pointer', transition: 'background 0.2s', background: classicSubPage === i ? '#fff' : 'rgba(255,255,255,0.3)' }} />
            ))}
          </div>
        </div>
        {/* Arrows */}
        {classicSubPage > 0 && (
          <button onClick={() => setClassicSubPage(p => Math.max(0, p - 1))} style={{ position: 'absolute', left: '10%', top: '50%', transform: 'translateY(-50%)', zIndex: 10, background: 'none', border: 'none', cursor: 'pointer', fontSize: '8rem', lineHeight: 1, color: 'rgba(240,200,74,0.9)', textShadow: '0 0 24px rgba(0,0,0,1)', padding: 0 }}>‹</button>
        )}
        {classicSubPage < classicModes.length - 1 && (
          <button onClick={() => setClassicSubPage(p => Math.min(classicModes.length - 1, p + 1))} style={{ position: 'absolute', right: '14%', top: '50%', transform: 'translateY(-50%)', zIndex: 10, background: 'none', border: 'none', cursor: 'pointer', fontSize: '8rem', lineHeight: 1, color: 'rgba(240,200,74,0.9)', textShadow: '0 0 24px rgba(0,0,0,1)', padding: 0 }}>›</button>
        )}
        {/* Bottom */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 10, padding: '0 14px 22px' }}>
          <div style={{ textAlign: 'center', marginBottom: 14 }}>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.4rem', fontWeight: 700, color: '#f0c84a', letterSpacing: '0.1em', textShadow: '0 2px 10px #000' }}>{cMode.name}</div>
            <div style={{ fontSize: '0.72rem', color: '#c0a040', fontFamily: 'Cinzel,serif', marginTop: 5, textShadow: '0 1px 6px #000' }}>{cMode.sub}</div>
          </div>
          <button className="btn btn-gold" style={{ width: '100%', padding: '15px', fontSize: '1rem', letterSpacing: '0.12em' }} onClick={() => { setPickedMode(classicModes[classicSubPage]); setViewFrom('classic-select'); setView('setup'); }}>
            ⚔ PLAY ⚔
          </button>
        </div>
      </div>
    );
  }

  // ── Empire variant selector ──────────────────────────────────────────────
  if (view === 'empire-select') {
    const eMode = empireModes[empireSubPage] || empireModes[0]; // guard against out-of-range page
    return (
      <div className="app" style={{ position: 'relative', background: '#000', overflow: 'hidden' }}>
        <img src={`images/${eMode.img}`} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', objectPosition: 'center top' }} />
        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '18%', background: 'linear-gradient(to bottom, rgba(0,0,0,0.75), transparent)' }} />
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '40%', background: 'linear-gradient(to top, rgba(0,0,0,0.97), transparent)' }} />
        {/* Back button */}
        <button onClick={() => setView('modes')} style={{ position: 'absolute', top: 0, left: 0, zIndex: 10, background: 'rgba(0,0,0,0.72)', border: '0 solid transparent', borderBottomRightRadius: 12, color: '#f0c84a', cursor: 'pointer', padding: '10px 14px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <span style={{ fontSize: '1.6rem' }}>←</span>
          <span style={{ fontSize: '0.55rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.05em', color: '#c0a040' }}>BACK</span>
        </button>
        <div style={{ position: 'absolute', top: 10, right: 10, zIndex: 10 }}><SettingsButton /></div>
        {/* Dots */}
        <div style={{ position: 'absolute', top: 16, left: 0, right: 0, zIndex: 10, display: 'flex', justifyContent: 'center' }}>
          <div style={{ display: 'flex', gap: 7 }}>
            {empireModes.map((_, i) => (
              <div key={i} onClick={() => setEmpireSubPage(i)} style={{ width: 8, height: 8, borderRadius: '50%', cursor: 'pointer', transition: 'background 0.2s', background: empireSubPage === i ? '#fff' : 'rgba(255,255,255,0.3)' }} />
            ))}
          </div>
        </div>
        {/* Arrows */}
        {empireSubPage > 0 && (
          <button onClick={() => setEmpireSubPage(p => Math.max(0, p - 1))} style={{ position: 'absolute', left: '10%', top: '50%', transform: 'translateY(-50%)', zIndex: 10, background: 'none', border: 'none', cursor: 'pointer', fontSize: '8rem', lineHeight: 1, color: 'rgba(240,200,74,0.9)', textShadow: '0 0 24px rgba(0,0,0,1)', padding: 0 }}>‹</button>
        )}
        {empireSubPage < empireModes.length - 1 && (
          <button onClick={() => setEmpireSubPage(p => Math.min(empireModes.length - 1, p + 1))} style={{ position: 'absolute', right: '14%', top: '50%', transform: 'translateY(-50%)', zIndex: 10, background: 'none', border: 'none', cursor: 'pointer', fontSize: '8rem', lineHeight: 1, color: 'rgba(240,200,74,0.9)', textShadow: '0 0 24px rgba(0,0,0,1)', padding: 0 }}>›</button>
        )}
        {/* Bottom */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 10, padding: '0 14px 22px' }}>
          <div style={{ textAlign: 'center', marginBottom: 14 }}>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.4rem', fontWeight: 700, color: '#f0c84a', letterSpacing: '0.1em', textShadow: '0 2px 10px #000' }}>{eMode.name}</div>
            <div style={{ fontSize: '0.72rem', color: '#c0a040', fontFamily: 'Cinzel,serif', marginTop: 5, textShadow: '0 1px 6px #000' }}>{eMode.sub}</div>
          </div>
          <button className="btn btn-gold" style={{ width: '100%', padding: '15px', fontSize: '1rem', letterSpacing: '0.12em' }} onClick={() => { setPickedMode(empireModes[empireSubPage]); setViewFrom('empire-select'); setView('setup'); }}>
            ⚔ PLAY ⚔
          </button>
        </div>
      </div>
    );
  }

  // ── Mode carousel (default) ───────────────────────────────────────────────
  const mode = modeCards[modePage] || modeCards[0]; // guard against out-of-range page
  const handlePlay = () => {
    if (mode.key === 'classic-group') { setView('classic-select'); return; }
    if (mode.key === 'empire-group')  { setView('empire-select');  return; }
    if (mode.key === 'chaos')         { onLadder();                return; }
    if (mode.key === 'collectors')    { onCollector();             return; }
    setPickedMode(null);
    setView('setup');
  };
  return (
    <div className="app" style={{ position: 'relative', background: '#000', overflow: 'hidden' }}>
      <img src={`images/${mode.img}`} alt=""
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'contain', objectPosition: 'center top' }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: '18%', background: 'linear-gradient(to bottom, rgba(0,0,0,0.75), transparent)' }} />
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '40%', background: 'linear-gradient(to top, rgba(0,0,0,0.97), transparent)' }} />
      <IconSidebar />

      {/* Huge side arrows */}
      {modePage > 0 && (
        <button onClick={() => setModePage(p => Math.max(0, p - 1))} style={{
          position: 'absolute', left: '10%', top: '50%', transform: 'translateY(-50%)', zIndex: 10,
          background: 'none', border: 'none', cursor: 'pointer',
          fontSize: '8rem', lineHeight: 1, color: 'rgba(240,200,74,0.9)',
          textShadow: '0 0 24px rgba(0,0,0,1)', padding: 0,
        }}>‹</button>
      )}
      {modePage < modeCards.length - 1 && (
        <button onClick={() => setModePage(p => Math.min(modeCards.length - 1, p + 1))} style={{
          position: 'absolute', right: '14%', top: '50%', transform: 'translateY(-50%)', zIndex: 10,
          background: 'none', border: 'none', cursor: 'pointer',
          fontSize: '8rem', lineHeight: 1, color: 'rgba(240,200,74,0.9)',
          textShadow: '0 0 24px rgba(0,0,0,1)', padding: 0,
        }}>›</button>
      )}

      <IconSidebar />

      {/* Corner buttons — flush with portrait edges */}
      <button onClick={() => setView('main-menu')} style={{
        position: 'absolute', top: 0, left: 0, zIndex: 10,
        background: 'rgba(0,0,0,0.72)', border: '0 solid transparent',
        borderBottomRightRadius: 12, color: '#f0c84a', cursor: 'pointer', padding: '10px 14px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
      }}>
        <span style={{ fontSize: '1.6rem' }}>🏠</span>
        <span style={{ fontSize: '0.55rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.05em', color: '#c0a040', whiteSpace: 'nowrap' }}>MAIN MENU</span>
      </button>
      <button onClick={() => setView('char-index')} style={{
        position: 'absolute', top: 0, left: 90, zIndex: 10,
        background: 'rgba(0,0,0,0.72)', border: '0 solid transparent',
        borderBottomRightRadius: 12, color: '#f0c84a', cursor: 'pointer', padding: '10px 14px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
      }}>
        <span style={{ fontSize: '1.6rem' }}>📖</span>
        <span style={{ fontSize: '0.55rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.05em', color: '#c0a040', whiteSpace: 'nowrap' }}>CHARACTER INDEX</span>
      </button>
      <button onClick={() => setView('achievements')} style={{
        position: 'absolute', top: 0, right: 62, zIndex: 10,
        background: 'rgba(0,0,0,0.72)', border: '0 solid transparent',
        borderBottomLeftRadius: 12, borderBottomRightRadius: 12, color: '#f0c84a', cursor: 'pointer', padding: '10px 14px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
      }}>
        <span style={{ fontSize: '1.6rem' }}>🏆</span>
        <span style={{ fontSize: '0.55rem', fontFamily: 'Cinzel,serif', letterSpacing: '0.05em', color: '#c0a040', whiteSpace: 'nowrap' }}>ACHIEVEMENTS</span>
      </button>
      {/* Settings cog — top right */}
      <div style={{ position: 'absolute', top: 10, right: 10, zIndex: 10 }}>
        <SettingsButton />
      </div>
      {/* Dots centered at top */}
      <div style={{ position: 'absolute', top: 14, left: 0, right: 0, zIndex: 10, display: 'flex', justifyContent: 'center', pointerEvents: 'none' }}>
        <div style={{ display: 'flex', gap: 7, pointerEvents: 'auto' }}>
          {modeCards.map((_, i) => (
            <div key={i} onClick={() => setModePage(i)} style={{
              width: 8, height: 8, borderRadius: '50%', cursor: 'pointer', transition: 'background 0.2s',
              background: modePage === i ? '#fff' : 'rgba(255,255,255,0.3)',
            }} />
          ))}
        </div>
      </div>

      {/* Bottom: mode name + PLAY */}
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 10, padding: '0 14px 22px' }}>
        <div style={{ textAlign: 'center', marginBottom: 14 }}>
          <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.4rem', fontWeight: 700, color: '#f0c84a', letterSpacing: '0.1em', textShadow: '0 2px 10px #000' }}>{mode.name}</div>
          <div style={{ fontSize: '0.72rem', color: '#c0a040', fontFamily: 'Cinzel,serif', marginTop: 5, textShadow: '0 1px 6px #000' }}>{mode.sub}</div>
        </div>
        <button className="btn btn-gold" style={{ width: '100%', padding: '15px', fontSize: '1rem', letterSpacing: '0.12em' }} onClick={handlePlay}>
          ⚔ PLAY ⚔
        </button>
      </div>
    </div>
  );
}

// ─── GameScreen ──────────────────────────────────────────────────────────────
function makeInitialState(modeKey, numPlayers, customPositions) {
  const mode = GAME_MODES[modeKey];
  const n = numPlayers || 1;
  const positions = customPositions || mode.positions;
  return {
    round: 1,
    rerolls: Array(n).fill(mode.rerolls),
    boards: Array.from({ length: n }, () => buildBoard(positions)),
    lastRoll: null,
    currentRoll: null,
    randomChar: null,
    phase: 'roll',
    selectedChar: null,
    draftChar: null,
    lockedGender: null,
    draftedIds: [],
    activePlayerIdx: 0,
    dynDiscards: Array(n).fill(0), // dynasty only: count of discards per player
  };
}

function GameScreen({ modeKey, showScores: initShowScores, numPlayers: propNumPlayers, cpuPlayers: propCpuPlayers, chaosRung, wildcardPositions, onEnd }) {
  const numPlayers = propNumPlayers || 1;
  const cpuPlayers = propCpuPlayers || [false];
  const mode = GAME_MODES[modeKey];

  // Wildcard positions: Ruler+Heir locked, 3 random picks from Empire non-locked pool
  const resolvedPositions = React.useMemo(() => {
    if (!wildcardPositions || !mode) return mode?.positions;
    const locked = [
      {id:'ruler', name:'RULER', scoreKey:'R', count:1},
      {id:'heir',  name:'HEIR',  scoreKey:'Hr', count:1, ageConstraint:true},
    ];
    const pool = (window.EMPIRE_POSITIONS || []).filter(p => p.id !== 'ruler' && p.id !== 'heir' && p.count === 1);
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    const picks = shuffled.slice(0, 3);
    return [...locked, ...picks];
  }, [modeKey, wildcardPositions]);

  const scoreGridKeys = React.useMemo(() => {
    const pos = resolvedPositions || mode?.positions || [];
    return pos.length ? [...new Set(pos.map(p => p.scoreKey))] : ['R','H','Hr','AC','KG','SC'];
  }, [modeKey, wildcardPositions]);
  const NO_DRAGON_MODES = new Set(['classic','classic-hard','empire','empire-hard','classic-random','classic-hard-random','empire-random','empire-hard-random','chaos']);
  const noDragons = NO_DRAGON_MODES.has(modeKey);
  // Chaos: compute opponent lineup once on mount
  const opponentLineup = React.useMemo(() => chaosRung ? buildChaosLineup(chaosRung.house, chaosRung.topN, chaosRung.fromBottom, chaosRung.pinned, chaosRung.members) : null, []);
  const opponentBoard = React.useMemo(() => {
    if (!opponentLineup || !mode) return null;
    return buildBoard(resolvedPositions || mode.positions).map(slot => ({
      ...slot,
      character: CHARACTERS.find(c => c.id === opponentLineup[slot.scoreKey]) || null,
    }));
  }, [opponentLineup]);
  const opponentScore = opponentBoard ? calcScore(opponentBoard) : 0;
  // Characters in the preset lineup are excluded from the player's draft pool
  const chaosExcludeIds = opponentLineup ? Object.values(opponentLineup) : [];
  const [gs, setGs] = useState(() => loadLiveGs(modeKey) || makeInitialState(modeKey, numPlayers, resolvedPositions));
  // Snapshot the live game on every change so a mobile background-reload resumes mid-game.
  useEffect(() => { saveLiveGs(modeKey, gs); }, [gs]);
  const [showScores, setShowScores] = useState(initShowScores);
  const [viewTab, setViewTab] = useState('roll');
  const [dynastyBoardGroup, setDynastyBoardGroup] = useState('House');
  const [confirmError, setConfirmError] = useState('');
  const [confirmQuit, setConfirmQuit] = useState(false);
  const [playerLastSlotId, setPlayerLastSlotId] = useState(null);
  const [passDevice, setPassDevice] = useState(null); // { toIdx, label } when pass-device overlay is showing

  const totalRounds = mode.rounds;
  const isLastRound = gs.round === totalRounds;
  const versusOrMulti = numPlayers > 1;
  const activeIdx = gs.activePlayerIdx;
  const cpuActive = cpuPlayers[activeIdx] || false;
  const currentBoard = gs.boards[activeIdx] || [];
  const rerollsLeft = gs.rerolls[activeIdx] ?? 0;

  // ── Chaos safety net ────────────────────────────────────────────────────────
  // Chaos has NO rerolls and must end on a legal board (Ruler & Consort opposite gender,
  // Heir younger than both). In the supremely rare case where every character placed so far
  // is the SAME gender and only the final slot remains, force that last roll to the OPPOSITE
  // gender so a legal Ruler/Consort pair is possible — and restrict it to houses that still
  // offer a character OLD enough to leave a valid (younger) Heir on the board. Together these
  // guarantee the player can always finalize a fully legal board after a freak run of rolls.
  const chaosSafety = (() => {
    if (!chaosRung) return null;
    const placed = currentBoard.filter(s => s.character).map(s => s.character);
    const emptyCount = currentBoard.filter(s => !s.character).length;
    if (placed.length < 1 || emptyCount !== 1) return null; // only on the very last draw
    const g0 = placed[0].gender;
    if (!placed.every(c => c.gender === g0)) return null;    // already mixed → no force needed
    const youngest = Math.min(...placed.map(c => window.getEffectiveAge(c)));
    return { forceGender: g0 === 'M' ? 'F' : 'M', youngest };
  })();
  const chaosSafetyCombos = (() => {
    if (!chaosSafety) return null;
    const blocked = window.getVariantBlockList ? window.getVariantBlockList(gs.draftedIds) : new Set(gs.draftedIds);
    const allExcluded = new Set([...blocked, ...chaosExcludeIds]);
    const combos = new Set();
    for (const c of CHARACTERS) {
      if (c.gender !== chaosSafety.forceGender) continue;
      if (!(c.unlimited || !allExcluded.has(c.id))) continue;
      if (noDragons && c.isDragon) continue;
      if (window.getEffectiveAge(c) <= chaosSafety.youngest) continue; // must leave room for a younger heir
      for (const house of (c.houses || [])) if (house !== chaosRung.house) combos.add(`${house}|${c.gender}`);
    }
    return combos.size ? combos : null; // if nothing qualifies, fall back to the normal pool
  })();
  const PLAYER_COLORS = ['var(--p1)', 'var(--p2)', '#2d9c4f', '#d4a017'];
  const playerColor = PLAYER_COLORS[activeIdx] || 'var(--p1)';
  const activePlayerLabel = cpuActive ? `CPU ${getCpuNum(cpuPlayers, activeIdx)}` : `PLAYER ${activeIdx + 1}`;
  const p1Score = calcScore(gs.boards[0] || []);

  // ── CPU auto-play ────────────────────────────────────────────────────────
  const cpuTimers = React.useRef([]);
  const [cpuSpinTrigger, setCpuSpinTrigger] = useState(0);
  const [cpuLastPlacedSlotId, setCpuLastPlacedSlotId] = useState(null);
  const [rerollExcludeHouse, setRerollExcludeHouse] = useState(null);
  const [cpuRerolling, setCpuRerolling] = useState(false);

  // Per-game CPU personality: randomized once per game session
  const cpuStylesRef = React.useRef(null);
  if (!cpuStylesRef.current) {
    // 'peak' = hunt for 10s / max single-slot value
    // 'balanced' = favor versatility and spread
    // 'aggressive' = reroll more often, bigger variance
    const pool = ['peak', 'peak', 'balanced', 'balanced', 'aggressive'];
    cpuStylesRef.current = cpuPlayers.map(isCpu => isCpu ? pool[Math.floor(Math.random() * pool.length)] : null);
  }

  function cpuAddTimer(fn, delay) {
    const t = setTimeout(fn, delay);
    cpuTimers.current.push(t);
    return t;
  }
  function cpuClearTimers() {
    cpuTimers.current.forEach(clearTimeout);
    cpuTimers.current = [];
  }

  // Returns a Set of "House|Gender" combos that still have at least 1 undrafted character
  function getAvailableCombos(draftedIds, excludeIds, excludeHouse) {
    const blocked = window.getVariantBlockList ? window.getVariantBlockList(draftedIds) : new Set(draftedIds);
    const allExcluded = new Set([...blocked, ...(excludeIds || [])]);
    // Dynasty: exclude Dragon house if active player already has 2 dragons on their board
    const dynastyDragonFull = mode?.isDynasty && (currentBoard.filter(s => s.character?.isDragon).length >= 2);
    const combos = new Set();
    for (const c of CHARACTERS) {
      if ((c.unlimited || !allExcluded.has(c.id)) && (!noDragons || !c.isDragon)) {
        if (dynastyDragonFull && c.isDragon) continue;
        for (const house of (c.houses || [])) {
          if (!excludeHouse || house !== excludeHouse) combos.add(`${house}|${c.gender}`);
        }
      }
    }
    return combos;
  }

  // Roll a house+gender restricted to non-empty pools. For higher difficulty the
  // CPU's spin is biased toward houses whose best available character best fills
  // one of its still-empty slots — a moderate weighting (with a base weight) so
  // the spin stays varied and the game beatable, not a deterministic best-pick.
  function cpuRandomRoll() {
    const combos = getAvailableCombos(gs.draftedIds, chaosExcludeIds, chaosRung?.house);
    const available = HOUSES.filter(h => (!chaosRung || h.name !== chaosRung.house) && (combos.has(`${h.name}|M`) || combos.has(`${h.name}|F`)));
    if (available.length === 0) return null;
    const board = gs.boards[gs.activePlayerIdx] || [];
    const emptySlots = board.filter(s => !s.character && !s.dragonOnly);
    const blocked = window.getVariantBlockList ? window.getVariantBlockList(gs.draftedIds) : new Set(gs.draftedIds);
    const houseBest = h => {
      if (!emptySlots.length) return 1;
      let best = 0;
      const chars = CHARACTERS.filter(c => (c.houses||[]).includes(h.name) && (c.unlimited || !blocked.has(c.id)) && (!noDragons || !c.isDragon));
      for (const c of chars) for (const sl of emptySlots) {
        const sc = getSlotScore({ character: c, scoreKey: sl.scoreKey }) * (SLOT_PRIORITY[sl.scoreKey] || 1);
        if (sc > best) best = sc;
      }
      return best;
    };
    const weights = available.map(h => houseBest(h) + 8); // +8 base keeps weaker houses in play
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total, h = available[available.length - 1];
    for (let i = 0; i < available.length; i++) { r -= weights[i]; if (r <= 0) { h = available[i]; break; } }
    const hasM = combos.has(`${h.name}|M`), hasF = combos.has(`${h.name}|F`);
    const g = h.alwaysMale ? 'M' : h.noGenderRoll ? null : (hasM && hasF ? (Math.random() < 0.5 ? 'M' : 'F') : hasM ? 'M' : 'F');
    return { house: h.name, gender: g, emoji: h.emoji, color: h.color };
  }

  function cpuPickBestChar(board2, draftedIds, roll, randomChar, cpuIdx, humanBoard) {
    const emptySlots = board2.filter(s => !s.character);
    let pool;
    if (mode.isRandom && randomChar) {
      pool = [randomChar];
    } else if (roll) {
      const blocked = window.getVariantBlockList ? window.getVariantBlockList(draftedIds) : new Set(draftedIds);
      pool = CHARACTERS.filter(c => (c.houses||[]).includes(roll.house) && c.gender === roll.gender && (c.unlimited || !blocked.has(c.id)) && (!noDragons || !c.isDragon));
    } else return null;
    if (pool.length === 0 || emptySlots.length === 0) return null;

    const style = cpuStylesRef.current?.[cpuIdx ?? activeIdx] || 'balanced';

    const findBoardChar = (...ids) => board2.find(s => ids.includes(s.positionId) || ids.includes(s.slotId))?.character;
    const rulerChar   = findBoardChar('ruler', 'd-ruler');
    const consortChar = findBoardChar('consort', 'd-consort');

    // Dynasty: precompute current CPU and human category scores for win-targeting
    const cpuCatScore = {};
    const humanCatScore = {};
    if (mode?.isDynasty) {
      for (const g of DYNASTY_GROUPS) {
        cpuCatScore[g] = board2.filter(s => s.group === g && s.character)
          .reduce((sum, s) => sum + getDynastySlotScore(s, board2), 0);
        humanCatScore[g] = humanBoard
          ? humanBoard.filter(s => s.group === g && s.character)
              .reduce((sum, s) => sum + getDynastySlotScore(s, humanBoard), 0)
          : 0;
      }
    }

    // Evaluate each char×slot combo
    const slotCandidates = [];
    for (const char of pool) {
      // Versatility: how many empty slots can this char fill at ≥5?
      const versatility = emptySlots.filter(sl => getSlotScore({ character: char, scoreKey: sl.scoreKey }) >= 5).length;
      // Peak: best single-slot score for this char
      const peakScore = Math.max(0, ...emptySlots.map(sl => getSlotScore({ character: char, scoreKey: sl.scoreKey })));

      for (const slot of emptySlots) {
        if (slot.dragonOnly && !char.isDragon) continue;
        if (!slot.dragonOnly && char.isDragon) continue;
        if (slot.dragonriderConstraint && (!char.DR || char.isDragon)) continue;
        if (slot.squireConstraint) {
          const knight = board2.find(s => s.slotId === slot.squireConstraint || s.positionId === slot.squireConstraint)?.character;
          if (knight && getEffectiveAge(char) >= getEffectiveAge(knight)) continue;
        }
        if (slot.genderConstraint && rulerChar && rulerChar.gender === char.gender) continue;
        if (slot.ageConstraint) {
          if (rulerChar   && getEffectiveAge(char) >= getEffectiveAge(rulerChar))   continue;
          if (consortChar && getEffectiveAge(char) >= getEffectiveAge(consortChar)) continue;
        }

        const base = getSlotScore({ character: char, scoreKey: slot.scoreKey });

        // Slot priority weight: critical positions are worth filling well
        const PRIO = { R:2.2, Hr:1.8, H:1.8, AC:1.3, KGC:1.4, KG:1.1, SC:1.1, Ally:1.0, Bank:1.0, Con:1.5 };
        const prioW = PRIO[slot.scoreKey] || 1.0;

        // Scarcity bonus: if fewer pool chars can score ≥7 in this slot, this char is rare
        const rivalCount = pool.filter(c => c !== char && getSlotScore({ character: c, scoreKey: slot.scoreKey }) >= 7).length;
        const scarcityBonus = base >= 7 ? Math.max(0, (5 - rivalCount) * 0.28) : 0;

        // Style-influenced composite scoring
        let composite;
        if (style === 'peak') {
          const isPeak = base >= peakScore - 0.2;
          composite = base * prioW * 1.05 + (isPeak ? 1.5 : 0) + versatility * 0.05 + scarcityBonus;
        } else if (style === 'balanced') {
          composite = base * prioW + versatility * 0.28 + scarcityBonus;
        } else { // aggressive
          composite = base * prioW * 1.15 + versatility * 0.05 + scarcityBonus * 1.3;
        }

        // Dynasty: category-win targeting — favor slots in categories where placing here
        // helps beat the human, and penalize over-concentration in one category
        if (mode?.isDynasty && slot.group) {
          const g = slot.group;
          const myNow = cpuCatScore[g] || 0;
          const theirNow = humanCatScore[g] || 0;
          const newScore = myNow + base;
          const behind = theirNow - myNow;
          const alreadyWinning = myNow > theirNow;

          if (!alreadyWinning && newScore > theirNow) {
            composite += 4.5; // Placing here flips this category to a win
          } else if (!alreadyWinning && behind > 0) {
            composite += (base / Math.max(behind, 0.1)) * 2.0; // Progress toward win
          } else if (alreadyWinning) {
            composite += 0.3; // Small bonus — reinforcing a lead is low priority
          }

          // Penalize over-filling one category (balance across all 4)
          const catFilled = board2.filter(s => s.group === g && s.character).length;
          const catTotal  = board2.filter(s => s.group === g).length;
          const fillPct   = catTotal > 0 ? catFilled / catTotal : 0;
          if (fillPct > 0.55) composite -= (fillPct - 0.55) * 4.0;
        }

        // Small random noise so identical games don't play identically
        composite += (Math.random() - 0.5) * 0.25;

        slotCandidates.push({ char, slot, composite });
      }
    }

    if (slotCandidates.length === 0) {
      // Fallback: ignore soft constraints, just find any valid slot
      for (const char of pool) {
        for (const slot of emptySlots) {
          if (slot.dragonOnly && !char.isDragon) continue;
          if (!slot.dragonOnly && char.isDragon) continue;
          if (slot.dragonriderConstraint && (!char.DR || char.isDragon)) continue;
          const base = getSlotScore({ character: char, scoreKey: slot.scoreKey });
          slotCandidates.push({ char, slot, composite: base });
        }
      }
    }

    if (slotCandidates.length === 0) return null;
    slotCandidates.sort((a, b) => b.composite - a.composite);
    const { char: bestChar, slot: bestSlot } = slotCandidates[0];
    return { char: bestChar, slot: bestSlot };
  }

  // Position priority weights — higher = more valuable to fill well
  const SLOT_PRIORITY = { R:2.2, Hr:1.8, H:1.8, AC:1.3, KGC:1.4, KG:1.1, SC:1.1, Ally:1.0, Bank:1.0, Con:1.5 };

  function cpuShouldReroll(board2, draftedIds, roll, rerollsLeft, roundsLeft, cpuIdx) {
    if (rerollsLeft <= 0) return false;
    const emptySlots = board2.filter(s => !s.character && !s.dragonOnly);
    if (emptySlots.length === 0) return false;

    const style = cpuStylesRef.current?.[cpuIdx ?? activeIdx] || 'balanced';
    const blockedSet = window.getVariantBlockList ? window.getVariantBlockList(draftedIds) : new Set(draftedIds);
    const available = CHARACTERS.filter(c =>
      (c.houses||[]).includes(roll.house) && c.gender === roll.gender && !blockedSet.has(c.id) && !c.isDragon
    );
    if (available.length === 0) return true;

    // Weighted best score: weight each slot by its priority importance
    const weightedScore = (chars, slots) => {
      let best = 0;
      for (const char of chars) {
        for (const slot of slots) {
          const w = SLOT_PRIORITY[slot.scoreKey] || 1.0;
          const sc = getSlotScore({ character: char, scoreKey: slot.scoreKey }) * w;
          if (sc > best) best = sc;
        }
      }
      return best;
    };

    const currentBest = weightedScore(available, emptySlots);

    // Hard rule: if a critical empty slot (Ruler, Hand, Heir) is still open and
    // the current roll scores 8+ for it, never reroll
    for (const slot of emptySlots) {
      const priority = SLOT_PRIORITY[slot.scoreKey] || 1.0;
      if (priority >= 1.8) {
        for (const char of available) {
          if (getSlotScore({ character: char, scoreKey: slot.scoreKey }) >= 8.0) return false;
        }
      }
    }

    // Weighted sample of all other combos
    let totalSample = 0, sampleCount = 0;
    for (const h of HOUSES) {
      for (const gender of ['M', 'F']) {
        if (h.name === roll.house && gender === roll.gender) continue;
        const chars = CHARACTERS.filter(c => (c.houses||[]).includes(h.name) && c.gender === gender && !blockedSet.has(c.id) && !c.isDragon);
        if (chars.length === 0) continue;
        const best = weightedScore(chars, emptySlots);
        if (best > 0) { totalSample += best; sampleCount++; }
      }
    }
    const avgExpected = sampleCount > 0 ? totalSample / sampleCount : currentBest;

    // surplus > 0 → more rerolls than rounds left, CPU must spend or waste them
    const surplus = rerollsLeft - roundsLeft;
    const isSmallBoard = totalRounds <= 5;

    // Aggressiveness by style — all bumped up by ~0.05 to reroll more aggressively
    let keepThreshold;
    if (style === 'aggressive') {
      keepThreshold = surplus > 2 ? 1.02 : surplus > 0 ? 0.93 : surplus > -2 ? 0.82 : isSmallBoard ? 0.74 : 0.68;
    } else if (style === 'peak') {
      keepThreshold = surplus > 2 ? 0.98 : surplus > 0 ? 0.87 : surplus > -2 ? 0.76 : isSmallBoard ? 0.69 : 0.62;
    } else { // balanced
      keepThreshold = surplus > 2 ? 0.94 : surplus > 0 ? 0.83 : surplus > -2 ? 0.72 : isSmallBoard ? 0.64 : 0.57;
    }

    // Reroll if current roll scores poorly for critical open positions
    const criticalEmpty = emptySlots.filter(s => (SLOT_PRIORITY[s.scoreKey] || 1) >= 1.8);
    if (criticalEmpty.length > 0 && rerollsLeft > 1) {
      const critBest = weightedScore(available, criticalEmpty);
      const unweightedCritBest = Math.max(0, ...available.flatMap(c => criticalEmpty.map(s => getSlotScore({ character: c, scoreKey: s.scoreKey }))));
      if (unweightedCritBest < 5.0) return true;
    }

    if (currentBest < 4.0 && rerollsLeft >= 1) return true;
    if (currentBest === 0) return true;
    if (currentBest < avgExpected * keepThreshold) return true;
    return false;
  }

  // Returns true if the CPU should flip gender on the same house
  function cpuShouldGenderReroll(board2, draftedIds, roll, rerollsLeft, lastRoll, roundsLeft, cpuIdx) {
    if (rerollsLeft <= 0) return false;
    const houseObj = HOUSES.find(h => h.name === roll.house);
    if (!houseObj || houseObj.alwaysMale) return false;
    if (lastRoll?.house === roll.house && lastRoll?.gender !== roll.gender) return false;

    const emptySlots = board2.filter(s => !s.character);
    if (emptySlots.length === 0) return false;

    const style = cpuStylesRef.current?.[cpuIdx ?? activeIdx] || 'balanced';

    const bestForGender = (gender) => {
      let best = 0;
      const chars = CHARACTERS.filter(c =>
        (c.houses||[]).includes(roll.house) && c.gender === gender && (c.unlimited || !draftedIds.includes(c.id))
      );
      for (const c of chars) {
        for (const slot of emptySlots) {
          const sc = getSlotScore({ character: c, scoreKey: slot.scoreKey });
          if (sc > best) best = sc;
        }
      }
      return best;
    };

    const currentBest = bestForGender(roll.gender);
    const oppBest = bestForGender(roll.gender === 'M' ? 'F' : 'M');

    if (rerollsLeft <= 1 && rerollsLeft <= roundsLeft) return false;

    const surplus = rerollsLeft - roundsLeft;
    // More aggressive flip thresholds per style
    const flipThreshold = style === 'aggressive' ? (surplus > 0 ? 1.08 : 1.18) :
                          style === 'peak'       ? (surplus > 0 ? 1.12 : 1.22) :
                                                   (surplus > 0 ? 1.15 : 1.28);
    const minGain = style === 'aggressive' ? 0.3 : style === 'peak' ? 0.4 : 0.6;
    return oppBest > currentBest * flipThreshold && oppBest - currentBest >= minGain;
  }

  React.useEffect(() => {
    if (!cpuActive) return;
    cpuClearTimers();

    const cpuBoard = gs.boards[activeIdx] || [];
    const cpuRerolls = gs.rerolls[activeIdx] ?? 0;
    // For Dynasty: the human player's board to cross-reference for category-win strategy
    const humanBoardForCpu = mode?.isDynasty
      ? (gs.boards.find((b, i) => !cpuPlayers[i]) || null)
      : null;

    if (!gs.currentRoll && !gs.randomChar) {
      // ── Phase 1: CPU spins ────────────────────────────────────────────────
      cpuAddTimer(() => {
        if (mode.isRandom) {
          const all = getAllChars().filter(c => (c.unlimited || !gs.draftedIds.includes(c.id)) && (!noDragons || !c.isDragon));
          if (all.length === 0) return;
          const char = all[Math.floor(Math.random() * all.length)];
          setGs(s => ({ ...s, randomChar: char, phase: 'browse', lockedGender: null }));
          setViewTab('roll');
        } else {
          const roll = cpuRandomRoll();
          if (!roll) return;
          setCpuSpinTrigger(t => t + 1);
          setViewTab('roll');
          cpuAddTimer(() => {
            setRerollExcludeHouse(null);
            setGs(s => ({ ...s, currentRoll: roll, lastRoll: roll, phase: 'browse', lockedGender: null }));
          }, 1430);
        }
      }, 1200);

    } else if (gs.currentRoll && !gs.draftChar) {
      // ── Phase 2: Decide reroll or pick ───────────────────────────────────
      cpuAddTimer(() => {
        const roundsLeft = totalRounds - gs.round;
        const cpuIdx = gs.activePlayerIdx;
        if (!mode.isRandom && cpuShouldReroll(cpuBoard, gs.draftedIds, gs.currentRoll, cpuRerolls, roundsLeft, cpuIdx)) {
          setCpuRerolling(true);
          cpuAddTimer(() => setCpuRerolling(false), 2000);
          setGs(s => {
            const nr = [...s.rerolls]; nr[s.activePlayerIdx]--;
            return { ...s, rerolls: nr, currentRoll: null, lastRoll: null, draftChar: null, selectedChar: null, phase: 'roll', lockedGender: null };
          });
          setViewTab('roll');
        } else if (!mode.isRandom && cpuShouldGenderReroll(cpuBoard, gs.draftedIds, gs.currentRoll, cpuRerolls, gs.lastRoll, roundsLeft, cpuIdx)) {
          setCpuRerolling(true);
          cpuAddTimer(() => setCpuRerolling(false), 2000);
          const houseObj = HOUSES.find(h => h.name === gs.currentRoll.house);
          const newGender = houseObj?.alwaysMale ? 'M' : (gs.currentRoll.gender === 'M' ? 'F' : 'M');
          const newRoll = { ...gs.currentRoll, gender: newGender };
          setCpuSpinTrigger(t => t + 1);
          setViewTab('roll');
          cpuAddTimer(() => {
            setGs(s => {
              const nr = [...s.rerolls]; nr[s.activePlayerIdx]--;
              return { ...s, rerolls: nr, currentRoll: newRoll, draftChar: null, selectedChar: null, phase: 'browse', lockedGender: null };
            });
          }, 1430);
        } else {
          const pick = cpuPickBestChar(cpuBoard, gs.draftedIds, gs.currentRoll, null, cpuIdx, humanBoardForCpu);
          if (!pick) {
            if (cpuRerolls > 0) {
              setGs(s => { const nr = [...s.rerolls]; nr[s.activePlayerIdx]--; return { ...s, rerolls: nr, currentRoll: null, lastRoll: null, draftChar: null, selectedChar: null, phase: 'roll', lockedGender: null }; });
            } else {
              const newDrafted = [...gs.draftedIds];
              const nextIdx = gs.activePlayerIdx + 1;
              if (nextIdx < numPlayers) {
                setGs(s => ({ ...s, draftedIds: newDrafted, activePlayerIdx: nextIdx, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll' }));
              } else {
                const nextRound = gs.round + 1;
                if (nextRound > totalRounds) { onEnd({ boards: gs.boards, draftedIds: newDrafted, opponentBoard, opponentScore, chaosRung, rerolls: gs.rerolls }); }
                else { setGs(s => ({ ...s, round: nextRound, activePlayerIdx: 0, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll', draftedIds: newDrafted })); }
              }
              setViewTab('roll');
            }
            return;
          }
          setGs(s => ({ ...s, selectedChar: pick.char }));
          setViewTab('browse');
          cpuAddTimer(() => {
            // Compute optimized board — dynasty uses category-win optimizer, classic uses score optimizer
            const nwFlag = gs.currentRoll?.house === "Night's Watch";
            const rawBoard = gs.boards[gs.activePlayerIdx] || [];
            const placed = rawBoard.map(sl =>
              sl.slotId === pick.slot.slotId
                ? { ...sl, character: { ...pick.char, _rolledAsNW: nwFlag } }
                : sl
            );
            const optimized = (mode?.isDynasty
              ? computeOptimalDynastyBoard(placed, humanBoardForCpu)
              : computeOptimalBoard(placed)) || placed;
            // Find where char actually ended up after optimization (may differ from pick.slot)
            const actualSlot = optimized.find(s => s.character?.id === pick.char.id);
            const actualSlotId = actualSlot?.slotId || pick.slot.slotId;
            AudioManager.playPlace();
            setCpuLastPlacedSlotId(actualSlotId);
            setGs(s => {
              const newBoards = [...s.boards];
              newBoards[s.activePlayerIdx] = optimized;
              return { ...s, boards: newBoards, draftChar: pick.char, selectedChar: null };
            });
            setViewTab('board');
            cpuAddTimer(() => setCpuLastPlacedSlotId(null), 2400);
          }, 1400);
        }
      }, 2000);

    } else if (gs.randomChar && !gs.draftChar) {
      // ── Phase 2b: Random mode ─────────────────────────────────────────────
      cpuAddTimer(() => {
        const cpuIdx2 = gs.activePlayerIdx;
        const pick = cpuPickBestChar(cpuBoard, gs.draftedIds, null, gs.randomChar, cpuIdx2, humanBoardForCpu);
        if (!pick) {
          const newDrafted = [...gs.draftedIds];
          const nextIdx = gs.activePlayerIdx + 1;
          if (nextIdx < numPlayers) {
            setGs(s => ({ ...s, draftedIds: newDrafted, activePlayerIdx: nextIdx, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll' }));
          } else {
            const nextRound = gs.round + 1;
            if (nextRound > totalRounds) { onEnd({ boards: gs.boards, draftedIds: newDrafted, opponentBoard, opponentScore, chaosRung, rerolls: gs.rerolls }); }
            else { setGs(s => ({ ...s, round: nextRound, activePlayerIdx: 0, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll', draftedIds: newDrafted })); }
          }
          setViewTab('roll');
          return;
        }
        setGs(s => ({ ...s, selectedChar: pick.char }));
        setViewTab('browse');
        cpuAddTimer(() => {
          const rawBoard = gs.boards[gs.activePlayerIdx] || [];
          const placed = rawBoard.map(sl =>
            sl.slotId === pick.slot.slotId
              ? { ...sl, character: { ...pick.char, _rolledAsNW: pick.char.isNW } }
              : sl
          );
          const optimized = (mode?.isDynasty
            ? computeOptimalDynastyBoard(placed, humanBoardForCpu)
            : computeOptimalBoard(placed)) || placed;
          const actualSlot = optimized.find(s => s.character?.id === pick.char.id);
          const actualSlotId = actualSlot?.slotId || pick.slot.slotId;
          AudioManager.playPlace();
          setCpuLastPlacedSlotId(actualSlotId);
          setGs(s => {
            const newBoards = [...s.boards];
            newBoards[s.activePlayerIdx] = optimized;
            return { ...s, boards: newBoards, draftChar: pick.char, selectedChar: null };
          });
          setViewTab('board');
          cpuAddTimer(() => setCpuLastPlacedSlotId(null), 2400);
        }, 1400);
      }, 1200);

    } else if (gs.draftChar) {
      // ── Phase 3: Confirm, advance turn/round ─────────────────────────────
      cpuAddTimer(() => {
        const newDrafted = gs.draftChar.unlimited ? gs.draftedIds : [...gs.draftedIds, gs.draftChar.id];
        const nextIdx = gs.activePlayerIdx + 1;
        if (nextIdx < numPlayers) {
          setGs(s => ({ ...s, draftedIds: newDrafted, activePlayerIdx: nextIdx, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll' }));
          setViewTab('roll');
        } else {
          const nextRound = gs.round + 1;
          if (nextRound > totalRounds) {
            onEnd({ boards: gs.boards, draftedIds: newDrafted, opponentBoard, opponentScore, chaosRung, rerolls: gs.rerolls });
          } else {
            setGs(s => ({ ...s, round: nextRound, activePlayerIdx: 0, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll', draftedIds: newDrafted }));
            setViewTab('roll');
          }
        }
      }, 1500);
    }

    return cpuClearTimers;
  }, [cpuActive, gs.activePlayerIdx, gs.currentRoll, gs.randomChar, gs.draftChar, gs.round, rerollsLeft]);

  function handleRoll(roll) {
    setRerollExcludeHouse(null);
    if (mode.isRandom) {
      const all = getAllChars().filter(c => (c.unlimited || !gs.draftedIds.includes(c.id)) && (!noDragons || !c.isDragon));
      if (all.length === 0) return;
      const char = all[Math.floor(Math.random() * all.length)];
      setGs(s => ({ ...s, randomChar: char, draftChar: char, phase: 'browse', lockedGender: null }));
    } else {
      setGs(s => ({ ...s, currentRoll: roll, lastRoll: roll, phase: 'browse', lockedGender: null }));
    }
    setViewTab('browse');
  }

  function clearDraftFromBoards(s) {
    const draftId = s.draftChar?.id;
    if (!draftId) return {};
    const newBoards = s.boards.map((brd, i) =>
      i === s.activePlayerIdx ? brd.map(sl => sl.character?.id === draftId ? { ...sl, character: null } : sl) : brd
    );
    return { boards: newBoards };
  }

  function decRerolls(s) {
    const nr = [...s.rerolls]; nr[s.activePlayerIdx] = Math.max(0, (nr[s.activePlayerIdx] || 0) - 1);
    return { rerolls: nr };
  }

  function handleRerollHouse() {
    if (rerollsLeft <= 0) return;
    const locked = gs.currentRoll?.gender || null;
    const exHouse = gs.currentRoll?.house || null;
    setRerollExcludeHouse(exHouse);
    setGs(s => ({ ...s, ...decRerolls(s), ...clearDraftFromBoards(s), currentRoll: null, lastRoll: null, draftChar: null, selectedChar: null, phase: 'roll', lockedGender: locked }));
    setViewTab('roll');
  }

  function handleRerollGender() {
    if (rerollsLeft <= 0) return;
    const houseObj = HOUSES.find(h => h.name === gs.currentRoll?.house);
    const newGender = houseObj?.alwaysMale ? 'M' : (gs.currentRoll?.gender === 'M' ? 'F' : 'M');
    const newRoll = { ...gs.currentRoll, gender: newGender };
    setGs(s => ({ ...s, ...decRerolls(s), ...clearDraftFromBoards(s), currentRoll: newRoll, lastRoll: newRoll, draftChar: null, selectedChar: null, phase: 'browse', lockedGender: null }));
    setViewTab('browse');
  }

  // Force free gender reroll when ALL empty constrained slots need opposite gender of current roll
  React.useEffect(() => {
    if (!gs.currentRoll || cpuActive || !currentBoard) return;
    const roll = gs.currentRoll;
    const ruler = currentBoard.find(s => (s.positionId === 'ruler' || s.slotId === 'd-ruler') && s.character)?.character;
    if (!ruler) return;
    const emptyConstrained = currentBoard.filter(s => !s.character && s.genderConstraint);
    const emptyUnconstrained = currentBoard.filter(s => !s.character && !s.genderConstraint && !s.dragonOnly && !s.dragonriderConstraint);
    if (emptyConstrained.length === 0 || emptyUnconstrained.length > 0) return;
    // All remaining empty slots require opposite gender — if roll matches ruler gender, force reroll
    if (roll.gender === ruler.gender) {
      const houseObj = HOUSES.find(h => h.name === roll.house);
      if (houseObj?.alwaysMale) return; // can't fix with gender reroll
      const newGender = roll.gender === 'M' ? 'F' : 'M';
      const newRoll = { ...roll, gender: newGender };
      setGs(s => ({ ...s, currentRoll: newRoll, lastRoll: newRoll, draftChar: null, selectedChar: null, phase: 'browse', lockedGender: null }));
    }
  }, [gs.currentRoll?.house, gs.currentRoll?.gender, gs.round]);

  function handleRedraw() {
    if (rerollsLeft <= 0) return;
    setGs(s => ({ ...s, ...decRerolls(s), ...clearDraftFromBoards(s), currentRoll: null, lastRoll: null, randomChar: null, draftChar: null, selectedChar: null, phase: 'roll', lockedGender: null }));
    setViewTab('roll');
  }

  function handleSelectChar(char) {
    if (gs.draftChar?.id === char.id) {
      // Re-selecting the same char already on board — just highlight it, don't clear it
      setGs(s => ({ ...s, selectedChar: char }));
    } else {
      setGs(s => ({ ...s, ...clearDraftFromBoards(s), selectedChar: char, draftChar: char }));
    }
    setViewTab('board');
  }

  function handleSlotClick(slot) {
    const { selectedChar } = gs;
    if (!selectedChar) {
      if (slot.character) setGs(s => ({ ...s, selectedChar: slot.character }));
      return;
    }

    const board = [...gs.boards[activeIdx]];

    if (slot.genderConstraint) {
      const ruler = board.find(s => s.positionId === 'ruler')?.character;
      if (ruler && ruler.gender === selectedChar.gender) {
        setConfirmError('CONSORT must be opposite gender of RULER');
        return;
      }
    }
    if (slot.ageConstraint) {
      const ruler = board.find(s => s.positionId === 'ruler')?.character;
      const consort = board.find(s => s.positionId === 'consort')?.character;
      if (ruler && getEffectiveAge(selectedChar) > getEffectiveAge(ruler)) { setConfirmError('HEIR must be younger than or same age as RULER'); return; }
      if (consort && getEffectiveAge(selectedChar) > getEffectiveAge(consort)) { setConfirmError('HEIR must be younger than or same age as CONSORT'); return; }
    }
    setConfirmError('');

    if (slot.character?.id === selectedChar.id) {
      setGs(s => ({ ...s, selectedChar: null }));
      return;
    }

    board.forEach((s, i) => { if (s.character?.id === selectedChar.id) board[i] = { ...s, character: null }; });
    const slotIdx = board.findIndex(s => s.slotId === slot.slotId);
    const displaced = board[slotIdx].character;
    board[slotIdx] = { ...board[slotIdx], character: { ...selectedChar, _rolledAsNW: gs.currentRoll?.house === "Night's Watch" || (gs.randomChar?.isNW) } };
    AudioManager.playPlace();
    setPlayerLastSlotId(slot.slotId);
    setTimeout(() => setPlayerLastSlotId(null), 1500);

    const newBoards = [...gs.boards];
    newBoards[activeIdx] = board;
    setGs(s => ({ ...s, boards: newBoards, selectedChar: displaced || null }));
  }

  function handleConfirmPick() {
    try {
      const errors = checkBoardConstraints(currentBoard);
      if (errors.length > 0 && !isLastRound) { setConfirmError(errors[0]); return; }
      setConfirmError('');

      const draftedChar = gs.draftChar;
      const newDrafted = draftedChar ? [...gs.draftedIds, draftedChar.id] : gs.draftedIds;

      const nextIdx = activeIdx + 1;
      if (versusOrMulti && nextIdx < numPlayers) {
        setGs(s => ({
          ...s,
          draftedIds: newDrafted,
          activePlayerIdx: nextIdx,
          currentRoll: null,
          randomChar: null,
          selectedChar: null,
          draftChar: null,
          lastRoll: null,
          phase: 'roll',
        }));
        setViewTab('roll');
        if (!cpuPlayers[nextIdx]) {
          const label = `PLAYER ${nextIdx + 1}`;
          setPassDevice({ toIdx: nextIdx, label });
        }
        return;
      }

      const nextRound = gs.round + 1;
      if (nextRound > totalRounds) {
        onEnd({ boards: gs.boards, draftedIds: newDrafted, opponentBoard, opponentScore, chaosRung, rerolls: gs.rerolls });
      } else {
        setGs(s => ({
          ...s,
          round: nextRound,
          activePlayerIdx: 0,
          currentRoll: null,
          randomChar: null,
          selectedChar: null,
          draftChar: null,
          lastRoll: null,
          phase: 'roll',
          draftedIds: newDrafted,
        }));
        setViewTab('roll');
        if (versusOrMulti && !cpuPlayers[0]) {
          setPassDevice({ toIdx: 0, label: 'PLAYER 1' });
        }
      }
    } catch(e) {
      console.error('handleConfirmPick error:', e);
      onEnd({ boards: gs.boards, draftedIds: gs.draftedIds, opponentBoard, opponentScore, chaosRung, rerolls: gs.rerolls });
    }
  }

  // can confirm: drafted char must be placed on active board, total placed must equal current round, no displaced char pending, no constraint errors
  const canConfirm = (() => {
    if (!gs.currentRoll && !gs.randomChar) return false;
    if (!gs.draftChar) return false;
    const onBoard = currentBoard.some(s => s.character?.id === gs.draftChar.id);
    if (!onBoard) return false;
    // dynasty: displaced char must be resolved first
    const displaced = (mode?.isDynasty && gs.selectedChar && gs.draftChar && gs.selectedChar.id !== gs.draftChar.id &&
      !currentBoard.some(s => s.character?.id === gs.selectedChar?.id)) ? gs.selectedChar : null;
    if (displaced) return false;
    if (mode?.isDynasty) {
      // Dragon/Dragonrider slots are optional — only the 46 non-dragon positions are required
      const requiredEmpty = currentBoard.filter(s => !s.character && !s.dragonOnly && !s.dragonriderConstraint);
      if (requiredEmpty.length > 0) return false;
    } else {
      const placedCount = currentBoard.filter(s => s.character).length;
      const discards = (gs.dynDiscards?.[activeIdx] || 0);
      if (placedCount !== gs.round - discards) return false;
    }
    // On the final round of any mode, allow finishing even if constraints can't be satisfied.
    // Wildcard positions, forced rolls, and chaos rungs can all create unavoidable conflicts.
    // Constraint errors are still shown in the UI but must not block the last confirm.
    if (isLastRound) return true;
    return checkBoardConstraints(currentBoard).length === 0;
  })();

  // dynasty: displaced char = selectedChar that is not the draftChar and not on the board
  const displacedChar = (mode?.isDynasty && gs.selectedChar && gs.draftChar && gs.selectedChar.id !== gs.draftChar.id &&
    !currentBoard.some(s => s.character?.id === gs.selectedChar.id)) ? gs.selectedChar : null;

  // helper: can a character be placed in a slot?
  const charFitsSlot = (char, slot) => {
    if (slot.character) return false;
    if (slot.dragonOnly) return !!char.isDragon;
    if (char.isDragon) return false;
    if (slot.dragonriderConstraint) return !!(char.DR && !char.isDragon);
    return true;
  };

  // chars on board that could fill the constrained-only empty slots
  const constrainedOnlySlots = currentBoard.filter(s => !s.character && (s.dragonOnly || s.dragonriderConstraint));
  const charsMovableToConstrained = constrainedOnlySlots.length > 0
    ? currentBoard.filter(s => s.character && s.character.id !== gs.draftChar?.id)
        .map(s => s.character)
        .filter(c => constrainedOnlySlots.some(slot => charFitsSlot(c, { ...slot, character: null })))
    : [];

  // warning message when player must move a board char to fill constrained slots
  const constrainedMoveWarning = (mode?.isDynasty && displacedChar && charsMovableToConstrained.length > 0)
    ? `Move to open slot: ${charsMovableToConstrained.map(c => c.name).join(', ')}`
    : null;

  // discard is allowed only when displaced char can't fit anywhere AND no board char can reach constrained slots
  const canDiscard = !!(mode?.isDynasty && displacedChar && !constrainedMoveWarning && (() => {
    const emptySlots = currentBoard.filter(s => !s.character);
    return !emptySlots.some(slot => charFitsSlot(displacedChar, slot));
  })());

  // message when drawn character has no empty compatible slot (must swap first)
  const mustSwapMessage = (mode?.isDynasty && gs.draftChar && !currentBoard.some(s => s.character?.id === gs.draftChar.id)) ? (() => {
    const emptySlots = currentBoard.filter(s => !s.character);
    const canPlaceDirect = emptySlots.some(slot => charFitsSlot(gs.draftChar, slot));
    if (!canPlaceDirect && emptySlots.length > 0) return 'No compatible empty slot — swap this character onto the board to continue.';
    return null;
  })() : null;

  function handleDiscard() {
    // Discard the displaced character; draftChar is already on the board
    const newDrafted = [...gs.draftedIds, displacedChar.id];
    const newDiscards = (gs.dynDiscards || []).map((d, i) => i === activeIdx ? d + 1 : d);
    setGs(s => ({ ...s, selectedChar: null, draftedIds: newDrafted, dynDiscards: newDiscards }));
  }

  // canSkipRound: dynasty rounds 47-50 where all empty slots are dragon-only and drawn char is not a dragon
  const canSkipRound = !!(mode?.isDynasty && gs.draftChar && !gs.draftChar.isDragon && (() => {
    const emptySlots = currentBoard.filter(s => !s.character);
    return emptySlots.length > 0 && emptySlots.every(s => s.dragonOnly);
  })());

  function handleSkipRound() {
    if (!canSkipRound) return;
    const newDrafted = gs.draftChar.unlimited ? gs.draftedIds : [...gs.draftedIds, gs.draftChar.id];
    // Dragon skips are NOT discards — dragon slots are optional luxury positions
    const currentDiscards = gs.dynDiscards || [];
    const nextIdx = activeIdx + 1;
    if (nextIdx < numPlayers) {
      setGs(s => ({ ...s, draftedIds: newDrafted, activePlayerIdx: nextIdx, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll' }));
    } else {
      const nextRound = gs.round + 1;
      if (nextRound > totalRounds) {
        onEnd({ boards: gs.boards, draftedIds: newDrafted, opponentBoard, opponentScore, chaosRung, dynDiscards: currentDiscards, rerolls: gs.rerolls });
      } else {
        setGs(s => ({ ...s, round: nextRound, activePlayerIdx: 0, currentRoll: null, randomChar: null, selectedChar: null, draftChar: null, lastRoll: null, phase: 'roll', draftedIds: newDrafted }));
      }
    }
    setViewTab('roll');
  }

  const showActionBar = !cpuActive && (gs.phase !== 'roll' || gs.currentRoll || gs.randomChar);

  return (
    <React.Fragment>
    <div className="app" style={{ position: 'relative' }}>
      {passDevice && (
        <div className="pass-overlay">
          <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.7rem', color: 'var(--text2)', letterSpacing: '0.2em', marginBottom: 8 }}>PASS THE DEVICE TO</div>
          <div style={{ fontFamily: 'Cinzel,serif', fontSize: '2rem', fontWeight: 900, color: 'var(--gold2)', letterSpacing: '0.08em', marginBottom: 24 }}>{passDevice.label}</div>
          <button className="btn btn-gold" style={{ padding: '14px 40px', fontSize: '0.9rem', letterSpacing: '0.12em' }} onClick={() => setPassDevice(null)}>
            I'M READY ⚔
          </button>
        </div>
      )}
      {confirmQuit && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.82)', zIndex: 300, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ background: '#120d06', border: '1px solid rgba(255,215,0,0.35)', borderRadius: 14, padding: '28px 24px', maxWidth: 270, width: '85%', textAlign: 'center', boxShadow: '0 8px 40px rgba(0,0,0,0.9)' }}>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.15rem', fontWeight: 700, color: '#f0c84a', marginBottom: 8 }}>Quit Game?</div>
            <div style={{ fontSize: '0.78rem', color: 'var(--text2)', marginBottom: 22, lineHeight: 1.5 }}>All progress will be lost.</div>
            <div style={{ display: 'flex', gap: 10 }}>
              <button className="btn btn-ghost" style={{ flex: 1, fontSize: '0.8rem' }} onClick={() => setConfirmQuit(false)}>Keep Playing</button>
              <button style={{ flex: 1, padding: '9px 4px', fontSize: '0.8rem', fontFamily: 'Cinzel,serif', fontWeight: 700, background: '#7a1010', color: '#fff', border: '1px solid #b01a1a', borderRadius: 7, cursor: 'pointer', letterSpacing: '0.06em' }} onClick={() => onEnd(null)}>QUIT</button>
            </div>
          </div>
        </div>
      )}
      <div className="nav-bar" style={{ borderBottomColor: versusOrMulti ? playerColor : 'var(--border)' }}>
        <div className="nav-side">
          <button onClick={() => setConfirmQuit(true)} style={{ width: 30, height: 30, borderRadius: '50%', background: '#8b1212', border: '2px solid #c0282a', color: '#fff', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1rem', fontWeight: 900, padding: 0, lineHeight: 1 }}>✕</button>
        </div>
        <div style={{ flex: 1, textAlign: 'center' }}>
          <div className="nav-title">{chaosRung ? `CHAOS #${chaosRung.id}` : mode.name.toUpperCase()}{versusOrMulti ? (numPlayers === 2 && cpuPlayers[1] ? ' · vs CPU' : ` · ${numPlayers}P`) : ''}</div>
          <div style={{ fontSize: '0.65rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif' }}>
            ROUND {gs.round}/{totalRounds}
            {!mode.isHard && ` · ${rerollsLeft} REROLL${rerollsLeft !== 1 ? 'S' : ''}`}
            {chaosRung && ' · score hidden'}
          </div>
        </div>
        <div className="nav-side" style={{ textAlign: 'right', display: 'flex', gap: 2 }}>
          <SettingsButton />
          {!chaosRung && (
            <button className="btn btn-ghost btn-sm" onClick={() => setShowScores(v => !v)} title="Toggle scores">
              {showScores ? '👁' : '🙈'}
            </button>
          )}
        </div>
