<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>A Song of An Empire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<meta name="theme-color" content="#080810">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASoE">
<link rel="manifest" href="manifest.json">
<script src="characters.js"></script>
<script src="achievements.js"></script>
<script src="collector_cards.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080810;--bg2:#0f0f1a;--bg3:#14141f;
  --border:#2a2a3a;--border2:#3a3a4a;
  --text:#e0d8c8;--text2:#8a8a9a;
  --gold:#d4a830;--gold2:#ffe050;
  --red:#8b0000;--red2:#a31515;
  --green:#1a4a1a;
  --p1:#2980b9;--p2:#c0392b;
  font-size:18px;
}
html,body,#root{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'Crimson Text',Georgia,serif;color:var(--text);overscroll-behavior:none;}

/* scrollable regions */
.scroll{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* layout */
.app{display:flex;flex-direction:column;height:100dvh;height:100vh;background:var(--bg);}
.flex1{flex:1;}

/* nav */
.nav-bar{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;min-height:52px;}
.nav-side{width:44px;flex-shrink:0;}
.nav-title{font-family:'Cinzel',serif;font-size:0.85rem;font-weight:700;color:var(--gold);letter-spacing:0.1em;}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text);font-family:'Cinzel',serif;font-size:0.8rem;font-weight:600;letter-spacing:0.05em;cursor:pointer;transition:all 0.15s;-webkit-appearance:none;appearance:none;text-align:center;}
.btn:active{transform:scale(0.97);}
.btn:disabled{opacity:0.38;cursor:default;pointer-events:none;}
.btn-gold{background:linear-gradient(135deg,#7a5a00,#a07000);border-color:var(--gold);color:var(--gold2);}
.btn-gold:active{background:linear-gradient(135deg,#6a4a00,#906000);}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red2));border-color:#c0392b;color:#ffaaaa;}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text2);font-size:0.75rem;padding:6px 10px;}
.btn-ghost:active{background:var(--bg3);}
.btn-sm{padding:6px 10px;font-size:0.7rem;}

/* home screen */
.home{display:flex;flex-direction:column;align-items:center;gap:0;height:100%;}
.home-header{width:100%;padding:20px 16px 12px;text-align:center;background:linear-gradient(to bottom,var(--bg2),transparent);flex-shrink:0;}
.home-title{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:900;color:var(--gold2);letter-spacing:0.1em;text-shadow:0 0 20px rgba(201,162,39,0.4);}
.home-sub{font-family:'Cinzel',serif;font-size:0.65rem;color:var(--text2);letter-spacing:0.2em;margin-top:4px;}
.ornament{color:var(--gold);font-size:0.9rem;margin:4px 0;opacity:0.7;}
.modes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px;width:100%;}
.mode-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s;text-align:center;}
.mode-card:active{transform:scale(0.97);border-color:var(--gold);}
.mode-card.selected{border-color:var(--gold);background:rgba(201,162,39,0.1);}
.mode-card .mode-emoji{font-size:1.6rem;}
.mode-card .mode-name{font-family:'Cinzel',serif;font-size:0.65rem;font-weight:700;color:var(--gold);letter-spacing:0.05em;}
.mode-card .mode-desc{font-size:0.65rem;color:var(--text2);line-height:1.3;}
.home-toggles{width:100%;padding:0 14px;display:flex;flex-direction:column;gap:8px;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;}
.toggle-label{font-family:'Cinzel',serif;font-size:0.75rem;color:var(--text);}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border2);border-radius:11px;cursor:pointer;transition:0.2s;}
.toggle-slider::after{content:'';position:absolute;width:16px;height:16px;left:2px;top:2px;background:var(--text2);border-radius:50%;transition:0.2s;}
.toggle input:checked+.toggle-slider{background:rgba(201,162,39,0.3);border-color:var(--gold);}
.toggle input:checked+.toggle-slider::after{transform:translateX(18px);background:var(--gold2);}
.home-begin{width:100%;padding:0 14px 16px;}

/* slot machine */
.reel-container{text-align:center;padding:20px 10px;}
.reel-window{background:var(--bg2);border:2px solid var(--border2);border-radius:12px;padding:28px 20px;margin:0 auto 16px;max-width:320px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.reel-house{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--gold2);letter-spacing:0.06em;transition:color 0.05s;}
.reel-gender{font-size:1rem;color:var(--text2);}
.reel-spinning{animation:reelTick 0.065s ease-out;}
@keyframes reelTick{from{opacity:0.35;transform:translateY(-7px)}to{opacity:1;transform:none}}
.pips{display:flex;gap:6px;justify-content:center;margin:10px 0;}
.pip{width:10px;height:10px;border-radius:50%;border:1px solid var(--border2);}
.pip.used{background:var(--border2);}
.pip.avail{background:var(--gold2);box-shadow:0 0 6px rgba(240,196,74,0.6);}
.roll-btn{padding:14px 32px;font-size:1rem;letter-spacing:0.1em;}

/* character browser */
.browser{display:flex;flex-direction:column;height:100%;}
.browser-header{padding:12px 14px 8px;flex-shrink:0;}
.browser-title{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);font-weight:700;}
.browser-sub{font-size:0.72rem;color:var(--text2);margin-top:2px;}
.search-input{width:100%;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:0.85rem;font-family:'Crimson Text',serif;outline:none;margin-top:8px;}
.search-input:focus{border-color:var(--gold);}
.char-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 80px;}
.char-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:all 0.12s;}
.char-row:active{background:var(--bg3);}
.char-row.selected{border-color:var(--gold);background:rgba(201,162,39,0.1);}
.char-name{font-family:'Cinzel',serif;font-size:0.8rem;font-weight:600;color:var(--text);}
.char-meta{font-size:0.68rem;color:var(--text2);margin-top:1px;}
.score-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.score-dot{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:28px;}
.score-dot .key{font-size:0.55rem;color:var(--text2);font-family:'Cinzel',serif;}
.score-dot .val{font-family:'Cinzel',serif;font-size:0.75rem;font-weight:700;}
.val-high{color:var(--gold2);}
.val-mid{color:var(--gold);}
.val-low{color:var(--text2);}

/* position board */
.board{padding:10px 10px 80px;}
.pos-group{margin-bottom:14px;}
.pos-group-name{font-family:'Cinzel',serif;font-size:0.62rem;color:var(--text2);letter-spacing:0.15em;padding:4px 4px;border-bottom:1px solid var(--border);margin-bottom:6px;}
.slot-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.slot-row:active{background:var(--bg3);}
.slot-row.filled{border-color:var(--border2);}
.slot-row.selected-slot{border-color:var(--gold);background:rgba(201,162,39,0.08);}
.slot-row.error-slot{border-color:var(--red2);}
@keyframes cpuPlaceFlash{0%{background:rgba(201,162,39,0.45);border-color:var(--gold);}100%{background:var(--bg2);border-color:var(--border2);}}
.slot-row.cpu-placed-flash{animation:cpuPlaceFlash 1.8s ease-out forwards;}
@keyframes cpuRerollBanner{0%{opacity:0;transform:translateY(-6px);}15%{opacity:1;transform:translateY(0);}85%{opacity:1;}100%{opacity:0;}}
.cpu-reroll-banner{animation:cpuRerollBanner 2.2s ease forwards;background:rgba(201,162,39,0.13);border:1px solid var(--gold);border-radius:8px;padding:10px 16px;text-align:center;font-family:'Cinzel',serif;font-size:0.75rem;color:var(--gold);letter-spacing:0.1em;margin-bottom:10px;}
.slot-char{flex:1;}
.slot-char-name{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--text);}
.slot-char-sub{font-size:0.65rem;color:var(--text2);margin-top:1px;}
.slot-empty{font-size:0.75rem;color:var(--text2);font-style:italic;}
.slot-score{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;width:26px;text-align:right;flex-shrink:0;}

/* phase tabs */
.phase-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.phase-tab{flex:1;padding:10px 4px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.05em;cursor:pointer;transition:all 0.15s;}
.phase-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.phase-tab:disabled{opacity:0.3;cursor:default;}

/* turn banner */
.turn-banner{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;font-family:'Cinzel',serif;font-size:0.8rem;font-weight:700;letter-spacing:0.08em;flex-shrink:0;}
.turn-banner.p1{background:rgba(41,128,185,0.2);color:var(--p1);border-bottom:1px solid rgba(41,128,185,0.3);}
.turn-banner.p2{background:rgba(192,57,43,0.2);color:var(--p2);border-bottom:1px solid rgba(192,57,43,0.3);}

/* end screen */
.end-screen{display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 14px 40px;max-width:520px;margin:0 auto;}
.tier-badge{font-family:'Cinzel',serif;font-size:0.8rem;font-weight:700;letter-spacing:0.15em;padding:6px 18px;border:2px solid;border-radius:20px;}
.tier-badge.glow{animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 6px currentColor}50%{box-shadow:0 0 20px currentColor,0 0 40px currentColor}}
.vs-compare{display:flex;gap:10px;}
.vs-col{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.vs-col-header{padding:10px;font-family:'Cinzel',serif;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-align:center;}
.vs-col-header.p1{background:rgba(41,128,185,0.3);color:var(--p1);}
.vs-col-header.p2{background:rgba(192,57,43,0.3);color:var(--p2);}
.winner-crown{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--gold2);letter-spacing:0.1em;text-align:center;}
.card{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px;}

/* history */
.history-screen{display:flex;flex-direction:column;height:100dvh;height:100vh;background:var(--bg);}
.page-embed .app{height:auto!important;min-height:0!important;}
.page-embed .scroll{overflow:visible!important;height:auto!important;flex:none!important;}
.page-embed .history-screen{height:auto!important;}
.history-header{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.history-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;}
.history-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;}
.history-item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.history-roster{font-size:0.68rem;color:var(--text2);line-height:1.7;}

/* misc */
.badge{font-family:'Cinzel',serif;font-size:0.62rem;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:0.04em;}
.badge-blue{background:rgba(41,128,185,0.3);color:var(--p1);}
.badge-red{background:rgba(192,57,43,0.3);color:var(--p2);}
.error-text{color:#ff6b6b;font-size:0.75rem;font-family:'Cinzel',serif;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn 0.25s ease both;}
h1{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;color:var(--gold2);letter-spacing:0.08em;text-align:center;}
h2{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--gold);}
/* ── screen transitions ──────────────────────────────────────────────────── */
.screen-enter{animation:screenIn 0.22s ease both;}
@keyframes screenIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
/* ── achievement toast ───────────────────────────────────────────────────── */
@keyframes toastIn{from{opacity:0;transform:translateY(-14px) scale(0.94)}60%{transform:translateY(2px) scale(1.02)}to{opacity:1;transform:none}}
.ach-toast{animation:toastIn 0.32s cubic-bezier(0.22,1,0.36,1) both;background:rgba(10,8,4,0.97);border:1px solid var(--gold);border-radius:10px;padding:10px 16px;display:flex;gap:10px;align-items:center;max-width:300px;box-shadow:0 4px 24px rgba(0,0,0,0.9),0 0 20px rgba(201,162,39,0.18);pointer-events:none;}
/* ── player placement flash ──────────────────────────────────────────────── */
@keyframes playerPlaceFlash{0%{background:rgba(41,128,185,0.38);border-color:var(--p1);}100%{background:var(--bg2);border-color:var(--border2);}}
.slot-row.player-placed-flash{animation:playerPlaceFlash 1.5s ease-out forwards;}
/* ── pass-device overlay ─────────────────────────────────────────────────── */
@keyframes passIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:none}}
.pass-overlay{animation:passIn 0.2s ease both;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
/* ── daily challenge badge ───────────────────────────────────────────────── */
.daily-new-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(201,162,39,0.8);}
</style>
</head>
<body>
<div id="root"></div>
<script id="app-src" type="text/plain">
const { useState, useCallback, useRef, useEffect } = React;

// ─── Error Boundary ──────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  componentDidCatch(e, info) { console.error('ASoE render error:', e, info); }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: { padding: 24, color: '#ff6b6b', fontFamily: 'monospace', background: '#1a0a00', minHeight: '100vh', whiteSpace: 'pre-wrap' }
      }, '⚠ Render Error:\n' + this.state.error.message + '\n\n' + this.state.error.stack);
    }
    return this.props.children;
  }
}

// ─── Audio Manager ───────────────────────────────────────────────────────────
const AudioManager = (() => {
  let _ctx = null, _masterGain = null, _musicGain = null, _sfxGain = null, _gameGain = null;
  let _reverb = null, _reverbBuffer = null, _dist = null, _rvGainMenu = null, _rvGainGame = null;
  let _musicPlaying = false, _gamePlaying = false, _muted = false, _initialized = false;
  let _volume = 0.85;
  // Suppress looping theme music in the local dev/preview window (localhost) so it can't
  // overlap with the deployed game open in another window. The live site is unaffected.
  const _isPreview = typeof location !== 'undefined' && /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[?::1\]?)$/.test(location.hostname || '');
  let _nextLoopTime = 0, _loopTimer = null;
  let _gameNextLoopTime = 0, _gameLoopTimer = null;
  // Dynasty theme state — declared early so _hardStopDynastyMusic can be called before dynasty section
  let _dynastyPlaying = false, _dynastyGain = null, _dynastyNextLoopTime = 0, _dynastyLoopTimer = null;
  // Collector theme state — declared early so _hardStopCollectorMusic can be called before its section
  let _collectorPlaying = false, _collectorGain = null, _collectorNextLoopTime = 0, _collectorLoopTimer = null;
  let _rvGainColl = null;

  const MUSIC_VOL = 0.18;
  const GAME_VOL  = 0.20;
  const SFX_VOL   = 0.55;
  const BPM        = 50;
  const BEAT       = 60 / BPM;

  // ── In-game theme: "The Iron Throne" ─────────────────────────────────────
  // D Dorian (D E F G A B C D) — medieval-fantasy, purposeful, slightly darker
  // BPM 65: noticeably more driven than the menu's 50 BPM
  const GBPM = 65;
  const GBEAT = 60 / GBPM;
  const GN = { D2:73.42, D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94, C4:261.63, D4:293.66, E4:329.63, F4:349.23 };
  const GAME_MELODY = [
    // Phrase 1 — the "great game" motif: purposeful, stepwise
    [GN.D4, 0.5, 0.55], [GN.F4, 0.5, 0.60],
    [GN.E4, 1.0, 0.55], [GN.D4, 0.5, 0.50], [GN.C4, 0.5, 0.45],
    [GN.B3, 1.0, 0.50], [GN.A3, 2.0, 0.55],
    // Phrase 2 — ascending response
    [GN.G3, 0.5, 0.40], [GN.A3, 0.5, 0.45],
    [GN.B3, 0.5, 0.50], [GN.C4, 0.5, 0.52],
    [GN.D4, 1.0, 0.58], [GN.E4, 0.5, 0.60], [GN.F4, 0.5, 0.55],
    [GN.E4, 2.0, 0.58],
    // Phrase 3 — quicker descent, forward momentum
    [GN.D4, 0.5, 0.52], [GN.C4, 0.5, 0.47],
    [GN.B3, 0.5, 0.48], [GN.A3, 0.5, 0.44],
    [GN.G3, 0.5, 0.40], [GN.F3, 0.5, 0.37],
    [GN.G3, 1.0, 0.42], [GN.A3, 1.5, 0.50],
    // Resolution — return to root, settle with gravitas
    [GN.B3, 0.5, 0.48], [GN.C4, 0.5, 0.52],
    [GN.D4, 1.5, 0.60],
    [GN.D3, 3.5, 0.58],
  ];
  const GAME_MELODY_DUR = GAME_MELODY.reduce((s, [, b]) => s + b, 0) * GBEAT;

  // Original dark medieval melody in A natural minor
  // [freq_hz, duration_beats, amplitude]
  const N = { D3:146.83, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94, C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00 };
  const MELODY = [
    [N.E4, 1.5, 0.65], [N.D4, 0.5, 0.50], [N.C4, 1.0, 0.55], [N.B3, 1.0, 0.50],
    [N.A3, 2.0, 0.60],
    [N.G3, 0.5, 0.40], [N.A3, 0.5, 0.45], [N.B3, 1.0, 0.50], [N.C4, 1.0, 0.55],
    [N.D4, 1.5, 0.60], [N.E4, 0.5, 0.65], [N.D4, 1.0, 0.55], [N.C4, 1.0, 0.50],
    [N.B3, 0.5, 0.45], [N.G3, 0.5, 0.40], [N.A3, 4.5, 0.58], // long final hold
  ];
  const MELODY_DUR = MELODY.reduce((s, [, b]) => s + b, 0) * BEAT;

  function ac() {
    if (_ctx) return _ctx;
    _ctx = new (window.AudioContext || window.webkitAudioContext)();

    _masterGain = _ctx.createGain();
    _masterGain.gain.value = _muted ? 0 : _volume;
    _masterGain.connect(_ctx.destination);

    _musicGain = _ctx.createGain();
    _musicGain.gain.value = 0;

    _gameGain = _ctx.createGain();
    _gameGain.gain.value = 0;

    _sfxGain = _ctx.createGain();
    _sfxGain.gain.value = SFX_VOL;
    _sfxGain.connect(_masterGain);

    // Gentle overdrive
    _dist = _ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 256 - 1;
      curve[i] = (Math.PI + 18) * x / (Math.PI + 18 * Math.abs(x));
    }
    _dist.curve = curve; _dist.oversample = '2x';

    // Hall reverb (shared by both tracks)
    _reverb = _ctx.createConvolver();
    const len = _ctx.sampleRate * 3.5;
    const rbuf = _ctx.createBuffer(2, len, _ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = rbuf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.8);
    }
    _reverbBuffer = rbuf;   // cache so the shared reverb can be flushed (recreated) on theme switch
    _reverb.buffer = rbuf;

    _rvGainMenu = _ctx.createGain(); _rvGainMenu.gain.value = 0.38;
    _rvGainGame = _ctx.createGain(); _rvGainGame.gain.value = 0.30;

    _musicGain.connect(_dist); _dist.connect(_masterGain);
    _musicGain.connect(_reverb); _reverb.connect(_rvGainMenu); _rvGainMenu.connect(_masterGain);
    _gameGain.connect(_masterGain);
    _gameGain.connect(_reverb); _reverb.connect(_rvGainGame); _rvGainGame.connect(_masterGain);

    return _ctx;
  }

  function scheduleNote(freq, t, beats, amp, decayFrac = 0.92) {
    const a = ac();
    const dur = beats * BEAT;
    const osc = a.createOscillator();
    const env = a.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    osc.detune.value = (Math.random() - 0.5) * 6;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(amp, t + 0.06);
    env.gain.setValueAtTime(amp * 0.65, t + 0.15);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur * decayFrac);
    osc.connect(env); env.connect(_musicGain);
    osc.start(t); osc.stop(t + dur);
    // Subtle octave-down drone on longer notes
    if (beats >= 2.0) {
      const d = a.createOscillator(); const dg = a.createGain();
      d.type = 'sine'; d.frequency.value = freq / 2;
      dg.gain.setValueAtTime(0, t);
      dg.gain.linearRampToValueAtTime(amp * 0.28, t + 0.12);
      dg.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.75);
      d.connect(dg); dg.connect(_musicGain);
      d.start(t); d.stop(t + dur * 0.75);
    }
  }

  // Ominous violin layer: sawtooth + lowpass + slow-attack bow envelope + vibrato LFO
  function scheduleViolin(freq, t, beats, amp) {
    const a = ac();
    const dur = beats * BEAT;
    if (!isFinite(freq) || !isFinite(t) || !isFinite(dur) || !isFinite(amp)) return;
    const osc  = a.createOscillator();
    const filt = a.createBiquadFilter();
    const env  = a.createGain();
    const vib  = a.createOscillator();
    const vibG = a.createGain();

    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    // Vibrato: 5 Hz, grows in over 0.6s (like a real violinist settling the bow)
    vib.type = 'sine';
    vib.frequency.value = 5.0;
    vibG.gain.setValueAtTime(0, t);
    vibG.gain.linearRampToValueAtTime(9, t + 0.6);
    vib.connect(vibG);
    vibG.connect(osc.detune);

    // Lowpass removes harsh upper partials → mellower string body
    filt.type = 'lowpass';
    filt.frequency.value = 900;
    filt.Q.value = 0.8;

    // Bow envelope: slow attack, hold, release
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(amp, t + 0.45);
    env.gain.setValueAtTime(amp * 0.88, t + Math.max(dur * 0.6, 0.5));
    env.gain.linearRampToValueAtTime(0.0001, t + dur);

    osc.connect(filt); filt.connect(env); env.connect(_musicGain);
    osc.start(t); vib.start(t);
    osc.stop(t + dur); vib.stop(t + dur);
  }

  // Ominous slow-moving violin counter-line — inlined Hz to avoid lookup issues
  const VIOLIN_LINE = [
    [164.81, 5.0, 0.13],   // E3 — austere, hollow
    [196.00, 4.0, 0.11],   // G3 — minor 3rd shadow
    [174.61, 3.0, 0.12],   // F3 — flat 6th, ominous
    [146.83, 2.0, 0.10],   // D3
    [164.81, 6.0, 0.13],   // E3 — long hold
  ];
  // Sustained drone on A2 throughout — the "cello pedal" that makes it ominous
  function scheduleDrone(t, dur) {
    const a = ac();
    const osc  = a.createOscillator();
    const filt = a.createBiquadFilter();
    const env  = a.createGain();
    const vib  = a.createOscillator();
    const vibG = a.createGain();

    osc.type = 'sawtooth';
    osc.frequency.value = 110; // A2
    vib.type = 'sine';
    vib.frequency.value = 3.2; // slower, heavier vibrato
    vibG.gain.value = 5;
    vib.connect(vibG); vibG.connect(osc.detune);

    filt.type = 'lowpass';
    filt.frequency.value = 600;
    filt.Q.value = 1.2;

    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(0.10, t + 1.0);
    env.gain.setValueAtTime(0.09, t + dur * 0.85);
    // Tail 0.6s past loop boundary so the next drone's fade-in overlaps (no silence gap)
    env.gain.linearRampToValueAtTime(0, t + dur + 0.6);

    osc.connect(filt); filt.connect(env); env.connect(_musicGain);
    osc.start(t); vib.start(t);
    osc.stop(t + dur + 0.6); vib.stop(t + dur + 0.6);
  }

  // ── Game theme scheduling ─────────────────────────────────────────────────
  function scheduleGameNote(freq, t, beats, amp, decayFrac = 0.88) {
    const a = ac();
    const dur = beats * GBEAT;
    if (!isFinite(freq) || !isFinite(t) || !isFinite(dur)) return;
    const osc = a.createOscillator();
    const env = a.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    osc.detune.value = (Math.random() - 0.5) * 4;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(amp, t + 0.05);
    env.gain.setValueAtTime(amp * 0.70, t + 0.12);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur * decayFrac);
    osc.connect(env); env.connect(_gameGain);
    osc.start(t); osc.stop(t + dur);
    // Octave-down body on longer notes
    if (beats >= 1.5) {
      const d = a.createOscillator(); const dg = a.createGain();
      d.type = 'sine'; d.frequency.value = freq / 2;
      dg.gain.setValueAtTime(0, t);
      dg.gain.linearRampToValueAtTime(amp * 0.22, t + 0.10);
      dg.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.70);
      d.connect(dg); dg.connect(_gameGain);
      d.start(t); d.stop(t + dur * 0.72);
    }
  }

  function scheduleGameBass(startT) {
    // Pizzicato D3 pulse every 2 beats — adds rhythmic drive without cluttering
    const a = ac();
    const totalBeats = GAME_MELODY.reduce((s, [, b]) => s + b, 0);
    for (let beat = 0; beat < totalBeats; beat += 2) {
      const t = startT + beat * GBEAT;
      const osc = a.createOscillator(); const env = a.createGain();
      osc.type = 'triangle'; osc.frequency.value = GN.D3;
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.09, t + 0.03);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.65);
      osc.connect(env); env.connect(_gameGain);
      osc.start(t); osc.stop(t + 0.7);
    }
  }

  function scheduleGamePad(startT) {
    // Quiet D-A power drone throughout each loop for body/warmth
    const a = ac();
    [GN.D2, GN.A3].forEach(freq => {
      const osc = a.createOscillator(); const env = a.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      env.gain.setValueAtTime(0, startT);
      env.gain.linearRampToValueAtTime(0.038, startT + 1.5);
      env.gain.setValueAtTime(0.033, startT + GAME_MELODY_DUR * 0.85);
      env.gain.linearRampToValueAtTime(0, startT + GAME_MELODY_DUR + 0.6);
      osc.connect(env); env.connect(_gameGain);
      osc.start(startT); osc.stop(startT + GAME_MELODY_DUR + 0.7);
    });
  }

  function scheduleGameLoop(startT) {
    for (let i = 0; i < GAME_MELODY.length; i++) {
      const [freq, beats, amp] = GAME_MELODY[i];
      scheduleGameNote(freq, startT, beats, amp, i === GAME_MELODY.length - 1 ? 1.0 : 0.88);
      startT += beats * GBEAT;
    }
  }

  // Wrapper that restores startT for bass/pad after melody loop consumed it
  function scheduleGameLoopFull(startT) {
    scheduleGameLoop(startT);
    scheduleGameBass(startT);
    scheduleGamePad(startT);
  }

  function _startGameLoop(fadeIn) {
    const a = ac();
    // Fresh gain node — old pre-scheduled oscillators are orphaned (no output path)
    if (_gameGain) _gameGain.disconnect();
    _gameGain = a.createGain(); _gameGain.gain.value = 0;
    _gameGain.connect(_masterGain); _gameGain.connect(_reverb);
    // Restore reverb wet level (zeroed on stop)
    if (_rvGainGame) { _rvGainGame.gain.cancelScheduledValues(a.currentTime); _rvGainGame.gain.setValueAtTime(0.30, a.currentTime); }
    _gamePlaying = true;
    _gameGain.gain.setValueAtTime(0, a.currentTime);
    _gameGain.gain.linearRampToValueAtTime(GAME_VOL, a.currentTime + (fadeIn || 0.1));
    _gameNextLoopTime = a.currentTime + 0.4;
    scheduleGameLoopFull(_gameNextLoopTime);
    _gameNextLoopTime += GAME_MELODY_DUR;
    scheduleGameLoopFull(_gameNextLoopTime);
    _gameNextLoopTime += GAME_MELODY_DUR;
    clearInterval(_gameLoopTimer);
    _gameLoopTimer = setInterval(() => {
      if (!_gamePlaying) return;
      const now = ac().currentTime;
      while (_gameNextLoopTime - now < GAME_MELODY_DUR * 2) {
        scheduleGameLoopFull(_gameNextLoopTime);
        _gameNextLoopTime += GAME_MELODY_DUR;
      }
    }, 2000);
  }

  function _hardStopGameMusic() {
    _gamePlaying = false;
    clearInterval(_gameLoopTimer);
    try {
      const a = ac();
      const t = a.currentTime;
      if (_gameGain)   { _gameGain.gain.cancelScheduledValues(t);   _gameGain.gain.setValueAtTime(0, t); }
      if (_rvGainGame) { _rvGainGame.gain.cancelScheduledValues(t); _rvGainGame.gain.setValueAtTime(0, t); }
    } catch(e) {}
  }

  function stopGameMusic() {
    if (!_gamePlaying) return;
    _hardStopGameMusic();
  }

  // ── Dynasty Theme: "The Conqueror's Crown" ─────────────────────────────────
  // D major · BPM 52 · Grand medieval opera — harp arpeggios + male choir + timpani + strings
  const DYNASTY_VOL = 0.22;
  const DBPM = 52, DBEAT = 60 / DBPM;

  // D major note frequencies
  const DN = {
    D2:73.42, A2:110.00, D3:146.83, E3:164.81, FS3:185.00, G3:196.00,
    A3:220.00, B3:246.94, CS4:277.18, D4:293.66, E4:329.63, FS4:370.00,
    G4:392.00, A4:440.00, B4:493.88, CS5:554.37, D5:587.33
  };

  // Grand operatic melody — 32 beats, majestic and soaring
  const DYN_MELODY = [
    // Opening fanfare (bars 1-2): D major ascending
    [DN.D4, 1.0, 0.70], [DN.FS4, 0.5, 0.72], [DN.A4, 0.5, 0.75],
    [DN.D5, 2.0, 0.80],
    [DN.CS5, 0.5, 0.72], [DN.B4, 0.5, 0.68], [DN.A4, 1.0, 0.72],
    // Phrase 2 (bars 3-4): noble stepwise descent
    [DN.G4,  1.0, 0.68], [DN.FS4, 0.5, 0.65], [DN.E4, 0.5, 0.60],
    [DN.D4,  1.0, 0.65], [DN.E4, 0.5, 0.62],  [DN.FS4, 0.5, 0.65],
    [DN.G4,  1.0, 0.68], [DN.A4, 1.0, 0.72],
    // Phrase 3 (bars 5-6): lyrical ascent
    [DN.B4,  1.0, 0.75], [DN.A4, 0.5, 0.72],  [DN.G4, 0.5, 0.70],
    [DN.FS4, 1.0, 0.68], [DN.E4, 0.5, 0.62],  [DN.D4, 0.5, 0.58],
    [DN.E4,  1.0, 0.62], [DN.FS4, 1.0, 0.65],
    // Resolution (bars 7-8): grand close on D
    [DN.G4,  0.5, 0.68], [DN.A4, 0.5, 0.72],
    [DN.D5,  1.5, 0.80],
    [DN.A4,  0.5, 0.72], [DN.FS4, 0.5, 0.68], [DN.D4, 0.5, 0.65],
    [DN.D3,  4.0, 0.60],
  ];
  const DYN_MELODY_DUR = DYN_MELODY.reduce((s, [, b]) => s + b, 0) * DBEAT;

  function scheduleDynastyNote(freq, t, beats, amp) {
    const a = ac();
    const dur = beats * DBEAT;
    if (!isFinite(freq) || !isFinite(t) || !isFinite(dur)) return;
    const osc = a.createOscillator(); const env = a.createGain();
    const vib = a.createOscillator(); const vibG = a.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    // Gentle vibrato for an operatic feel
    vib.type = 'sine'; vib.frequency.value = 5.5;
    vibG.gain.setValueAtTime(0, t); vibG.gain.linearRampToValueAtTime(7, t + 0.4);
    vib.connect(vibG); vibG.connect(osc.detune);
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(amp, t + 0.08);
    env.gain.setValueAtTime(amp * 0.72, t + 0.25);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.90);
    osc.connect(env); env.connect(_dynastyGain);
    osc.start(t); vib.start(t); osc.stop(t + dur); vib.stop(t + dur);
    // Octave-down for richness on long notes
    if (beats >= 1.5) {
      const d = a.createOscillator(); const dg = a.createGain();
      d.type = 'sine'; d.frequency.value = freq / 2;
      dg.gain.setValueAtTime(0, t);
      dg.gain.linearRampToValueAtTime(amp * 0.30, t + 0.15);
      dg.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.75);
      d.connect(dg); dg.connect(_dynastyGain);
      d.start(t); d.stop(t + dur * 0.78);
    }
  }

  // Harp: plucked arpeggios alternating D-major and G-major triads
  function scheduleDynastyHarp(startT) {
    const a = ac();
    // Two-bar arpeggio pattern repeating throughout
    const HARP_PATTERN = [
      // D major arpeg (beat 1-2)
      [DN.D3,0.25,0.28],[DN.FS3,0.25,0.26],[DN.A3,0.25,0.25],[DN.D4,0.25,0.27],
      [DN.A3,0.25,0.24],[DN.FS3,0.25,0.23],[DN.D3,0.25,0.22],[DN.A2,0.25,0.25],
      // G major arpeg (beat 3-4)
      [DN.G3,0.25,0.26],[DN.B3,0.25,0.24],[DN.D4,0.25,0.25],[DN.G4,0.25,0.27],
      [DN.D4,0.25,0.24],[DN.B3,0.25,0.22],[DN.G3,0.25,0.21],[DN.D3,0.25,0.24],
      // A major arpeg (beat 5-6)
      [DN.A2,0.25,0.25],[DN.CS4,0.25,0.23],[DN.E4,0.25,0.24],[DN.A4,0.25,0.26],
      [DN.E4,0.25,0.23],[DN.CS4,0.25,0.21],[DN.A3,0.25,0.22],[DN.E3,0.25,0.24],
      // D major resolve (beat 7-8)
      [DN.D3,0.25,0.26],[DN.FS3,0.25,0.24],[DN.A3,0.25,0.25],[DN.D4,0.25,0.28],
      [DN.A3,0.25,0.24],[DN.D4,0.25,0.25],[DN.FS4,0.25,0.26],[DN.A4,0.25,0.27],
    ];
    let t = startT;
    // Repeat pattern for the full melody duration
    const totalBeats = DYN_MELODY.reduce((s, [, b]) => s + b, 0);
    const patternBeats = HARP_PATTERN.reduce((s, [, b]) => s + b, 0);
    let beat = 0;
    let pi = 0;
    while (beat < totalBeats) {
      const [freq, dur, amp] = HARP_PATTERN[pi % HARP_PATTERN.length];
      const osc = a.createOscillator(); const env = a.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq;
      env.gain.setValueAtTime(amp * 0.9, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + dur * DBEAT * 0.85);
      osc.connect(env); env.connect(_dynastyGain);
      osc.start(t); osc.stop(t + dur * DBEAT);
      t += dur * DBEAT; beat += dur;
      pi++;
    }
  }

  // Male choir: slow-attack sustained "Aaah" vowel formants
  function scheduleDynastyChoir(startT) {
    const a = ac();
    // Choir enters every 8 beats, holds for 6 beats
    const CHOIR_ENTRIES = [
      { t: 0,       freqs: [DN.D2, DN.A2, DN.D3], amp: 0.12 },
      { t: 8*DBEAT, freqs: [DN.G3, DN.B3, DN.D4], amp: 0.10 },
      { t:16*DBEAT, freqs: [DN.A2, DN.E3, DN.A3], amp: 0.12 },
      { t:24*DBEAT, freqs: [DN.D2, DN.FS3, DN.D4], amp: 0.14 },
    ];
    for (const { t: offset, freqs, amp } of CHOIR_ENTRIES) {
      const entryT = startT + offset;
      const dur = 6 * DBEAT;
      for (const freq of freqs) {
        // Main vowel body (sawtooth with formant filter — "Aaah" male voice)
        const osc = a.createOscillator();
        const filt1 = a.createBiquadFilter(); // F1 ~750Hz for male "a" vowel
        const filt2 = a.createBiquadFilter(); // F2 ~1200Hz
        const env = a.createGain();
        osc.type = 'sawtooth'; osc.frequency.value = freq;
        filt1.type = 'bandpass'; filt1.frequency.value = 750; filt1.Q.value = 3;
        filt2.type = 'bandpass'; filt2.frequency.value = 1200; filt2.Q.value = 2;
        const mix1 = a.createGain(); mix1.gain.value = 0.55;
        const mix2 = a.createGain(); mix2.gain.value = 0.35;
        // Slow operatic bow attack + steady hold + breath release
        env.gain.setValueAtTime(0, entryT);
        env.gain.linearRampToValueAtTime(amp, entryT + 0.9); // slow breath attack
        env.gain.setValueAtTime(amp * 0.88, entryT + dur * 0.75);
        env.gain.linearRampToValueAtTime(0, entryT + dur);
        osc.connect(filt1); filt1.connect(mix1); mix1.connect(env);
        osc.connect(filt2); filt2.connect(mix2); mix2.connect(env);
        env.connect(_dynastyGain);
        osc.start(entryT); osc.stop(entryT + dur + 0.1);
        // Add gentle vibrato that grows in like a trained singer
        const vibO = a.createOscillator(); const vibG2 = a.createGain();
        vibO.type = 'sine'; vibO.frequency.value = 5.0;
        vibG2.gain.setValueAtTime(0, entryT); vibG2.gain.linearRampToValueAtTime(8, entryT + 1.2);
        vibO.connect(vibG2); vibG2.connect(osc.detune);
        vibO.start(entryT); vibO.stop(entryT + dur + 0.1);
      }
    }
  }

  // Timpani: majestic D2 hits on beats 1 and 3
  function scheduleDynastyTimpani(startT) {
    const a = ac();
    const totalBeats = DYN_MELODY.reduce((s, [, b]) => s + b, 0);
    for (let beat = 0; beat < totalBeats; beat += 2) {
      const t = startT + beat * DBEAT;
      const isDownbeat = (beat % 4 === 0);
      const amp = isDownbeat ? 0.55 : 0.32;
      const osc = a.createOscillator(); const env = a.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(isDownbeat ? 75 : 62, t);
      osc.frequency.exponentialRampToValueAtTime(32, t + 0.45);
      env.gain.setValueAtTime(amp, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.80);
      osc.connect(env); env.connect(_dynastyGain);
      osc.start(t); osc.stop(t + 0.85);
      // Timpani beater click
      if (isDownbeat) {
        const nb = a.createBuffer(1, Math.floor(a.sampleRate * 0.018), a.sampleRate);
        const nd = nb.getChannelData(0);
        for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * Math.exp(-i/(a.sampleRate*0.002));
        const ns = a.createBufferSource(); ns.buffer = nb;
        const ng = a.createGain(); ng.gain.value = 0.30;
        ns.connect(ng); ng.connect(_dynastyGain); ns.start(t);
      }
    }
  }

  // Sustained string pad — D major chord held throughout
  function scheduleDynastyStrings(startT) {
    const a = ac();
    const dur = DYN_MELODY_DUR;
    const STRING_FREQS = [DN.D2, DN.A2, DN.D3, DN.FS3, DN.A3];
    for (const freq of STRING_FREQS) {
      const osc = a.createOscillator(); const filt = a.createBiquadFilter();
      const env = a.createGain();
      const vib = a.createOscillator(); const vibG = a.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      filt.type = 'lowpass'; filt.frequency.value = 1100; filt.Q.value = 0.5;
      vib.type = 'sine'; vib.frequency.value = 4.8;
      vibG.gain.setValueAtTime(0, startT); vibG.gain.linearRampToValueAtTime(6, startT + 1.5);
      vib.connect(vibG); vibG.connect(osc.detune);
      env.gain.setValueAtTime(0, startT);
      env.gain.linearRampToValueAtTime(0.045, startT + 2.0);
      env.gain.setValueAtTime(0.040, startT + dur * 0.80);
      env.gain.linearRampToValueAtTime(0, startT + dur + 0.8);
      osc.connect(filt); filt.connect(env); env.connect(_dynastyGain);
      osc.start(startT); vib.start(startT);
      osc.stop(startT + dur + 1.0); vib.stop(startT + dur + 1.0);
    }
  }

  function scheduleDynastyLoop(startT) {
    let t = startT;
    for (const [freq, beats, amp] of DYN_MELODY) {
      scheduleDynastyNote(freq, t, beats, amp);
      t += beats * DBEAT;
    }
    scheduleDynastyHarp(startT);
    scheduleDynastyChoir(startT);
    scheduleDynastyTimpani(startT);
    scheduleDynastyStrings(startT);
  }

  function _startDynastyLoop(fadeIn) {
    const a = ac();
    // Fresh gain node — old pre-scheduled oscillators are orphaned (no output path)
    if (_dynastyGain) _dynastyGain.disconnect();
    _dynastyGain = a.createGain(); _dynastyGain.gain.value = 0;
    _dynastyGain.connect(_masterGain);
    _dynastyGain.connect(_reverb);
    _dynastyPlaying = true;
    _dynastyGain.gain.setValueAtTime(0, a.currentTime);
    _dynastyGain.gain.linearRampToValueAtTime(DYNASTY_VOL, a.currentTime + (fadeIn || 0.1));
    _dynastyNextLoopTime = a.currentTime + 0.5;
    scheduleDynastyLoop(_dynastyNextLoopTime);
    _dynastyNextLoopTime += DYN_MELODY_DUR;
    scheduleDynastyLoop(_dynastyNextLoopTime);
    _dynastyNextLoopTime += DYN_MELODY_DUR;
    clearInterval(_dynastyLoopTimer);
    _dynastyLoopTimer = setInterval(() => {
      if (!_dynastyPlaying) return;
      const now = ac().currentTime;
      while (_dynastyNextLoopTime - now < DYN_MELODY_DUR * 2) {
        scheduleDynastyLoop(_dynastyNextLoopTime);
        _dynastyNextLoopTime += DYN_MELODY_DUR;
      }
    }, 2000);
  }

  function _hardStopDynastyMusic() {
    _dynastyPlaying = false;
    clearInterval(_dynastyLoopTimer);
    try {
      const a = ac(); const t = a.currentTime;
      if (_dynastyGain) { _dynastyGain.gain.cancelScheduledValues(t); _dynastyGain.gain.setValueAtTime(0, t); }
    } catch(e) {}
  }

  function stopDynastyMusic() {
    if (!_dynastyPlaying) return;
    _hardStopDynastyMusic();
  }

  // ── Collector Theme: "The Vault Eternal" ─────────────────────────────────────
  // A major · BPM 90 · Upbeat, gilded grandeur — the highest, brightest theme in the game
  // Instruments: recorder (sine, soaring melody) · harp (cascade arpeggios) · piano bass · divine bells
  const COLL_VOL  = 0.21;
  const CBPM      = 90;
  const CBEAT_C   = 60 / CBPM;   // 0.6667 s per beat

  // Melody: recorder voice in A major — 32 beats total
  // [Hz, beats, amplitude]
  const COLL_MEL = [
    // Phrase 1 — Hero's Call (8 beats): bold upward arpeggio, then lilting descent
    [440.00, 0.5, 0.70], [554.37, 0.5, 0.76], [659.25, 1.0, 0.84],
    [587.33, 1.0, 0.80], [554.37, 1.0, 0.76],
    [493.88, 0.5, 0.70], [440.00, 0.5, 0.66], [415.30, 0.5, 0.62], [440.00, 0.5, 0.68],
    [329.63, 2.0, 0.60],
    // Phrase 2 — The Gods' Walk (8 beats): flowing stepwise climb back to the peak
    [370.00, 0.5, 0.66], [329.63, 0.5, 0.63], [293.66, 0.5, 0.58], [329.63, 0.5, 0.63],
    [370.00, 1.0, 0.68], [415.30, 1.0, 0.72],
    [440.00, 0.5, 0.74], [493.88, 0.5, 0.76], [554.37, 0.5, 0.78], [493.88, 0.5, 0.74],
    [440.00, 2.0, 0.72],
    // Phrase 3 — Ascension (8 beats): E5 peak held, then builds toward final triumph
    [659.25, 2.0, 0.86],
    [587.33, 1.0, 0.82], [554.37, 1.0, 0.78],
    [493.88, 0.5, 0.73], [440.00, 0.5, 0.70], [493.88, 0.5, 0.72], [554.37, 0.5, 0.74],
    [587.33, 2.0, 0.80],
    // Phrase 4 — Triumph (8 beats): E5 again triumphant, scales down, lands on A3 root
    [659.25, 1.0, 0.88], [554.37, 0.5, 0.80], [440.00, 0.5, 0.76],
    [415.30, 0.5, 0.70], [370.00, 0.5, 0.66], [329.63, 1.0, 0.63],
    [220.00, 4.0, 0.78],
  ];
  const COLL_MEL_DUR = COLL_MEL.reduce((s, [, b]) => s + b, 0) * CBEAT_C;

  // Recorder/flute: pure sine, fast breath attack, gentle lilting vibrato
  function scheduleCollNotes(startT) {
    let t = startT;
    for (let i = 0; i < COLL_MEL.length; i++) {
      const [freq, beats, amp] = COLL_MEL[i];
      const dur = beats * CBEAT_C;
      const a = ac();
      if (!isFinite(freq) || !isFinite(t) || !isFinite(dur)) { t += dur; continue; }
      const osc = a.createOscillator(); const env = a.createGain();
      const vib = a.createOscillator(); const vibG = a.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      vib.type = 'sine'; vib.frequency.value = 6.2;
      vibG.gain.setValueAtTime(0, t); vibG.gain.linearRampToValueAtTime(5.5, t + 0.28);
      vib.connect(vibG); vibG.connect(osc.detune);
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(amp, t + 0.022);
      env.gain.setValueAtTime(amp * 0.82, t + 0.10);
      env.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.91);
      osc.connect(env); env.connect(_collectorGain);
      osc.start(t); vib.start(t); osc.stop(t + dur); vib.stop(t + dur);
      // Piano "body": triangle 1 octave below on longer notes — punchy, warm grounding
      if (beats >= 1.0) {
        const p = a.createOscillator(); const pg = a.createGain();
        p.type = 'triangle'; p.frequency.value = freq / 2;
        pg.gain.setValueAtTime(amp * 0.24, t);
        pg.gain.exponentialRampToValueAtTime(0.0001, t + Math.min(dur * 0.48, 0.80));
        p.connect(pg); pg.connect(_collectorGain);
        p.start(t); p.stop(t + Math.min(dur * 0.55, 0.92));
      }
      t += dur;
    }
  }

  // Harp: upbeat 16th-note arpeggios — I·IV·V·I in A major, cycling through the full loop
  function scheduleCollHarp(startT) {
    const a = ac();
    const HP = [
      // I — A major: A3-C#4-E4-A4 up, C#5-A4-E4-A3 down (beats 1-2)
      [220.00,0.25,0.26],[277.18,0.25,0.24],[329.63,0.25,0.23],[440.00,0.25,0.26],
      [554.37,0.25,0.22],[440.00,0.25,0.21],[329.63,0.25,0.20],[220.00,0.25,0.23],
      // IV — D major: D4-F#4-A4-D5 up, A4-F#4-D4-A3 down (beats 3-4)
      [293.66,0.25,0.24],[370.00,0.25,0.23],[440.00,0.25,0.24],[587.33,0.25,0.26],
      [440.00,0.25,0.22],[370.00,0.25,0.21],[293.66,0.25,0.20],[220.00,0.25,0.23],
      // V — E major: E3-G#3-B3-E4 up, G#4-B4-G#4-E4 (beats 5-6)
      [164.81,0.25,0.24],[207.65,0.25,0.22],[246.94,0.25,0.23],[329.63,0.25,0.25],
      [415.30,0.25,0.23],[493.88,0.25,0.22],[415.30,0.25,0.21],[329.63,0.25,0.23],
      // I — A major glide high: A3-C#4-E4-A4-C#5-E5-C#5-A2 sweep (beats 7-8)
      [220.00,0.25,0.24],[277.18,0.25,0.23],[440.00,0.25,0.24],[554.37,0.25,0.26],
      [659.25,0.25,0.25],[554.37,0.25,0.23],[440.00,0.25,0.22],[110.00,0.25,0.25],
    ];
    const totalBeats = COLL_MEL.reduce((s, [, b]) => s + b, 0);
    let t = startT, beat = 0, pi = 0;
    while (beat < totalBeats) {
      const [freq, dur, amp] = HP[pi % HP.length];
      const osc = a.createOscillator(); const env = a.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq;
      osc.detune.value = (Math.random() - 0.5) * 3;
      env.gain.setValueAtTime(amp * 0.88, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + dur * CBEAT_C * 0.78);
      osc.connect(env); env.connect(_collectorGain);
      osc.start(t); osc.stop(t + dur * CBEAT_C);
      t += dur * CBEAT_C; beat += dur; pi++;
    }
  }

  // Piano bass: punchy root-note hits with brightness overtone and hammer click
  function scheduleCollBass(startT) {
    const a = ac();
    // [beat, Hz, amp] — one downbeat per 4-beat bar across the 32-beat loop
    const BASS = [
      [0,  110.00, 0.30],  // A2
      [4,  146.83, 0.24],  // D3
      [8,  82.41,  0.26],  // E2
      [12, 110.00, 0.30],  // A2
      [16, 110.00, 0.33],  // A2 (ascension — louder)
      [20, 146.83, 0.24],  // D3
      [24, 110.00, 0.36],  // A2 (triumph — loudest)
      [28, 82.41,  0.26],  // E2
    ];
    for (const [beat, freq, amp] of BASS) {
      const t = startT + beat * CBEAT_C;
      // Body: triangle, ~1.6s decay
      const osc = a.createOscillator(); const env = a.createGain();
      osc.type = 'triangle'; osc.frequency.value = freq;
      env.gain.setValueAtTime(amp, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
      osc.connect(env); env.connect(_collectorGain); osc.start(t); osc.stop(t + 1.7);
      // Brightness overtone (octave up, quick decay)
      const o2 = a.createOscillator(); const e2 = a.createGain();
      o2.type = 'sine'; o2.frequency.value = freq * 2;
      e2.gain.setValueAtTime(amp * 0.17, t);
      e2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      o2.connect(e2); e2.connect(_collectorGain); o2.start(t); o2.stop(t + 0.7);
      // Piano hammer click (very short noise burst)
      try {
        const nb = a.createBuffer(1, Math.floor(a.sampleRate * 0.009), a.sampleRate);
        const nd = nb.getChannelData(0);
        for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.0008));
        const ns = a.createBufferSource(); ns.buffer = nb;
        const ng = a.createGain(); ng.gain.value = amp * 0.30;
        ns.connect(ng); ng.connect(_collectorGain); ns.start(t);
      } catch(e) {}
    }
  }

  // Divine bells: inharmonic partials shimmer at phrase peaks — the "godly" sparkle
  function scheduleCollBells(startT) {
    const a = ac();
    const BELLS = [
      [1.0,  659.25, 0.13],  // E5 — phrase 1 peak
      [18.0, 659.25, 0.15],  // E5 — phrase 3 ascension
      [24.0, 659.25, 0.17],  // E5 — phrase 4 triumph (loudest)
    ];
    for (const [beat, freq, amp] of BELLS) {
      const t = startT + beat * CBEAT_C;
      [1.0, 2.756, 5.404].forEach((ratio, ri) => {
        const osc = a.createOscillator(); const env = a.createGain();
        osc.type = 'sine'; osc.frequency.value = freq * ratio;
        const pAmp  = amp * [0.90, 0.40, 0.18][ri];
        const decay = [3.2,  1.6,  0.9][ri];
        env.gain.setValueAtTime(pAmp, t);
        env.gain.exponentialRampToValueAtTime(0.0001, t + decay);
        osc.connect(env); env.connect(_collectorGain);
        osc.start(t); osc.stop(t + decay + 0.1);
      });
    }
  }

  function scheduleCollectorLoop(startT) {
    scheduleCollNotes(startT);
    scheduleCollHarp(startT);
    scheduleCollBass(startT);
    scheduleCollBells(startT);
  }

  function _startCollectorLoop(fadeIn) {
    const a = ac();
    // Fresh gain nodes — old pre-scheduled oscillators are orphaned (no output path)
    if (_collectorGain) _collectorGain.disconnect();
    _collectorGain = a.createGain(); _collectorGain.gain.value = 0;
    _collectorGain.connect(_masterGain);
    if (_rvGainColl) { try { _reverb.disconnect(_rvGainColl); } catch(e) {} _rvGainColl.disconnect(); }
    _rvGainColl = a.createGain(); _rvGainColl.gain.value = 0.20;
    _collectorGain.connect(_reverb); _reverb.connect(_rvGainColl); _rvGainColl.connect(_masterGain);
    _collectorPlaying = true;
    _collectorGain.gain.setValueAtTime(0, a.currentTime);
    _collectorGain.gain.linearRampToValueAtTime(COLL_VOL, a.currentTime + (fadeIn || 0.1));
    _collectorNextLoopTime = a.currentTime + 0.4;
    scheduleCollectorLoop(_collectorNextLoopTime);
    _collectorNextLoopTime += COLL_MEL_DUR;
    scheduleCollectorLoop(_collectorNextLoopTime);
    _collectorNextLoopTime += COLL_MEL_DUR;
    clearInterval(_collectorLoopTimer);
    _collectorLoopTimer = setInterval(() => {
      if (!_collectorPlaying) return;
      const now = ac().currentTime;
      while (_collectorNextLoopTime - now < COLL_MEL_DUR * 2) {
        scheduleCollectorLoop(_collectorNextLoopTime);
        _collectorNextLoopTime += COLL_MEL_DUR;
      }
    }, 2000);
  }

  function _hardStopCollectorMusic() {
    _collectorPlaying = false;
    clearInterval(_collectorLoopTimer);
    try {
      const a = ac(); const t = a.currentTime;
      if (_collectorGain) { _collectorGain.gain.cancelScheduledValues(t); _collectorGain.gain.setValueAtTime(0, t); }
    } catch(e) {}
  }

  function stopCollectorMusic() {
    if (!_collectorPlaying) return;
    _hardStopCollectorMusic();
  }

  function _stopMenuMusicInternal() {
    if (!_musicPlaying) return;
    _musicPlaying = false;
    clearInterval(_loopTimer);
    try {
      const a = ac();
      const t = a.currentTime;
      if (_musicGain)   { _musicGain.gain.cancelScheduledValues(t);   _musicGain.gain.setValueAtTime(0, t); }
      if (_rvGainMenu)  { _rvGainMenu.gain.cancelScheduledValues(t);  _rvGainMenu.gain.setValueAtTime(0, t); }
      if (_dist)        { /* dist is in-line; silenced via _musicGain */ }
    } catch(e) {}
  }

  // Immediate stop of menu music (no fade) — used by _stopAll()
  function _hardStopMenuMusic() {
    _musicPlaying = false;
    clearInterval(_loopTimer);
    try {
      const a = ac(); const t = a.currentTime;
      if (_musicGain)  { _musicGain.gain.cancelScheduledValues(t);  _musicGain.gain.setValueAtTime(0, t); }
      if (_rvGainMenu) { _rvGainMenu.gain.cancelScheduledValues(t); _rvGainMenu.gain.setValueAtTime(0, t); }
    } catch(e) {}
  }

  // Recreate the SHARED reverb convolver to flush its tail — otherwise a stopped theme's
  // reverb keeps ringing through the next theme's wet gain (the audible "bleed"). The impulse
  // buffer is cached, so this is cheap. Theme gains reconnect to _reverb in their start-loops.
  function _flushReverb() {
    if (!_ctx || !_reverbBuffer) return;
    try { if (_reverb) _reverb.disconnect(); } catch (e) {}
    _reverb = _ctx.createConvolver();
    _reverb.buffer = _reverbBuffer;
    try { _reverb.connect(_rvGainMenu); } catch (e) {}
    try { _reverb.connect(_rvGainGame); } catch (e) {}
  }

  // Guaranteed exclusivity: hard-stop every theme AND flush the shared reverb before
  // starting a new one, so nothing from the previous theme bleeds through.
  function _stopAll() {
    _hardStopMenuMusic();
    _hardStopGameMusic();
    _hardStopDynastyMusic();
    _hardStopCollectorMusic();
    _flushReverb();
  }

  function startMenuMusic() {
    if (_isPreview) { _stopAll(); return; } // no theme music in the local preview window
    _hardStopGameMusic();    // stop non-menu themes immediately
    _hardStopDynastyMusic();
    _hardStopCollectorMusic();
    if (_musicPlaying) return; // already playing — don't restart and cause a gap
    _flushReverb();          // clear the just-stopped themes' reverb tails before menu starts
    _startLoop(1.8); // always schedule notes; they play the moment the context runs
  }

  function startGameMusic() {
    _stopAll();
    if (_isPreview) return; // no theme music in the local preview window
    _startGameLoop(1.8);
  }

  function startDynastyMusic() {
    _stopAll();
    if (_isPreview) return; // no theme music in the local preview window
    _startDynastyLoop(2.5);
  }

  function startCollectorMusic() {
    _stopAll();
    if (_isPreview) return; // no theme music in the local preview window
    _startCollectorLoop(1.8);
  }

  function scheduleMelody(startT) {
    let t = startT;
    for (let i = 0; i < MELODY.length; i++) {
      const [freq, beats, amp] = MELODY[i];
      // Last note decays exactly to the loop boundary so there's no silence gap
      scheduleNote(freq, t, beats, amp, i === MELODY.length - 1 ? 1.0 : 0.92);
      t += beats * BEAT;
    }
    // Violin counter-line
    let tv = startT + BEAT * 0.5; // slight offset so it doesn't perfectly align
    for (const [freq, beats, amp] of VIOLIN_LINE) { scheduleViolin(freq, tv, beats, amp); tv += beats * BEAT; }
    // A2 drone spanning full loop
    scheduleDrone(startT, MELODY_DUR);
  }

  function _startLoop(fadeIn) {
    const a = ac();
    // Fresh gain node — old pre-scheduled oscillators are orphaned (no output path)
    if (_musicGain) _musicGain.disconnect();
    _musicGain = a.createGain(); _musicGain.gain.value = 0;
    _musicGain.connect(_dist); _musicGain.connect(_reverb);
    // Restore reverb wet level (zeroed on stop)
    if (_rvGainMenu) { _rvGainMenu.gain.cancelScheduledValues(a.currentTime); _rvGainMenu.gain.setValueAtTime(0.38, a.currentTime); }
    _musicPlaying = true;
    _musicGain.gain.setValueAtTime(0, a.currentTime);
    _musicGain.gain.linearRampToValueAtTime(MUSIC_VOL, a.currentTime + (fadeIn || 0.1));
    _nextLoopTime = a.currentTime + 0.4;
    scheduleMelody(_nextLoopTime);
    _nextLoopTime += MELODY_DUR;
    scheduleMelody(_nextLoopTime);
    _nextLoopTime += MELODY_DUR;
    clearInterval(_loopTimer);
    // Short interval + while loop: robust against browser throttling
    _loopTimer = setInterval(() => {
      if (!_musicPlaying) return;
      const now = ac().currentTime;
      while (_nextLoopTime - now < MELODY_DUR * 2) {
        scheduleMelody(_nextLoopTime);
        _nextLoopTime += MELODY_DUR;
      }
    }, 2000);
  }

  function setMute(muted) {
    _muted = muted;
    localStorage.setItem('asoe-muted', muted ? '1' : '0');
    if (_ctx) {
      _masterGain.gain.cancelScheduledValues(_ctx.currentTime);
      _masterGain.gain.setValueAtTime(_masterGain.gain.value, _ctx.currentTime);
      _masterGain.gain.linearRampToValueAtTime(muted ? 0 : _volume, _ctx.currentTime + 0.15);
    }
  }

  function setVolume(v) {
    _volume = Math.max(0, Math.min(1, v));
    localStorage.setItem('asoe-vol', _volume);
    if (_ctx && !_muted) {
      _masterGain.gain.cancelScheduledValues(_ctx.currentTime);
      _masterGain.gain.setValueAtTime(_masterGain.gain.value, _ctx.currentTime);
      _masterGain.gain.linearRampToValueAtTime(_volume, _ctx.currentTime + 0.05);
    }
  }

  function getVolume() { return _volume; }
  function isMuted() { return _muted; }

  function playClick() {
    if (_muted) return;
    try {
      const a = ac();
      const buf = a.createBuffer(1, Math.floor(a.sampleRate * 0.06), a.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (a.sampleRate * 0.008));
      const src = a.createBufferSource(); src.buffer = buf;
      const g = a.createGain(); g.gain.value = 0.22;
      src.connect(g); g.connect(_sfxGain); src.start();
    } catch(e) {}
  }

  function playPlace() {
    if (_muted) return;
    try {
      const a = ac(); const now = a.currentTime;
      // Thud
      const o1 = a.createOscillator(); const e1 = a.createGain();
      o1.type = 'sine'; o1.frequency.setValueAtTime(130, now); o1.frequency.exponentialRampToValueAtTime(52, now + 0.22);
      e1.gain.setValueAtTime(0.7, now); e1.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      o1.connect(e1); e1.connect(_sfxGain); o1.start(now); o1.stop(now + 0.4);
      // Metallic sting
      const o2 = a.createOscillator(); const e2 = a.createGain();
      o2.type = 'triangle'; o2.frequency.value = 1040;
      e2.gain.setValueAtTime(0.18, now); e2.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
      o2.connect(e2); e2.connect(_sfxGain); o2.start(now); o2.stop(now + 0.15);
      // Click transient
      const cb = a.createBuffer(1, Math.floor(a.sampleRate * 0.012), a.sampleRate);
      const cd = cb.getChannelData(0);
      for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * Math.exp(-i / (a.sampleRate * 0.0008));
      const cs = a.createBufferSource(); cs.buffer = cb;
      const cg = a.createGain(); cg.gain.value = 0.55;
      cs.connect(cg); cg.connect(_sfxGain); cs.start(now);
    } catch(e) {}
  }

  function playVictory() {
    if (_muted) return;
    try {
      const a = ac(); const t = a.currentTime;
      const sg = a.createGain(); sg.gain.value = 0.26; sg.connect(_masterGain);
      // Ascending D-major fanfare: D4→F4→A4→D5
      const vn = [[293.66,0,0.20],[349.23,0.19,0.20],[440.00,0.38,0.26],[587.33,0.63,0.95]];
      for (const [freq,off,dur] of vn) {
        const o=a.createOscillator(), e=a.createGain();
        o.type='triangle'; o.frequency.value=freq;
        e.gain.setValueAtTime(0,t+off);
        e.gain.linearRampToValueAtTime(0.80,t+off+0.035);
        e.gain.setValueAtTime(0.80,t+off+dur-0.09);
        e.gain.linearRampToValueAtTime(0,t+off+dur);
        o.connect(e); e.connect(sg); o.start(t+off); o.stop(t+off+dur+0.05);
        // Octave harmony
        const o2=a.createOscillator(), e2=a.createGain();
        o2.type='sine'; o2.frequency.value=freq*2;
        e2.gain.setValueAtTime(0,t+off); e2.gain.linearRampToValueAtTime(0.18,t+off+0.05);
        e2.gain.exponentialRampToValueAtTime(0.0001,t+off+dur);
        o2.connect(e2); e2.connect(sg); o2.start(t+off); o2.stop(t+off+dur+0.05);
      }
      // Snare punch on beat 1
      const nb=a.createBuffer(1,Math.floor(a.sampleRate*0.16),a.sampleRate);
      const nd=nb.getChannelData(0);
      for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*0.022));
      const ns=a.createBufferSource(); ns.buffer=nb;
      const ng=a.createGain(); ng.gain.value=0.55;
      ns.connect(ng); ng.connect(_sfxGain); ns.start(t);
    } catch(e) {}
  }

// ─── SlotMachine ────────────────────────────────────────────────────────────
function SlotMachine({ onResult, lastRoll, rerollsLeft, maxRerolls, isRandom, rolledChar, onRerollHouse, onRerollGender, onRedraw, isHard, lockedGender, excludeHouse, cpuSpinTrigger, availableCombos }) {
  const [spinning, setSpinning] = useState(false);
  const [display, setDisplay] = useState({ house: 'SEVEN KINGDOMS', gender: '' });
  const timerRef = useRef(null);
  const cpuTimerRef = useRef(null);
  const mountCpuTrigger = useRef(cpuSpinTrigger);

  function doSpin() {
    if (spinning) return;
    setSpinning(true);
    let ticks = 0;
    const maxTicks = 22;
    // For animation ticks, show any house for visual variety
    const allSpinHouses = HOUSES.filter(h => h.name !== excludeHouse && (lockedGender !== 'F' || (!h.alwaysMale && !h.noGenderRoll)));
    // For the final result, only pick houses that still have available characters
    const finalHouses = availableCombos
      ? allSpinHouses.filter(h => {
          if (lockedGender) return availableCombos.has(`${h.name}|${lockedGender}`);
          return availableCombos.has(`${h.name}|M`) || availableCombos.has(`${h.name}|F`);
        })
      : allSpinHouses;
    const pickPool = finalHouses.length > 0 ? finalHouses : allSpinHouses;
    timerRef.current = setInterval(() => {
      const h = allSpinHouses[Math.floor(Math.random() * allSpinHouses.length)];
      const g = lockedGender || (h.alwaysMale ? 'M' : h.noGenderRoll ? null : (Math.random() < 0.5 ? 'M' : 'F'));
      setDisplay({ house: h.name, gender: !g ? '' : g === 'M' ? '♂ MALE' : '♀ FEMALE', emoji: h.emoji, color: h.color });
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(timerRef.current);
        const fh = pickPool[Math.floor(Math.random() * pickPool.length)];
        const hasM = !availableCombos || availableCombos.has(`${fh.name}|M`);
        const hasF = !availableCombos || availableCombos.has(`${fh.name}|F`);
        const fg = lockedGender || (fh.alwaysMale ? 'M' : fh.noGenderRoll ? null : (hasM && hasF ? (Math.random() < 0.5 ? 'M' : 'F') : hasM ? 'M' : 'F'));
        setDisplay({ house: fh.name, gender: !fg ? '' : fg === 'M' ? '♂ MALE' : '♀ FEMALE', emoji: fh.emoji, color: fh.color });
        setSpinning(false);
        onResult({ house: fh.name, gender: fg, emoji: fh.emoji, color: fh.color });
      }
    }, 65);
  }

  // CPU-triggered spin: plays the animation without calling onResult (CPU sets roll state separately)
  // Uses cpuTimerRef (not timerRef) so it never interferes with the player's spin interval
  useEffect(() => {
    if (!cpuSpinTrigger || cpuSpinTrigger <= mountCpuTrigger.current) return;
    clearInterval(cpuTimerRef.current);
    setDisplay({ house: 'SEVEN KINGDOMS', gender: '' });
    setSpinning(true);
    let ticks = 0;
    const maxTicks = 22;
    const spinHouses = HOUSES.filter(h => h.name !== excludeHouse);
    const id = setInterval(() => {
      const h = spinHouses[Math.floor(Math.random() * spinHouses.length)];
      const g = h.alwaysMale ? 'M' : h.noGenderRoll ? null : (Math.random() < 0.5 ? 'M' : 'F');
      setDisplay({ house: h.name, gender: !g ? '' : g === 'M' ? '♂ MALE' : '♀ FEMALE', emoji: h.emoji, color: h.color });
      ticks++;
      if (ticks >= maxTicks) {
        clearInterval(id);
        cpuTimerRef.current = null;
        setSpinning(false);
      }
    }, 65);
    cpuTimerRef.current = id;
    return () => clearInterval(id);
  }, [cpuSpinTrigger]);

  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  if (isRandom) {
    return (
      <div className="reel-container">
        <div className="reel-window">
          {rolledChar ? (
            <>
              <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.7rem', color: 'var(--text2)', letterSpacing: '0.1em' }}>FATES HAVE CHOSEN</div>
              <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.2rem', fontWeight: 700, color: 'var(--gold2)', textAlign: 'center' }}>{rolledChar.name}</div>
              <div style={{ fontSize: '0.7rem', color: 'var(--text2)' }}>{rolledChar.houses.join(' · ')}</div>
            </>
          ) : (
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.9rem', color: 'var(--text2)', textAlign: 'center' }}>Draw from the full roster<br/>Fate decides</div>
          )}
        </div>
        {!rolledChar && (
          <button className="btn btn-gold roll-btn" onClick={() => onResult(null)}>⚔ DRAW FATE ⚔</button>
        )}
        {!isHard && maxRerolls > 0 && (
          <div style={{ marginTop: 14, textAlign: 'center' }}>
            <div className="pips">
              {Array.from({ length: maxRerolls }).map((_, i) => (
                <div key={i} className={`pip ${i < (maxRerolls - rerollsLeft) ? 'used' : 'avail'}`} />
              ))}
            </div>
            {rolledChar && rerollsLeft > 0 && (
              <button className="btn btn-ghost btn-sm" onClick={onRedraw} style={{ marginTop: 6 }}>↺ Redraw ({rerollsLeft})</button>
            )}
          </div>
        )}
      </div>
    );
  }

  const hasRolled = !!lastRoll;
  const houseObj = lastRoll ? HOUSES.find(h => h.name === lastRoll.house) : null;
  const canRerollGender = lastRoll && !HOUSES.find(h => h.name === lastRoll.house)?.alwaysMale && !HOUSES.find(h => h.name === lastRoll.house)?.noGenderRoll;

  return (
    <div className="reel-container">
      {lockedGender && !hasRolled && (
        <div style={{ textAlign: 'center', marginBottom: 8, fontSize: '0.72rem', color: 'var(--gold)', fontFamily: 'Cinzel,serif' }}>
          Gender locked: {lockedGender === 'M' ? '♂ MALE' : '♀ FEMALE'} — spinning for new house
        </div>
      )}
      <div className="reel-window" style={{ borderColor: spinning ? 'var(--gold)' : (houseObj ? houseObj.color : 'var(--border2)') }}>
        {spinning ? (
          <>
            <div key={display.house + display.gender} className="reel-house reel-spinning" style={{ color: display.color || 'var(--gold2)' }}>
              {display.emoji || '⚔'} {display.house}
            </div>
            <div key={'g' + display.gender} className="reel-gender" style={{ color: lockedGender ? 'var(--gold)' : 'var(--text2)' }}>
              {lockedGender ? `🔒 ${lockedGender === 'M' ? '♂ MALE' : '♀ FEMALE'}` : display.gender}
            </div>
          </>
        ) : hasRolled ? (
          <>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.65rem', color: 'var(--text2)', letterSpacing: '0.15em' }}>HOUSE DRAWN</div>
            <div className="reel-house" style={{ color: houseObj?.color || 'var(--gold2)' }}>
              {houseObj?.emoji} {lastRoll.house}
            </div>
            <div className="reel-gender">{lastRoll.gender === 'M' ? '♂ MALE' : '♀ FEMALE'}</div>
            <div style={{ fontSize: '0.68rem', color: 'var(--text2)', marginTop: 4 }}>Browse characters →</div>
          </>
        ) : (
          <>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1rem', color: 'var(--text2)' }}>⚔</div>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.8rem', color: 'var(--text2)' }}>Spin the reels</div>
          </>
        )}
      </div>

      {!hasRolled && !spinning && (
        <button className="btn btn-gold roll-btn" onClick={doSpin}>⚔ SPIN ⚔</button>
      )}
      {spinning && (
        <button className="btn btn-gold roll-btn" disabled>Spinning…</button>
      )}

      {!isHard && maxRerolls > 0 && (
        <div style={{ marginTop: 14, textAlign: 'center' }}>
          <div className="pips">
            {Array.from({ length: maxRerolls }).map((_, i) => (
              <div key={i} className={`pip ${i < (maxRerolls - rerollsLeft) ? 'used' : 'avail'}`} />
            ))}
          </div>
          {hasRolled && !spinning && rerollsLeft > 0 && (
            <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 6 }}>
              <button className="btn btn-ghost btn-sm" onClick={onRerollHouse}>↺ House ({rerollsLeft})</button>
              {canRerollGender && (
                <button className="btn btn-ghost btn-sm" onClick={onRerollGender}>↺ Gender ({rerollsLeft})</button>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── PositionBoard ───────────────────────────────────────────────────────────
function PositionBoard({ board, selectedChar, onSlotClick, showScores, playerLabel, playerColor, readOnly, highlightSlotId, playerHighlightSlotId, groupFilter }) {
  const highlightRef = React.useRef(null);
  React.useEffect(() => {
    if (highlightSlotId && highlightRef.current) {
      highlightRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, [highlightSlotId]);
  const isDynastyBoard = board.some(s => s.group);
  const groups = {};
  board.forEach(slot => {
    const key = isDynastyBoard ? (slot.group || 'Other') : slot.positionId;
    if (!groups[key]) groups[key] = { name: isDynastyBoard ? (slot.group || 'Other') : slot.positionName, slots: [] };
    groups[key].slots.push(slot);
  });

  function canPlace(slot) {
    if (!selectedChar) return true;
    const findPos = (...ids) => board.find(s => ids.includes(s.positionId) || ids.includes(s.slotId))?.character;

    // Dragon-only slots
    if (slot.dragonOnly && !selectedChar.isDragon) return false;
    // Non-dragon slots should not accept dragons
    if (!slot.dragonOnly && selectedChar.isDragon) return false;
    // Dragonrider constraint
    if (slot.dragonriderConstraint && (!selectedChar.DR || selectedChar.isDragon)) return false;

    // Gender constraint (consort must be opposite of ruler)
    if (slot.genderConstraint) {
      const ruler = findPos('ruler', 'd-ruler');
      if (ruler && ruler.gender === selectedChar.gender) return false;
    }
    // Placing as ruler: consort must be opposite gender
    if (slot.positionId === 'ruler' || slot.positionId === 'd-ruler') {
      const consort = findPos('consort', 'd-consort');
      if (consort && consort.gender === selectedChar.gender) return false;
    }
    // Placing as classic consort: heir must be younger
    if (slot.positionId === 'consort') {
      const heir = findPos('heir');
      if (heir && getEffectiveAge(selectedChar) <= getEffectiveAge(heir)) return false;
    }
    // Age constraint: must be younger than ruler and consort
    if (slot.ageConstraint) {
      const ruler = findPos('ruler', 'd-ruler');
      const consort = findPos('consort', 'd-consort');
      if (ruler && getEffectiveAge(selectedChar) >= getEffectiveAge(ruler)) return false;
      if (consort && getEffectiveAge(selectedChar) >= getEffectiveAge(consort)) return false;
    }
    // Squire constraint: must be younger than paired knight
    if (slot.squireConstraint) {
      const knight = board.find(s => s.slotId === slot.squireConstraint || s.positionId === slot.squireConstraint)?.character;
      if (knight && getEffectiveAge(selectedChar) >= getEffectiveAge(knight)) return false;
    }
    return true;
  }

  return (
    <div className="board">
      {playerLabel && (
        <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.75rem', fontWeight: 700, color: playerColor, marginBottom: 10, letterSpacing: '0.08em' }}>
          {playerLabel}'S BOARD
        </div>
      )}
      {selectedChar && !readOnly && (
        <div className="fade-in" style={{ padding: '8px 12px', background: 'rgba(201,162,39,0.08)', border: '1px solid var(--gold)', borderRadius: 6, marginBottom: 10, fontSize: '0.75rem', color: 'var(--gold)' }}>
          Placing: <strong>{selectedChar.name}</strong> — tap a slot below
        </div>
      )}
      {Object.entries(groups).filter(([posId]) => !groupFilter || posId === groupFilter).map(([posId, group]) => (
        <div key={posId} className="pos-group">
          <div className="pos-group-name">{group.name}</div>
          {group.slots.map(slot => {
            const score = getSlotScore(slot);
            const isOccupied = !!slot.character;
            const isSelSlot = selectedChar && slot.character?.id === selectedChar.id;
            const placeable = canPlace(slot);
            const isHighlighted = slot.slotId === highlightSlotId;
            const isPlayerHighlighted = slot.slotId === playerHighlightSlotId;
            const cls = [
              'slot-row',
              isOccupied ? 'filled' : '',
              isSelSlot ? 'selected-slot' : '',
              selectedChar && !placeable ? 'error-slot' : '',
              isHighlighted ? 'cpu-placed-flash' : '',
              isPlayerHighlighted ? 'player-placed-flash' : '',
            ].filter(Boolean).join(' ');
            const constraintMsg = !placeable
              ? slot.dragonOnly ? '⚠ Dragon only'
              : slot.dragonriderConstraint ? '⚠ Needs dragon rider ability'
              : slot.squireConstraint ? '⚠ Must be younger than paired knight'
              : slot.ageConstraint ? '⚠ Age constraint'
              : slot.genderConstraint ? '⚠ Gender constraint'
              : selectedChar?.isDragon ? '⚠ Not a dragon slot'
              : '— empty —'
              : null;

            return (
              <div key={slot.slotId} ref={isHighlighted ? highlightRef : null} className={cls} onClick={() => !readOnly && onSlotClick(slot)}>
                <div style={{ flex: 1 }}>
                  {isDynastyBoard && <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:1 }}>{slot.positionName}</div>}
                  {isOccupied ? (
                    <>
                      <div className="slot-char-name">{slot.character.name}</div>
                      <div className="slot-char-sub">{slot.character.houses.join(' · ')}</div>
                    </>
                  ) : (
                    <div className="slot-empty">
                      {selectedChar && !placeable ? constraintMsg : '— tap to place —'}
                    </div>
                  )}
                </div>
                {isOccupied && showScores && (
                  <div className={`slot-score ${score >= 9 ? 'val-high' : score >= 7 ? 'val-mid' : 'val-low'}`}>{Math.floor(score * 10) / 10}</div>
                )}
                {isOccupied && !selectedChar && !readOnly && (
                  <div style={{ fontSize:'0.6rem', color:'var(--text2)', paddingLeft:4, opacity:0.6 }}>›</div>
                )}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

}
// Wipe EVERY piece of local data for a save (history, achievements, chaos progress/
// completions, averages, the per-save collector deck/gold/stats, and dynamic daily_<date>
// keys). Used both for a user-initiated delete AND when a cloud pull learns the save was
// deleted on another device — so it does NOT touch the cloud itself.
function removeLocalSaveData(slotId) {
  const names = ['history','achievements','chaosProgress','chaosCompletions','p1Averages','collector'];
  names.forEach(k => localStorage.removeItem(sk(slotId, k)));
  const prefix = (slotId === 1) ? null : `asoe-s${slotId}-`;
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const key = localStorage.key(i);
    if (!key) continue;
    if (prefix ? key.startsWith(prefix) : key.startsWith('daily_')) localStorage.removeItem(key);
  }
  setSaveMeta(getSaveMeta().filter(s => s.id !== slotId));
  if (getActiveSaveId() === slotId) localStorage.removeItem('asoe-active-save');
}
function deleteSaveSlot(slotId) {
  removeLocalSaveData(slotId);
  // Propagate the deletion to the cloud so other signed-in devices drop it too.
  try { FirebaseSync.deleteSave(slotId); } catch (e) {}
}
function renameSaveSlot(slotId, name) {
  const meta = getSaveMeta();
  const idx = meta.findIndex(s => s.id === slotId);
  if (idx >= 0) { meta[idx].name = name.trim() || `Save ${slotId}`; setSaveMeta(meta); }
}
function touchSave(saveId) {
  const meta = getSaveMeta(); const idx = meta.findIndex(s => s.id === saveId);
  if (idx >= 0) { meta[idx].lastPlayed = Date.now(); setSaveMeta(meta); }
}

// ─── Live session: resume an in-progress game after a mobile background reload ──
// Phones suspend and often discard backgrounded tabs to save battery; when the player
// returns, the browser reloads the page from scratch and the in-memory game is lost.
// We snapshot the active game to localStorage so we can drop the player straight back
// where they were instead of the home screen. Cleared the moment a game ends or they
// leave to any non-game screen.
const LIVE_KEY = 'asoe-live-session';
const LIVE_GS_KEY = 'asoe-live-gs';
const LIVE_MAX_AGE = 24 * 60 * 60 * 1000; // ignore snapshots older than a day
function saveLive(data) {
  try { localStorage.setItem(LIVE_KEY, JSON.stringify({ ...data, ts: Date.now() })); } catch (e) {}
}
function loadLive() {
  try {
    const l = JSON.parse(localStorage.getItem(LIVE_KEY) || 'null');
    if (!l || !l.ts || Date.now() - l.ts > LIVE_MAX_AGE) return null;
    return l;
  } catch (e) { return null; }
}
function saveLiveGs(modeKey, gs) {
  try { localStorage.setItem(LIVE_GS_KEY, JSON.stringify({ modeKey, gs, ts: Date.now() })); } catch (e) {}
}
function loadLiveGs(modeKey) {
  try {
    const s = JSON.parse(localStorage.getItem(LIVE_GS_KEY) || 'null');
    if (!s || s.modeKey !== modeKey || !s.ts || Date.now() - s.ts > LIVE_MAX_AGE) return null;
    if (!s.gs || !Array.isArray(s.gs.boards) || !s.gs.boards.length) return null; // sanity-check shape
    return s.gs;
  } catch (e) { return null; }
}
function clearLive() {
  try { localStorage.removeItem(LIVE_KEY); localStorage.removeItem(LIVE_GS_KEY); } catch (e) {}
}
