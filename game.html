    });
  }

  // Auto-check dynamically generated achievements. The id encodes one charId,
  // but characters that share a display name collapse to a single achievement,
  // so we match by NAME — any variant (e.g. any Jon Snow) earns it.
  const _nameById = window.__achNameById || (window.__achNameById =
    Object.fromEntries((window.CHARACTERS || []).map(c => [c.id, c.name])));
  const _nm = cid => _nameById[cid];
  for (const a of ACHIEVEMENTS) {
    if (a.id.startsWith('ach_dyn_ruler_')) {
      checks[a.id] = !!slotCharEither('ruler') && slotCharEither('ruler').name === _nm(a.id.slice('ach_dyn_ruler_'.length));
    } else if (a.id.startsWith('ach_dyn_hand_')) {
      checks[a.id] = !!slotCharEither('hand') && slotCharEither('hand').name === _nm(a.id.slice('ach_dyn_hand_'.length));
    } else if (a.id.startsWith('ach_dyn_heir_')) {
      checks[a.id] = !!slotCharEither('heir') && slotCharEither('heir').name === _nm(a.id.slice('ach_dyn_heir_'.length));
    } else if (a.id.startsWith('ach_dyn_any_')) {
      const nm = _nm(a.id.slice('ach_dyn_any_'.length));
      checks[a.id] = chars.some(c => c.name === nm);
    } else if (a.id.startsWith('ach_dyn_consort_')) {
      checks[a.id] = slotChar('d-consort')?.name === _nm(a.id.slice('ach_dyn_consort_'.length));
    } else if (a.id.startsWith('ach_dyn_gm_')) {
      checks[a.id] = slotChar('d-gm')?.name === _nm(a.id.slice('ach_dyn_gm_'.length));
    } else if (a.id.startsWith('ach_dyn_warden_')) {
      const nm = _nm(a.id.slice('ach_dyn_warden_'.length));
      checks[a.id] = ['d-warden-1','d-warden-2','d-warden-3','d-warden-4'].some(pid => slotChar(pid)?.name === nm);
    } else if (a.id.startsWith('ach_dyn_army_')) {
      const nm = _nm(a.id.slice('ach_dyn_army_'.length));
      checks[a.id] = isDynasty && ['d-army-cmd','d-kg-cmd'].some(pid => slotChar(pid)?.name === nm);
    }
  }

  const achKey = sk(saveId, 'achievements');
  const existing = JSON.parse(localStorage.getItem(achKey) || '{}');
  const newlyUnlocked = [];
  for (const [id, earned] of Object.entries(checks)) {
    if (earned && !existing[id]) {
      existing[id] = Date.now();
      newlyUnlocked.push(id);
    }
  }
  if (newlyUnlocked.length > 0) {
    localStorage.setItem(achKey, JSON.stringify(existing));
  }
  return newlyUnlocked;
}


// ─── Collector Achievement Checker ───────────────────────────────────────────
function checkCollectorAchievements(newSave, result) {
  const saveId = getActiveSaveId();
  if (!saveId) return [];
  const achKey = sk(saveId, 'achievements');
  const existing = JSON.parse(localStorage.getItem(achKey) || '{}');

  const stats = newSave.stats || {};
  const owned = newSave.owned || [];
  const ownedCards = owned.map(id => getCollCard(id)).filter(Boolean);
  const games  = stats.games  || 0;
  const wins   = stats.wins   || 0;
  const totalScore = stats.totalScore || 0;
  const gold   = newSave.gold || 0;
  const maxStreak = stats.maxWinStreak || 0;

  // Count cards by tier
  const tierCounts = { starter:0, uncommon:0, rare:0, hero:0, legendary:0, mythic:0 };
  ownedCards.forEach(c => { if (tierCounts[c.tier] !== undefined) tierCounts[c.tier]++; });
  const deckTier = deckTierLabel(owned);

  const { isWin, playerScore = 0, margin = 0, wager = 0, playerBoard = {}, rerollsUsed = 0 } = result || {};
  const boardCards = Object.values(playerBoard).filter(Boolean);
  const posScores = COLL_POS.map(pos => {
    const card = playerBoard[pos.id];
    return card ? Math.floor((card.scores?.[pos.id] || 0) * 10) / 10 : -1;
  });
  const filledScores = posScores.filter(s => s >= 0);
  const numTens = filledScores.filter(s => s >= 10).length;
  const allSevens = filledScores.length === COLL_POS.length && filledScores.every(s => s >= 7);

  // Check if board uses only starter/uncommon cards
  const starterOnly = boardCards.every(c => c.tier === 'starter' || c.tier === 'uncommon');

  // Check for 3+ same character (different variants) on the board
  const charCountMap = {};
  boardCards.forEach(c => { if (c.charId) charCountMap[c.charId] = (charCountMap[c.charId] || 0) + 1; });
  const hasTripleChar = Object.values(charCountMap).some(n => n >= 3);

  const checks = {
    ach_coll_first_game:    games >= 1,
    ach_coll_5_games:       games >= 5,
    ach_coll_10_games:      games >= 10,
    ach_coll_25_games:      games >= 25,
    ach_coll_50_games:      games >= 50,
    ach_coll_100_games:     games >= 100,
    ach_coll_first_win:     wins >= 1,
    ach_coll_5_wins:        wins >= 5,

    ach_coll_win_30:        isWin && margin >= 30,
    ach_coll_streak_3:      maxStreak >= 3,
    ach_coll_streak_5:      maxStreak >= 5,
    ach_coll_streak_10:     maxStreak >= 10,
    ach_coll_wager_25:      isWin && wager >= 25,
    ach_coll_wager_50:      isWin && wager >= 50,

    ach_coll_5_tens:        numTens >= 5,
    ach_coll_sweep:         allSevens,
    ach_coll_no_reroll:     isWin && rerollsUsed === 0,
    ach_coll_starter_win:   isWin && starterOnly,
    ach_coll_all_same_char: hasTripleChar,
  };

  const newlyUnlocked = [];
  for (const [id, earned] of Object.entries(checks)) {
    if (earned && !existing[id]) {
      existing[id] = Date.now();
      newlyUnlocked.push(id);
    }
  }
  if (newlyUnlocked.length > 0) localStorage.setItem(achKey, JSON.stringify(existing));
  return newlyUnlocked;
}

const HAND_CRAFTED_CATS = ['Easy','Medium','Hard','Uncommon','Rare','Epic','Legendary','Dynasty','Dynasty Consorts','Dynasty Council','Dynasty Army','Characters','Rulers','Hands','Heirs','Chaos Ladder','Collector'];
const CAT_ORDER = Object.fromEntries(HAND_CRAFTED_CATS.map((c, i) => [c, i]));
// Every achievement is viewable, paginated 20/page and filterable by category —
// including the per-character Rulers/Hands/Heirs/Characters/Dynasty achievements.
const DISPLAY_ACHIEVEMENTS = ACHIEVEMENTS;

const RARITY_SORT = { common: 0, uncommon: 1, rare: 2, epic: 3, legendary: 4 };
const DISPLAY_ACHIEVEMENTS_SORTED = [...DISPLAY_ACHIEVEMENTS].sort((a, b) => {
  const catA = CAT_ORDER[a.cat] ?? 99, catB = CAT_ORDER[b.cat] ?? 99;
  if (catA !== catB) return catA - catB;
  return (RARITY_SORT[a.rarity] ?? 0) - (RARITY_SORT[b.rarity] ?? 0);
});

function AchievementsScreen({ onBack, embedded, saveId }) {
  const unlocked = JSON.parse(localStorage.getItem(sk(saveId, 'achievements')) || '{}');
  const allUnlockedAchs = ACHIEVEMENTS.filter(a => !!unlocked[a.id]);
  const cats = [...new Set(DISPLAY_ACHIEVEMENTS_SORTED.map(a => a.cat))];
  const [activeCat, setActiveCat] = useState('All');
  const [showCompletedOnly, setShowCompletedOnly] = useState(false);
  const PAGE_SIZE = 20;
  const [page, setPage] = useState(0);
  const [search, setSearch] = useState('');

  // Special tabs: __unlocked__ shows earned, __locked__ shows unearned
  const isUnlockedTab = activeCat === '__unlocked__';
  const isLockedTab   = activeCat === '__locked__';
  const base = isUnlockedTab
    ? [...allUnlockedAchs].sort((a, b) => (unlocked[b.id] || 0) - (unlocked[a.id] || 0))
    : isLockedTab
      ? DISPLAY_ACHIEVEMENTS_SORTED.filter(a => !unlocked[a.id])
      : activeCat === 'All'
        ? DISPLAY_ACHIEVEMENTS_SORTED
        : DISPLAY_ACHIEVEMENTS_SORTED.filter(a => a.cat === activeCat);
  const filtered = (!isUnlockedTab && !isLockedTab && showCompletedOnly) ? base.filter(a => !!unlocked[a.id]) : base;
  // Character / text search — matches achievement name or description (the desc
  // contains the character name, e.g. "Place Jon Snow as Ruler").
  const q = search.trim().toLowerCase();
  const searched = q ? filtered.filter(a => a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q)) : filtered;

  const totalPages = Math.ceil(searched.length / PAGE_SIZE);
  const paginated = searched.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  const total = ACHIEVEMENTS.length;
  const earned = allUnlockedAchs.length; // only currently-valid achievements (ignore stale/removed ids)

  const rarityColor = { legendary: '#f0c44a', epic: '#a855f7', rare: '#3b82f6', uncommon: '#22c55e', common: 'var(--text2)' };

  function handleCat(c) { setActiveCat(c); setPage(0); }

  return (
    <div className="app">
      <div className="scroll" style={{ flex: 1, padding: '12px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
          {!embedded && <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>}
          {!embedded && <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.1rem', color: 'var(--gold)', fontWeight: 700 }}>ACHIEVEMENTS</div>}
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
            {!isUnlockedTab && !isLockedTab && (
              <button
                onClick={() => { setShowCompletedOnly(v => !v); setPage(0); }}
                style={{ padding: '3px 8px', fontSize: '0.6rem', fontFamily: 'Cinzel,serif', background: showCompletedOnly ? 'var(--gold)' : 'var(--bg3)', color: showCompletedOnly ? '#000' : 'var(--text2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                {showCompletedOnly ? '✓ Completed' : 'Completed'}
              </button>
            )}
            <div style={{ fontSize: '0.7rem', color: 'var(--text2)' }}>{earned}/{total}</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 10, alignItems: 'center' }}>
          <input value={search} onChange={e => { setSearch(e.target.value); setPage(0); }}
            placeholder="🔍 Search by character or achievement…"
            style={{ flex: 1, fontSize: '0.7rem', padding: '6px 10px', background: 'var(--bg2)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: 4, boxSizing: 'border-box' }} />
          {q && <span style={{ fontSize: '0.6rem', color: 'var(--text2)', whiteSpace: 'nowrap' }}>{searched.length} found</span>}
          {q && <button className="btn btn-ghost btn-sm" style={{ fontSize: '0.6rem' }} onClick={() => { setSearch(''); setPage(0); }}>Clear</button>}
        </div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 10 }}>
          {['All', ...cats].map(c => (
            <button key={c} onClick={() => handleCat(c)}
              style={{ padding: '3px 7px', fontSize: '0.58rem', fontFamily: 'Cinzel,serif', whiteSpace: 'nowrap', background: activeCat===c ? 'var(--gold)' : 'var(--bg3)', color: activeCat===c ? '#000' : 'var(--text2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }}>
              {c}
            </button>
          ))}
          <button onClick={() => handleCat('__unlocked__')}
            style={{ padding: '3px 7px', fontSize: '0.58rem', fontFamily: 'Cinzel,serif', whiteSpace: 'nowrap', background: isUnlockedTab ? '#22c55e' : 'var(--bg3)', color: isUnlockedTab ? '#000' : '#22c55e', border: '1px solid #22c55e', borderRadius: 4, cursor: 'pointer' }}>
            🏆 Unlocked ({earned})
          </button>
          <button onClick={() => handleCat('__locked__')}
            style={{ padding: '3px 7px', fontSize: '0.58rem', fontFamily: 'Cinzel,serif', whiteSpace: 'nowrap', background: isLockedTab ? '#64748b' : 'var(--bg3)', color: isLockedTab ? '#fff' : 'var(--text2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }}>
            🔒 Locked ({total - earned})
          </button>
        </div>
        {totalPages > 1 && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 10 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}>◀</button>
            <div style={{ fontSize: '0.65rem', color: 'var(--text2)' }}>{page+1}/{totalPages} ({filtered.length} total)</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page === totalPages-1}>▶</button>
          </div>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {paginated.map(a => {
            const isUnlocked = !!unlocked[a.id];
            return (
              <div key={a.id} className="card" style={{ opacity: isUnlocked ? 1 : 0.45, borderColor: isUnlocked ? rarityColor[a.rarity] : 'var(--border)' }}>
                <div style={{ fontSize: '1.5rem', marginBottom: 4 }}>{isUnlocked ? a.icon : '🔒'}</div>
                <div style={{ fontSize: '0.7rem', fontFamily: 'Cinzel,serif', fontWeight: 700, color: isUnlocked ? rarityColor[a.rarity] : 'var(--text2)', marginBottom: 2 }}>{a.name}</div>
                <div style={{ fontSize: '0.6rem', color: 'var(--text2)', lineHeight: 1.4 }}>{a.desc}</div>
                {isUnlocked && <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginTop: 4 }}>{new Date(unlocked[a.id]).toLocaleDateString()}</div>}
              </div>
            );
          })}
        </div>
        {totalPages > 1 && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 12 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}>◀ Prev</button>
            <div style={{ flex: 1, textAlign: 'center', fontSize: '0.65rem', color: 'var(--text2)' }}>Page {page+1} of {totalPages}</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page === totalPages-1}>Next ▶</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MostPlayed ───────────────────────────────────────────────────────────────
function MostPlayedScreen({ onBack, embedded, initialModeFilter, saveId }) {
  const raw = localStorage.getItem(sk(saveId, 'history'));
  const allHistory = raw ? JSON.parse(raw) : [];
  const [charSort, setCharSort] = useState('count');
  const [houseSort, setHouseSort] = useState('count');
  const [modeFilter, setModeFilter] = useState(initialModeFilter || 'all');
  const [positionFilter, setPositionFilter] = useState('all');
  const [houseFilter, setHouseFilter] = useState('All');
  const [charPage, setCharPage] = useState(0);
  const [housePage, setHousePage] = useState(0);
  const STATS_PAGE = 20;

  const MODE_FILTER_TABS = [
    { key:'all',                label:'All Modes' },
    { key:'classic',            label:'Classic' },
    { key:'classic-hard',       label:'Classic (Hard)' },
    { key:'classic-random',     label:'Classic (Random)' },
    { key:'classic-hard-random',label:'Classic (Fate)' },
    { key:'empire',             label:'Empire' },
    { key:'empire-hard',        label:'Empire (Hard)' },
    { key:'empire-random',      label:'Empire (Random)' },
    { key:'empire-hard-random', label:'Empire (Fate)' },
    { key:'dynasty',            label:'Dynasty' },
  ];

  const POSITION_OPTS = [
    { key:'all', label:'All Positions' },
    { key:'R',   label:'Ruler' },
    { key:'H',   label:'Hand' },
    { key:'Hr',  label:'Heir' },
    { key:'Con', label:'Consort' },
    { key:'AC',  label:'Army Commander' },
    { key:'KG',  label:'Kingsguard' },
    { key:'KGC', label:'Kingsguard Commander' },
    { key:'SC',  label:'Small Council' },
    { key:'Ally',label:'Ally' },
    { key:'Bank',label:'Bank' },
  ];

  // P1-only solo games for stats
  const history = allHistory.filter(g => (g.numPlayers || 1) === 1 && !g.isVersus && !g.isCPU && (modeFilter === 'all' || g.modeKey === modeFilter));

  const charStats = {};
  const houseStats = {};

  // Seed all known houses with 0 so every house always appears
  for (const h of (window.HOUSES || [])) {
    houseStats[h.name] = { name: h.name, count: 0, points: 0, games: 0 };
  }

  for (const game of history) {
    const board = game.board || [];
    const seenHouses = new Set();
    for (const slot of board) {
      const c = slot.character;
      if (!c) continue;
      // Position filter
      if (positionFilter !== 'all' && slot.scoreKey !== positionFilter) continue;
      if (!charStats[c.id]) charStats[c.id] = { name: c.name, id: c.id, count: 0, points: 0, games: new Set() };
      charStats[c.id].count++;
      charStats[c.id].points += getSlotScore(slot);
      charStats[c.id].games.add(game.id || game.ts || Math.random());
      for (const h of (c.houses || [])) {
        if (!houseFilter || houseFilter === 'All' || h === houseFilter) {
          if (!houseStats[h]) houseStats[h] = { name: h, count: 0, points: 0, games: 0 };
          houseStats[h].count++;
          houseStats[h].points += getSlotScore(slot);
        }
      }
    }
  }

  // Convert games Set to count for PPG
  const charList = Object.values(charStats).map(c => ({
    ...c,
    gameCount: c.games instanceof Set ? c.games.size : 1,
    ppg: c.count > 0 ? (c.points / c.count) : 0,
  }));

  const sortFn = (key) => (a, b) => {
    if (key === 'count') return b.count - a.count || a.name.localeCompare(b.name);
    if (key === 'points') return b.points - a.points || a.name.localeCompare(b.name);
    if (key === 'ppg') return b.ppg - a.ppg || a.name.localeCompare(b.name);
    return a.name.localeCompare(b.name);
  };

  const houseSortFn = (key) => (a, b) =>
    key === 'count' ? (b.count - a.count || a.name.localeCompare(b.name))
                    : (b.points - a.points || a.name.localeCompare(b.name));

  const topChars  = charList.sort(sortFn(charSort));
  const topHouses = Object.values(houseStats).sort(houseSortFn(houseSort));

  const charTotalPages  = Math.ceil(topChars.length / STATS_PAGE);
  const houseTotalPages = Math.ceil(topHouses.length / STATS_PAGE);
  const pagedChars  = topChars.slice(charPage * STATS_PAGE, (charPage + 1) * STATS_PAGE);
  const pagedHouses = topHouses.slice(housePage * STATS_PAGE, (housePage + 1) * STATS_PAGE);

  const selectStyle = { padding:'6px 10px', background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', fontFamily:'Cinzel,serif', fontSize:'0.72rem', cursor:'pointer' };

  const allHouseNames = ['All', ...(window.HOUSES || []).map(h => h.name)];

  return (
    <div className="app">
      <div className="scroll" style={{ flex: 1, padding: '12px' }}>
        {!embedded && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 10 }}>
            <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.1rem', color: 'var(--gold)', fontWeight: 700 }}>MOST PLAYED</div>
          </div>
        )}
        <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
          {MODE_FILTER_TABS.map(t => (
            <button key={t.key} onClick={() => { setModeFilter(t.key); setCharPage(0); setHousePage(0); }}
              style={{ padding:'5px 10px', borderRadius:5, border:'1px solid',
                borderColor: modeFilter === t.key ? 'var(--gold)' : 'var(--border)',
                background: modeFilter === t.key ? 'var(--gold)' : 'var(--bg3)',
                color: modeFilter === t.key ? '#1a1a2e' : 'var(--text2)',
                fontFamily:'Cinzel,serif', fontSize:'0.63rem', cursor:'pointer',
                fontWeight: modeFilter === t.key ? 700 : 400, whiteSpace: 'nowrap' }}
            >{t.label}</button>
          ))}
        </div>
        <div style={{ display:'flex', gap:6, marginBottom:10 }}>
          <select value={positionFilter} onChange={e => { setPositionFilter(e.target.value); setCharPage(0); }} style={{ ...selectStyle, flex:1 }}>
            {POSITION_OPTS.map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
          </select>
          <select value={houseFilter} onChange={e => { setHouseFilter(e.target.value); setCharPage(0); }} style={{ ...selectStyle, flex:1 }}>
            {allHouseNames.map(h => <option key={h} value={h}>{h}</option>)}
          </select>
        </div>
        <div style={{ fontSize:'0.62rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:10 }}>
          Solo (P1) stats only · {history.length} game{history.length !== 1 ? 's' : ''}
        </div>
        {allHistory.length === 0 ? (
          <div style={{ textAlign: 'center', color: 'var(--text2)', marginTop: 40 }}>No games played yet.</div>
        ) : (
          <>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)' }}>TOP CHARACTERS {topChars.length > 0 ? `(${topChars.length})` : ''}</div>
              <select value={charSort} onChange={e => { setCharSort(e.target.value); setCharPage(0); }} style={selectStyle}>
                <option value="count">Most Drafted</option>
                <option value="points">Most Points</option>
                <option value="ppg">Best PPG</option>
              </select>
            </div>
            {charTotalPages > 1 && (
              <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8 }}>
                <button className="btn btn-ghost btn-sm" disabled={charPage===0} onClick={() => setCharPage(p=>p-1)}>‹</button>
                <span style={{ fontSize:'0.65rem', color:'var(--text2)', flex:1, textAlign:'center' }}>Page {charPage+1}/{charTotalPages}</span>
                <button className="btn btn-ghost btn-sm" disabled={charPage>=charTotalPages-1} onClick={() => setCharPage(p=>p+1)}>›</button>
              </div>
            )}
            {pagedChars.map(c => (
              <div key={c.id || c.name} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6, padding:'6px 10px', background:'var(--bg3)', borderRadius:6 }}>
                <div style={{ flex:1, fontSize:'0.78rem', color:'var(--text)' }}>{c.name}</div>
                <div style={{ fontSize:'0.65rem', color:'var(--text2)' }}>{c.count}×</div>
                <div style={{ fontSize:'0.65rem', fontFamily:'Cinzel,serif', color:'var(--gold2)', minWidth:38, textAlign:'right' }}>{Math.floor(c.ppg*10)/10} ppg</div>
                <div style={{ fontSize:'0.7rem', fontFamily:'Cinzel,serif', color:'var(--gold)', minWidth:46, textAlign:'right' }}>{Math.floor(c.points*10)/10}pts</div>
              </div>
            ))}
            {charTotalPages > 1 && (
              <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8, marginTop:4 }}>
                <button className="btn btn-ghost btn-sm" disabled={charPage===0} onClick={() => setCharPage(p=>p-1)}>‹ Prev</button>
                <span style={{ fontSize:'0.65rem', color:'var(--text2)', flex:1, textAlign:'center' }}>{charPage+1}/{charTotalPages}</span>
                <button className="btn btn-ghost btn-sm" disabled={charPage>=charTotalPages-1} onClick={() => setCharPage(p=>p+1)}>Next ›</button>
              </div>
            )}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8, marginTop:16 }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)' }}>HOUSES</div>
              <select value={houseSort} onChange={e => { setHouseSort(e.target.value); setHousePage(0); }} style={selectStyle}>
                <option value="count">Most Drafted</option>
                <option value="points">Most Points</option>
              </select>
            </div>
            {houseTotalPages > 1 && (
              <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8 }}>
                <button className="btn btn-ghost btn-sm" disabled={housePage===0} onClick={() => setHousePage(p=>p-1)}>‹</button>
                <span style={{ fontSize:'0.65rem', color:'var(--text2)', flex:1, textAlign:'center' }}>Page {housePage+1}/{houseTotalPages}</span>
                <button className="btn btn-ghost btn-sm" disabled={housePage>=houseTotalPages-1} onClick={() => setHousePage(p=>p+1)}>›</button>
              </div>
            )}
            {pagedHouses.map(h => (
              <div key={h.name} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6, padding:'6px 10px', background:'var(--bg3)', borderRadius:6 }}>
                <div style={{ flex:1, fontSize:'0.78rem', color: h.count > 0 ? 'var(--text)' : 'var(--text2)' }}>{h.name}</div>
                <div style={{ fontSize:'0.7rem', color:'var(--text2)' }}>{h.count}× drafted</div>
                <div style={{ fontSize:'0.7rem', fontFamily:'Cinzel,serif', color: h.count > 0 ? 'var(--gold)' : 'var(--text2)', minWidth:50, textAlign:'right' }}>{Math.floor(h.points*10)/10} pts</div>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}


// ─── LadderScreen ────────────────────────────────────────────────────────────
function LadderScreen({ onBack, onChallenge, progress }) {
  const rungs = window.CHAOS_RUNGS || [];
  const totalRungs = rungs.length;
  const pct = totalRungs > 0 ? Math.min(progress / totalRungs, 1) : 0;
  const [expandedRung, setExpandedRung] = useState(null);

  // Compute all lineups once (memoized) for previews
  const allLineups = React.useMemo(() => {
    const result = {};
    for (const rung of rungs) {
      result[rung.id] = buildChaosLineup(rung.house, rung.topN, rung.fromBottom, rung.pinned, rung.members);
    }
    return result;
  }, []);

  const SK_LABELS = { R:'Ruler',H:'Hand',Hr:'Heir',AC:'Commander',KG:'Kingsguard',KGC:'Kingsguard Commander',SC:'Small Council',Bank:'Bank',Ally:'Ally',Con:'Consort' };
  const SK = ['R','H','Hr','AC','KG','KGC','SC','Bank','Ally','Con'];

  function renderPreview(rung) {
    const lineup = allLineups[rung.id] || {};
    const r  = CHARACTERS.find(c => c.id === lineup['R']);
    const co = CHARACTERS.find(c => c.id === lineup['Con']);
    const hr = CHARACTERS.find(c => c.id === lineup['Hr']);
    // Show the full name (minus any trailing "(epithet)") — a bare first word like "The",
    // "Khal" or "Grey" doesn't identify The Night King, Khal Drogo or Grey Worm.
    const pName = c => c ? c.name.replace(/\s*\([^)]*\)\s*$/, '').trim() : '?';
    return (
      <div style={{ marginTop: 8, padding: '8px 10px', background: 'rgba(0,0,0,0.2)', borderRadius: 6 }}>
        <div style={{ fontSize: '0.58rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif', marginBottom: 5, letterSpacing: '0.06em' }}>LINEUP PREVIEW</div>
        <div style={{ display: 'flex', justifyContent: 'space-around', marginBottom: 4, gap: 6 }}>
          <div style={{ textAlign: 'center', flex: 1 }}>
            <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginBottom: 2 }}>RULER</div>
            <div style={{ fontSize: '0.68rem', color: '#d4a0f0', fontFamily: 'Cinzel,serif' }}>{pName(r)}</div>
          </div>
          <div style={{ textAlign: 'center', flex: 1 }}>
            <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginBottom: 2 }}>CONSORT</div>
            <div style={{ fontSize: '0.68rem', color: '#d4a0f0', fontFamily: 'Cinzel,serif' }}>{pName(co)}</div>
          </div>
        </div>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginBottom: 2 }}>HEIR</div>
          <div style={{ fontSize: '0.68rem', color: '#d4a0f0', fontFamily: 'Cinzel,serif' }}>{pName(hr)}</div>
        </div>
      </div>
    );
  }

  function renderFullLineup(rung) {
    const lineup = allLineups[rung.id] || {};
    return (
      <div style={{ marginTop: 8, padding: '8px 10px', background: 'rgba(0,0,0,0.2)', borderRadius: 6 }}>
        <div style={{ fontSize: '0.58rem', color: 'var(--gold)', fontFamily: 'Cinzel,serif', marginBottom: 5, letterSpacing: '0.06em' }}>FULL LINEUP (REVEALED)</div>
        {SK.map(k => {
          const char = CHARACTERS.find(c => c.id === lineup[k]);
          if (!char) return null;
          const mockSlot = { character: char, scoreKey: k };
          const s = getSlotScore(mockSlot);

// ─── Chaos Achievements ───────────────────────────────────────────────────────
function checkChaosAchievements(rung, newProgress, saveId) {
  const achKey = sk(saveId, 'achievements');
  const stored = JSON.parse(localStorage.getItem(achKey) || '{}');
  const unlocked = [];
  function check(id) {
    if (!stored[id]) { unlocked.push(id); stored[id] = Date.now(); }
  }
  if (newProgress >= 1)  check('ach_chaos_first');
  if (newProgress >= 10) check('ach_chaos_10');
  if (newProgress >= 25) check('ach_chaos_25');
  if (newProgress >= 50) check('ach_chaos_50');
  if (newProgress >= 50) check('ach_chaos_all');
  const houseMap = {
    "Night's Watch": 'ach_chaos_nw', Frey: 'ach_chaos_frey', Other: 'ach_chaos_other',
    Velaryon: 'ach_chaos_velaryon', Tyrell: 'ach_chaos_tyrell', Baratheon: 'ach_chaos_baratheon',
    Blackfyre: 'ach_chaos_blackfyre', Essos: 'ach_chaos_essos', Martell: 'ach_chaos_martell',
    Lannister: 'ach_chaos_lannister', Stark: 'ach_chaos_stark', Bannermen: 'ach_chaos_bannermen',
    Targaryen: 'ach_chaos_targaryen',
  };
  if (houseMap[rung.house]) check(houseMap[rung.house]);
  if (unlocked.length > 0) localStorage.setItem(achKey, JSON.stringify(stored));
  return unlocked;
}

// All collector cards (generated)
function getCollCards() { return window.COLLECTOR_CARDS || []; }
function getCollCard(id) { return getCollCards().find(c => c.id === id); }

// Player's average deck overall → tier label
function deckTierLabel(owned) {
  if (!owned || owned.length === 0) return 'starter';
  const cards = owned.map(id => getCollCard(id)).filter(Boolean);
  if (!cards.length) return 'starter';
  const avg = cards.reduce((s, c) => s + (c.overall || 0), 0) / cards.length;
  if (avg >= 90) return 'mythic';
  if (avg >= 80) return 'legendary';
  if (avg >= 70) return 'hero';
  if (avg >= 60) return 'rare';
  if (avg >= 50) return 'uncommon';
  return 'starter';
}

function deckAvgOverall(owned) {
  if (!owned || !owned.length) return 45;
  const cards = owned.map(id => getCollCard(id)).filter(Boolean);
  if (!cards.length) return 45;
  return cards.reduce((s, c) => s + (c.overall || 0), 0) / cards.length;
}

function seededRandColl(seed) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return h / 4294967295;
}

// Draw a random card from pool weighted by tier probability
function weightedDraw(pool, probs, excludeIds, seed) {
  const TIER_ORDER = ['starter','uncommon','rare','hero','legendary','mythic'];
  const r = seededRandColl(seed + Date.now() + Math.random());
  let cumProb = 0;
  let chosenTier = TIER_ORDER[0];
  for (const [tier, prob] of Object.entries(probs)) {
    cumProb += prob;
    if (r < cumProb) { chosenTier = tier; break; }
  }
  const eligible = pool.filter(c => c.tier === chosenTier && !excludeIds.has(c.id));
  if (!eligible.length) {
    const any = pool.filter(c => !excludeIds.has(c.id));
    if (!any.length) return null;
    return any[Math.floor(Math.random() * any.length)];
  }
  return eligible[Math.floor(Math.random() * eligible.length)];
}

// Generate store showcase (5 cards: starter, uncommon, rare, hero, then 2 random-tier)
function genStoreShowcase(save) {
  const all = getCollCards();
  const owned = new Set(save.owned || []);
  const available = all.filter(c => !owned.has(c.id));
  const showcase = [];
  const used = new Set();
  const fixed = ['starter','uncommon','rare','hero'];
  fixed.forEach(tier => {
    const pool = available.filter(c => c.tier === tier && !used.has(c.id));
    if (pool.length) { const c = pool[Math.floor(Math.random()*pool.length)]; showcase.push(c.id); used.add(c.id); }
  });
  // Last 2 positions have variable tiers
  const varProbs = [{starter:.50,uncommon:.20,rare:.10,hero:.08,legendary:.06,mythic:.06},
                    {starter:.50,uncommon:.20,rare:.10,hero:.08,legendary:.06,mythic:.06}];
  varProbs.forEach((probs, i) => {
    const c = weightedDraw(available.filter(c=>!used.has(c.id)), probs, used, 'showcase'+i);
    if (c) { showcase.push(c.id); used.add(c.id); }
  });
  return showcase;
}

// Deterministic "win pull" — transform CPU board cards into tiered versions
function genWinPullCards(cpuCards, save) {
  const all = getCollCards();
  const owned = new Set(save.owned || []);
  const probs = {starter:.50,uncommon:.10,rare:.10,hero:.10,legendary:.05,mythic:.05};
  const result = [];
  const usedIds = new Set(owned);
  cpuCards.forEach((card, i) => {
    // Find a card for the same charId at a randomly determined tier
    const r = Math.random();
    let cumP = 0; let chosenTier = 'starter';
    for (const [t, p] of Object.entries(probs)) { cumP += p; if (r < cumP) { chosenTier = t; break; } }
    const opts = all.filter(c => c.charId === card.charId && c.tier === chosenTier && !usedIds.has(c.id));
    let picked = opts.length ? opts[Math.floor(Math.random()*opts.length)] : null;
    if (!picked) {
      const any = all.filter(c => c.charId === card.charId && !usedIds.has(c.id));
      picked = any.length ? any[Math.floor(Math.random()*any.length)] : null;
    }
    if (!picked) {
      const any2 = all.filter(c => !usedIds.has(c.id));
      picked = any2.length ? any2[Math.floor(Math.random()*any2.length)] : null;
    }
    if (picked) { result.push(picked); usedIds.add(picked.id); }
    else result.push(null);
  });
  return result;
}

      <div style={{ fontSize:'0.6rem', color:'var(--text2)', fontStyle:'italic', marginBottom:8, lineHeight:1.4 }}>{card.desc}</div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'2px 8px' }}>
        {pos.map(p => {
          const sc = card.scores?.[p.id] || 0;
          const pct = Math.round(sc * 10);
          return (
            <div key={p.id} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', fontSize:'0.55rem' }}>
              <span style={{ color:'var(--text2)', fontFamily:'Cinzel,serif' }}>{p.label}</span>
              <span style={{ color: sc >= 9 ? '#ffd700' : sc >= 7 ? T.color : 'var(--text)', fontWeight:700 }}>
                {Math.floor(sc*10)/10}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Starting Deck Pull ────────────────────────────────────────────────────

function CollectorStartingPull({ onDone }) {
  const [phase, setPhase] = React.useState('intro'); // intro | spinning | done
  const [pulledCards, setPulledCards] = React.useState([]);
  const [currentSpin, setCurrentSpin] = React.useState(0);
  const [revealed, setRevealed] = React.useState([]);

  function doStartingPull() {
    const all = getCollCards();
    const cards = [];
    const usedIds = new Set();
    const starters = all.filter(c => c.tier === 'starter');
    const uncommons = all.filter(c => c.tier === 'uncommon');
    // 18 starter draws
    for (let i = 0; i < 18; i++) {
      const pool = starters.filter(c => !usedIds.has(c.id));
      if (pool.length) { const c = pool[Math.floor(Math.random()*pool.length)]; cards.push(c); usedIds.add(c.id); }
    }
    // 2 uncommon draws
    for (let i = 0; i < 2; i++) {
      const pool = uncommons.filter(c => !usedIds.has(c.id));
      if (pool.length) { const c = pool[Math.floor(Math.random()*pool.length)]; cards.push(c); usedIds.add(c.id); }
    }
    return cards;
  }

  function startSpin() {
    const cards = doStartingPull();
    setPulledCards(cards);
    setPhase('spinning');
    revealNext(cards, 0);
  }

  function revealNext(cards, idx) {
    if (idx >= cards.length) { setPhase('done'); return; }
    setCurrentSpin(idx);
    setTimeout(() => {
      setRevealed(prev => [...prev, idx]);
      setTimeout(() => revealNext(cards, idx + 1), 60);
    }, 80);
  }

  if (phase === 'intro') {
    return (
      <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.95)', zIndex:9998, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
        <div className="card" style={{ maxWidth:400, width:'100%', borderColor:'var(--gold)', padding:28, textAlign:'center' }}>
          <div style={{ fontSize:'2rem', marginBottom:12 }}>🃏</div>
          <h2 style={{ fontFamily:'Cinzel,serif', color:'var(--gold)', marginBottom:12 }}>Starting Deck Pull</h2>
          <p style={{ fontSize:'0.8rem', color:'var(--text2)', marginBottom:20, lineHeight:1.6 }}>
            You'll receive 18 Starter cards and 2 Uncommon cards to begin your collection. The entire Starter and Uncommon pools are available!
          </p>
          <button className="btn btn-gold" style={{ width:'100%' }} onClick={startSpin}>Draw Your Starting Deck</button>
        </div>
      </div>
    );
  }

  const T = window.COLLECTOR_TIERS || {};
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.97)', zIndex:9998, display:'flex', flexDirection:'column', padding:16 }}>
      <div style={{ fontFamily:'Cinzel,serif', color:'var(--gold)', textAlign:'center', fontSize:'0.9rem', marginBottom:12 }}>
        {phase === 'done' ? 'Your Starting Deck' : `Revealing Card ${currentSpin+1} of 20...`}
      </div>
      <div style={{ flex:1, overflow:'auto' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))', gap:8 }}>
          {pulledCards.map((card, i) => {
            const isRev = revealed.includes(i);
            const ct = T[card.tier] || { color:'#888', bg:'#111', border:'#333' };
            return (
              <div key={card.id} style={{ border:`2px solid ${isRev ? ct.color : 'var(--border)'}`, borderRadius:8,
                background: isRev ? ct.bg : '#0a0a14', padding:10, transition:'all 0.3s',
                opacity: isRev ? 1 : 0.3, minHeight:80 }}>
                {isRev && <>
                  <div style={{ fontSize:'0.6rem', fontFamily:'Cinzel,serif', color:ct.color, fontWeight:700, marginBottom:2 }}>{card.name}</div>
                  <div style={{ fontSize:'0.55rem', color:'var(--text2)' }}>{card.houses?.[0]}</div>
                  <CollTierBadge tier={card.tier} />
                  <div style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color, textAlign:'right', fontSize:'1rem', marginTop:4 }}>{card.overall}</div>
                </>}
              </div>
            );
          })}
        </div>
      </div>
      {phase === 'done' && (
        <button className="btn btn-gold" style={{ width:'100%', marginTop:12, padding:'14px' }} onClick={() => onDone(pulledCards.map(c=>c.id))}>
          Enter Collector Mode →
        </button>
      )}
    </div>
  );
}

function CollectorMyDeck({ save, onUpdate }) {
  const [sort, setSort] = React.useState('overall');
  const [filterTier, setFilterTier] = React.useState('all');
  const [selected, setSelected] = React.useState(null);
  const [showAuction, setShowAuction] = React.useState(false);
  const [identityView, setIdentityView] = React.useState(null); // selected charId in "Sort: Identity" mode

  const ownedCards = (save.owned||[]).map(id=>getCollCard(id)).filter(Boolean);
  let cards = [...ownedCards];
  if (filterTier !== 'all') cards = cards.filter(c => c.tier === filterTier);
  if (sort === 'overall') cards.sort((a,b) => b.overall - a.overall);
  else if (sort === 'tier') cards.sort((a,b) => COLL_TIER_ORDER.indexOf(b.tier) - COLL_TIER_ORDER.indexOf(a.tier) || b.overall - a.overall);
  else if (sort === 'name') cards.sort((a,b) => a.name.localeCompare(b.name));
  else if (sort === 'house') cards.sort((a,b) => (a.houses?.[0]||'').localeCompare(b.houses?.[0]||'') || b.overall - a.overall);

  // "Sort: Identity" — group the player's cards by character so they can drill into one
  // character and see every variant of that identity they own.
  const identityGroups = {};
  cards.forEach(c => { (identityGroups[c.charId] = identityGroups[c.charId] || []).push(c); });
  const identities = Object.keys(identityGroups).map(charId => {
    const variants = identityGroups[charId].slice().sort((a,b) => b.overall - a.overall);
    return { charId, variants, count: variants.length, name: (CHARACTERS.find(ch => ch.id === charId) || {}).name || variants[0].name };
  }).sort((a,b) => a.name.localeCompare(b.name));
  const currentIdentity = (sort === 'identity' && identityView) ? identities.find(i => i.charId === identityView) : null;

  function handleAuction(card) {
    if ((save.owned||[]).length <= 20) { alert('You must keep at least 20 cards in your deck!'); return; }
    const gold = COLL_AUCTION_GOLD[card.tier] || 15;
    const newSave = { ...save, gold: (save.gold||0) + gold, owned: (save.owned||[]).filter(id => id !== card.id) };
    saveCollSave(newSave);
    onUpdate(newSave);
    setSelected(null);
    setShowAuction(false);
  }

  const T = window.COLLECTOR_TIERS || {};
  const avgOvr = ownedCards.length ? Math.floor(ownedCards.reduce((s,c)=>s+c.overall,0)/ownedCards.length*10)/10 : 0;
  const deckTier = deckTierLabel(save.owned);

  // Deck composition + progress toward the next deck tier
  const comp = {}; COLL_TIER_ORDER.forEach(t=>comp[t]=0);
  ownedCards.forEach(c=>{ if(comp[c.tier]!==undefined) comp[c.tier]++; });
  const totalOwned = ownedCards.length || 1;
  const compSegments = COLL_TIER_ORDER.filter(t=>comp[t]>0).map(t=>({ pct: comp[t]/totalOwned*100, color:(T[t]||{}).color||'#888' }));
  const TIER_FLOOR = { starter:40, uncommon:50, rare:60, hero:70, legendary:80, mythic:90 };
  const TIER_NEXT  = { starter:'uncommon', uncommon:'rare', rare:'hero', hero:'legendary', legendary:'mythic', mythic:null };
  const nextTier = TIER_NEXT[deckTier];
  const curFloor = TIER_FLOOR[deckTier]||40;
  const nextFloor = nextTier ? TIER_FLOOR[nextTier] : 100;
  const tierProgress = nextTier ? Math.max(0, Math.min(100, (avgOvr-curFloor)/(nextFloor-curFloor)*100)) : 100;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ display:'flex', gap:8, marginBottom:10, flexWrap:'wrap', alignItems:'center' }}>
        <div style={{ fontSize:'0.7rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>
          {ownedCards.length} CARDS · AVG <span style={{ color:'var(--gold)' }}>{avgOvr}</span> · DECK TIER: <CollTierBadge tier={deckTier} />
        </div>
        <div style={{ marginLeft:'auto', display:'flex', gap:4 }}>
          <select style={{ fontSize:'0.6rem', padding:'3px 6px', background:'var(--bg2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:4 }} value={sort} onChange={e=>{ setSort(e.target.value); setIdentityView(null); }}>
            <option value="overall">Sort: Overall</option>
            <option value="tier">Sort: Tier</option>
            <option value="name">Sort: A-Z</option>
            <option value="house">Sort: House</option>
            <option value="identity">Sort: Identity</option>
          </select>
          <select style={{ fontSize:'0.6rem', padding:'3px 6px', background:'var(--bg2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:4 }} value={filterTier} onChange={e=>setFilterTier(e.target.value)}>
            <option value="all">All Tiers</option>
            {COLL_TIER_ORDER.map(t => <option key={t} value={t}>{(T[t]||{}).label||t}</option>)}
          </select>
        </div>
      </div>

      {/* Deck composition + next-tier progress */}
      {ownedCards.length > 0 && (
        <div className="card" style={{ marginBottom:10, padding:'9px 12px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6 }}>
            <span style={{ fontFamily:'Cinzel,serif', fontSize:'0.6rem', color:'var(--gold)', letterSpacing:'0.08em' }}>DECK COMPOSITION</span>
            {nextTier
              ? <span style={{ fontSize:'0.55rem', color:'var(--text2)' }}>{Math.round(tierProgress)}% to <span style={{ color:(T[nextTier]||{}).color, fontFamily:'Cinzel,serif' }}>{(T[nextTier]||{}).label}</span></span>
              : <span style={{ fontSize:'0.55rem', color:(T.mythic||{}).color, fontFamily:'Cinzel,serif' }}>MAX TIER ★</span>}
          </div>
          <div style={{ marginBottom:6 }}><CollBar segments={compSegments} height={9} /></div>
          <div style={{ display:'flex', flexWrap:'wrap', gap:'2px 10px' }}>
            {COLL_TIER_ORDER.filter(t=>comp[t]>0).map(t=>(
              <span key={t} style={{ fontSize:'0.52rem', color:(T[t]||{}).color, fontFamily:'Cinzel,serif' }}>● {comp[t]} {(T[t]||{}).label}</span>
            ))}
          </div>
          {nextTier && (
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:8 }}>
              <span style={{ fontSize:'0.5rem', color:'var(--text2)', width:54, fontFamily:'Cinzel,serif' }}>Next tier</span>
              <div style={{ flex:1 }}><CollBar pct={tierProgress} color={(T[nextTier]||{}).color} height={5} /></div>
              <span style={{ fontFamily:'Cinzel,serif', fontSize:'0.52rem', color:'var(--text2)', width:70, textAlign:'right' }}>avg {avgOvr} → {nextFloor}</span>
            </div>
          )}
        </div>
      )}

      <div className="scroll" style={{ flex:1 }}>
        {sort === 'identity' ? (
          currentIdentity ? (
            <>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <button className="btn btn-ghost btn-sm" onClick={() => setIdentityView(null)}>← All Characters</button>
                <span style={{ fontFamily:'Cinzel,serif', fontSize:'0.82rem', color:'var(--gold)', fontWeight:700 }}>{currentIdentity.name} · {currentIdentity.count} variant{currentIdentity.count!==1?'s':''}</span>
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:8 }}>
                {currentIdentity.variants.map(card => (
                  <CollCardDisplay key={card.id} card={card} compact onClick={() => setSelected(card)} isOwned={true} />
                ))}
              </div>
            </>
          ) : (
            <>
              <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginBottom:8, fontStyle:'italic' }}>Tap a character to see every variant of them you own.</div>
              {identities.length === 0 ? (
                <div style={{ fontSize:'0.7rem', color:'var(--text2)', textAlign:'center', marginTop:30 }}>No cards to show.</div>
              ) : (
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:8 }}>
                  {identities.map(idn => (
                    <div key={idn.charId} onClick={() => setIdentityView(idn.charId)}
                      style={{ cursor:'pointer', border:'1px solid var(--border)', borderRadius:8, padding:'10px 12px', background:'var(--bg2)', display:'flex', flexDirection:'column', gap:4 }}>
                      <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.76rem', color:'var(--gold)', fontWeight:700, lineHeight:1.2 }}>{idn.name}</div>
                      <div style={{ fontSize:'0.58rem', color:'var(--text2)' }}>{idn.count} variant{idn.count!==1?'s':''} owned</div>
                      <div style={{ display:'flex', flexWrap:'wrap', gap:'3px 5px', marginTop:2 }}>
                        {idn.variants.map(v => <CollTierBadge key={v.id} tier={v.tier} />)}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )
        ) : (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:8 }}>
            {cards.map(card => (
              <CollCardDisplay key={card.id} card={card} compact onClick={() => setSelected(card)} isOwned={true} />
            ))}
          </div>
        )}
      </div>

      {selected && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:100, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={() => setSelected(null)}>
          <div style={{ maxWidth:360, width:'100%' }} onClick={e=>e.stopPropagation()}>
            <CollCardDisplay card={selected} isOwned={true} />
            <div style={{ display:'flex', gap:8, marginTop:10 }}>
              <button className="btn btn-ghost btn-sm" style={{ flex:1 }} onClick={() => setSelected(null)}>Close</button>
              <button className="btn btn-ghost btn-sm" style={{ flex:1, color:'#e05555', borderColor:'#e05555' }} onClick={() => setShowAuction(true)}>
                Auction ({COLL_AUCTION_GOLD[selected.tier]}G)
              </button>
            </div>
            {showAuction && (
              <div className="card" style={{ marginTop:8, borderColor:'#e05555' }}>
                <div style={{ fontSize:'0.75rem', color:'#e05555', marginBottom:8 }}>
                  Sell <strong>{selected.name}</strong> for <strong>{COLL_AUCTION_GOLD[selected.tier]} Gold</strong>?
                </div>
                {(save.owned||[]).length <= 20 && <div style={{ fontSize:'0.65rem', color:'#e05555', marginBottom:8 }}>Cannot auction — must keep at least 20 cards.</div>}
                <div style={{ display:'flex', gap:8 }}>
                  <button className="btn btn-ghost btn-sm" style={{ flex:1 }} onClick={() => setShowAuction(false)}>Cancel</button>
                  <button className="btn btn-ghost btn-sm" style={{ flex:1, color:'#e05555' }} disabled={(save.owned||[]).length <= 20} onClick={() => handleAuction(selected)}>Confirm Auction</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function CollectorCardIndex({ save }) {
  const [page, setPage] = React.useState(0);
  const [filterTier, setFilterTier] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [selected, setSelected] = React.useState(null);
  const PER_PAGE = 20;
  const T = window.COLLECTOR_TIERS || {};
  const ownedSet = new Set(save.owned || []);

  let cards = getCollCards();
  if (filterTier !== 'all') cards = cards.filter(c => c.tier === filterTier);
  if (search.trim()) {
    const q = search.trim().toLowerCase();
    cards = cards.filter(c => c.name.toLowerCase().includes(q) || c.charId.toLowerCase().includes(q) || (c.houses||[]).some(h=>h.toLowerCase().includes(q)));
  }
  cards = [...cards].sort((a,b) => COLL_TIER_ORDER.indexOf(b.tier) - COLL_TIER_ORDER.indexOf(a.tier) || b.overall - a.overall);
  const totalPages = Math.max(1, Math.ceil(cards.length / PER_PAGE));
  const pageCards = cards.slice(page * PER_PAGE, (page+1) * PER_PAGE);

  React.useEffect(() => { setPage(0); }, [filterTier, search]);

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ display:'flex', gap:6, marginBottom:10, flexWrap:'wrap' }}>
        <input style={{ flex:1, minWidth:120, fontSize:'0.65rem', padding:'4px 8px', background:'var(--bg2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:4 }}
          placeholder="Search name, house..." value={search} onChange={e=>setSearch(e.target.value)} />
        <select style={{ fontSize:'0.6rem', padding:'4px 6px', background:'var(--bg2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:4 }} value={filterTier} onChange={e=>setFilterTier(e.target.value)}>
          <option value="all">All Tiers</option>
          {COLL_TIER_ORDER.map(t => <option key={t} value={t}>{(T[t]||{}).label||t}</option>)}
        </select>
      </div>
      <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginBottom:6 }}>{cards.length} cards · Page {page+1}/{totalPages}</div>
      <div className="scroll" style={{ flex:1 }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:8 }}>
          {pageCards.map(card => (
            <CollCardDisplay key={card.id} card={card} compact isOwned={ownedSet.has(card.id)} onClick={() => setSelected(card)} />
          ))}
        </div>
      </div>
      <div style={{ display:'flex', gap:12, justifyContent:'center', alignItems:'center', marginTop:16 }}>
        <button className="btn btn-ghost" disabled={page===0} onClick={() => setPage(p=>p-1)} style={{ fontSize:'1.4rem', padding:'6px 18px', minWidth:52 }}>←</button>
        <span style={{ fontSize:'0.95rem', color:'var(--text2)', fontWeight:600, minWidth:60, textAlign:'center' }}>{page+1} / {totalPages}</span>
        <button className="btn btn-ghost" disabled={page>=totalPages-1} onClick={() => setPage(p=>p+1)} style={{ fontSize:'1.4rem', padding:'6px 18px', minWidth:52 }}>→</button>
      </div>

      {selected && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:100, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }} onClick={() => setSelected(null)}>
          <div style={{ maxWidth:360, width:'100%' }} onClick={e=>e.stopPropagation()}>
            <CollCardDisplay card={selected} isOwned={ownedSet.has(selected.id)} />
            <button className="btn btn-ghost btn-sm" style={{ width:'100%', marginTop:8 }} onClick={() => setSelected(null)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Card Stats ─────────────────────────────────────────────────────────────

function CollectorCardStats({ save }) {
  const stats = save.stats || {};
  const ownedCards = (save.owned||[]).map(id=>getCollCard(id)).filter(Boolean);
  const cardPlays = stats.cardPlays || {};
  const cardScores = stats.cardScores || {};

  const mostPlayed = [...ownedCards]
    .filter(c => cardPlays[c.id])
    .sort((a,b) => (cardPlays[b.id]||0) - (cardPlays[a.id]||0))
    .slice(0, 10);
  const highestAvg = [...ownedCards]
    .filter(c => cardPlays[c.id] >= 3)
    .map(c => ({ ...c, avg: Math.floor((cardScores[c.id]||0) / cardPlays[c.id] * 10) / 10 }))
    .sort((a,b) => b.avg - a.avg)
    .slice(0, 10);

  const T = window.COLLECTOR_TIERS || {};

  // ── Combat record ──
  const games = stats.games||0, wins = stats.wins||0, losses = Math.max(0, games-wins);
  const winRate = games ? Math.round(wins/games*100) : 0;
  const scoreAvg = games ? Math.floor((stats.totalScore||0)/games*10)/10 : 0;
  const curStreak = stats.winStreak||0, bestStreak = stats.maxWinStreak||0;
  // ── Collection progress ──
  const allCards = getCollCards();
  const totalCards = allCards.length;
  const ownedCount = ownedCards.length;
  const completion = totalCards ? Math.round(ownedCount/totalCards*1000)/10 : 0;
  const tierTotals = {}, tierOwned = {};
  COLL_TIER_ORDER.forEach(t => { tierTotals[t]=0; tierOwned[t]=0; });
  allCards.forEach(c => { if(tierTotals[c.tier]!==undefined) tierTotals[c.tier]++; });
  ownedCards.forEach(c => { if(tierOwned[c.tier]!==undefined) tierOwned[c.tier]++; });

  return (
    <div className="scroll" style={{ height:'100%' }}>
      {/* Combat record */}
      <div className="card" style={{ marginBottom:12 }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--gold)', marginBottom:8 }}>⚔ COMBAT RECORD</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:10 }}>
          {[['Games',games,'var(--gold)'],['Wins',wins,'#4caf50'],['Losses',losses,'#e05555'],
            ['Win Rate',winRate+'%','var(--gold)'],['Streak',curStreak,'#4caf50'],['Best',bestStreak,'#ffd700']].map(([l,v,c])=>(
            <div key={l} style={{ textAlign:'center' }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:c }}>{v}</div>
              <div style={{ fontSize:'0.55rem', color:'var(--text2)' }}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
          <span style={{ fontSize:'0.55rem', color:'var(--text2)', width:60 }}>Win Rate</span>
          <div style={{ flex:1 }}><CollBar pct={winRate} color="#4caf50" /></div>
          <span style={{ fontFamily:'Cinzel,serif', fontSize:'0.6rem', color:'var(--text2)', width:34, textAlign:'right' }}>{winRate}%</span>
        </div>
        <div style={{ fontSize:'0.55rem', color:'var(--text2)', textAlign:'center', marginTop:6 }}>
          Avg score per game: <span style={{ color:'var(--gold)', fontFamily:'Cinzel,serif' }}>{scoreAvg}</span>
        </div>
      </div>

      {/* Collection progress */}
      <div className="card" style={{ marginBottom:12 }}>
        <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:8 }}>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--gold)' }}>📚 COLLECTION</div>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--gold)' }}>{ownedCount} / {totalCards} <span style={{ fontSize:'0.55rem', color:'var(--text2)' }}>({completion}%)</span></div>
        </div>
        <div style={{ marginBottom:10 }}><CollBar pct={completion} color="var(--gold)" height={9} /></div>
        {COLL_TIER_ORDER.map(t => {
          const tot = tierTotals[t]||0, own = tierOwned[t]||0;
          const pct = tot ? own/tot*100 : 0;
          const tc = (T[t]||{}).color || '#888';
          return (
            <div key={t} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4 }}>
              <span style={{ fontSize:'0.55rem', color:tc, width:64, fontFamily:'Cinzel,serif' }}>{(T[t]||{}).label||t}</span>
              <div style={{ flex:1 }}><CollBar pct={pct} color={tc} height={5} /></div>
              <span style={{ fontFamily:'Cinzel,serif', fontSize:'0.55rem', color:'var(--text2)', width:54, textAlign:'right' }}>{own}/{tot}</span>
            </div>
          );
        })}
      </div>

      {mostPlayed.length > 0 && (
        <div className="card" style={{ marginBottom:12 }}>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--gold)', marginBottom:8 }}>MOST PLAYED CARDS</div>
          {mostPlayed.map(card => {
            const ct = T[card.tier] || { color:'#888' };
            return (
              <div key={card.id} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, fontSize:'0.7rem' }}>
                <CollTierBadge tier={card.tier} />
                <div style={{ flex:1, color:ct.color }}>{card.name}</div>
                <div style={{ fontFamily:'Cinzel,serif', color:'var(--text2)' }}>{cardPlays[card.id]} plays</div>
              </div>
            );
          })}
        </div>
      )}

      {highestAvg.length > 0 && (
        <div className="card">
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--gold)', marginBottom:8 }}>HIGHEST AVERAGE SCORE (3+ games)</div>
          {highestAvg.map(card => {
            const ct = T[card.tier] || { color:'#888' };
            return (
              <div key={card.id} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, fontSize:'0.7rem' }}>
                <CollTierBadge tier={card.tier} />
                <div style={{ flex:1, color:ct.color }}>{card.name}</div>
                <div style={{ fontFamily:'Cinzel,serif', color:'var(--gold)' }}>{card.avg} avg</div>
              </div>
            );
          })}
        </div>
      )}

      {mostPlayed.length === 0 && (
        <div style={{ textAlign:'center', color:'var(--text2)', fontSize:'0.75rem', marginTop:40 }}>
          Play some games to see your card statistics!
        </div>
      )}
    </div>
  );
}

// ─── Daily Section ──────────────────────────────────────────────────────────

const DAILY_PULL_PROBS = { starter:.60, uncommon:.20, rare:.10, hero:.04, legendary:.03, mythic:.03 };
const DAILY_REWARD_TABLE = [
  { gold:50,  prob:.50 },
  { gold:25,  prob:.25 },
  { gold:100, prob:.15 },
  { gold:0,   prob:.07 },
  { gold:200, prob:.05 },
  { gold:500, prob:.03 },  // actually .03 but user said 3%
];

function timeUntil24h(ts) {
  if (!ts) return 0;
  const diff = 86400000 - (Date.now() - ts);
  return Math.max(0, diff);
}

function formatCountdown(ms) {
  if (ms <= 0) return 'READY';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${h}h ${m}m ${s}s`;
}

// Compact form for the always-visible HUD badge (no seconds).
function formatCountdownShort(ms) {
  if (ms <= 0) return 'READY';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function CollectorDailySection({ save, onUpdate }) {
  const [pullReady, setPullReady] = React.useState(timeUntil24h(save.lastDailyPull) === 0);
  const [rewardReady, setRewardReady] = React.useState(timeUntil24h(save.lastDailyReward) === 0);
  const [pullCountdown, setPullCountdown] = React.useState(timeUntil24h(save.lastDailyPull));
  const [rewardCountdown, setRewardCountdown] = React.useState(timeUntil24h(save.lastDailyReward));
  const [pulledCard, setPulledCard] = React.useState(null);
  const [rewardGold, setRewardGold] = React.useState(null);

  React.useEffect(() => {
    const iv = setInterval(() => {
      const pc = timeUntil24h(save.lastDailyPull);
      const rc = timeUntil24h(save.lastDailyReward);
      setPullCountdown(pc); setPullReady(pc === 0);
      setRewardCountdown(rc); setRewardReady(rc === 0);
    }, 1000);
    return () => clearInterval(iv);
  }, [save.lastDailyPull, save.lastDailyReward]);

  function doDailyPull() {
    const all = getCollCards();
    const owned = new Set(save.owned || []);
    const available = all.filter(c => !owned.has(c.id));
    const card = weightedDraw(available, DAILY_PULL_PROBS, owned, 'dailypull');
    if (!card) return;
    const newSave = { ...save, lastDailyPull: Date.now(), owned: [...(save.owned||[]), card.id] };
    saveCollSave(newSave);
    onUpdate(newSave);
    setPulledCard(card);
    setPullReady(false);
  }

  function doDailyReward() {
    let r = Math.random(), cumP = 0, gold = 50;
    for (const row of DAILY_REWARD_TABLE) { cumP += row.prob; if (r < cumP) { gold = row.gold; break; } }
    const newSave = { ...save, lastDailyReward: Date.now(), gold: (save.gold||0) + gold };
    saveCollSave(newSave);
    onUpdate(newSave);
    setRewardGold(gold);
    setRewardReady(false);
  }

  const T = window.COLLECTOR_TIERS || {};

  return (
    <div className="scroll" style={{ height:'100%' }}>
      <div className="card" style={{ marginBottom:12, borderColor: pullReady ? 'var(--gold)' : 'var(--border)' }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)', marginBottom:6 }}>🃏 DAILY CARD PULL</div>
        <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:10, lineHeight:1.5 }}>
          Once every 24 hours. Pulls from the entire card pool you don't own yet.<br/>
          60% Starter · 20% Uncommon · 10% Rare · 4% Hero · 3% Legendary · 3% Mythic
        </div>
        {pulledCard ? (
          <div>
            <div style={{ fontSize:'0.7rem', color:'var(--gold)', marginBottom:8 }}>✨ You pulled:</div>
            <CollCardDisplay card={pulledCard} isOwned={true} />
            <button className="btn btn-ghost btn-sm" style={{ width:'100%', marginTop:8 }} onClick={() => setPulledCard(null)}>Dismiss</button>
          </div>
        ) : pullReady ? (
          <button className="btn btn-gold" style={{ width:'100%' }} onClick={doDailyPull}>Pull Now</button>
        ) : (
          <div style={{ textAlign:'center', fontFamily:'Cinzel,serif', color:'var(--text2)', fontSize:'0.75rem' }}>
            Next pull in: {formatCountdown(pullCountdown)}
          </div>
        )}
      </div>

      <div className="card" style={{ borderColor: rewardReady ? '#ffd700' : 'var(--border)' }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)', marginBottom:6 }}>🪙 DAILY GOLD REWARD</div>
        <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:10, lineHeight:1.5 }}>
          Once every 24 hours. Spin for Gold Coins!<br/>
          50% → 50G · 25% → 25G · 15% → 100G · 7% → 0G · 5% → 200G · 3% → 500G
        </div>
        {rewardGold !== null ? (
          <div style={{ textAlign:'center' }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'2rem', color:'var(--gold)' }}>
              {rewardGold === 0 ? '😢 0 Gold' : `+${rewardGold} 🪙`}
            </div>
            <button className="btn btn-ghost btn-sm" style={{ width:'100%', marginTop:8 }} onClick={() => setRewardGold(null)}>Dismiss</button>
          </div>
        ) : rewardReady ? (
          <button className="btn btn-gold" style={{ width:'100%' }} onClick={doDailyReward}>Claim Reward</button>
        ) : (
          <div style={{ textAlign:'center', fontFamily:'Cinzel,serif', color:'var(--text2)', fontSize:'0.75rem' }}>
            Next reward in: {formatCountdown(rewardCountdown)}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Store ──────────────────────────────────────────────────────────────────

function CollectorStore({ save, onUpdate }) {
  const [tab, setTab] = React.useState('showcase');
  const [buyFilter, setBuyFilter] = React.useState('starter');
  const [buySearch, setBuySearch] = React.useState('');
  const [buyPage, setBuyPage] = React.useState(0);
  const [lotteryType, setLotteryType] = React.useState('hero');
  const [lotteryResult, setLotteryResult] = React.useState(null);
  const [lotterySpinning, setLotterySpinning] = React.useState(false);
  const [upgradeSelected, setUpgradeSelected] = React.useState(null);
  const [detailCard, setDetailCard] = React.useState(null);
  const [storeMsg, setStoreMsg] = React.useState('');
  const [showcaseCards, setShowcaseCards] = React.useState(() => {
    const now = Date.now();
    const needRefresh = !save.storeRefresh || (now - save.storeRefresh > 86400000);
    if (needRefresh) {
      const sc = genStoreShowcase(save);
      const newSave = { ...save, storeRefresh: now, storeShowcase: sc };
      saveCollSave(newSave);
      onUpdate(newSave);
      return sc;
    }
    return save.storeShowcase || [];
  });

  const T = window.COLLECTOR_TIERS || {};
  const owned = new Set(save.owned || []);

  function msg(text, dur=3000) { setStoreMsg(text); setTimeout(() => setStoreMsg(''), dur); }

  function buyShowcaseCard(cardId) {
    const card = getCollCard(cardId);
    if (!card) return;
    const price = { starter:50, uncommon:75, rare:100, hero:150, legendary:300, mythic:500 }[card.tier] || 50;
    if ((save.gold||0) < price) { msg(`Not enough Gold! Need ${price}G.`); return; }
    if (owned.has(cardId)) { msg('You already own this card!'); return; }
    const newSave = { ...save, gold:(save.gold||0)-price, owned:[...(save.owned||[]),cardId] };
    saveCollSave(newSave);
    onUpdate(newSave);
    setShowcaseCards(prev => prev.filter(id=>id!==cardId));
    msg(`Purchased ${card.name} for ${price}G!`);
  }

  function buyDirectCard(card) {
    const price = COLL_BUY_GOLD[card.tier] || 50;
    if ((save.gold||0) < price) { msg(`Not enough Gold! Need ${price}G.`); return; }
    if (owned.has(card.id)) { msg('You already own this card!'); return; }
    const newSave = { ...save, gold:(save.gold||0)-price, owned:[...(save.owned||[]),card.id] };
    saveCollSave(newSave);
    onUpdate(newSave);
    msg(`Purchased ${card.name} for ${price}G!`);
  }

  const LOTTERY_PROBS = {
    hero:      { hero:.60, rare:.20, uncommon:.10, starter:.10 },
    legendary: { legendary:.60, hero:.20, rare:.08, uncommon:.06, starter:.06 },
    mythic:    { mythic:.60, legendary:.20, hero:.05, rare:.05, uncommon:.05, starter:.05 },
  };

  function doLotterySpin() {
    const cost = COLL_LOTTERY_COST[lotteryType];
    if ((save.gold||0) < cost) { msg(`Need ${cost}G for this spin!`); return; }
    setLotterySpinning(true);
    setTimeout(() => {
      const all = getCollCards();
      const available = all.filter(c => !owned.has(c.id));
      const probs = LOTTERY_PROBS[lotteryType];
      const card = weightedDraw(available, probs, owned, 'lottery'+Date.now());
      const newSave = { ...save, gold:(save.gold||0)-cost, owned: card ? [...(save.owned||[]),card.id] : (save.owned||[]) };
      saveCollSave(newSave);
      onUpdate(newSave);
      setLotteryResult(card);
      setLotterySpinning(false);
    }, 1500);
  }

  function doUpgrade(card) {
    const tierIdx = COLL_TIER_ORDER.indexOf(card.tier);
    if (tierIdx < 0 || tierIdx >= COLL_TIER_ORDER.length - 1) { msg('Cannot upgrade Mythic cards!'); return; }
    const nextTier = COLL_TIER_ORDER[tierIdx + 1];
    const cost = COLL_UPGRADE_GOLD[card.tier];
    if ((save.gold||0) < cost) { msg(`Need ${cost}G to upgrade!`); return; }
    const all = getCollCards();
    const nextCards = all.filter(c => c.charId === card.charId && c.tier === nextTier && !owned.has(c.id));
    if (!nextCards.length) { msg(`No available ${nextTier} cards for ${card.name}!`); return; }
    const nextCard = nextCards[Math.floor(Math.random()*nextCards.length)];
    const newSave = { ...save, gold:(save.gold||0)-cost, owned:[...(save.owned||[]),nextCard.id] };
    saveCollSave(newSave);
    onUpdate(newSave);
    setUpgradeSelected(null);
    msg(`Upgraded to ${nextCard.name}!`);
  }

  function buyRerolls(n) {
    const cost = n * REROLL_COST;
    if ((save.gold||0) < cost) { msg(`Need ${cost}G!`); return; }
    const newSave = { ...save, gold:(save.gold||0)-cost, rerolls:(save.rerolls||0)+n };
    saveCollSave(newSave);
    onUpdate(newSave);
    msg(`Purchased ${n} reroll${n>1?'s':''}!`);
  }

  const STORE_TABS = [
    { id:'showcase', label:'Showcase' },
    { id:'buy', label:'Buy Cards' },
    { id:'lottery', label:'Lottery' },
    { id:'upgrade', label:'Upgrade' },
    { id:'rerolls', label:'Rerolls' },
  ];

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
      <div style={{ display:'flex', gap:4, marginBottom:10, overflowX:'auto', paddingBottom:2 }}>
        {STORE_TABS.map(t => (
          <button key={t.id} className={`btn btn-${tab===t.id?'gold':'ghost'} btn-sm`} onClick={() => setTab(t.id)} style={{ whiteSpace:'nowrap', fontSize:'0.6rem' }}>{t.label}</button>
        ))}
      </div>
      {storeMsg && <div style={{ fontSize:'0.7rem', color:'var(--gold)', background:'rgba(212,168,48,0.1)', border:'1px solid var(--gold)', borderRadius:4, padding:'6px 10px', marginBottom:8 }}>{storeMsg}</div>}

      <div className="scroll" style={{ flex:1 }}>
        {tab === 'showcase' && (
          <div>
            <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:10 }}>
              5 cards refresh every 24h. First 4 are always Starter/Uncommon/Rare/Hero.
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:8 }}>
              {showcaseCards.map(cardId => {
                const card = getCollCard(cardId);
                if (!card) return null;
                const price = { starter:50, uncommon:75, rare:100, hero:150, legendary:300, mythic:500 }[card.tier] || 50;
                const isOwned = owned.has(cardId);
                return (
                  <div key={cardId}>
                    <CollCardDisplay card={card} compact isOwned={isOwned} onClick={() => setDetailCard(card)} />
                    {!isOwned ? (
                      <button className="btn btn-gold btn-sm" style={{ width:'100%', marginTop:4, fontSize:'0.6rem' }} onClick={() => buyShowcaseCard(cardId)}>
                        Buy {price}G
                      </button>
                    ) : (
                      <div style={{ textAlign:'center', fontSize:'0.6rem', color:'var(--text2)', marginTop:4 }}>Owned</div>
                    )}
                  </div>
                );
              })}
              {showcaseCards.length === 0 && <div style={{ color:'var(--text2)', fontSize:'0.7rem' }}>Showcase is empty. Refresh tomorrow!</div>}
            </div>
          </div>
        )}

        {tab === 'buy' && (
          <div>
            <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:8 }}>
              Buy any Starter (50G), Uncommon (75G), or Rare (100G) card directly.
            </div>
            <div style={{ display:'flex', gap:6, marginBottom:10 }}>
              {['starter','uncommon','rare'].map(t => (
                <button key={t} className={`btn btn-${buyFilter===t?'gold':'ghost'} btn-sm`} onClick={() => { setBuyFilter(t); setBuyPage(0); }} style={{ fontSize:'0.6rem' }}>
                  {(T[t]||{}).label||t}
                </button>
              ))}
            </div>
            <input style={{ width:'100%', fontSize:'0.65rem', padding:'4px 8px', background:'var(--bg2)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:4, marginBottom:8 }}
              placeholder="Search..." value={buySearch} onChange={e=>{setBuySearch(e.target.value);setBuyPage(0);}} />
            {(() => {
              const price = COLL_BUY_GOLD[buyFilter];
              let pool = getCollCards().filter(c => c.tier === buyFilter && !owned.has(c.id));
              if (buySearch) { const q=buySearch.toLowerCase(); pool=pool.filter(c=>c.name.toLowerCase().includes(q)||(c.houses||[]).some(h=>h.toLowerCase().includes(q))); }
              pool.sort((a,b)=>b.overall-a.overall);
              const pp = 20;
              const totalPg = Math.max(1,Math.ceil(pool.length/pp));
              const pg = pool.slice(buyPage*pp,(buyPage+1)*pp);
              return <>
                <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginBottom:6 }}>{pool.length} available</div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:8 }}>
                  {pg.map(card => (
                    <div key={card.id}>
                      <CollCardDisplay card={card} compact onClick={() => setDetailCard(card)} />
                      <button className="btn btn-gold btn-sm" style={{ width:'100%', marginTop:4, fontSize:'0.6rem' }} onClick={() => buyDirectCard(card)}>Buy {price}G</button>
                    </div>
                  ))}
                </div>
                {totalPg > 1 && <div style={{ display:'flex', gap:6, justifyContent:'center', marginTop:10 }}>
                  <button className="btn btn-ghost btn-sm" disabled={buyPage===0} onClick={()=>setBuyPage(p=>p-1)}>←</button>
                  <span style={{ fontSize:'0.65rem', color:'var(--text2)', padding:'4px 0' }}>{buyPage+1}/{totalPg}</span>
                  <button className="btn btn-ghost btn-sm" disabled={buyPage>=totalPg-1} onClick={()=>setBuyPage(p=>p+1)}>→</button>
                </div>}
              </>;
            })()}
          </div>
        )}

        {tab === 'lottery' && (
          <div>
            <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:12, lineHeight:1.5 }}>
              Spin for a chance at rare cards! You are guaranteed at least the stated tier or lower.
            </div>

// Compact music volume + mute control for Collector Mode.

        style={{ width:70, accentColor:'var(--gold)', cursor:'pointer' }} />
