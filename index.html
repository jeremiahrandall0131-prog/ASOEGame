// ─── The Game of Thrones: Win or Die — pick 1 of 10, instant Win/Loss ───────
function CollectorGoT({ save, onUpdate, onDone, onSpin }) {
  const T = window.COLLECTOR_TIERS || {};
  const [board] = React.useState(genGotBoard);
  const [picked, setPicked] = React.useState(null);
  const [stage, setStage] = React.useState('intro'); // intro | pick | reveal | done | <choiceKind>
  const [postReveal, setPostReveal] = React.useState('done'); // where the flip reveal advances to
  const [flipped, setFlipped] = React.useState(false);
  const [revealed, setRevealed] = React.useState(false);
  const [summary, setSummary] = React.useState('');
  const [reward, setReward] = React.useState(null);
  const [rewardEvolved, setRewardEvolved] = React.useState(false);
  const [idQuery, setIdQuery] = React.useState('');
  const [idChar, setIdChar] = React.useState(null);
  const [detailCard, setDetailCard] = React.useState(null);
  const cardObj = picked != null ? board[picked] : null;

  function commit(ns) { saveCollSave(ns); onUpdate(ns); }
  function finishChoice(ns, summaryText, rewardCard) {
    commit({ ...ns, gotPending: null });
    if (summaryText) setSummary(summaryText);
    if (rewardCard !== undefined) setReward(rewardCard);
    setStage('done');
  }

  // Drive the card-flip + staged reveal whenever we enter the reveal stage.
  React.useEffect(() => {
    if (stage !== 'reveal') return;
    setFlipped(false); setRevealed(false);
    const t1 = setTimeout(() => setFlipped(true), 60);
    const t2 = setTimeout(() => setRevealed(true), 820);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [stage, picked]);

  function pick(i) {
    if (picked != null) return;
    setPicked(i);
    const c = board[i], k = c.kind;
    // Apply the effect SYNCHRONOUSLY the instant the card is touched (anti-dodge); the flip
    // reveal that follows is purely cosmetic. `next` = the stage the reveal advances into.
    let next = 'done';
    if (k === 'gold') { commit({ ...save, gold: (save.gold||0) + c.amount }); setSummary(`${c.amount>=0?'+':''}${c.amount} Gold`); }
    else if (k === 'randomCard') { const got = gotRandomTierCard(c.tier); if (got) { const res = collAcquire(save.owned||[], got.id); commit({ ...save, owned: res.owned }); setReward(res.evolved?res.card:got); setRewardEvolved(res.evolved); } }
    else if (k === 'massEvolve') { commit({ ...save, owned: gotMassEvolve(save.owned) }); setSummary('Every card in your deck leveled up a tier!'); }
    else if (k === 'massDevolve') { commit({ ...save, owned: gotMassDevolve(save.owned) }); setSummary('Every card dropped a tier (Starters spared).'); }
    else if (k === 'massDegrade') { commit({ ...save, owned: gotMassDegrade(save.owned) }); setSummary('−3 to every position score, on every card.'); }
    else if (k === 'loseBest') { const bi=gotHighestIndex(save.owned); const o=[...(save.owned||[])]; const lost=bi>=0?getCollCard(o[bi]):null; if(bi>=0)o.splice(bi,1); commit({ ...save, owned:o }); setSummary(lost?`Lost ${lost.name}.`:'—'); }
    else if (k === 'bestDevolve') { const bi=gotHighestIndex(save.owned); const o=[...(save.owned||[])]; const cc=bi>=0?getCollCard(o[bi]):null; const t=cc&&collDevolveTargetId(cc); if(t)o[bi]=t; commit({ ...save, owned:o }); setSummary(cc?(t?`${cc.name} devolved a tier.`:`${cc.name} is a Starter — spared.`):'—'); }
    else if (k === 'degradeBest') { const bi=gotHighestIndex(save.owned); const o=[...(save.owned||[])]; const cc=bi>=0?getCollCard(o[bi]):null; if(bi>=0)o[bi]=collApplyMod(o[bi],-3); commit({ ...save, owned:o }); setSummary(cc?`−3 to every position of ${cc.name}.`:'—'); }
    else if (k === 'storeClosed') { commit({ ...save, storeClosedUntil: Date.now()+GOT_CLOSE_MS }); setSummary('The store is barred for 23h 59m.'); }
    else if (k === 'dailyWait') { commit({ ...save, lastDailyPull: Date.now() }); setSummary('Your Daily Pull timer is reset to 23h 59m.'); }
    else if (k === 'genocide') { const r=gotGenocide(save.owned); commit({ ...save, owned:r.owned }); setSummary(r.house?`House ${r.house} purged — ${r.removed} card${r.removed!==1?'s':''} surrendered.`:'No House to purge.'); }
    else if (k === 'spinWheel') { commit({ ...save }); next = 'spin'; }
    else { if (GOT_LOSS_CHOICE_KINDS.has(k)) commit({ ...save, gotPending: { kind:k } }); next = k; } // choice kinds (loss choices locked for anti-dodge)
    setPostReveal(next);
    setStage('reveal');
  }

  function doEvolve(i) { const o=[...(save.owned||[])]; const cc=getCollCard(o[i]); const t=collEvolveTargetId(cc, save.owned); if(t){ o[i]=t; setRewardEvolved(true); finishChoice({ ...save, owned:o }, null, getCollCard(t)); } else finishChoice({ ...save }, 'That card is already at the top tier.'); }
  function doUpgrade(i) { const o=[...(save.owned||[])]; const cc=getCollCard(o[i]); o[i]=collApplyMod(o[i], 3); finishChoice({ ...save, owned:o }, `+3 to every position of ${cc?cc.name:'your card'}!`, getCollCard(o[i])); }
  function doLose(i) { const o=[...(save.owned||[])]; const cc=getCollCard(o[i]); o.splice(i,1); finishChoice({ ...save, owned:o }, `Surrendered ${cc?cc.name:'a card'}.`); }
  function doDevolve(i) { const o=[...(save.owned||[])]; const cc=getCollCard(o[i]); const t=collDevolveTargetId(cc); if(!t)return; o[i]=t; finishChoice({ ...save, owned:o }, `${cc?cc.name:'Card'} devolved a tier.`); }
  function doDegrade(i) { const o=[...(save.owned||[])]; const cc=getCollCard(o[i]); o[i]=collApplyMod(o[i],-3); finishChoice({ ...save, owned:o }, `−3 to every position of ${cc?cc.name:'your card'}.`); }
  function doIdentityClaim(id) { const res=collAcquire(save.owned||[], id); setRewardEvolved(res.evolved); finishChoice({ ...save, owned:res.owned }, null, res.evolved?res.card:getCollCard(id)); }

  // ── card-picker for the choice effects ──
  const isLossChoice = GOT_LOSS_CHOICE_KINDS.has(stage);
  function ownedGrid(onPickCard, disableFn) {
    const entries = (save.owned||[]).map((id,i)=>({ id, i, card:getCollCard(id) })).filter(e=>e.card)
      .sort((a,b)=>(b.card.overall||0)-(a.card.overall||0));
    return (
      <div className="scroll" style={{ flex:1, overflowY:'auto', marginTop:8 }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:6 }}>
          {entries.map(e => { const c=e.card; const ct=T[c.tier]||{color:'#888',bg:'#111'}; const disabled=disableFn&&disableFn(c); return (
            <div key={e.i} onClick={()=>{ if(!disabled) onPickCard(e.i); }} style={{ border:`2px solid ${ct.color}`, borderRadius:6, padding:'7px 9px', background:ct.bg, cursor:disabled?'not-allowed':'pointer', opacity:disabled?0.4:1 }}>
              <div style={{ fontSize:'0.66rem', color:ct.color, fontWeight:700, lineHeight:1.2 }}>{c.name}</div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:4 }}>
                <CollTierBadge tier={c.tier} />
                <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color, fontSize:'0.72rem' }}>{c.overall}</span>
              </div>
            </div>
          ); })}
        </div>
      </div>
    );
  }

  const cardBack = (i) => i % 2 === 0 ? '👑' : '⚔️';
  const wrap = (children) => (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      {detailCard && <CollDetailModal card={detailCard} onClose={()=>setDetailCard(null)} />}
      <div className="nav-bar"><div style={{ flex:1, textAlign:'center' }}>
        <div className="nav-title" style={{ fontSize:'0.85rem' }}>👑 THE GAME OF THRONES ⚔️</div>
        <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>Win or Die</div>
      </div></div>
      {children}
    </div>
  );

  // ── card faces ──
  const coverFace = (i) => (
    <div style={{ width:'100%', height:'100%', borderRadius:14, border:'2px solid var(--gold)', background:'linear-gradient(160deg,#1a1206,#0b0905)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'3rem', boxShadow:'inset 0 0 26px rgba(0,0,0,0.6)' }}>
      <span style={{ filter:'drop-shadow(0 0 10px rgba(212,168,48,0.85))' }}>{cardBack(i)}</span>
    </div>
  );
  const effectFace = (c) => {
    const win = c && c.win;
    const accent = win ? 'var(--gold2,#f0c84a)' : '#e05555';
    const bg = win ? 'linear-gradient(165deg,#241a06,#0c0a05)' : 'linear-gradient(165deg,#2a0d0d,#0c0605)';
    return (
      <div style={{ width:'100%', height:'100%', background:bg, border:`2px solid ${accent}`, borderRadius:14, padding:'16px 14px', display:'flex', flexDirection:'column', alignItems:'center', textAlign:'center', boxShadow:`inset 0 0 40px ${win?'rgba(240,200,74,0.14)':'rgba(224,85,85,0.16)'}` }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.62rem', letterSpacing:'0.2em', color:accent, fontWeight:700 }}>{win?'A WIN':'A LOSS'}</div>
        <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'3.6rem', filter:`drop-shadow(0 0 16px ${win?'rgba(240,200,74,0.6)':'rgba(224,85,85,0.6)'})` }}>{c&&c.icon}</div>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'1rem', fontWeight:800, color:accent }}>{c&&c.name}</div>
        <div style={{ fontSize:'0.62rem', color:'var(--text2)', marginTop:7, lineHeight:1.45 }}>{c&&c.desc}</div>
      </div>
    );
  };
  // Full character-card display (mirrors CollDetailModal — same as tapping a card in My Deck).
  const characterFace = (card, evolved) => {
    if (!card) return null;
    const ct = T[card.tier] || { color:'#888', bg:'#111' };
    return (
      <div style={{ width:'100%', height:'100%', background:`linear-gradient(165deg, ${ct.bg||'#120d06'}, #0a0805)`, border:`2px solid ${ct.color}`, borderRadius:14, padding:'12px 13px', display:'flex', flexDirection:'column', boxShadow:`inset 0 0 34px ${ct.color}22` }}>
        {evolved && <div style={{ textAlign:'center', fontSize:'0.6rem', color:'var(--gold)', fontWeight:800, letterSpacing:'0.1em', marginBottom:3 }}>✦ IT EVOLVED!</div>}
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.92rem', color:ct.color, fontWeight:800, lineHeight:1.15, textAlign:'center' }}>{card.name}</div>
        <div style={{ fontSize:'0.52rem', color:'var(--text2)', textAlign:'center', marginTop:2 }}>{card.identity||card.name} · {card.gender==='F'?'♀ Female':'♂ Male'} · Age {card.age}</div>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:9, marginTop:6 }}>
          <CollTierBadge tier={card.tier} />
          <span style={{ fontFamily:'Cinzel,serif', fontWeight:800, color:ct.color, fontSize:'1.05rem' }}>{card.overall}</span>
        </div>
        {!!(card.houses||[]).length && <div style={{ fontSize:'0.46rem', color:'var(--text2)', textAlign:'center', marginTop:3 }}>{(card.houses||[]).join(' · ')}</div>}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'1px 10px', marginTop:7, paddingTop:6, borderTop:`1px solid ${ct.color}33`, flex:1, alignContent:'start' }}>
          {COLL_POS.map(p => { const sc=(card.scores&&card.scores[p.id])||0; return (
            <div key={p.id} style={{ display:'flex', justifyContent:'space-between', fontSize:'0.5rem' }}>
              <span style={{ color:'var(--text2)', fontFamily:'Cinzel,serif' }}>{p.label}</span>
              <span style={{ color: sc>=9?'#ffd700':sc>=7?ct.color:'var(--text)', fontWeight:700 }}>{Math.round(sc*10)/10}</span>
            </div>
          ); })}
        </div>
      </div>
    );
  };

  // ── INTRO / PREVIEW SCREEN ──
  if (stage === 'intro') {
    const introRow = (c, win) => { const accent = win ? 'var(--gold2,#f0c84a)' : '#e05555'; return (
      <div key={c.id} style={{ display:'flex', gap:8, alignItems:'flex-start', padding:'5px 8px', borderLeft:`2px solid ${accent}`, background:'rgba(255,255,255,0.02)', borderRadius:'0 6px 6px 0', marginBottom:5 }}>
        <div style={{ fontSize:'1.05rem', lineHeight:1.1, width:18, textAlign:'center', flexShrink:0 }}>{c.icon}</div>
        <div style={{ minWidth:0 }}>
          <div style={{ fontSize:'0.62rem', color:accent, fontWeight:700, fontFamily:'Cinzel,serif' }}>{c.name}</div>
          <div style={{ fontSize:'0.54rem', color:'var(--text2)', lineHeight:1.35 }}>{c.desc}</div>
        </div>
      </div>
    ); };
    return wrap(
      <div className="scroll" style={{ flex:1, overflowY:'auto', padding:'10px 16px 4px' }}>
        <div style={{ textAlign:'center', fontSize:'0.66rem', color:'var(--text2)', lineHeight:1.5, maxWidth:540, margin:'0 auto 12px' }}>
          Ten cards will be laid face-down — <b style={{ color:'var(--gold2,#f0c84a)' }}>5 Win</b> and <b style={{ color:'#e05555' }}>5 Loss</b>, drawn from the pools below and shuffled. You pick <b>one</b>; its fate is sealed the instant you touch it. Here is everything that could befall you:
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, maxWidth:600, margin:'0 auto' }}>
          <div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.78rem', color:'var(--gold2,#f0c84a)', textAlign:'center', fontWeight:700, marginBottom:7, letterSpacing:'0.05em' }}>👑 WIN CARDS</div>
            {GOT_WIN_CARDS.map(c => introRow(c, true))}
          </div>
          <div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.78rem', color:'#e05555', textAlign:'center', fontWeight:700, marginBottom:7, letterSpacing:'0.05em' }}>⚔️ LOSS CARDS</div>
            {GOT_LOSS_CARDS.map(c => introRow(c, false))}
          </div>
        </div>
        <div style={{ maxWidth:300, margin:'16px auto 8px' }}>
          <button className="btn btn-gold" style={{ width:'100%', padding:'13px', letterSpacing:'0.08em' }} onClick={()=>setStage('pick')}>Enter the Game →</button>
        </div>
      </div>
    );
  }

  // ── PICK SCREEN ──
  if (stage === 'pick') {
    return wrap(
      <div className="scroll" style={{ flex:1, display:'flex', flexDirection:'column', padding:'14px 16px' }}>
        <div style={{ textAlign:'center', fontSize:'0.7rem', color:'var(--text2)', marginBottom:4 }}>5 Win cards · 5 Loss cards, hidden &amp; shuffled.</div>
        <div style={{ textAlign:'center', fontSize:'0.6rem', color:'#e0a84a', marginBottom:14 }}>Choose one. Its fate is sealed the instant you touch it — no take-backs.</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8, maxWidth:560, margin:'0 auto', width:'100%' }}>
          {board.map((c,i) => (
            <div key={i} onClick={()=>pick(i)} style={{ aspectRatio:'2/3', borderRadius:10, border:'2px solid var(--gold)', background:'linear-gradient(160deg,#1a1206,#0b0905)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', boxShadow:'0 3px 12px rgba(0,0,0,0.6)', transition:'transform .12s', fontSize:'1.7rem' }}
              onMouseDown={e=>e.currentTarget.style.transform='scale(0.95)'} onMouseUp={e=>e.currentTarget.style.transform='scale(1)'} onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
              <span style={{ filter:'drop-shadow(0 0 6px rgba(212,168,48,0.7))' }}>{cardBack(i)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── FLIP REVEAL SCREEN ──
  if (stage === 'reveal') {
    const isChar = cardObj && cardObj.kind === 'randomCard';
    const win = cardObj && cardObj.win;
    const accent = win ? 'var(--gold2,#f0c84a)' : '#e05555';
    return wrap(
      <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'10px 16px' }}>
        <div className="got-flip" style={{ width:236, height:354, flexShrink:0 }}>
          <div className={'got-flip-inner' + (flipped ? ' flipped' : '')}>
            <div className="got-face">{coverFace(picked == null ? 0 : picked)}</div>
            <div className="got-face got-face-rev">{isChar ? (reward ? characterFace(reward, rewardEvolved) : effectFace(cardObj)) : effectFace(cardObj)}</div>
          </div>
        </div>
        {revealed && !isChar && summary && postReveal === 'done' && (
          <div className="got-pop" style={{ fontSize:'0.72rem', color:accent, fontFamily:'Cinzel,serif', marginTop:14, textAlign:'center', maxWidth:300 }}>{summary}</div>
        )}
        {revealed && (
          <div className="got-pop" style={{ marginTop:16, width:'100%', maxWidth:300 }}>
            {postReveal === 'done' && <button className="btn btn-gold" style={{ width:'100%', padding:'12px' }} onClick={()=>onDone(cardObj && cardObj.win)}>Continue</button>}
            {postReveal === 'spin' && <button className="btn btn-gold" style={{ width:'100%', padding:'12px' }} onClick={()=>onSpin && onSpin(cardObj && cardObj.win)}>Spin the Wheel →</button>}
            {postReveal !== 'done' && postReveal !== 'spin' && (
              <button className="btn btn-gold" style={{ width:'100%', padding:'12px' }} onClick={()=>setStage(postReveal)}>Choose your card →</button>
            )}
          </div>
        )}
      </div>
    );
  }

  // ── RESULT + CHOICE SCREENS ──
  const isWin = cardObj && cardObj.win;
  const accent = isWin ? 'var(--gold2,#f0c84a)' : '#e05555';
  const header = (
    <div style={{ textAlign:'center', padding:'14px 16px 6px' }}>
      <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.4rem', fontWeight:800, color:accent, textShadow:`0 0 16px ${isWin?'rgba(240,200,74,0.5)':'rgba(224,85,85,0.5)'}` }}>{isWin?'👑 A WIN!':'⚔️ A LOSS'}</div>
      <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.95rem', color:accent, marginTop:4 }}>{cardObj?cardObj.name:''}</div>
      <div style={{ fontSize:'0.66rem', color:'var(--text2)', marginTop:4, lineHeight:1.5 }}>{cardObj?cardObj.desc:''}</div>
    </div>
  );

  if (stage === 'done') {
    return wrap(
      <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
        {header}
        <div className="scroll" style={{ flex:1, padding:'6px 16px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
          {reward ? (
            <div className="got-pop" style={{ width:228, height:340, flexShrink:0 }}>{characterFace(reward, rewardEvolved)}</div>
          ) : (
            <div style={{ fontSize:'0.85rem', color:isWin?'var(--gold)':'#e05555', fontFamily:'Cinzel,serif', marginTop:10, textAlign:'center' }}>{summary}</div>
          )}
        </div>
        <div style={{ padding:'10px 16px', background:'var(--bg2)', borderTop:'1px solid var(--border)' }}>
          <button className="btn btn-gold" style={{ width:'100%', padding:'13px' }} onClick={()=>onDone(cardObj && cardObj.win)}>Continue</button>
        </div>
      </div>
    );
  }

  // choice picker stages
  let pickFn = null, disableFn = null, instruction = '';
  if (stage === 'evolveChoose') { pickFn = doEvolve; disableFn = c => c.tier==='god'; instruction = 'Choose a card to EVOLVE one tier up:'; }
  else if (stage === 'upgradeChoose') { pickFn = doUpgrade; instruction = 'Choose a card to UPGRADE (+3 to every position):'; }
  else if (stage === 'loseChoose') { pickFn = doLose; instruction = 'You must SURRENDER one card — choose:'; }
  else if (stage === 'devolveChoose') { pickFn = doDevolve; disableFn = c => c.tier==='starter'; instruction = 'You must DEVOLVE one card a tier — choose:'; }
  else if (stage === 'degradeChoose') { pickFn = doDegrade; instruction = 'You must DEGRADE one card (−3 to every position) — choose:'; }

  if (pickFn) {
    return wrap(
      <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
        {header}
        <div style={{ fontSize:'0.66rem', color:isLossChoice?'#e05555':'var(--gold)', textAlign:'center', padding:'2px 16px' }}>{instruction}{isLossChoice && ' (required)'}</div>
        <div style={{ flex:1, minHeight:0, padding:'0 16px', display:'flex', flexDirection:'column' }}>{ownedGrid(pickFn, disableFn)}</div>
      </div>
    );
  }

  // identity pull
  if (stage === 'identityPull') {
    const deckRank = collTierRank(deckTierLabel(save.owned));
    if (!idChar) {
      const q = idQuery.trim().toLowerCase();
      const seen = new Set(); const ids = [];
      getCollCards().forEach(c => { if (seen.has(c.charId)) return; const label = c.identity || c.name; if (!q || label.toLowerCase().includes(q) || (c.name||'').toLowerCase().includes(q)) { seen.add(c.charId); ids.push({ charId:c.charId, label }); } });
      return wrap(
        <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
          {header}
          <div style={{ padding:'4px 16px' }}>
            <input autoFocus value={idQuery} onChange={e=>setIdQuery(e.target.value)} placeholder="Search a character…" style={{ width:'100%', fontSize:'0.72rem', padding:'7px 10px', background:'var(--bg2)', border:'1px solid var(--gold)', color:'var(--text)', borderRadius:6 }} />
          </div>
          <div className="scroll" style={{ flex:1, padding:'4px 16px' }}>
            {ids.slice(0,40).map(x => (
              <div key={x.charId} onClick={()=>setIdChar(x.charId)} style={{ padding:'8px 10px', borderBottom:'1px solid var(--border)', cursor:'pointer', fontSize:'0.72rem', color:'var(--text)' }}>{x.label}</div>
            ))}
            {ids.length===0 && <div style={{ fontSize:'0.65rem', color:'var(--text2)', padding:8 }}>No characters match.</div>}
          </div>
        </div>
      );
    }
    const variants = getCollCards().filter(c => c.charId === idChar && collTierRank(c.tier) <= deckRank);
    const ownedSet = new Set(save.owned||[]);
    return wrap(
      <div style={{ flex:1, display:'flex', flexDirection:'column' }}>
        {header}
        <div style={{ fontSize:'0.64rem', color:'var(--gold)', textAlign:'center', padding:'2px 16px' }}>Claim a variant at your deck strength (≤ {deckTierLabel(save.owned)}). Owned ones will <b>Evolve</b>.</div>
        <button className="btn btn-ghost btn-sm" style={{ alignSelf:'flex-start', margin:'4px 16px', fontSize:'0.58rem' }} onClick={()=>setIdChar(null)}>← Search again</button>
        <div className="scroll" style={{ flex:1, padding:'0 16px' }}>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:6 }}>
            {variants.sort((a,b)=>collTierRank(b.tier)-collTierRank(a.tier)||b.overall-a.overall).map(c => { const ct=T[c.tier]||{color:'#888',bg:'#111'}; const own=ownedSet.has(c.id); return (
              <div key={c.id} onClick={()=>doIdentityClaim(c.id)} style={{ border:`2px solid ${ct.color}`, borderRadius:6, padding:'7px 9px', background:ct.bg, cursor:'pointer', position:'relative' }}>
                {own && <div style={{ position:'absolute', top:3, right:5, fontSize:'0.5rem', color:'var(--gold)' }}>OWNED ✦</div>}
                <div style={{ fontSize:'0.66rem', color:ct.color, fontWeight:700, lineHeight:1.2, paddingRight:own?28:0 }}>{c.name}</div>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:4 }}>
                  <CollTierBadge tier={c.tier} /><span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color, fontSize:'0.72rem' }}>{c.overall}</span>
                </div>
              </div>
            ); })}
            {variants.length===0 && <div style={{ fontSize:'0.65rem', color:'var(--text2)', padding:8 }}>No variants at or below your deck tier.</div>}
          </div>
        </div>
      </div>
    );
  }

  return wrap(<div style={{ flex:1 }}>{header}</div>);
}

function CollectorWheel({ onDone, streak, spinsLeft }) {
  const T = window.COLLECTOR_TIERS || {};
  const [wheel] = React.useState(genWheelCards);
  const n = wheel.length || 30;
  const seg = 360 / n;
  const [rotation, setRotation] = React.useState(0);
  const [spinning, setSpinning] = React.useState(false);
  const [won, setWon] = React.useState(null);

  const grad = 'conic-gradient(from 0deg, ' + wheel.map((c,i) => {
    const col = (T[c.tier]||{}).color || '#888';
    return `${col} ${(i*seg).toFixed(3)}deg ${((i+1)*seg).toFixed(3)}deg`;
  }).join(', ') + ')';

  function spin() {
    if (spinning || won) return;
    setSpinning(true);
    const idx = Math.floor(Math.random() * n);
    const target = rotation + 360*6 + (360 - ((rotation + idx*seg + seg/2) % 360));
    setRotation(target);
    setTimeout(() => { setWon(wheel[idx]); setSpinning(false); }, 4300);
  }

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:20, textAlign:'center' }}>
      <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.25rem', color:'var(--gold)', fontWeight:700 }}>🎡 Spin the Wheel!</div>
      <div style={{ fontSize:'0.7rem', color:'var(--text2)', marginTop:4, marginBottom:18 }}>{streak||5}-win streak reward · 30 cards · 5 per tier{spinsLeft > 1 ? ` · ${spinsLeft} spins left` : ''}</div>
      <div style={{ position:'relative', width:280, height:280, marginBottom:18 }}>
        <div style={{ position:'absolute', top:-4, left:'50%', transform:'translateX(-50%)', width:0, height:0, borderLeft:'12px solid transparent', borderRight:'12px solid transparent', borderTop:'22px solid var(--gold2,#f0c84a)', zIndex:5, filter:'drop-shadow(0 1px 2px rgba(0,0,0,0.85))' }} />
        <div style={{ width:'100%', height:'100%', borderRadius:'50%', background:grad, border:'4px solid #2a2008', boxShadow:'0 0 30px rgba(0,0,0,0.7), inset 0 0 22px rgba(0,0,0,0.55)', transform:`rotate(${rotation}deg)`, transition: spinning ? 'transform 4.2s cubic-bezier(0.15,0.85,0.25,1)' : 'none' }} />
        <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:50, height:50, borderRadius:'50%', background:'#120d06', border:'3px solid var(--gold)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.2rem', zIndex:4 }}>🎡</div>
      </div>
      {!won ? (
        <button className="btn btn-gold" style={{ padding:'12px 40px', fontSize:'0.95rem', letterSpacing:'0.12em' }} disabled={spinning} onClick={spin}>
          {spinning ? 'SPINNING…' : 'SPIN'}
        </button>
      ) : (
        <div className="fade-in" style={{ width:'100%', maxWidth:320 }}>
          <div style={{ fontSize:'0.7rem', color:'var(--text2)', marginBottom:6 }}>You won:</div>
          <div className="card" style={{ borderColor:(T[won.tier]||{}).color||'var(--gold)', marginBottom:14 }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.95rem', color:(T[won.tier]||{}).color||'var(--gold)', fontWeight:700 }}>{won.name}</div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:6 }}>
              <CollTierBadge tier={won.tier} />
              <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:(T[won.tier]||{}).color||'var(--gold)' }}>{won.overall}</span>
            </div>
          </div>
          <button className="btn btn-gold" style={{ width:'100%' }} onClick={() => onDone(won)}>Add to Deck ✓</button>
        </div>
      )}
    </div>
  );
}

// ─── Evolve animation (shown when a duplicate merges into a higher tier) ────
function EvolveOverlay({ from, to, onDone }) {
  const T = window.COLLECTOR_TIERS || {};
  const [phase, setPhase] = React.useState(0); // 0 = merging, 1 = revealed
  React.useEffect(() => { const t = setTimeout(() => setPhase(1), 1500); return () => clearTimeout(t); }, []);
  if (!from || !to) return null;
  const fc = (T[from.tier]||{}), tc = (T[to.tier]||{});
  const isGod = to.tier === 'god';
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:400, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:20, textAlign:'center' }}>
      <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.35rem', fontWeight:800, letterSpacing:'0.1em', marginBottom:20, color: tc.color||'var(--gold)', textShadow:`0 0 20px ${tc.color||'#f0c84a'}` }}>
        {isGod ? '✨ GOD TIER! ✨' : '✦ EVOLVE! ✦'}
      </div>
      {phase === 0 ? (
        <div style={{ display:'flex', alignItems:'center', gap:8 }} className="evolve-pulse">
          {[0,1].map(i => (
            <div key={i} className="card" style={{ width:108, padding:'10px 8px', borderColor:fc.color||'#888', opacity:0.85 }}>
              <div style={{ fontSize:'0.58rem', color:fc.color||'#aaa', fontWeight:700, lineHeight:1.2 }}>{from.name}</div>
              <div style={{ marginTop:5 }}><CollTierBadge tier={from.tier} /></div>
            </div>
          ))}
        </div>
      ) : (
        <div className="fade-in" style={{ width:'100%', maxWidth:300 }}>
          <div className="card" style={{ borderColor: tc.color||'var(--gold)', boxShadow:`0 0 28px ${tc.color||'#f0c84a'}`, marginBottom:16 }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1rem', color: tc.color||'var(--gold)', fontWeight:700 }}>{to.name}</div>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:8 }}>
              <CollTierBadge tier={to.tier} />
              <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color: tc.color||'var(--gold)', fontSize:'1.05rem' }}>{to.overall}</span>
            </div>
            {isGod && <div style={{ fontSize:'0.58rem', color:'var(--text2)', marginTop:6, fontStyle:'italic' }}>×2 to all position scores</div>}
          </div>
          <button className="btn btn-gold" style={{ width:'100%' }} onClick={onDone}>Continue ✓</button>
        </div>
      )}
    </div>
  );
}

// ─── Collector Hub ────────────────────────────────────────────────────────────

function CollectorHub({ onHome }) {
  const [save, setSave] = React.useState(() => loadCollSave());
  const [tab, setTab] = React.useState('deck');
  const [evolveAnim, setEvolveAnim] = React.useState(null); // { from, to } when a win-pull/wheel duplicate merges
  const [screen, setScreen] = React.useState('hub'); // hub | tutorial | startingPull | wager | game | result | winpull
  const [gameWager, setGameWager] = React.useState(0);
  const [gameResult, setGameResult] = React.useState(null);
  const [winPullCards, setWinPullCards] = React.useState([]);
  const [tourActive, setTourActive] = React.useState(false); // interactive guided tour overlay
  const [showModeChoice, setShowModeChoice] = React.useState(false); // (legacy flag, harmless)
  const [selectedMode, setSelectedMode] = React.useState(null); // highlighted mode on the Game Modes screen
  const [helpMode, setHelpMode] = React.useState(null);          // mode whose "?" how-to-play is open
  const [gameMode, setGameMode] = React.useState('traditional'); // 'traditional' (1 CPU) | 'tourney' (3 CPUs)
  const [wheelSpinsLeft, setWheelSpinsLeft] = React.useState(1);     // multi-spin wheel (HW grants 5)
  // House Wars active-game state
  const [hwUserHouse, setHwUserHouse] = React.useState(null);
  const [hwCpuHouse, setHwCpuHouse] = React.useState(null);
  const [hwLineup, setHwLineup] = React.useState(null);   // { cards, ids }
  const [hwCpuCards, setHwCpuCards] = React.useState(null);
  const [hwResult, setHwResult] = React.useState(null);
  const [hwReward, setHwReward] = React.useState(null);
  const [hwNotice, setHwNotice] = React.useState(null);   // abandon-penalty message
  // Trial of Seven active-game state
  const [trialLineup, setTrialLineup] = React.useState(null); // player's 15 cards
  const [trialCpu, setTrialCpu] = React.useState(null);       // CPU's 15 cards
  const [trialResult, setTrialResult] = React.useState(null);
  const [trialWager, setTrialWager] = React.useState(0);      // optional wager (same rules as Traditional)
  const [winPullKG, setWinPullKG] = React.useState(false);    // win-pull screen shows Kingsguard (Trial)

  // A cloud pull (cross-device sync) writes the latest deck/gold/stats to localStorage and
  // fires 'asoe-cloud-sync'. Reload from it so the hub doesn't keep stale in-memory state
  // (which would otherwise get pushed back and clobber the other device's progress). Guarded
  // to the hub screen so it never yanks state out from under an in-progress game.
  const screenRef = React.useRef(screen);
  screenRef.current = screen;
  React.useEffect(() => {
    function onSync() { if (screenRef.current === 'hub') setSave(loadCollSave()); }
    window.addEventListener('asoe-cloud-sync', onSync);
    return () => window.removeEventListener('asoe-cloud-sync', onSync);
  }, []);

  function handleUpdate(newSave) {
    setSave(newSave);
    // Re-check cumulative Collector achievements on every save change so milestones
    // unlock after ANY mode (House Wars, GoT, Trial, Seven Kingdoms), not just games
    // that route through CollectorGame's own check.
    try { checkCollectorAchievements(newSave, null).forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id }))); } catch (e) {}
  }

  React.useEffect(() => {
    // Collector Mode ALWAYS plays its own theme: force it and ignore any global soundtrack
    // override while inside Collector, restoring the player's choice when they leave.
    const prevOverride = _soundtrackOverride;
    _soundtrackOverride = 'collector';
    AudioManager.startCollectorMusic();
    return () => { _soundtrackOverride = prevOverride; applyNavMusic(); };
  }, []);

  React.useEffect(() => {
    if (!save.tutorialSeen) {
      const needsPull = !save.owned || save.owned.length === 0;
      if (needsPull) {
        setScreen('startingPull'); // first-timer grabs a deck; the interactive tour launches right after
      } else {
        setScreen('hub'); setTourActive(true);
        const ns = { ...save, tutorialSeen: true }; saveCollSave(ns); setSave(ns);
      }
    }
  }, []);

  // If a House Wars game was left active (app closed after the roll or mid-match), penalise on load.
  React.useEffect(() => {
    const active = save.hw && save.hw.active;
    if (active) applyHwAbandon(active);
  }, []);

  // If The Game of Thrones was closed mid-choice on a LOSS card, apply it to a random card on load.
  React.useEffect(() => {
    const p = save.gotPending;
    if (!p) return;
    const owned = (save.owned||[]).slice();
    if (!owned.length) { const ns={ ...save, gotPending:null }; saveCollSave(ns); setSave(ns); return; }
    let name = null;
    if (p.kind === 'loseChoose') { const i=Math.floor(Math.random()*owned.length); name=(getCollCard(owned[i])||{}).name; owned.splice(i,1); }
    else if (p.kind === 'devolveChoose') { const cand=owned.map((id,i)=>({id,i,card:getCollCard(id)})).filter(e=>e.card&&collDevolveTargetId(e.card)); if(cand.length){ const pk=cand[Math.floor(Math.random()*cand.length)]; owned[pk.i]=collDevolveTargetId(pk.card); name=(pk.card||{}).name; } }
    else if (p.kind === 'degradeChoose') { const i=Math.floor(Math.random()*owned.length); name=(getCollCard(owned[i])||{}).name; owned[i]=collApplyMod(owned[i],-3); }
    const ns = { ...save, owned, gotPending:null }; saveCollSave(ns); setSave(ns);
    setHwNotice(`You left The Game of Thrones before resolving a Loss card — it struck ${name||'a random card'}.`);
  }, []);

  // If a Win Pull was owed but the app closed before choosing, auto-award it on load (#6).
  React.useEffect(() => { if (save.pendingWinPull) autoResolveWinPull(save); }, []);

  function handleStartingPullDone(cardIds) {
    const newSave = { ...save, tutorialSeen: true, owned: cardIds };
    saveCollSave(newSave);
    setSave(newSave);
    setScreen('hub');
    setTourActive(true); // launch the interactive guided tour now that they have a deck
  }

  function handlePlay() {
    if (!save.owned || save.owned.length < 10) {
      alert('You need at least 10 cards in your deck to play!');
      return;
    }
    setSelectedMode(null); setScreen('modeChoice');
  }
  function startTraditional() { setGameMode('traditional'); setShowModeChoice(false); setScreen('wager'); }
  function startTourney() { setGameMode('tourney'); setShowModeChoice(false); setScreen('wager'); }
  function startHouseWars() {
    // HW & GoT can lose cards, so they require ≥21 (never drop below the 20-card minimum).
    if ((save.owned||[]).length < 21 || hwEligibleHouses(save.owned).length === 0) return;
    setShowModeChoice(false); setScreen('hwSpin');
  }
  function startGameOfThrones() {
    if ((save.owned||[]).length < 21) return;
    setShowModeChoice(false); setScreen('got');
  }
  function startTrial() {
    if ((save.owned||[]).length < 15) return; // you field a 15-card lineup
    setTrialWager(0);
    setShowModeChoice(false); setScreen('trialLineup');
  }
  function handleTrialLineupConfirm(cards) {
    setTrialLineup(cards);
    setTrialCpu(genTrialCpuDeck(trialDeckKG(cards))); // CPU 15-card deck within ±2% of your Kingsguard
    setScreen('trialWager'); // optional wager (same rules as Traditional) before the match
  }
  function handleTrialWagerStart(wager) { setTrialWager(wager); setScreen('trialGame'); }
  function handleTrialEnd(result) {
    const wager = trialWager || 0;
    if (!result || result.quit) { // quitting forfeits the wager, like Traditional
      if (wager > 0) { const ns = { ...save, gold: Math.max(0, (save.gold||0) - wager) }; saveCollSave(ns); setSave(ns); }
      setTrialWager(0); setTrialResult(null); setScreen('hub'); return;
    }
    const wagerDelta = wager > 0 ? (result.isWin ? wager : -wager) : 0; // win returns it doubled (+wager net); loss loses it
    const placedIds = Object.values(result.cpuBoard || {}).filter(Boolean).map(c => c.id); // the CPU's 7 fielded cards
    const ns = { ...save, gold: Math.max(0, (save.gold||0) + wagerDelta), cardStats: collRecordCardStats(save.cardStats, result.playerBoard, result.isWin, 'kingsguard'),
      modeStats: collRecordMode(save.modeStats, 'trial', { win:result.isWin, score:result.playerScore }) };
    if (result.isWin) ns.pendingWinPull = { cards: placedIds }; // auto-award (from the 7 placed) if they bail (#6)
    saveCollSave(ns); setSave(ns);
    setTrialResult({ ...result, wager, wagerDelta }); setScreen('trialResult');
  }
  function handleTrialWinPull() {
    const placed = Object.values((trialResult && trialResult.cpuBoard) || {}).filter(Boolean);
    setWinPullCards(placed); // Win Pull from the CPU's 7 PLACED Kingsguard cards
    setWinPullKG(true); setScreen('winpull');
  }
  function recordGot(wasWin) { // each GoT pick = 1 game; a Win card = win, a Loss card = loss
    if (typeof wasWin !== 'boolean') return;
    const ns = { ...save, modeStats: collRecordMode(save.modeStats, 'got', { win: wasWin }) };
    saveCollSave(ns); setSave(ns);
  }
  function handleGotDone(wasWin) { recordGot(wasWin); setScreen('hub'); }
  function handleGotSpin(wasWin) { recordGot(wasWin); setWheelSpinsLeft(1); setScreen('wheel'); } // GoT "Spin the Wheel" card (a Win)
  function startSevenKingdoms() {
    if ((save.owned||[]).length < 25) return; // you place a card per square — need a 25-card deck
    setShowModeChoice(false); setScreen('sevenK');
  }
  function handleSevenKingdomsSpin() { setWheelSpinsLeft(1); setScreen('wheel'); } // 20+ squares filled reward

  function handleStartGame(wager) {
    setGameWager(wager);
    setScreen('game');
  }

  // ── House Wars flow ──────────────────────────────────────────────────────
  function handleHwRolled(userHouse, cpuHouse) {
    // The spin has finalized — this is the commitment point. Mark an active game so that
    // backing out OR closing the app from here on forfeits a random card from the deck.
    setHwUserHouse(userHouse); setHwCpuHouse(cpuHouse);
    const newSave = { ...save, hw: { ...(save.hw||{}), active: { userHouse, cpuHouse, phase:'preGame' } } };
    saveCollSave(newSave); setSave(newSave);
  }
  function handleHwSpinDone(userHouse, cpuHouse) {
    setHwUserHouse(userHouse); setHwCpuHouse(cpuHouse); setScreen('hwLineup');
  }
  function handleHwBackout() { applyHwAbandon(save.hw && save.hw.active); } // warned back-out → forfeit
  function handleHwLineupConfirm(cards, ids) {
    const cpuCards = genHouseLineup(hwCpuHouse, hwLineupTotal(cards)); // CPU lineup within ±2%
    setHwLineup({ cards, ids });
    setHwCpuCards(cpuCards);
    // Upgrade the marker to the locked lineup (mid-match abandon now forfeits from these 10).
    const newSave = { ...save, hw: { ...(save.hw||{}), active: { userHouse: hwUserHouse, cpuHouse: hwCpuHouse, lineupIds: ids, phase:'playing' } } };
    saveCollSave(newSave); setSave(newSave);
    setScreen('hwGame');
  }
  function handleHwEnd(result) {
    if (!result || result.quit) { applyHwAbandon(save.hw && save.hw.active); return; }
    const hw = save.hw || {};
    const isWin = result.isWin;
    const streak = isWin ? (hw.streak||0) + 1 : 0;
    const house = hwUserHouse;
    const byHouse = { ...(hw.byHouse||{}) };
    const bh = byHouse[house] || { games:0, wins:0 };
    byHouse[house] = { games: bh.games + 1, wins: bh.wins + (isWin?1:0) };
    const recentRun = (hw.recentHouse === house) ? (hw.recentRun||0) + 1 : 1;
    const wheelEarned = isWin && streak % 5 === 0;
    // On a loss the card-surrender is still pending: keep an active marker (the 5 placed cards)
    // so closing the app on the scorecard can't dodge it. The game is already counted here, so
    // the marker is flagged 'lossPending' and won't be re-counted by the abandon handler.
    const placedIds = isWin ? [] : HW_POS.map(p => result.playerBoard[p.id]).filter(Boolean).map(c => c.id);
    const newHw = { ...hw, games:(hw.games||0)+1, wins:(hw.wins||0)+(isWin?1:0), streak,
                    maxStreak: Math.max(hw.maxStreak||0, streak), byHouse, recentHouse: house, recentRun,
                    active: isWin ? null : { userHouse: house, cpuHouse: hwCpuHouse, lineupIds: placedIds, phase:'lossPending' } };
    const newSave = { ...save, hw: newHw, cardStats: collRecordCardStats(save.cardStats, result.playerBoard, isWin) }; // per-card record (#3)
    saveCollSave(newSave); setSave(newSave);
    setHwReward(isWin ? hwRollReward(hwCpuHouse) : null); // pre-rolled, spawns after the scorecard
    setHwResult({ ...result, wheelEarned });
    setScreen('hwResult');
  }
  function handleHwClaim() { // win: spawn the reward into the deck
    let s = save;
    if (hwReward) {
      const res = collAcquire(s.owned||[], hwReward.id);
      s = { ...s, owned: res.owned }; saveCollSave(s); setSave(s);
      if (res.evolved) setEvolveAnim({ from: res.from, to: res.card });
    }
    const earned = hwResult && hwResult.wheelEarned;
    setHwResult(null); setHwReward(null);
    if (earned) { setWheelSpinsLeft(5); setScreen('wheel'); } else setScreen('hub');
  }
  function handleHwDiscard(cardId) { // loss: surrender the chosen card (clears the pending marker)
    const owned = (save.owned||[]).slice();
    const idx = owned.indexOf(cardId); if (idx !== -1) owned.splice(idx, 1);
    const newSave = { ...save, owned, hw: { ...(save.hw||{}), active: null } }; saveCollSave(newSave); setSave(newSave);
    setHwResult(null); setHwReward(null); setScreen('hub');
  }
  function applyHwAbandon(active) { // back-out / quit / app-close → forfeit a random card
    const hw = save.hw || {};
    const phase = active && active.phase;
    let owned = (save.owned||[]).slice(); let lostName = null;
    // preGame (backed out after the roll, no lineup locked) → forfeit any card in the deck;
    // playing/lossPending → forfeit from the lineup / placed cards.
    const poolIds = phase === 'preGame' ? owned.slice() : ((active && active.lineupIds) || []);
    const present = poolIds.filter(id => owned.indexOf(id) !== -1);
    if (present.length) { const lostId = present[Math.floor(Math.random()*present.length)]; owned.splice(owned.indexOf(lostId), 1); lostName = (getCollCard(lostId)||{}).name || 'a card'; }
    let newHw;
    if (phase === 'lossPending' || phase === 'preGame') {
      // No stat change: a loss was already recorded (lossPending), or no game was played (preGame).
      newHw = { ...hw, active: null };
    } else {
      const house = (active && active.userHouse) || hw.recentHouse;
      const recentRun = (hw.recentHouse === house) ? (hw.recentRun||0) + 1 : 1;
      newHw = { ...hw, games:(hw.games||0)+1, streak:0, recentHouse: house || hw.recentHouse, recentRun, active: null };
    }
    const newSave = { ...save, owned, hw: newHw }; saveCollSave(newSave); setSave(newSave);
    if (lostName) setHwNotice(
      phase === 'preGame' ? `You backed out after the spin — ${lostName} was forfeited from your collection.`
      : phase === 'lossPending' ? `You left before surrendering a card — ${lostName} was taken from your collection.`
      : `You abandoned a House Wars battle — counted as a loss, and ${lostName} was lost from your collection.`);
    setHwResult(null); setHwReward(null); setScreen('hub');
  }

  function handleGameEnd(result) {
    if (!result) { setScreen('hub'); return; }
    // Remember the Win-Pull-eligible (out-placed) court cards so closing the app before choosing
    // still auto-awards a pull on next load (#6). Cleared the moment a pull is taken.
    const boards = (result.cpuBoards && result.cpuBoards.length) ? result.cpuBoards : [result.cpuBoard || {}];
    const scores = (result.cpuScores && result.cpuScores.length) ? result.cpuScores : [result.cpuScore || 0];
    const beatenCardIds = boards.filter((b, i) => (scores[i] || 0) < (result.playerScore || 0))
      .reduce((acc, b) => acc.concat(Object.values(b || {}).filter(Boolean).map(c => c.id)), []);
    if (beatenCardIds.length) { const ns = { ...save, pendingWinPull: { cards: beatenCardIds } }; saveCollSave(ns); setSave(ns); }
    setGameResult(result);
    setScreen('result');
  }

  function handleWinPull() {
    // Win Pull draws only from the boards the player OUTPLACED. Tourney: 1st→all 30, 2nd→20,
    // 3rd→10. Traditional: the single CPU's board on a win.
    const r = gameResult;
    const boards = (r.cpuBoards && r.cpuBoards.length) ? r.cpuBoards : [r.cpuBoard || {}];
    const scores = (r.cpuScores && r.cpuScores.length) ? r.cpuScores : [r.cpuScore || 0];
    const beaten = boards.filter((b, i) => (scores[i] || 0) < (r.playerScore || 0));
    const pool = beaten.length ? beaten : boards;
    const cpuBoardCards = pool.reduce((acc, b) => acc.concat(Object.values(b||{}).filter(Boolean)), []);
    const pullCards = genWinPullCards(cpuBoardCards, save);
    setWinPullCards(pullCards);
    setWinPullKG(false); // Traditional/Tourney show Overall (Trial flips this on)
    setScreen('winpull');
  }

  function handlePickWinPull(card) {
    const res = collAcquire(save.owned || [], card.id);
    const newSave = { ...save, owned: res.owned, pendingWinPull: null };
    saveCollSave(newSave);
    setSave(newSave);
    if (res.evolved) setEvolveAnim({ from: res.from, to: res.card });
    setWinPullKG(false); setTrialResult(null);
    if (gameResult && gameResult.wheelEarned) { setWheelSpinsLeft(1); setScreen('wheel'); return; } // 5-win streak reward
    setScreen('hub');
    setGameResult(null);
  }

  // Auto-perform a still-owed Win Pull (player left/closed before choosing) — award the best card.
  function autoResolveWinPull(curSave) {
    const pend = curSave && curSave.pendingWinPull;
    if (!pend) return;
    const cpuCards = (pend.cards || []).map(id => getCollCard(id)).filter(Boolean);
    const pull = cpuCards.length ? genWinPullCards(cpuCards, curSave) : [];
    const best = pull.reduce((b, c) => (c && (!b || (c.overall || 0) > (b.overall || 0))) ? c : b, null);
    let ns;
    if (best) { const res = collAcquire(curSave.owned || [], best.id); ns = { ...curSave, owned: res.owned, pendingWinPull: null }; }
    else ns = { ...curSave, pendingWinPull: null };
    saveCollSave(ns); setSave(ns);
    if (best) setHwNotice(`Win Pull auto-awarded: you received ${best.name}.`);
  }

  function handleWheelDone(card) {
    if (card) {
      const res = collAcquire(save.owned || [], card.id);
      const newSave = { ...save, owned: res.owned };
      saveCollSave(newSave);
      setSave(newSave);
      if (res.evolved) setEvolveAnim({ from: res.from, to: res.card });
    }
    const left = wheelSpinsLeft - 1;
    if (left > 0) { setWheelSpinsLeft(left); return; } // another spin (keyed remount re-spins)
    setWheelSpinsLeft(1);
    setScreen('hub');
    setGameResult(null);
  }

  const HUB_TABS = [
    { id:'deck',  label:'My Deck' },
    { id:'index', label:'Card Index' },
    { id:'stats', label:'Stats' },
    { id:'store', label:'Store' },
    { id:'daily', label:'Daily' },
  ];

  const deckTier = deckTierLabel(save.owned);
  const T = window.COLLECTOR_TIERS || {};
  // Tick every second so the HUD daily countdowns update live.
  const [, setNowTick] = React.useState(0);
  React.useEffect(() => { const iv = setInterval(() => setNowTick(t => t + 1), 1000); return () => clearInterval(iv); }, []);
  const pullCountdown = timeUntil24h(save.lastDailyPull);

  );

// ─── Firebase Sync ────────────────────────────────────────────────────────────
const FirebaseSync = (() => {
  const _config = {
    apiKey: "AIzaSyBuBvCDlPDXLVK7EUg4H5KDHu95QW0EkbI",
    authDomain: "a-song-of-an-empire.firebaseapp.com",
    projectId: "a-song-of-an-empire",
    storageBucket: "a-song-of-an-empire.firebasestorage.app",
    messagingSenderId: "801114138568",
    appId: "1:801114138568:web:4edb684c20507d0e4d82fd"
  };
  const SYNC_KEYS = ['history', 'achievements', 'chaosProgress', 'chaosCompletions', 'p1Averages'];
  let _auth = null, _db = null, _user = null;
  let _sessionId = null, _sessionUnsub = null;
  const _listeners = [];

  function init() {
    if (typeof firebase === 'undefined') return;
    if (!firebase.apps.length) firebase.initializeApp(_config);
    _auth = firebase.auth();
    _db = firebase.firestore();
    _auth.getRedirectResult().catch(() => {});
    _auth.onAuthStateChanged(user => {
      _user = user;
      _listeners.forEach(fn => fn(user));
      if (user) { _claimSession(); _pullAll(); }
      else { _releaseSession(); }
    });
  }

  // ── Single active session ──────────────────────────────────────────────────
  // Only one device may be signed in at a time. On sign-in we claim the session by writing a
  // fresh id to saves/<uid>_session and listening for changes; if another device later claims
  // it, this device is signed out. (Stored in the existing `saves` collection — with no
  // saveId field the save-sync ignores it, so no extra Firestore rules are required.)
  function _sessionDocRef() { return _db.collection('saves').doc(`${_user.uid}_session`); }
  function _newSessionId() { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10); }
  async function _claimSession() {
    if (!_user || !_db) return;
    const sid = _newSessionId();
    _sessionId = sid;
    try { await _sessionDocRef().set({ uid: _user.uid, sessionId: sid, updatedAt: Date.now() }); } catch (e) {}
    if (_sessionUnsub) { try { _sessionUnsub(); } catch (e) {} _sessionUnsub = null; }
    try {
      _sessionUnsub = _sessionDocRef().onSnapshot(doc => {
        const d = doc.data();
        if (d && d.sessionId && _sessionId && d.sessionId !== _sessionId) {
          _releaseSession();
          window.dispatchEvent(new CustomEvent('asoe-session-ended'));
          signOut();
        }
      }, () => {});
    } catch (e) {}
  }
  function _releaseSession() {
    if (_sessionUnsub) { try { _sessionUnsub(); } catch (e) {} _sessionUnsub = null; }
    _sessionId = null;
  }

  function onAuthChange(fn) { _listeners.push(fn); }
  function getUser() { return _user; }
  function signIn() {
    const provider = new firebase.auth.GoogleAuthProvider();
    return _auth.signInWithPopup(provider);
  }
  function signOut() { return _auth.signOut(); }

  function _docId(saveId) { return `${_user.uid}_${saveId}`; }

  async function _pullAll() {
    if (!_user || !_db) return;
    try {
      const snap = await _db.collection('saves').where('uid', '==', _user.uid).get();
      snap.forEach(doc => {
        const data = doc.data();
        const saveId = data.saveId;
        if (!saveId) return;
        if (data.deleted) { removeLocalSaveData(saveId); return; } // deleted on another device → drop locally
        // Ensure save slot exists locally
        const meta = getSaveMeta();
        if (!meta.find(s => s.id === saveId)) {
          meta.push({ id: saveId, created: data.createdAt || Date.now(), lastPlayed: data.updatedAt || Date.now(), name: data.saveName || `Save ${saveId}` });
          setSaveMeta(meta);
        }
        for (const key of SYNC_KEYS) {
          if (data[key] !== undefined && data[key] !== null) {
            const val = typeof data[key] === 'string' ? data[key] : JSON.stringify(data[key]);
            localStorage.setItem(sk(saveId, key), val);
          }
        }
        if (data.dailyCompletions) {
          for (const [dateKey, completed] of Object.entries(data.dailyCompletions)) {
            localStorage.setItem(sk(saveId, `daily_${dateKey}`), JSON.stringify(completed));
          }
        }
      });
      await _pullCollector();
      window.dispatchEvent(new CustomEvent('asoe-cloud-sync'));
    } catch(e) { console.warn('FirebaseSync pull failed', e); }
  }

  async function pushCollector() {
    if (!_user || !_db) return;
    try {
      const sid = getActiveSaveId() || 1;
      const raw = localStorage.getItem(collKey());
      if (!raw) return;
      const data = JSON.parse(raw);
      // Per-save cloud doc so one save's collection never overwrites another's.
      await _db.collection('collector').doc(_docId(sid)).set({ uid: _user.uid, saveId: sid, updatedAt: Date.now(), ...data }, { merge: true });
    } catch(e) { console.warn('FirebaseSync collector push failed', e); }
  }

  async function _pullCollector() {
    if (!_user || !_db) return;
    try {
      const sid = getActiveSaveId() || 1;
      const localKey = collKey();
      const doc = await _db.collection('collector').doc(_docId(sid)).get();
      if (doc.exists) {
        const { uid, saveId, updatedAt, ...data } = doc.data();
        const local = JSON.parse(localStorage.getItem(localKey) || '{}');
        // Cloud wins if it has a later updatedAt, otherwise keep local
        if (!local.updatedAt || updatedAt > (local.updatedAt || 0)) {
          localStorage.setItem(localKey, JSON.stringify({ ...collDefaultSave(), ...data }));
        }
      }
    } catch(e) { console.warn('FirebaseSync collector pull failed', e); }
  }

  async function pushSave(saveId) {
    if (!_user || !_db || !saveId) return;
    try {
      const meta = getSaveMeta().find(s => s.id === saveId);
      const payload = { uid: _user.uid, saveId, deleted: false, updatedAt: Date.now(), createdAt: meta?.created || Date.now(), saveName: meta?.name || `Save ${saveId}` };
      for (const key of SYNC_KEYS) {
        const raw = localStorage.getItem(sk(saveId, key));
        if (raw !== null) {
          try { payload[key] = JSON.parse(raw); } catch { payload[key] = raw; }
        }
      }
      // Firestore forbids nested arrays — serialize complex objects as JSON strings
      if (Array.isArray(payload.history)) payload.history = JSON.stringify(payload.history.slice(-50));
      if (payload.chaosCompletions != null && typeof payload.chaosCompletions === 'object') payload.chaosCompletions = JSON.stringify(payload.chaosCompletions);
      const dateKey = getDailyDateKey();
      const dailyRaw = localStorage.getItem(sk(saveId, `daily_${dateKey}`));
      if (dailyRaw) {
        payload.dailyCompletions = {};
        try { payload.dailyCompletions[dateKey] = JSON.parse(dailyRaw); } catch {}
      }
      await _db.collection('saves').doc(_docId(saveId)).set(payload, { merge: true });
    } catch(e) { console.warn('FirebaseSync push failed', e); }
  }

  // Tombstone a deleted save in the cloud so every other signed-in device drops it on its
  // next pull, and clear its cloud collector data.
  async function deleteSave(saveId) {
    if (!_user || !_db || !saveId) return;
    try {
      await _db.collection('saves').doc(_docId(saveId)).set({ uid: _user.uid, saveId, deleted: true, deletedAt: Date.now() });
      await _db.collection('collector').doc(_docId(saveId)).delete();
    } catch(e) { console.warn('FirebaseSync delete failed', e); }
  }

  return { init, signIn, signOut, getUser, onAuthChange, pushSave, pushCollector, deleteSave };
})();

// ─── Account Screen ───────────────────────────────────────────────────────────
function AccountScreen({ onBack, startup, onContinue }) {
  const [user, setUser] = useState(() => FirebaseSync.getUser());
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState(null);
  const [convertSlot, setConvertSlot] = useState(null); // active Offline save offered for Online conversion (#9)

  useEffect(() => {
    FirebaseSync.onAuthChange(u => setUser(u));
  }, []);

  async function handleSignIn() {
    setLoading(true); setStatus(null);
    try {
      await FirebaseSync.signIn();
      setStatus('Signed in! Your progress is now syncing.');
      // If the player is currently in an Offline save, offer to convert it to Online (#9).
      const aid = getActiveSaveId();
      const meta = aid ? getSaveMeta().find(s => s.id === aid) : null;
      if (meta && !isSaveOnline(meta)) setConvertSlot(meta);
    }
    catch(e) { setStatus(`Error: ${e.code || e.message || 'unknown'}`); }
    finally { setLoading(false); }
  }

  async function handleSignOut() {
    setLoading(true);
    try { await FirebaseSync.signOut(); setStatus('Signed out.'); }
    finally { setLoading(false); }
  }

  return (
    <div className="app screen-enter">

function getDailyDateKey() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function makeDailyRng(seed) {
  let s = (seed ^ 0xdeadbeef) >>> 0;
  return () => { s = Math.imul(s ^ (s >>> 16), 0x45d9f3b); s = Math.imul(s ^ (s >>> 16), 0x45d9f3b); return (s >>> 0) / 0xffffffff; };
}

function buildDailyChallenges(dateKey) {
  const rng = makeDailyRng(parseInt(dateKey, 10));
  const t1 = 30 + Math.floor(rng() * 16); // 30-45 classic
  const t2 = 50 + Math.floor(rng() * 22); // 50-71 empire
  const t3 = 32 + Math.floor(rng() * 10); // 32-41 classic heir constraint
  const t4 = 255 + Math.floor(rng() * 90); // 255-344 dynasty
  const cpuMode = rng() < 0.5 ? 'classic' : 'empire';
  const cpuModeLabel = cpuMode === 'classic' ? 'Classic' : 'Empire Fate';
  return [
    {
      id: 'c_score', label: `Classic ≥${t1}pts`, diff: 1,
      desc: `Score at least ${t1} points in Classic Mode (solo)`,
      check: (h) => (h.modeKey==='classic' || h.modeKey==='classic-hard') && !h.isVersus && !h.isCPU && calcScore((h.boards||[])[0]||h.board||[]) >= t1,
    },
    {
      id: 'cpu_beat', label: `Beat CPU (${cpuModeLabel})`, diff: 2,
      desc: `Win a vs-CPU game in ${cpuModeLabel} Mode`,
      check: (h) => h.modeKey===cpuMode && h.isCPU && calcScore((h.boards||[])[0]||h.board||[]) > calcScore((h.boards||[])[1]||h.board2||[]),
    },
    {
      id: 'e_score', label: `Empire ≥${t2}pts`, diff: 2,
      desc: `Score at least ${t2} points in Empire Fate Mode (solo)`,
      check: (h) => h.modeKey==='empire' && !h.isVersus && !h.isCPU && calcScore((h.boards||[])[0]||h.board||[]) >= t2,
    },
    {
      id: 'c_heir', label: `Cursed Heir (≥${t3})`, diff: 3,
      desc: `Score ${t3}+ in Classic with the Heir slot scoring under 5`,
      check: (h) => (h.modeKey==='classic'||h.modeKey==='classic-hard') && !h.isVersus && calcScore((h.boards||[])[0]||h.board||[]) >= t3 &&
        getSlotScore(((h.boards||[])[0]||h.board||[]).find(s=>s.positionId==='heir')||{}) < 5,
    },
    {
      id: 'dyn_score', label: `Dynasty ≥${t4}`, diff: 4,
      desc: `Score at least ${t4} total in Dynasty Mode`,
      check: (h) => { if (h.modeKey!=='dynasty' || h.isVersus || h.isCPU) return false;
        const b = (h.boards||[])[0]||h.board||[];
        // Use the same category-aware scoring the game displays (incomplete pairs score 0)
        return b.reduce((sum,sl)=>sum+getDynastySlotScore(sl,b),0) >= t4; },
    },
    {
      id: 'chaos_win', label: 'Chaos Victory', diff: 3,
      desc: 'Win any rung on the Chaos Ladder',
      check: (h) => h.modeKey==='chaos' && h.isWin,
    },
  ];
}

function getDailyChallengeState(saveId) {
  const dateKey = getDailyDateKey();
  const storageKey = sk(saveId, `daily_${dateKey}`);
  const completed = JSON.parse(localStorage.getItem(storageKey) || '[]');
  const allChallenges = buildDailyChallenges(dateKey);
  // Pick 5 from 6 templates using the rng
  const rng = makeDailyRng(parseInt(dateKey, 10) + 1);
  const indices = [0,1,2,3,4,5];
  for(let i=indices.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[indices[i],indices[j]]=[indices[j],indices[i]];}
  const challenges = indices.slice(0,5).map(i => allChallenges[i]);
  return { dateKey, storageKey, challenges, completed };
}

function markDailyChallengeComplete(saveId, challengeId) {
  const dateKey = getDailyDateKey();
  const storageKey = sk(saveId, `daily_${dateKey}`);
  const completed = JSON.parse(localStorage.getItem(storageKey) || '[]');
  if (!completed.includes(challengeId)) {
    completed.push(challengeId);
    localStorage.setItem(storageKey, JSON.stringify(completed));
  }
}

function checkDailyChallenges(gameResult, saveId) {
  if (!saveId) return [];
  const { challenges, completed } = getDailyChallengeState(saveId);
  const newlyDone = [];
  for (const ch of challenges) {
    if (completed.includes(ch.id)) continue;
    try {
      if (ch.check(gameResult)) {
        markDailyChallengeComplete(saveId, ch.id);
        newlyDone.push(ch.id);
      }
    } catch(e) {}
  }
  return newlyDone;
}

function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    function onAch(e) {
      const ach = (window.ACHIEVEMENTS || []).find(a => a.id === e.detail);
      if (!ach) return;
      const key = Date.now() + Math.random();
      setToasts(ts => [...ts, { key, ach }]);
      setTimeout(() => setToasts(ts => ts.filter(t => t.key !== key)), 3600);
    }
    window.addEventListener('asoe-achievement', onAch);
    return () => window.removeEventListener('asoe-achievement', onAch);

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  // Resume an in-progress game if the page was reloaded mid-game (e.g. a phone discarded the
  // backgrounded tab); otherwise open on the account/login screen, then the opening tutorial.
  const bootRef = useRef();
  if (!bootRef.current) {
    const l = loadLive();
    let b = { screen: 'account' };
    if (l && l.screen === 'game' && l.gameConfig) b = { screen: 'game', gameConfig: l.gameConfig };
    else if (l && l.screen === 'chaosGame' && l.chaosRungId != null) {
      const rung = (window.CHAOS_RUNGS || []).find(r => r.id === l.chaosRungId);
      if (rung) b = { screen: 'chaosGame', currentChaosRung: rung };
    }
    else if (l && l.screen === 'collector') b = { screen: 'collector' };
    bootRef.current = b;
  }
  const boot = bootRef.current;
  const [screen, setScreen] = useState(boot.screen);
  const [homeInitialView, setHomeInitialView] = useState(null);
  const [gameConfig, setGameConfig] = useState(boot.gameConfig || null);
  const [gameResult, setGameResult] = useState(null);
  const [newAchievements, setNewAchievements] = useState([]);
  const [saveId, setSaveId] = useState(() => getActiveSaveId());
  const [chaosProgress, setChaosProgress] = useState(() => {
    const id = getActiveSaveId();
    const v = parseInt(localStorage.getItem(sk(id, 'chaosProgress')) || '0', 10);
    return isNaN(v) ? 0 : Math.min(v, 50);
  });
  const [currentChaosRung, setCurrentChaosRung] = useState(boot.currentChaosRung || null);
  const [chaosEndResult, setChaosEndResult] = useState(null);
  const [syncKey, setSyncKey] = useState(0);
  const [sessionEnded, setSessionEnded] = useState(false);

  useEffect(() => {
    FirebaseSync.init();
    function onSync() {
      // Re-read chaos progress and force HomeScreen refresh after cloud pull
      const id = getActiveSaveId();
      if (id) {
        const v = parseInt(localStorage.getItem(sk(id, 'chaosProgress')) || '0', 10);
        setChaosProgress(isNaN(v) ? 0 : Math.min(v, 50));
      }
      setSaveId(getActiveSaveId()); // a pull may have added or removed saves
      setSyncKey(k => k + 1);
    }
    function onSessionEnded() { setSessionEnded(true); }
    window.addEventListener('asoe-cloud-sync', onSync);
    window.addEventListener('asoe-session-ended', onSessionEnded);
    return () => { window.removeEventListener('asoe-cloud-sync', onSync); window.removeEventListener('asoe-session-ended', onSessionEnded); };
  }, []);

  // Keep a resume snapshot of any in-progress game; clear it once the game ends or the
  // player leaves to a non-game screen (home, results, ladder, etc.).
  useEffect(() => {
    if (screen === 'game' && gameConfig) saveLive({ screen, gameConfig });
    else if (screen === 'chaosGame' && currentChaosRung) saveLive({ screen, chaosRungId: currentChaosRung.id });
    else if (screen === 'collector') saveLive({ screen });
    else clearLive();
  }, [screen, gameConfig, currentChaosRung]);

  function handleSaveChange(newId, goTo) {
    if (goTo) setHomeInitialView(goTo);
    setSaveId(newId);
    if (newId) {
      setActiveSaveId(newId);
      touchSave(newId);
      const v = parseInt(localStorage.getItem(sk(newId, 'chaosProgress')) || '0', 10);
      setChaosProgress(isNaN(v) ? 0 : Math.min(v, 50));
    } else {
      setChaosProgress(0);
    }
  }

  function handleStart({ mode, showScores, numPlayers, cpuPlayers, wildcardPositions }) {
    if (saveId) touchSave(saveId);
    if (mode === 'dynasty') AudioManager.startDynastyMusic();
    else AudioManager.startGameMusic();
    setGameConfig({ mode, showScores, numPlayers: numPlayers || 1, cpuPlayers: cpuPlayers || [false], wildcardPositions: wildcardPositions || false });
    setScreen('game');
  }

  function handleChaosChallenge(rung) {
    AudioManager.startGameMusic();
    setCurrentChaosRung(rung);
    setScreen('chaosGame');
  }

  function handleChaosGameEnd(result) {
    if (!result) { setScreen('ladder'); return; }
    let achUnlocked = [];
    let playerBoard = [], isWin = false, newProgress = chaosProgress;
    try {
      playerBoard = (result.boards || [])[0] || result.board || [];
      const playerScore = calcScore(playerBoard);
      isWin = playerScore > result.opponentScore;
      if (isWin && currentChaosRung) {
        if (currentChaosRung.id === chaosProgress + 1) {
          newProgress = chaosProgress + 1;
          localStorage.setItem(sk(saveId, 'chaosProgress'), String(newProgress));
          setChaosProgress(newProgress);
          achUnlocked = checkChaosAchievements(currentChaosRung, newProgress, saveId) || [];
        }
        const existing = JSON.parse(localStorage.getItem(sk(saveId, 'chaosCompletions')) || '{}');
        if (!existing[currentChaosRung.id]) {
          existing[currentChaosRung.id] = { board: playerBoard, date: Date.now() };
          localStorage.setItem(sk(saveId, 'chaosCompletions'), JSON.stringify(existing));
        }
      }
      achUnlocked.forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id })));
      try { checkDailyChallenges({ modeKey: 'chaos', isWin, boards: [playerBoard], board: playerBoard }, saveId); } catch(e) {}
      try { FirebaseSync.pushSave(saveId); } catch(e) {}
    } catch(e) { console.error('handleChaosGameEnd error:', e); }
    setChaosEndResult({ ...result, board: playerBoard, isWin, newProgress });
    setNewAchievements(achUnlocked);
    setScreen('chaosEnd');
  }

  function handleGameEnd(result) {
    // Returning to the carousel (not the title/main menu) after a game; quitting too.
    if (!result) { applyNavMusic(); setHomeInitialView('modes'); setScreen('home'); return; }
    let unlocked = [];
    // A completed game legitimizes the save: make sure it's registered in the save list and
    // marked as the most-recently-played slot so CONTINUE/LOAD reliably show it.
    if (saveId) {
      const meta = getSaveMeta();
      if (!meta.find(s => s.id === saveId)) {
        meta.push({ id: saveId, created: Date.now(), lastPlayed: Date.now(), name: `Save ${saveId}` });
        setSaveMeta(meta); setActiveSaveId(saveId);
      } else touchSave(saveId);
    }
    try {
      const histKey = sk(saveId, 'history');
      const existing = JSON.parse(localStorage.getItem(histKey) || '[]');
      const np = gameConfig.numPlayers || 1;
      const cp = gameConfig.cpuPlayers || [false];
      const boards = result.boards || [result.board, result.board2].filter(Boolean);
      const entry = {
        modeKey: gameConfig.mode, numPlayers: np, cpuPlayers: cp,
        isVersus: np > 1 && cp.slice(1).some(c => !c),
        isCPU: np > 1 && cp.slice(1).every(c => c),
        showScores: gameConfig.showScores, boards,
        board: boards[0] || null, board2: boards[1] || null, date: Date.now(),
      };
      existing.push(entry);
      localStorage.setItem(histKey, JSON.stringify(existing));
      if (entry.board && !entry.isVersus && !entry.isCPU) {
        const avgKey = sk(saveId, 'p1Averages');
        const avgs = JSON.parse(localStorage.getItem(avgKey) || '{}');
        const mk = entry.modeKey;
        const prev = avgs[mk] || { count: 0, sum: 0 };
        avgs[mk] = { count: prev.count + 1, sum: prev.sum + calcScore(entry.board) };
        localStorage.setItem(avgKey, JSON.stringify(avgs));
      }
      unlocked = checkAchievements({ modeKey: gameConfig.mode, boards, board: boards[0] || [], board2: boards[1] || [], numPlayers: np, cpuPlayers: cp, isVersus: entry.isVersus, isCPU: entry.isCPU, dynDiscards: result.dynDiscards, rerolls: result.rerolls }, existing, saveId) || [];
      unlocked.forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id })));
      try { checkDailyChallenges({ modeKey: gameConfig.mode, boards, board: boards[0] || [], board2: boards[1] || [], numPlayers: np, cpuPlayers: cp, isVersus: entry.isVersus, isCPU: entry.isCPU, isWin: entry.isCPU ? (calcScore(boards[0]||[]) > calcScore(boards[1]||[])) : false }, saveId); } catch(e) {}
      try { FirebaseSync.pushSave(saveId); } catch(e) {}
      result = { ...result, boards };
    } catch(e) { console.error('handleGameEnd error:', e); }
    setNewAchievements(unlocked);
    setGameResult(result);
    setScreen('end');
  }

  const nav = (s, initView) => () => {
    applyNavMusic();
    if (initView) setHomeInitialView(initView);
    setScreen(s);
  };

  return (
    <>
      <ToastContainer />
      {sessionEnded && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:99999, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
          <div style={{ background:'#120d06', border:'1px solid var(--gold)', borderRadius:14, padding:'28px 24px', maxWidth:320, width:'88%', textAlign:'center', boxShadow:'0 8px 40px rgba(0,0,0,0.9)' }}>
            <div style={{ fontSize:'2.2rem', marginBottom:8 }}>📱</div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.15rem', color:'var(--gold2)', fontWeight:700, marginBottom:8 }}>Signed Out</div>
            <div style={{ fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.6, marginBottom:20 }}>Your account was opened on another device. Only one device can be signed in at a time.</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              <button className="btn btn-gold" onClick={() => { setSessionEnded(false); try { FirebaseSync.signIn(); } catch(e){} }}>Sign In Again Here</button>
              <button className="btn btn-ghost" onClick={() => setSessionEnded(false)}>Continue Offline</button>
            </div>
          </div>
        </div>
      )}
      <div key={screen} className="screen-enter" style={{ height: '100%' }}>
      {screen === 'account' && (
        <AccountScreen startup onContinue={() => setScreen('tutorial')} onBack={() => setScreen('tutorial')} />
      )}
      {screen === 'tutorial' && (
        <TutorialScreen onDone={() => setScreen('home')} />
      )}
      {screen === 'home' && (
        <HomeScreen
          key={`${saveId}-${syncKey}`}
          onStart={handleStart}
          onHistory={nav('history')}
          onHowToPlay={nav('howtoplay')}
          onCharIndex={nav('charindex')}
          onAchievements={nav('achievements')}
          onMostPlayed={nav('mostplayed')}
          onLadder={nav('ladder')}
          onCollector={nav('collector')}
          chaosProgress={chaosProgress}
          initialView={homeInitialView}
          saveId={saveId}
          onSaveChange={handleSaveChange}
        />
      )}
      {screen === 'collector' && (
        <CollectorHub onHome={nav('home', 'modes')} />
      )}
      {screen === 'ladder' && (
        <LadderScreen
          onBack={() => { applyNavMusic(); setHomeInitialView('modes'); setScreen('home'); }}
          onChallenge={handleChaosChallenge}
          progress={chaosProgress}
        />
      )}
      {screen === 'chaosGame' && currentChaosRung && (
        <GameScreen
          modeKey="chaos"
          showScores={false}
          chaosRung={currentChaosRung}
          onEnd={handleChaosGameEnd}
        />
      )}
      {screen === 'chaosEnd' && chaosEndResult && currentChaosRung && (
        <ChaosEndScreen
          rung={currentChaosRung}
          board={chaosEndResult.board}
          opponentBoard={chaosEndResult.opponentBoard}
          opponentScore={chaosEndResult.opponentScore}
          isWin={chaosEndResult.isWin}
          progress={chaosEndResult.newProgress}
          totalRungs={50}
          newAchievements={newAchievements}
          onRetry={() => { setScreen('chaosGame'); }}
          onNext={() => {
            const nextRung = (window.CHAOS_RUNGS || []).find(r => r.id === chaosEndResult.newProgress + 1);
            if (nextRung) { setCurrentChaosRung(nextRung); setScreen('chaosGame'); }
            else setScreen('ladder');
          }}
          onLadder={nav('ladder')}
          onHome={nav('home', 'modes')}
        />
      )}
      {screen === 'game' && gameConfig && (
        <GameScreen
          modeKey={gameConfig.mode}
          showScores={gameConfig.showScores}
          numPlayers={gameConfig.numPlayers}
          cpuPlayers={gameConfig.cpuPlayers}
          wildcardPositions={gameConfig.wildcardPositions}
          onEnd={handleGameEnd}
        />
      )}
      {screen === 'end' && gameResult && (
        <EndScreen
          modeKey={gameConfig.mode}
          boards={gameResult.boards}
          numPlayers={gameConfig.numPlayers}
          cpuPlayers={gameConfig.cpuPlayers}
          showScores={gameConfig.showScores}
          newAchievements={newAchievements}
          saveId={saveId}
          onHome={nav('home', 'modes')}
          onPlayAgain={() => { if (gameConfig?.mode === 'dynasty') AudioManager.startDynastyMusic(); else AudioManager.startGameMusic(); setGameResult(null); setNewAchievements([]); setScreen('game'); }}
        />
      )}
      {screen === 'history' && <HistoryScreen key={saveId} saveId={saveId} onBack={nav('home')} />}
      {screen === 'howtoplay' && <HowToPlayScreen onBack={nav('home')} />}
      {screen === 'charindex' && <CharacterIndexScreen onBack={nav('home')} />}
      {screen === 'achievements' && <AchievementsScreen key={saveId} saveId={saveId} onBack={nav('home')} />}
      {screen === 'mostplayed' && <MostPlayedScreen key={saveId} saveId={saveId} onBack={nav('home')} />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
<script>
(function() {
  var el = document.getElementById('app-src');
  if (!el) return;
  var src = el.textContent;
  try {
    var compiled = Babel.transform(src, {
      presets: [['react', { runtime: 'classic' }]]
    }).code;
    var fn = new Function(compiled);
    fn();
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<div style="color:#ff6b6b;padding:20px;font-family:monospace;white-space:pre-wrap">' +
      'Error: ' + e.message + '</div>';
    console.error(e);
  }
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
</script>
</body>
</html>
