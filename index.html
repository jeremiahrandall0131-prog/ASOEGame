function CollectorGame({ save, wager, onEnd, onUpdate, numCpus = 1 }) {
  // Player deck: shuffle owned cards
  const [playerDeck] = React.useState(() => {
    const cards = (save.owned||[]).map(id=>getCollCard(id)).filter(Boolean);
    // Shuffle
    for (let i = cards.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [cards[i],cards[j]]=[cards[j],cards[i]];
    }
    return cards;
  });

  const [playerBoard, setPlayerBoard] = React.useState({}); // posId → card
  const [drawnCard, setDrawnCard] = React.useState(null);
  const [usedCardIds, setUsedCardIds] = React.useState(new Set());
  const [rerollsLeft, setRerollsLeft] = React.useState(Math.min(save.rerolls||0, GAME_REROLL_LIMIT));
  const [rerollsUsed, setRerollsUsed] = React.useState(0);
  // CPU opponents: 1 in Traditional, 3 in Tourney. Each gets its OWN hidden ±2% deck and
  // drafts/places independently (same logic as the single Traditional CPU). Never shown until end.
  const NCPU = numCpus || 1;
  const [cpuDecks] = React.useState(() => {
    const cum = (save.owned||[]).reduce((s,id)=>s+((getCollCard(id)||{}).overall||0),0);
    return Array.from({ length: NCPU }, () => genCpuDeck(cum));
  });
  const [cpus, setCpus] = React.useState(() => Array.from({ length: NCPU }, () => ({ board:{}, drafted:[], drawn:new Set(), rerolls:GAME_REROLL_LIMIT, last:null })));
  const [phase, setPhase] = React.useState('draw'); // draw | place | done
  const [view, setView] = React.useState(-1); // -1 = player board, 0..NCPU-1 = a CPU's board
  const [selectedPos, setSelectedPos] = React.useState(null);
  const [heldDisplaced, setHeldDisplaced] = React.useState(false); // holding a card swapped out of a slot
  const [detailCard, setDetailCard] = React.useState(null); // card whose stats popup is open
  const [showSettings, setShowSettings] = React.useState(false);
  const [showDeckView, setShowDeckView] = React.useState(false);
  const [confirmQuit, setConfirmQuit] = React.useState(false);

  // Each CPU draws fate from its OWN hidden deck each round (like the player), spending up to
  // 3 rerolls wisely on weak draws, then always re-fields its optimal LEGAL lineup. Their deck
  // strength tracks the player's so games stay competitive. Returns the advanced CPU array.
  function advanceCpus() {
    return cpus.map((c, i) => {
      const deck = cpuDecks[i];
      const undrawn = deck.filter(card => !c.drawn.has(card));
      if (!undrawn.length) return c;
      const overalls = deck.map(card => card.overall||0).slice().sort((a,b)=>a-b);
      const med = overalls[Math.floor(overalls.length/2)] || 0;
      const roundsLeftAfter = COLL_POS.length - c.drafted.length - 1;
      let rerolls = c.rerolls;
      let pick = undrawn[Math.floor(Math.random()*undrawn.length)];
      const considered = new Set([pick]);
      while (rerolls > 0 && (pick.overall||0) < med && (undrawn.length - considered.size) > roundsLeftAfter) {
        const others = undrawn.filter(card => !considered.has(card));
        if (!others.length) break;
        const cand = others[Math.floor(Math.random()*others.length)];
        considered.add(cand); rerolls--;
        if ((cand.overall||0) > (pick.overall||0)) pick = cand;
      }
      const drawn = new Set(c.drawn); drawn.add(pick);
      const drafted = [...c.drafted, pick];
      return { board: optimalAssign(drafted), drafted, drawn, rerolls, last: pick };
    });
  }

  // Assign a set of cards to positions to MAXIMISE total score (greedy seed + pairwise-swap
  // local search — optimal for boards this small). The CPU always fields this best lineup,
  // re-optimising (repositioning) every time it drafts a new card.
  function optimalAssign(cards) {
    // The three constrained slots (ruler/consort/heir) are chosen by exhaustive search —
    // each may be left empty if no legal card fits, and that slot simply scores 0 (the
    // natural "forfeit"). The remaining slots are filled greedily for max score. The CPU
    // therefore always fields the best LEGAL lineup it can from its drafted cards.
    const constrained = new Set(['ruler','consort','heir']);
    const freePids = COLL_POS.map(p => p.id).filter(p => !constrained.has(p));
    const scoreOf = a => COLL_POS.reduce((s, p) => s + (a[p.id]?.scores?.[p.id] || 0), 0);
    function fillFree(fixed, usedCards) {
      const a = { ...fixed };
      const rem = cards.filter(c => !usedCards.has(c));
      const pairs = [];
      rem.forEach(c => freePids.forEach(pid => pairs.push({ c, pid, s: c.scores?.[pid] || 0 })));
      pairs.sort((x, y) => y.s - x.s);
      const uc = new Set(), up = new Set();
      for (const pr of pairs) { if (uc.has(pr.c) || up.has(pr.pid)) continue; a[pr.pid] = pr.c; uc.add(pr.c); up.add(pr.pid); }
      return a;
    }
    const cand = [null, ...cards];
    let best = null, bestS = -1;
    for (const r of cand) for (const c of cand) for (const h of cand) {
      if ((r && c && r === c) || (r && h && r === h) || (c && h && c === h)) continue;
      const fixed = {}, used = new Set();
      if (r) { fixed.ruler = r; used.add(r); }
      if (c) { fixed.consort = c; used.add(c); }
      if (h) { fixed.heir = h; used.add(h); }
      if (!collBoardLegal(fixed)) continue;
      const a = fillFree(fixed, used);
      const s = scoreOf(a);
      if (s > bestS) { bestS = s; best = a; }
    }
    return best || {};
  }

  function drawFate() {
    const available = playerDeck.filter(c => !usedCardIds.has(c.id) && !Object.values(playerBoard).some(pc=>pc?.id===c.id));
    if (!available.length) { setPhase('done'); return; }
    let pool = available;
    // Anti-softlock: if every card on the board is the same gender and only the last slot or
    // two remain, force the draw toward an opposite-gender card (if the deck holds one) so a
    // legal Ruler/Consort pairing stays possible. If none remain, the slot can be forfeited.
    const placed = Object.values(playerBoard).filter(Boolean);
    if (placed.length && (COLL_POS.length - placed.length) <= 2) {
      const genders = new Set(placed.map(c => c.gender));
      if (genders.size === 1) {
        const opp = available.filter(c => c.gender !== [...genders][0]);
        if (opp.length) pool = opp;
      }
    }
    const card = pool[Math.floor(Math.random()*pool.length)];
    setDrawnCard(card);
    setHeldDisplaced(false);
    setPhase('place');
  }

  function doReroll() {
    if (rerollsLeft <= 0 || rerollsUsed >= GAME_REROLL_LIMIT) return;
    const available = playerDeck.filter(c => !usedCardIds.has(c.id) && c.id !== drawnCard?.id && !Object.values(playerBoard).some(pc=>pc?.id===c.id));
    if (!available.length) return;
    const card = available[Math.floor(Math.random()*available.length)];
    setDrawnCard(card);
    setRerollsLeft(r=>r-1);
    setRerollsUsed(r=>r+1);
  }

  // Forfeit the card in hand: don't place it, leaving a slot empty (it scores 0). Lets the
  // player decline a placement that would otherwise force an illegal board.
  function discardDrawn() {
    if (!drawnCard) return;
    setUsedCardIds(new Set([...usedCardIds, drawnCard.id]));
    setDrawnCard(null);
    setHeldDisplaced(false);
    setSelectedPos(null);
    setPhase('arrange');
  }

  function placeCard(posId) {
    if (!drawnCard) return;
    const occupant = playerBoard[posId];
    if (occupant) {
      // Placing onto an occupied slot SWAPS: the drawn card takes the slot and the displaced
      // card becomes the new card-in-hand to place elsewhere (no forced empty-slot placement).
      setPlayerBoard({ ...playerBoard, [posId]: drawnCard });
      setUsedCardIds(new Set([...usedCardIds, drawnCard.id]));
      setDrawnCard(occupant);
      setHeldDisplaced(true);
      setSelectedPos(null);
      return; // stay in 'place' phase, now holding the displaced card
    }
    setPlayerBoard({ ...playerBoard, [posId]: drawnCard });
    setUsedCardIds(new Set([...usedCardIds, drawnCard.id]));
    setDrawnCard(null);
    setHeldDisplaced(false);
    setSelectedPos(null);
    setPhase('arrange'); // let the player reposition, then confirm to pass the turn
  }

  // Reposition during the arrange step: tap a placed card to pick it up, then tap another
  // slot to move it (into an empty slot) or swap it (with the card already there).
  function handleReposition(posId) {
    if (phase !== 'arrange') return;
    if (selectedPos === null) { if (playerBoard[posId]) setSelectedPos(posId); return; }
    if (selectedPos === posId) { setSelectedPos(null); return; }
    const nb = { ...playerBoard };
    const moving = nb[selectedPos], target = nb[posId];
    nb[posId] = moving;
    if (target) nb[selectedPos] = target; else delete nb[selectedPos];
    setPlayerBoard(nb);
    setSelectedPos(null);
  }

  // End the player's turn: the CPU draws fate from its own hidden deck and re-fields its
  // optimal lineup, then play returns to the player (or finishes when the board is full).
  function confirmTurn() {
    if (phase !== 'arrange') return;
    if (!collBoardLegal(playerBoard)) return; // gender/age violation — must be fixed first
    setCpus(advanceCpus());
    setSelectedPos(null);
    if (Object.keys(playerBoard).length >= COLL_POS.length) setPhase('done');
    else setPhase('draw');
  }

  function calcScore(board) {
    // No cap: elite cards can score above 10 in a position, so a strong board
    // total can legitimately exceed 100. Displays handle the larger numbers.
    return Math.round(COLL_POS.reduce((sum, pos) => {
      const card = board[pos.id];
      return sum + (card?.scores?.[pos.id] || 0);
    }, 0) * 10) / 10;
  }

  const playerScore = calcScore(playerBoard);
  const cpuScores = cpus.map(c => calcScore(c.board));
  const topCpuScore = cpuScores.length ? Math.max(...cpuScores) : 0;
  const cpuScore = topCpuScore;               // back-compat alias (the toughest opponent)
  const showCpu = view >= 0;                  // derived from the board-view index
  const viewCpuBoard = (cpus[Math.max(0, view)] || {}).board || {};

  function handleFinish() {
    const isWin = playerScore > topCpuScore;  // Tourney: must outscore ALL opponents
    const margin = playerScore - cpuScore;
    // Gold breakdown — every line below is itemised on the scorecard.
    const baseGold = isWin ? (margin >= 10 ? 30 : margin >= 5 ? 15 : 10) : 5; // win-by-margin, else completion
    const baseLabel = isWin ? (margin >= 10 ? 'Decisive win' : margin >= 5 ? 'Solid win' : 'Win') : 'Completion';
    // Graduated score bonus — rewards how well your cards fit their positions
    // (a typical board is ~45-70; a perfect court hits 100).
    const scoreBonus = playerScore >= 100 ? 500 : playerScore >= 90 ? 150 : playerScore >= 80 ? 75 : playerScore >= 70 ? 40 : playerScore >= 60 ? 20 : 0;
    const goldEarned = baseGold + scoreBonus;
    // Tourney: each of the N CPUs matches the wager, so a win takes the whole pot (+N×wager);
    // a loss still costs only your own wager. Traditional (N=1) is unchanged (+wager / −wager).
    const wagerDelta = wager > 0 ? (isWin ? wager * NCPU : -wager) : 0;
    const pot = wager > 0 ? wager * (NCPU + 1) : 0;
    const netGold = goldEarned + wagerDelta;
    const finalGold = Math.max(0, (save.gold||0) + netGold);
    const goldBreakdown = { baseGold, baseLabel, scoreBonus, wager, wagerDelta, pot, goldEarned, netGold, startGold: (save.gold||0), finalGold };

    // Update stats
    const cardPlays = { ...(save.stats?.cardPlays||{}) };
    const cardScores = { ...(save.stats?.cardScores||{}) };
    Object.entries(playerBoard).forEach(([posId, card]) => {
      if (!card) return;
      cardPlays[card.id] = (cardPlays[card.id]||0) + 1;
      cardScores[card.id] = (cardScores[card.id]||0) + (card.scores?.[posId]||0);
    });
    const currentStreak = isWin ? (save.stats?.winStreak || 0) + 1 : 0;
    const maxWinStreak = Math.max(save.stats?.maxWinStreak || 0, currentStreak);
    const newSave = {
      ...save,
      gold: finalGold,
      rerolls: Math.max(0, (save.rerolls||0) - rerollsUsed),
      cardStats: collRecordCardStats(save.cardStats, playerBoard, isWin), // per-card placement record (#3)
      modeStats: collRecordMode(save.modeStats, NCPU>1?'tourney':'traditional', { win:isWin, score:playerScore }),
      stats: {
        ...(save.stats||{}),
        games: (save.stats?.games||0)+1,
        wins: (save.stats?.wins||0)+(isWin?1:0),
        totalScore: (save.stats?.totalScore||0)+playerScore,
        winStreak: currentStreak,
        maxWinStreak,
        cardPlays, cardScores,
      }
    };
    saveCollSave(newSave);
    onUpdate(newSave);
    const topIdx = cpuScores.indexOf(topCpuScore);
    const result = { isWin, playerScore, cpuScore, goldEarned, goldBreakdown, playerBoard,
      cpuBoard: (cpus[topIdx] || cpus[0] || {}).board || {}, cpuDeck: cpuDecks[topIdx] || cpuDecks[0] || [],
      cpuBoards: cpus.map(c => c.board), cpuScores, cpuDecks, numCpus: NCPU,
      wager, margin, rerollsUsed, wheelEarned: isWin && currentStreak > 0 && currentStreak % 5 === 0, winStreak: currentStreak };
    const collUnlocked = checkCollectorAchievements(newSave, result);
    collUnlocked.forEach(id => window.dispatchEvent(new CustomEvent('asoe-achievement', { detail: id })));
    onEnd(result);
  }

  // Quitting mid-game forfeits any Gold wagered on this game AND counts as a loss (it breaks
  // the win streak and adds a played game) — an early exit can't dodge a defeat.
  function handleQuit() {
    const s = save.stats || {};
    const newSave = { ...save,
      gold: wager > 0 ? Math.max(0, (save.gold||0) - wager) : (save.gold||0),
      modeStats: collRecordMode(save.modeStats, NCPU>1?'tourney':'traditional', { win:false, score:0 }),
      stats: { ...s, games: (s.games||0) + 1, winStreak: 0 } };
    saveCollSave(newSave);
    onUpdate(newSave);
    onEnd(null);
  }

  const filledPositions = Object.keys(playerBoard).length;
  const T = window.COLLECTOR_TIERS || {};

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)', position:'relative' }}>
      {confirmQuit && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.82)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ background:'#120d06', border:'1px solid rgba(255,215,0,0.35)', borderRadius:14, padding:'28px 24px', maxWidth:270, width:'85%', textAlign:'center', boxShadow:'0 8px 40px rgba(0,0,0,0.9)' }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.15rem', fontWeight:700, color:'#f0c84a', marginBottom:8 }}>Quit Game?</div>
            <div style={{ fontSize:'0.78rem', color:'var(--text2)', marginBottom:22, lineHeight:1.5 }}>{wager > 0 ? `All progress will be lost — and your ${wager}G wager forfeited.` : 'All progress will be lost.'}</div>
            <div style={{ display:'flex', gap:10 }}>
              <button className="btn btn-ghost" style={{ flex:1, fontSize:'0.8rem' }} onClick={() => setConfirmQuit(false)}>Keep Playing</button>
              <button style={{ flex:1, padding:'9px 4px', fontSize:'0.8rem', fontFamily:'Cinzel,serif', fontWeight:700, background:'#7a1010', color:'#fff', border:'1px solid #b01a1a', borderRadius:7, cursor:'pointer', letterSpacing:'0.06em' }} onClick={handleQuit}>QUIT</button>
            </div>
          </div>
        </div>
      )}
      {detailCard && (() => { const dc = detailCard; const ct = T[dc.tier]||{color:'#888'};
        return (
        <div onClick={()=>setDetailCard(null)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:350, display:'flex', alignItems:'center', justifyContent:'center', padding:20 }}>
          <div onClick={e=>e.stopPropagation()} className="card" style={{ maxWidth:340, width:'100%', borderColor:ct.color, maxHeight:'85%', overflowY:'auto' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
              <div>
                <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.95rem', color:ct.color, fontWeight:700 }}>{dc.name}</div>
                <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginTop:2 }}>{dc.identity||dc.name} · {dc.gender==='F'?'♀ Female':'♂ Male'} · Age {dc.age}</div>
              </div>
              <button onClick={()=>setDetailCard(null)} style={{ background:'none', border:'none', color:'var(--text2)', fontSize:'1.1rem', cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:6 }}>
              <CollTierBadge tier={dc.tier} />
              <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>Overall {dc.overall}</span>
              <span style={{ marginLeft:'auto', fontSize:'0.55rem', color:'var(--text2)' }}>{dc.houses?.[0]}</span>
            </div>
            {dc.desc && <div style={{ fontSize:'0.62rem', color:'var(--text2)', marginTop:8, lineHeight:1.5, fontStyle:'italic' }}>{dc.desc}</div>}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'2px 10px', marginTop:10, paddingTop:8, borderTop:'1px solid var(--border)' }}>
              {COLL_POS.map(p => { const sc = dc.scores?.[p.id]||0; return (
                <div key={p.id} style={{ display:'flex', justifyContent:'space-between', fontSize:'0.58rem' }}>
                  <span style={{ color:'var(--text2)', fontFamily:'Cinzel,serif' }}>{p.label}</span>
                  <span style={{ color: sc>=9?'#ffd700':sc>=7?ct.color:'var(--text)', fontWeight:700 }}>{Math.round(sc*10)/10}</span>
                </div>
              ); })}
            </div>
          </div>
        </div>
        );
      })()}
      {showSettings && (
        <div onClick={()=>setShowSettings(false)} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.82)', zIndex:360, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
          <div onClick={e=>e.stopPropagation()} className="card" style={{ maxWidth:300, width:'100%', borderColor:'var(--gold)' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.9rem', color:'var(--gold)' }}>⚙ Settings</div>
              <button onClick={()=>setShowSettings(false)} style={{ background:'none', border:'none', color:'var(--text2)', fontSize:'1.1rem', cursor:'pointer', lineHeight:1 }}>✕</button>
            </div>
            <div style={{ fontSize:'0.6rem', color:'var(--text2)', fontFamily:'Cinzel,serif', letterSpacing:'0.1em', marginBottom:8 }}>MUSIC VOLUME</div>
            <VolumeBar />
            <div style={{ fontSize:'0.55rem', color:'var(--text2)', marginTop:14, fontStyle:'italic', lineHeight:1.5 }}>Collector Mode always plays its own theme.</div>
          </div>
        </div>
      )}
      {/* Header */}
      <div className="nav-bar">
        <div className="nav-side">
          <button onClick={() => setConfirmQuit(true)} style={{ width:30, height:30, borderRadius:'50%', background:'#8b1212', border:'2px solid #c0282a', color:'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1rem', fontWeight:900, padding:0, lineHeight:1 }}>✕</button>
        </div>
        <div style={{ flex:1, textAlign:'center' }}>
          <div className="nav-title">COLLECTOR MODE</div>
          <div style={{ fontSize:'0.6rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>
            {filledPositions}/{COLL_POS.length} PLACED · {rerollsLeft} REROLL{rerollsLeft!==1?'S':''} LEFT
          </div>
        </div>
        <div className="nav-side" style={{ justifyContent:'flex-end', display:'flex', gap:6, width:'auto', alignItems:'center' }}>
          <button onClick={() => setShowDeckView(true)} title="View your deck" style={{ width:30, height:30, borderRadius:'50%', background:'var(--bg3)', border:'1px solid var(--border2)', color:'var(--gold)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1rem', padding:0, lineHeight:1 }}>🃏</button>
          <button onClick={() => setShowSettings(true)} title="Settings" style={{ width:30, height:30, borderRadius:'50%', background:'var(--bg3)', border:'1px solid var(--border2)', color:'var(--gold)', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.05rem', padding:0, lineHeight:1 }}>⚙</button>
        </div>
      </div>
      {showDeckView && <CollectorDeckViewer cards={playerDeck} title="Your Deck" onClose={() => setShowDeckView(false)} />}

      {/* Score display */}
      {NCPU === 1 ? (
        <div style={{ display:'flex', background:'var(--bg2)', borderBottom:'1px solid var(--border)', padding:'6px 12px', gap:12, alignItems:'center' }}>
          <div style={{ flex:1, textAlign:'center' }}>
            <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>YOUR SCORE</div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:'var(--gold)', fontWeight:700 }}>{playerScore}</div>
          </div>
          <div style={{ fontSize:'0.65rem', color:'var(--text2)' }}>vs</div>
          <div style={{ flex:1, textAlign:'center' }}>
            <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>CPU SCORE</div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:'#e05555', fontWeight:700 }}>{cpuScore}</div>
          </div>
          {wager > 0 && <div style={{ fontSize:'0.6rem', color:'var(--gold)' }}>🎲 {wager}G</div>}
        </div>
      ) : (() => {
        // Live leaderboard: all 4 courts sorted by current score, highest on the far left.
        const ranked = [{ label:'YOU', score:playerScore, me:true }]
          .concat(cpuScores.map((s,i) => ({ label:`CPU ${i+1}`, score:s, me:false })))
          .sort((a,b) => b.score - a.score);
        return (
        <div style={{ display:'flex', background:'var(--bg2)', borderBottom:'1px solid var(--border)', padding:'6px 10px', gap:8, alignItems:'center' }}>
          {ranked.map((p, i) => (
            <div key={p.label} style={{ flex:1, textAlign:'center', background: p.me?'rgba(212,168,48,0.14)':'transparent', borderRadius:4, padding:'2px 0' }}>
              <div style={{ fontSize:'0.5rem', color: p.me?'var(--gold)':'var(--text2)', fontFamily:'Cinzel,serif' }}>{p.label}</div>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.05rem', color: p.me?(i===0?'#4caf50':'var(--gold)'):'#e05555', fontWeight:700 }}>{p.score}</div>
            </div>
          ))}
          {wager > 0 && <div style={{ fontSize:'0.52rem', color:'var(--gold)', whiteSpace:'nowrap' }}>🎲 {wager*(NCPU+1)}G pot</div>}
        </div>
        );
      })()}

      {/* Board view toggle — your board and each CPU's, like the other modes */}
      <div style={{ display:'flex', gap:6, padding:'6px 12px', background:'var(--bg2)', borderBottom:'1px solid var(--border)' }}>
        <button className={`btn btn-${view<0?'gold':'ghost'} btn-sm`} style={{ flex:1, fontSize: NCPU>1?'0.55rem':'0.62rem' }} onClick={()=>setView(-1)}>{NCPU>1?`My (${playerScore})`:`My Board (${playerScore})`}</button>
        {cpus.map((c,i)=>(
          <button key={i} className={`btn btn-${view===i?'gold':'ghost'} btn-sm`} style={{ flex:1, fontSize: NCPU>1?'0.55rem':'0.62rem' }} onClick={()=>setView(i)}>{NCPU>1?`CPU ${i+1} (${cpuScores[i]})`:`CPU Board (${cpuScores[i]})`}</button>
        ))}
      </div>

      {/* Board */}
      <div className="scroll" style={{ flex:1, padding:'10px 12px' }}>
        {!showCpu ? (
          <>
            {/* Drawn card */}
            {phase === 'draw' && (
              <div style={{ textAlign:'center', padding:'14px 0' }}>
                {cpus.some(c=>c.last) && (
                  <div style={{ fontSize:'0.62rem', color:'var(--text2)', marginBottom:10, lineHeight:1.6 }}>
                    {cpus.map((c,i) => c.last ? (
                      <div key={i}>🤖 {NCPU>1?`CPU ${i+1} `:'CPU '}drafted <span style={{ color:(T[c.last.tier]||{}).color||'#e05555', fontWeight:700 }}>{c.last.name}</span><span style={{ color:'var(--text2)' }}> ({(T[c.last.tier]||{}).label})</span></div>
                    ) : null)}
                  </div>
                )}
                <button className="btn btn-gold" style={{ width:'100%', padding:'14px', fontSize:'0.85rem', letterSpacing:'0.1em' }} onClick={drawFate}>
                  🃏 DRAW FATE
                </button>
                {filledPositions > 0 && filledPositions === COLL_POS.length && (
                  <button className="btn btn-gold" style={{ width:'100%', marginTop:8 }} onClick={handleFinish}>Finish Game</button>
                )}
              </div>
            )}
            {phase === 'place' && drawnCard && (
              <div className="card" style={{ marginBottom:10, borderColor:(T[drawnCard.tier]||{}).color||'var(--gold)' }}>
                <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginBottom:6 }}>{heldDisplaced ? '✋ HOLDING — place this card:' : 'FATE DREW:'}</div>
                <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.8rem', color:(T[drawnCard.tier]||{}).color||'var(--gold)', fontWeight:700 }}>{drawnCard.name}</div>
                    <div style={{ fontSize:'0.6rem', color:'var(--text2)' }}>{drawnCard.houses?.[0]} · Overall: {drawnCard.overall}</div>
                    <CollTierBadge tier={drawnCard.tier} />
                  </div>
                  {rerollsLeft > 0 && rerollsUsed < GAME_REROLL_LIMIT && !heldDisplaced && (
                    <button className="btn btn-ghost btn-sm" style={{ fontSize:'0.6rem' }} onClick={doReroll}>
                      🎲 Reroll ({rerollsLeft})
                    </button>
                  )}
                </div>
                {/* Character score profile — highest open position highlighted */}
                {(() => {
                  const bestOpen = COLL_POS.filter(p => !playerBoard[p.id])
                    .sort((a,b)=>(drawnCard.scores?.[b.id]||0)-(drawnCard.scores?.[a.id]||0))[0];
                  return (
                    <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:'2px 10px', marginTop:8, paddingTop:8, borderTop:'1px solid var(--border)' }}>
                      {COLL_POS.map(p => {
                        const sc = drawnCard.scores?.[p.id] || 0;
                        const isBest = bestOpen && bestOpen.id === p.id;
                        return (
                          <div key={p.id} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:'0.55rem',
                            background:isBest?'rgba(212,168,48,0.14)':'transparent', borderRadius:3, padding:'1px 4px' }}>
                            <span style={{ color:isBest?'var(--gold)':'var(--text2)', fontFamily:'Cinzel,serif' }}>{p.label}</span>
                            <span style={{ color: sc>=9?'#ffd700':sc>=7?(T[drawnCard.tier]||{}).color:'var(--text)', fontWeight:700 }}>{Math.round(sc*10)/10}</span>
                          </div>
                        );
                      })}
                    </div>
                  );
                })()}
                <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginTop:8, fontStyle:'italic' }}>
                  Tap an empty slot to place — or an occupied slot to swap. (Best fit highlighted.)
                </div>
                {!canPlaceDrawnLegally(playerBoard, drawnCard) && (
                  <button className="btn btn-ghost btn-sm" style={{ width:'100%', marginTop:8, fontSize:'0.58rem', color:'#c98a3a', borderColor:'#c98a3a' }} onClick={discardDrawn}>
                    🗑 No legal position for this card — forfeit it (that slot scores 0)
                  </button>
                )}
              </div>
            )}
            {/* Position grid */}
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
              {COLL_POS.map(pos => {
                const placed = playerBoard[pos.id];
                const canPlace = phase === 'place' && !!drawnCard; // empty slot = place, occupied = swap
                const canArrange = phase === 'arrange';
                const isSelected = canArrange && selectedPos === pos.id;
                const clickable = canPlace || canArrange;
                const onClickSlot = canPlace ? () => placeCard(pos.id) : canArrange ? () => handleReposition(pos.id) : undefined;
                const score = placed ? (placed.scores?.[pos.id]||0) : null;
                const ct = placed ? (T[placed.tier]||{color:'#888'}) : null;
                const borderColor = isSelected ? '#fff' : canPlace ? 'var(--gold)' : placed ? ct.color : 'var(--border)';
                return (
                  <div key={pos.id} onClick={onClickSlot}
                    style={{ border:`2px solid ${borderColor}`,
                      borderRadius:6, padding:'8px 10px', cursor:clickable?'pointer':'default',
                      background: isSelected ? 'rgba(255,255,255,0.14)' : canPlace ? 'rgba(212,168,48,0.08)' : placed ? ct.bg : 'var(--bg2)',
                      boxShadow: isSelected ? '0 0 8px rgba(255,255,255,0.4)' : 'none',
                      transition:'all 0.15s' }}>
                    <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:2 }}>{pos.label}</div>
                    {placed ? (
                      <>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:4 }}>
                          <span style={{ fontSize:'0.65rem', color:ct.color, fontWeight:700 }}>{placed.name}</span>
                          <button onClick={(e)=>{ e.stopPropagation(); setDetailCard(placed); }} title="View card" style={{ background:'none', border:'none', color:'var(--text2)', fontSize:'0.72rem', cursor:'pointer', padding:0, lineHeight:1, flexShrink:0 }}>ⓘ</button>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:2 }}>
                          <CollTierBadge tier={placed.tier} />
                          <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>{Math.floor(score*10)/10}</span>
                        </div>
                      </>
                    ) : canPlace ? (
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline' }}>
                        <span style={{ fontSize:'0.6rem', color:'var(--gold)', fontStyle:'italic' }}>← Place</span>
                        <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, fontSize:'0.95rem',
                          color: (drawnCard.scores?.[pos.id]||0)>=9?'#ffd700':(drawnCard.scores?.[pos.id]||0)>=7?'var(--gold)':'var(--text2)' }}>
                          {Math.floor((drawnCard.scores?.[pos.id]||0)*10)/10}
                        </span>
                      </div>
                    ) : (
                      <div style={{ fontSize:'0.65rem', color: (canArrange && selectedPos) ? 'var(--gold)' : 'var(--text2)', fontStyle:'italic' }}>{(canArrange && selectedPos) ? '↳ move here' : '— Empty —'}</div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        ) : (
          /* CPU Board */
          <div>
            <div style={{ fontSize:'0.65rem', color:'var(--text2)', marginBottom:10 }}>
              {NCPU>1?`CPU ${view+1}`:'CPU'} Board · {Object.keys(viewCpuBoard).length}/{COLL_POS.length} drafted · {NCPU>1?'Each CPU drafts its own court':'The CPU drafts its own court each round'} and always fields its optimal lineup.
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
              {COLL_POS.map(pos => {
                const card = viewCpuBoard[pos.id];
                const ct = card ? (T[card.tier]||{color:'#888',bg:'#111'}) : null;
                const score = card ? (card.scores?.[pos.id]||0) : null;
                return (
                  <div key={pos.id} style={{ border:`2px solid ${card?ct.color:'var(--border)'}`, borderRadius:6, padding:'8px 10px', background: card?ct.bg:'var(--bg2)' }}>
                    <div style={{ fontSize:'0.55rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:2 }}>{pos.label}</div>
                    {card ? (
                      <>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:4 }}>
                          <span style={{ fontSize:'0.65rem', color:ct.color, fontWeight:700 }}>{card.name}</span>
                          <button onClick={(e)=>{ e.stopPropagation(); setDetailCard(card); }} title="View card" style={{ background:'none', border:'none', color:'var(--text2)', fontSize:'0.72rem', cursor:'pointer', padding:0, lineHeight:1, flexShrink:0 }}>ⓘ</button>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:2 }}>
                          <CollTierBadge tier={card.tier} />
                          <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>{Math.floor(score*10)/10}</span>
                        </div>
                      </>
                    ) : (
                      <div style={{ fontSize:'0.65rem', color:'var(--text2)', fontStyle:'italic' }}>— Empty —</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Bottom action */}
      {phase === 'arrange' && !showCpu && (() => {
        const cErrs = collConstraintErrors(playerBoard);
        const fixHint = cErrs.length ? collFixHint(playerBoard) : '';
        return (
        <div style={{ padding:'10px 12px', borderTop:'1px solid var(--border)', background:'var(--bg2)' }}>
          {cErrs.length > 0 && (
            <div style={{ fontSize:'0.6rem', color:'#e05555', textAlign:'center', marginBottom:6, padding:'6px 8px', background:'rgba(224,85,85,0.1)', borderRadius:6, border:'1px solid rgba(224,85,85,0.35)', lineHeight:1.45 }}>
              ⚠ {fixHint || cErrs[0]}
            </div>
          )}
          <div style={{ fontSize:'0.58rem', color:'var(--text2)', textAlign:'center', marginBottom:6, fontStyle:'italic' }}>
            {selectedPos ? 'Tap another slot to move/swap — or tap the same card to cancel.' : 'Tap any placed card to reposition it, then confirm your lineup.'}
          </div>
          <button className="btn btn-gold" style={{ width:'100%', padding:'13px', fontSize:'0.85rem', letterSpacing:'0.08em', opacity: cErrs.length?0.45:1, cursor: cErrs.length?'not-allowed':'pointer' }} onClick={confirmTurn} disabled={cErrs.length>0}>
            ✓ CONFIRM LINEUP — END TURN
          </button>
        </div>
        );
      })()}
      {phase === 'done' && (
        <div style={{ padding:'10px 12px', borderTop:'1px solid var(--border)', background:'var(--bg2)' }}>
          <button className="btn btn-gold" style={{ width:'100%', padding:'14px', fontSize:'0.9rem' }} onClick={handleFinish}>
            ⚔ Finish & See Results
          </button>
        </div>
      )}
    </div>
  );
}

// ─── Game Result Screen ───────────────────────────────────────────────────────

function CollectorGameResult({ result, save, onWinPull, onHome }) {
  const { isWin, playerScore, cpuScore, goldEarned, margin, wager } = result;
  const T = window.COLLECTOR_TIERS || {};
  const [boardView, setBoardView] = React.useState('mine'); // mine | cpu
  const shownBoard = boardView === 'mine' ? (result.playerBoard||{}) : (result.cpuBoard||{});
  const [revealDeck, setRevealDeck] = React.useState(false);
  const [deckPage, setDeckPage] = React.useState(0);
  const gb = result.goldBreakdown;
  const cpuDeck = result.cpuDeck || [];
  const DECK_PAGE = 12;
  const deckPages = Math.max(1, Math.ceil(cpuDeck.length / DECK_PAGE));
  // Tourney placement: rank, how many CPUs the player outplaced (their boards feed the Win Pull),
  // and the 4 courts sorted high→low for the scorecard. Win Pull is offered for any non-last finish.
  const isTourney = result.numCpus > 1 && Array.isArray(result.cpuScores);
  const cpuScoresArr = result.cpuScores || [cpuScore];
  const beatenCount = cpuScoresArr.filter(s => s < playerScore).length;
  const placeRank = 1 + cpuScoresArr.filter(s => s > playerScore).length;
  const canWinPull = beatenCount > 0;
  const ordinal = n => n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : n + 'th';
  const rankedAll = [{ label:'YOU', score:playerScore, me:true }]
    .concat(cpuScoresArr.map((s,i) => ({ label:`CPU ${i+1}`, score:s, me:false })))
    .sort((a,b) => b.score - a.score);

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      <div className="nav-bar">
        <div className="nav-title">COLLECTOR · RESULTS</div>
      </div>
      <div className="scroll" style={{ flex:1, padding:16 }}>
        <div className="card" style={{ textAlign:'center', borderColor: isWin?'var(--gold)':'#e05555', marginBottom:12 }}>
          <div style={{ fontSize:'2rem', marginBottom:8 }}>{isTourney ? (placeRank===1 ? '⚔ 1ST PLACE! ⚔' : `${ordinal(placeRank)} of ${cpuScoresArr.length+1}`) : (isWin ? '⚔ VICTORY! ⚔' : '💀 DEFEAT')}</div>
          {isTourney ? (
            <>
              <div style={{ fontSize:'0.6rem', color:'var(--text2)', marginBottom:6 }}>{placeRank===1 ? 'You took 1st of 4 courts!' : beatenCount>0 ? `You outplaced ${beatenCount} of ${cpuScoresArr.length} rival courts.` : 'The rival courts all outscored you.'}</div>
              <div style={{ display:'flex', justifyContent:'center', gap:14, marginBottom:12, flexWrap:'wrap' }}>
                {rankedAll.map((p,i)=>(
                  <div key={p.label}><div style={{ fontFamily:'Cinzel,serif', fontSize:'1.7rem', color: p.me?(i===0?'#4caf50':'var(--gold)'):'#e05555' }}>{p.score}</div><div style={{ fontSize:'0.55rem', color: p.me?'var(--gold)':'var(--text2)' }}>{p.label}</div></div>
                ))}
              </div>
            </>
          ) : (
            <div style={{ display:'flex', justifyContent:'center', gap:40, marginBottom:12 }}>
              <div>
                <div style={{ fontFamily:'Cinzel,serif', fontSize:'2rem', color:'var(--gold)' }}>{playerScore}</div>
                <div style={{ fontSize:'0.6rem', color:'var(--text2)' }}>YOUR SCORE</div>
              </div>
              <div>
                <div style={{ fontFamily:'Cinzel,serif', fontSize:'2rem', color:'#e05555' }}>{cpuScore}</div>
                <div style={{ fontSize:'0.6rem', color:'var(--text2)' }}>CPU SCORE</div>
              </div>
            </div>
          )}
          {gb ? (
            <div style={{ maxWidth:268, margin:'0 auto', fontSize:'0.62rem' }}>
              <div style={{ display:'flex', justifyContent:'space-between', color:'var(--text2)', marginBottom:2 }}><span>{gb.baseLabel}</span><span style={{ color:'var(--gold)' }}>+{gb.baseGold}G</span></div>
              {gb.scoreBonus > 0 && <div style={{ display:'flex', justifyContent:'space-between', color:'var(--text2)', marginBottom:2 }}><span>Court bonus (score {playerScore})</span><span style={{ color:'var(--gold)' }}>+{gb.scoreBonus}G</span></div>}
              {gb.wager > 0 && <div style={{ display:'flex', justifyContent:'space-between', marginBottom:2 }}><span style={{ color:'var(--text2)' }}>{result.numCpus > 1 ? (isWin ? `Pot won (${gb.pot}G)` : 'Wager lost') : `Wager ${isWin ? 'won' : 'lost'}`}</span><span style={{ color: isWin ? '#4caf50' : '#e05555' }}>{gb.wagerDelta >= 0 ? '+' : ''}{gb.wagerDelta}G</span></div>}
              <div style={{ display:'flex', justifyContent:'space-between', borderTop:'1px solid var(--border)', marginTop:4, paddingTop:4, fontFamily:'Cinzel,serif' }}><span style={{ color:'var(--text)' }}>Net this game</span><span style={{ color: gb.netGold >= 0 ? 'var(--gold)' : '#e05555', fontWeight:700 }}>{gb.netGold >= 0 ? '+' : ''}{gb.netGold}G</span></div>
              <div style={{ display:'flex', justifyContent:'space-between', color:'var(--text2)', fontSize:'0.56rem', marginTop:3 }}><span>Gold</span><span>🪙 {gb.startGold} → {gb.finalGold}</span></div>
            </div>
          ) : (
            <>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)', marginBottom:4 }}>+{goldEarned} Gold earned</div>
              {wager > 0 && <div style={{ fontSize:'0.7rem', color: isWin?'#4caf50':'#e05555' }}>{isWin ? `+${wager}G wager won!` : `-${wager}G wager lost`}</div>}
            </>
          )}
        </div>

        <div className="card" style={{ marginBottom:12 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8 }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.65rem', color:'var(--gold)' }}>HEAD-TO-HEAD</div>
            <div style={{ marginLeft:'auto', fontSize:'0.5rem', color:'var(--text2)' }}>YOU vs CPU</div>
          </div>
          {COLL_POS.map(pos => {
            const pCard = result.playerBoard?.[pos.id];
            const cCard = result.cpuBoard?.[pos.id];
            const pSc = pCard ? Math.floor((pCard.scores?.[pos.id]||0)*10)/10 : 0;
            const cSc = cCard ? Math.floor((cCard.scores?.[pos.id]||0)*10)/10 : 0;
            return (
              <div key={pos.id} style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4, fontSize:'0.62rem' }}>
                <div style={{ width:96, fontSize:'0.52rem', color:'var(--text2)', fontFamily:'Cinzel,serif', lineHeight:1.15 }}>{pos.label}</div>
                <div style={{ flex:1, color:(T[pCard?.tier]||{}).color||'var(--text2)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{pCard?.name||'—'}</div>
                <div style={{ fontFamily:'Cinzel,serif', width:34, textAlign:'right', color: pSc>cSc?'#4caf50':pSc<cSc?'var(--text2)':'var(--text)' }}>{pSc}</div>
                <div style={{ width:16, textAlign:'center', fontWeight:900, color: pSc>cSc?'#4caf50':pSc<cSc?'#e05555':'var(--text2)' }}>{pSc>cSc?'◄':pSc<cSc?'►':'='}</div>
                <div style={{ fontFamily:'Cinzel,serif', width:34, textAlign:'right', color: cSc>pSc?'#e05555':'var(--text2)' }}>{cSc}</div>
              </div>
            );
          })}
        </div>

        {/* Full board view with toggle (like other game modes) */}
        <div className="card" style={{ marginBottom:12 }}>
          <div style={{ display:'flex', gap:6, marginBottom:10 }}>
            <button className={`btn btn-${boardView==='mine'?'gold':'ghost'} btn-sm`} style={{ flex:1, fontSize:'0.62rem' }} onClick={()=>setBoardView('mine')}>My Board ({playerScore})</button>
            <button className={`btn btn-${boardView==='cpu'?'gold':'ghost'} btn-sm`} style={{ flex:1, fontSize:'0.62rem' }} onClick={()=>setBoardView('cpu')}>CPU Board ({cpuScore})</button>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
            {COLL_POS.map(pos => {
              const card = shownBoard[pos.id];
              const ct = card ? (T[card.tier]||{color:'#888',bg:'#111'}) : null;
              const sc = card ? Math.floor((card.scores?.[pos.id]||0)*10)/10 : null;
              return (
                <div key={pos.id} style={{ border:`2px solid ${card?ct.color:'var(--border)'}`, borderRadius:6, padding:'7px 9px', background: card?ct.bg:'var(--bg2)' }}>
                  <div style={{ fontSize:'0.52rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:2, lineHeight:1.15 }}>{pos.label}</div>
                  {card ? (
                    <>
                      <div style={{ fontSize:'0.62rem', color:ct.color, fontWeight:700, lineHeight:1.2 }}>{card.name}</div>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:3 }}>
                        <CollTierBadge tier={card.tier} />
                        <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>{sc}</span>
                      </div>
                    </>
                  ) : (
                    <div style={{ fontSize:'0.62rem', color:'var(--text2)', fontStyle:'italic' }}>— Empty —</div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Reveal opponent deck — every card the CPU brought, drawn or not (paginated) */}
        {cpuDeck.length > 0 && (
          <div className="card" style={{ marginBottom:12 }}>
            <button className="btn btn-ghost btn-sm" style={{ width:'100%', fontSize:'0.62rem' }} onClick={()=>setRevealDeck(v=>!v)}>
              {revealDeck ? '▲ Hide Opponent Deck' : `👁 Reveal Opponent Deck (${cpuDeck.length} cards)`}
            </button>
            {revealDeck && (
              <div style={{ marginTop:10 }}>
                <div style={{ fontSize:'0.55rem', color:'var(--text2)', marginBottom:8, fontStyle:'italic' }}>Every card the CPU brought this game — drawn or not.</div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
                  {cpuDeck.slice(deckPage*DECK_PAGE, deckPage*DECK_PAGE+DECK_PAGE).map((card,i) => { const ct=T[card.tier]||{color:'#888',bg:'#111'}; return (
                    <div key={i} style={{ border:`1px solid ${ct.color}`, borderRadius:6, padding:'6px 8px', background:ct.bg }}>
                      <div style={{ fontSize:'0.6rem', color:ct.color, fontWeight:700, lineHeight:1.2 }}>{card.name}</div>
                      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:3 }}>
                        <CollTierBadge tier={card.tier} />
                        <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color, fontSize:'0.7rem' }}>{card.overall}</span>
                      </div>
                    </div>
                  ); })}
                </div>
                {deckPages > 1 && (
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:12, marginTop:10 }}>
                    <button className="btn btn-ghost btn-sm" style={{ fontSize:'0.6rem' }} disabled={deckPage===0} onClick={()=>setDeckPage(p=>Math.max(0,p-1))}>‹ Prev</button>
                    <span style={{ fontSize:'0.58rem', color:'var(--text2)' }}>Page {deckPage+1} / {deckPages}</span>
                    <button className="btn btn-ghost btn-sm" style={{ fontSize:'0.6rem' }} disabled={deckPage>=deckPages-1} onClick={()=>setDeckPage(p=>Math.min(deckPages-1,p+1))}>Next ›</button>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        <div style={{ display:'flex', gap:8 }}>
          {canWinPull && <button className="btn btn-gold" style={{ flex:2 }} onClick={onWinPull}>⭐ Win Pull{isTourney ? ` (${beatenCount*10} cards)` : ''}</button>}
          <button className="btn btn-ghost" style={{ flex:1 }} onClick={onHome}>Back to Hub</button>
        </div>
      </div>
    </div>
  );
}

// ─── Spin the Wheel (5-win-streak reward) ───────────────────────────────────
// 30 cards: 5 of each of the 6 tiers, all distinct identities, interleaved so
// every tier is evenly spaced around the wheel (segment k -> tier k % 6).
function genWheelCards() {
  const all = getCollCards();
  const usedChars = new Set();
  const byTier = {};
  COLL_TIER_ORDER.forEach(t => {
    const pool = all.filter(c => c.tier === t);
    for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); const tmp=pool[i]; pool[i]=pool[j]; pool[j]=tmp; }
    const picked = [];
    for (const c of pool) { if (picked.length >= 5) break; if (!usedChars.has(c.charId)) { picked.push(c); usedChars.add(c.charId); } }
    byTier[t] = picked;
  });
  const wheel = [];
  for (let i = 0; i < 5; i++) for (const t of COLL_TIER_ORDER) if (byTier[t][i]) wheel.push(byTier[t][i]);
  return wheel;
}

// ─── House Wars: the two spinners ───────────────────────────────────────────
function CollectorHouseWarsSpin({ save, onDone, onCancel, onRolled, onBackout }) {
  const hw = save.hw || {};
  const eligible = React.useState(() => hwEligibleHouses(save.owned))[0];
  // Rotation: bench the recently-played house only when ≥2 houses are eligible.
  const userPool = (eligible.length >= 2 && hw.recentRun >= 3 && hw.recentHouse)
    ? eligible.filter(h => h !== hw.recentHouse) : eligible;
  const [result] = React.useState(() => ({
    user: userPool[Math.floor(Math.random()*userPool.length)],
    cpu: HW_HOUSES[Math.floor(Math.random()*HW_HOUSES.length)],
  }));
  const [userFace, setUserFace] = React.useState(HW_HOUSES[0]);
  const [cpuFace, setCpuFace] = React.useState(HW_HOUSES[0]);
  const [done, setDone] = React.useState(false);
  const [confirmBack, setConfirmBack] = React.useState(false);

  React.useEffect(() => {
    let delay = 55, elapsed = 0, t = null;
    function tick() {
      elapsed += delay;
      setUserFace(HW_HOUSES[Math.floor(Math.random()*HW_HOUSES.length)]);
      setCpuFace(HW_HOUSES[Math.floor(Math.random()*HW_HOUSES.length)]);
      if (elapsed >= 2700) {
        setUserFace(result.user); setCpuFace(result.cpu); setDone(true);
        if (onRolled) onRolled(result.user, result.cpu); // rolls finalized → commitment point
        return;
      }
      if (elapsed > 1900) delay += 40; // decelerate near the end
      t = setTimeout(tick, delay);
    }
    t = setTimeout(tick, delay);
    return () => { if (t) clearTimeout(t); };
  }, []);

  const reel = (label, face, color) => (
    <div style={{ flex:1, textAlign:'center' }}>
      <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.62rem', color:'var(--text2)', letterSpacing:'0.14em', marginBottom:8 }}>{label}</div>
      <div className="card" style={{ height:120, display:'flex', alignItems:'center', justifyContent:'center', borderColor:color, boxShadow: done?`0 0 22px ${color}`:'none', overflow:'hidden' }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.05rem', fontWeight:700, color, opacity: done?1:0.6, filter: done?'none':'blur(0.6px)', transition:'opacity .2s' }}>{face}</div>
      </div>
    </div>
  );

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:20, textAlign:'center', background:'var(--bg)' }}>
      {confirmBack && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:360, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }} onClick={()=>setConfirmBack(false)}>
          <div onClick={e=>e.stopPropagation()} className="card" style={{ maxWidth:320, width:'100%', borderColor:'#b01a1a', textAlign:'center' }}>
            <div style={{ fontFamily:'Cinzel,serif', color:'#e05555', fontSize:'0.95rem', marginBottom:8 }}>Forfeit the Battle?</div>
            <div style={{ fontSize:'0.72rem', color:'var(--text2)', marginBottom:14, lineHeight:1.5 }}>The houses are set. Backing out now forfeits a <b>random card from your deck</b>.</div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn btn-ghost btn-sm" style={{ flex:1 }} onClick={()=>setConfirmBack(false)}>Keep Playing</button>
              <button className="btn btn-sm" style={{ flex:1, background:'#7a1010', color:'#fff', border:'1px solid #b01a1a' }} onClick={onBackout}>Forfeit & Leave</button>
            </div>
          </div>
        </div>
      )}
      <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.25rem', color:'var(--gold)', fontWeight:700, letterSpacing:'0.08em' }}>⚔ HOUSE WARS ⚔</div>
      <div style={{ fontSize:'0.7rem', color:'var(--text2)', marginTop:4, marginBottom:22 }}>The spinners choose your battlefield…</div>
      <div style={{ display:'flex', gap:14, width:'100%', maxWidth:430, marginBottom:22 }}>
        {reel('YOU', userFace, 'var(--p1,#3aa0ff)')}
        {reel('CPU', cpuFace, 'var(--p2,#e05555)')}
      </div>
      {done ? (
        <button className="btn btn-gold" style={{ padding:'12px 36px', letterSpacing:'0.1em' }} onClick={() => onDone(result.user, result.cpu)}>
          Choose Your Lineup →
        </button>
      ) : (
        <div style={{ fontSize:'0.8rem', color:'var(--gold)', fontFamily:'Cinzel,serif' }}>Spinning…</div>
      )}
      <button className="btn btn-ghost btn-sm" style={{ marginTop:16, fontSize:'0.6rem' }} onClick={() => done ? setConfirmBack(true) : onCancel()}>← Back</button>
    </div>
  );
}

    setSelected(sel => sel.indexOf(i) !== -1 ? sel.filter(x => x !== i) : (sel.length >= 10 ? sel : [...sel, i]));

            <div style={{ display:'flex', gap:8 }}>
              <button className="btn btn-ghost btn-sm" style={{ flex:1 }} onClick={()=>setConfirmBack(false)}>Keep Playing</button>
              <button className="btn btn-sm" style={{ flex:1, background:'#7a1010', color:'#fff', border:'1px solid #b01a1a' }} onClick={onBackout}>Forfeit & Leave</button>

      </div>
      <div style={{ fontSize:'0.62rem', color:'var(--text2)', padding:'6px 12px' }}>Pick 10 of your {userHouse} cards. Fate will field 5 of them across Ruler · Hand · Kingsguard · Ally · Bank.</div>
      <div className="scroll" style={{ flex:1, padding:'4px 12px 10px' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))', gap:8 }}>

// ─── House Wars: the match (5 seats, 10-card fate deck, no rerolls) ──────────
function CollectorHouseWarsGame({ playerCards, cpuCards, userHouse, cpuHouse, onEnd }) {
  const [playerBoard, setPlayerBoard] = React.useState({});
  const [cpuBoard, setCpuBoard] = React.useState({});
  const [drawnCard, setDrawnCard] = React.useState(null);
  const [usedIds, setUsedIds] = React.useState(new Set());
  const [round, setRound] = React.useState(0);            // 0..4
  const [phase, setPhase] = React.useState('draw');        // draw | place | arrange | done
  const [cpuDrafted, setCpuDrafted] = React.useState([]);
  const [cpuUsed, setCpuUsed] = React.useState(new Set()); // indices into cpuCards
  const [showCpu, setShowCpu] = React.useState(false);
  const [selectedPos, setSelectedPos] = React.useState(null);
  const [detailCard, setDetailCard] = React.useState(null);
  const [confirmQuit, setConfirmQuit] = React.useState(false);
  const [showDeckView, setShowDeckView] = React.useState(false);
  const T = window.COLLECTOR_TIERS || {};

  const playerScore = hwScore(playerBoard);
  const cpuScore = hwScore(cpuBoard);

  function drawFate() {
    if (phase !== 'draw') return;
    const onBoard = new Set(Object.values(playerBoard).filter(Boolean).map(c => c.id));
    const available = playerCards.filter(c => !usedIds.has(c.id) && !onBoard.has(c.id));
    if (!available.length) { setPhase('done'); return; }
    setDrawnCard(available[Math.floor(Math.random()*available.length)]);
    setPhase('place');
  }

  function placeCard(posId) {
    if (!drawnCard) return;
    const occupant = playerBoard[posId];
    if (occupant) { // swap: drawn takes the seat, occupant becomes the held card
      setPlayerBoard({ ...playerBoard, [posId]: drawnCard });
      setUsedIds(new Set([...usedIds, drawnCard.id]));
      setDrawnCard(occupant);
      return; // still 'place', now holding the displaced card
    }
    setPlayerBoard({ ...playerBoard, [posId]: drawnCard });
    setUsedIds(new Set([...usedIds, drawnCard.id]));
    setDrawnCard(null);
    setPhase('arrange');
  }

  function handleReposition(posId) {
    if (phase !== 'arrange') return;
    if (selectedPos === null) { if (playerBoard[posId]) setSelectedPos(posId); return; }
    if (selectedPos === posId) { setSelectedPos(null); return; }
    const nb = { ...playerBoard }, moving = nb[selectedPos], target = nb[posId];
    nb[posId] = moving; if (target) nb[selectedPos] = target; else delete nb[selectedPos];
    setPlayerBoard(nb); setSelectedPos(null);
  }

  function cpuTurn() {
    const avail = cpuCards.map((c,i)=>({c,i})).filter(x => !cpuUsed.has(x.i));
    if (!avail.length) return;
    const pick = avail[Math.floor(Math.random()*avail.length)];
    const drafted = [...cpuDrafted, pick.c];
    setCpuUsed(new Set([...cpuUsed, pick.i]));
    setCpuDrafted(drafted);
    setCpuBoard(hwOptimalAssign(drafted));
  }

  function confirmTurn() {
    if (phase !== 'arrange') return;
    cpuTurn();
    if (round + 1 >= 5) { setPhase('done'); setTimeout(handleFinish, 0); return; }
    setRound(r => r + 1); setDrawnCard(null); setSelectedPos(null); setPhase('draw');
  }

  function handleFinish() {
    const pScore = hwScore(playerBoard), cScore = hwScore(cpuBoard);
    onEnd({ isWin: pScore > cScore, playerScore: pScore, cpuScore: cScore, margin: pScore - cScore,
            playerBoard, cpuBoard, cpuCards, userHouse, cpuHouse });
  }

  const board = showCpu ? cpuBoard : playerBoard;
  const drawnHint = drawnCard ? HW_POS.reduce((m,p) => Math.max(m, (drawnCard.scores&&drawnCard.scores[p.id])||0), 0) : 0;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', background:'var(--bg)' }}>
      {detailCard && <CollDetailModal card={detailCard} onClose={() => setDetailCard(null)} />}
      {confirmQuit && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.85)', zIndex:360, display:'flex', alignItems:'center', justifyContent:'center', padding:24 }} onClick={()=>setConfirmQuit(false)}>
          <div onClick={e=>e.stopPropagation()} className="card" style={{ maxWidth:320, width:'100%', borderColor:'#b01a1a', textAlign:'center' }}>
            <div style={{ fontFamily:'Cinzel,serif', color:'#e05555', fontSize:'0.95rem', marginBottom:8 }}>Quit House Wars?</div>
            <div style={{ fontSize:'0.72rem', color:'var(--text2)', marginBottom:14 }}>Quitting counts as a LOSS and you'll forfeit one random card from your 10-card lineup.</div>
            <div style={{ display:'flex', gap:8 }}>
              <button className="btn btn-ghost btn-sm" style={{ flex:1 }} onClick={()=>setConfirmQuit(false)}>Keep Playing</button>
              <button className="btn btn-sm" style={{ flex:1, background:'#7a1010', color:'#fff', border:'1px solid #b01a1a' }} onClick={()=>onEnd({ quit:true })}>QUIT</button>
            </div>
          </div>
        </div>
      )}
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', padding:'8px 12px', background:'var(--bg2)', borderBottom:'1px solid var(--border)' }}>
        <button onClick={()=>setConfirmQuit(true)} title="Quit" style={{ width:30, height:30, borderRadius:'50%', background:'#7a1010', border:'1px solid #b01a1a', color:'#fff', cursor:'pointer', fontWeight:900, flexShrink:0 }}>✕</button>
        <div style={{ flex:1, textAlign:'center' }}>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)' }}>⚔ HOUSE WARS · Turn {Math.min(round+1,5)}/5</div>
          <div style={{ fontSize:'0.55rem', color:'var(--text2)' }}><span style={{color:'var(--p1,#3aa0ff)'}}>{userHouse}</span> vs <span style={{color:'var(--p2,#e05555)'}}>{cpuHouse}</span></div>
        </div>
        <button onClick={()=>setShowDeckView(true)} title="View your lineup" style={{ width:30, height:30, borderRadius:'50%', background:'var(--bg3)', border:'1px solid var(--border2)', color:'var(--gold)', cursor:'pointer', fontSize:'1rem', flexShrink:0, lineHeight:1 }}>🃏</button>
      </div>
      {showDeckView && <CollectorDeckViewer cards={playerCards} title="Your Lineup" positions={HW_POS} onClose={()=>setShowDeckView(false)} />}
      {/* Score / board toggle */}
      <div style={{ display:'flex', borderBottom:'1px solid var(--border)' }}>
        <button onClick={()=>setShowCpu(false)} style={{ flex:1, padding:'7px', border:'none', cursor:'pointer', background: !showCpu?'rgba(58,160,255,0.15)':'var(--bg2)', color:!showCpu?'var(--p1,#3aa0ff)':'var(--text2)', fontFamily:'Cinzel,serif', fontSize:'0.7rem', fontWeight:700 }}>My Court ({Math.round(playerScore*10)/10})</button>
        <button onClick={()=>setShowCpu(true)} style={{ flex:1, padding:'7px', border:'none', cursor:'pointer', background: showCpu?'rgba(224,85,85,0.15)':'var(--bg2)', color:showCpu?'var(--p2,#e05555)':'var(--text2)', fontFamily:'Cinzel,serif', fontSize:'0.7rem', fontWeight:700 }}>CPU Court ({Math.round(cpuScore*10)/10})</button>
      </div>
      {/* Seats */}
      <div className="scroll" style={{ flex:1, padding:'10px 12px' }}>
        {HW_POS.map(p => {
          const card = board[p.id];
          const isSel = selectedPos === p.id;
          const canPlaceHere = !showCpu && phase === 'place' && !!drawnCard;
          const canRepos = !showCpu && phase === 'arrange';
          const hintScore = (!showCpu && phase==='place' && drawnCard) ? ((drawnCard.scores&&drawnCard.scores[p.id])||0) : null;
          const ct = card ? (T[card.tier]||{color:'#888'}) : null;
          return (
            <div key={p.id} onClick={() => { if (canPlaceHere) placeCard(p.id); else if (canRepos) handleReposition(p.id); }}
              className="card" style={{ marginBottom:7, padding:'8px 10px', borderColor: isSel?'var(--gold)':(hintScore!==null && hintScore===drawnHint && drawnHint>0)?'var(--gold)':(card?ct.color:'var(--border)'),
                cursor:(canPlaceHere||canRepos)?'pointer':'default', display:'flex', alignItems:'center', gap:10, opacity: card?1:0.85 }}>
              <div style={{ width:78, flexShrink:0, fontFamily:'Cinzel,serif', fontSize:'0.62rem', color:'var(--text2)', letterSpacing:'0.04em' }}>{p.label}</div>
              {card ? (
                <>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.74rem', color:ct.color, fontWeight:700, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{card.name}</div>
                    <div style={{ marginTop:2 }}><CollTierBadge tier={card.tier} /></div>
                  </div>
                  <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color, fontSize:'0.95rem' }}>{Math.round(((card.scores&&card.scores[p.id])||0)*10)/10}</span>
                  <button onClick={(e)=>{ e.stopPropagation(); setDetailCard(card); }} style={{ background:'none', border:'none', color:'var(--text2)', fontSize:'0.72rem', cursor:'pointer', padding:0, flexShrink:0 }}>ⓘ</button>
                </>
              ) : (
                <div style={{ flex:1, fontSize:'0.65rem', color:'var(--text2)', fontStyle:'italic' }}>
                  {hintScore!==null ? `— tap to place (scores ${Math.round(hintScore*10)/10}) —` : '— empty —'}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Action bar */}
      <div style={{ padding:'10px 12px', background:'var(--bg2)', borderTop:'1px solid var(--border)' }}>
        {phase === 'draw' && (
          <button className="btn btn-gold" style={{ width:'100%', padding:'13px', letterSpacing:'0.1em' }} onClick={drawFate}>🎴 DRAW FATE</button>
        )}
        {phase === 'place' && drawnCard && (() => { const ct = T[drawnCard.tier]||{color:'#888'}; return (
          <div>
            <div style={{ fontSize:'0.6rem', color:'var(--text2)', textAlign:'center', marginBottom:6 }}>Fate drew — tap a seat to place {showCpu?'(switch to My Court)':''}</div>
            <div className="card" style={{ borderColor:ct.color, padding:'8px 10px', display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ flex:1 }}><div style={{ fontFamily:'Cinzel,serif', fontSize:'0.8rem', color:ct.color, fontWeight:700 }}>{drawnCard.name}</div><div style={{ marginTop:3 }}><CollTierBadge tier={drawnCard.tier} /></div></div>
              <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:ct.color }}>{drawnCard.overall}</span>
              <button onClick={()=>setDetailCard(drawnCard)} style={{ background:'none', border:'none', color:'var(--text2)', fontSize:'0.72rem', cursor:'pointer' }}>ⓘ</button>
            </div>
          </div>
        ); })()}
        {phase === 'arrange' && (
          <button className="btn btn-gold" style={{ width:'100%', padding:'13px', letterSpacing:'0.1em' }} onClick={confirmTurn}>✓ END TURN</button>
        )}
      </div>
    </div>
  );
}
