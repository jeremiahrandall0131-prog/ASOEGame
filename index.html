                <>
                  <div style={{ fontSize: '0.52rem', color: SLOT_COLORS[i], fontFamily: 'Cinzel,serif', fontWeight: 700, lineHeight: 1.2, wordBreak: 'break-word' }}>{s.name.length > 18 ? s.name.slice(0,16)+'…' : s.name}</div>
                  <button onClick={e => { e.stopPropagation(); clearSlot(i); }} style={{ position: 'absolute', top: 1, right: 2, background: 'none', border: 'none', color: 'var(--text2)', cursor: 'pointer', fontSize: '0.6rem', lineHeight: 1, padding: 0 }}>✕</button>
                </>
              ) : (
                <div style={{ fontSize: '0.58rem', color: activeSlot === i ? SLOT_COLORS[i] : 'var(--text2)', fontFamily: 'Cinzel,serif' }}>+ Slot {i+1}</div>
              )}
            </button>
          ))}
        </div>
      </div>

      {/* Body: side-by-side picker + comparison table */}
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>

        {/* Comparison table (top half when chars selected) */}
        {filled.length > 0 && (
          <div style={{ flexShrink: 0, overflowX: 'auto', borderBottom: '1px solid var(--border)', padding: '0 12px 8px' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.62rem' }}>
              <thead>
                <tr>
                  <th style={{ textAlign: 'left', color: 'var(--text2)', fontFamily: 'Cinzel,serif', fontWeight: 400, padding: '4px 4px', fontSize: '0.55rem', width: 70 }}>POSITION</th>
                  {slots.map((s, i) => s && (
                    <th key={i} style={{ textAlign: 'center', color: SLOT_COLORS[i], fontFamily: 'Cinzel,serif', fontWeight: 700, padding: '4px 2px', fontSize: '0.55rem', minWidth: 42 }}>
                      {s.name.length > 12 ? s.name.slice(0,11)+'…' : s.name}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {SCORE_KEYS.map(k => (
                  <tr key={k} style={{ borderTop: '1px solid rgba(255,255,255,0.05)' }}>
                    <td style={{ color: 'var(--text2)', fontFamily: 'Cinzel,serif', padding: '3px 4px', fontSize: '0.55rem' }}>{SCORE_NAMES[k]}</td>
                    {slots.map((s, i) => {
                      if (!s) return null;
                      const v = s.isDragon ? null : (dynastyMode ? getDynScore(s, k) : (s.scores?.[k] ?? null));
                      const best = filled.filter(x => !x.isDragon).reduce((m, x) => Math.max(m, (dynastyMode ? getDynScore(x,k) : x.scores?.[k]) ?? -1), -1);
                      const isBest = v !== null && v === best && filled.filter(x => !x.isDragon).length > 1;
                      return (
                        <td key={i} style={{ textAlign: 'center', padding: '3px 2px', fontFamily: 'Cinzel,serif', fontWeight: 700, color: v !== null ? scoreColor(v) : 'var(--text2)', background: isBest ? 'rgba(255,215,0,0.08)' : 'transparent' }}>
                          {v !== null ? v : '—'}
                        </td>
                      );
                    })}
                  </tr>
                ))}
                {dynastyMode && (
                  <tr style={{ borderTop: '1px solid rgba(255,215,0,0.2)' }}>
                    <td style={{ color: '#f0c84a', fontFamily: 'Cinzel,serif', padding: '3px 4px', fontSize: '0.55rem' }}>Dragonrider</td>
                    {slots.map((s, i) => {
                      if (!s) return null;
                      const v = s.isDragon ? (s.power ?? null) : (s.DR ?? null);
                      return <td key={i} style={{ textAlign: 'center', padding: '3px 2px', fontFamily: 'Cinzel,serif', fontWeight: 700, color: v != null ? scoreColor(v) : 'var(--text2)' }}>{v != null ? v : '—'}</td>;
                    })}
                  </tr>
                )}
                <tr style={{ borderTop: '2px solid var(--border)' }}>
                  <td style={{ color: 'var(--text2)', fontFamily: 'Cinzel,serif', padding: '4px 4px', fontSize: '0.55rem', fontWeight: 700 }}>TOTAL</td>
                  {slots.map((s, i) => {
                    if (!s) return null;
                    const calcTot = x => x.isDragon ? (x.power ?? 0) : (dynastyMode ? SCORE_KEYS.reduce((a,k) => a + (getDynScore(x,k)||0), 0) + (x.DR??0) : SCORE_KEYS.reduce((a,k) => a + (x.scores?.[k]||0), 0));
                    const tot = calcTot(s);
                    const bestTot = filled.reduce((m, x) => Math.max(m, calcTot(x)), -1);
                    return <td key={i} style={{ textAlign: 'center', padding: '4px 2px', fontFamily: 'Cinzel,serif', fontWeight: 700, color: SLOT_COLORS[i], background: tot === bestTot && filled.length > 1 ? 'rgba(255,215,0,0.08)' : 'transparent' }}>{(Math.floor(tot*10)/10).toFixed(1)}</td>;
                  })}
                </tr>
              </tbody>
            </table>
            {/* Notes row */}
            {filled.some(s => s.notes) && (
              <div style={{ display: 'flex', gap: 4, marginTop: 6 }}>
                {slots.map((s, i) => s && s.notes ? (
                  <div key={i} style={{ flex: 1, fontSize: '0.55rem', color: 'var(--text2)', fontStyle: 'italic', borderLeft: `2px solid ${SLOT_COLORS[i]}`, paddingLeft: 5, lineHeight: 1.4 }}>{s.notes}</div>
                ) : s ? <div key={i} style={{ flex: 1 }} /> : null)}
              </div>
            )}
          </div>
        )}

        {/* Picker: filters + character list for active slot */}
        <div style={{ flex: 1, overflow: 'auto', padding: '8px 12px' }}>
          <div style={{ fontSize: '0.6rem', color: SLOT_COLORS[activeSlot], fontFamily: 'Cinzel,serif', marginBottom: 6 }}>
            SELECTING FOR SLOT {activeSlot + 1}{slots[activeSlot] ? ` · currently: ${slots[activeSlot].name}` : ''}
          </div>
          <CharIndexFilters {...f} compact />
          <div style={{ fontSize: '0.62rem', color: 'var(--text2)', marginBottom: 6 }}>{f.filtered.length} characters</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {f.filtered.map(c => {
              const isSelected = slots.some(s => s?.id === c.id);
              const slotIdx = slots.findIndex(s => s?.id === c.id);
              return (
                <button key={c.id} onClick={() => pickChar(c)}
                  style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '7px 10px', borderRadius: 6, border: `1px solid ${isSelected ? SLOT_COLORS[slotIdx] : 'var(--border)'}`, background: isSelected ? 'rgba(0,0,0,0.4)' : 'var(--bg3)', cursor: 'pointer', textAlign: 'left' }}>
                  <div style={{ width: 24, height: 24, borderRadius: '50%', background: 'var(--bg2)', border: '1px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem', flexShrink: 0 }}>
                    {c.isDragon ? '🐉' : (c.gender === 'M' ? '♂' : '♀')}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: '0.75rem', fontWeight: 700, color: isSelected ? SLOT_COLORS[slotIdx] : 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.name}</div>
                    <div style={{ fontSize: '0.58rem', color: 'var(--text2)' }}>{c.isDragon ? 'Dragon' : `${c.houses.join(' · ')} · Age ${window.getEffectiveAge(c)}`}</div>
                  </div>
                  {isSelected && <div style={{ fontSize: '0.55rem', color: SLOT_COLORS[slotIdx], fontFamily: 'Cinzel,serif', flexShrink: 0 }}>S{slotIdx+1}</div>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── CharacterIndex main ──────────────────────────────────────────────────────
function CharacterIndexScreen({ onBack, embedded }) {
  const [sortMode, setSortMode] = useState('alpha');
  const [sortPosition, setSortPosition] = useState('R');
  const [expanded, setExpanded] = useState(new Set());
  const [dynastyMode, setDynastyMode] = useState(false);
  const [showComparison, setShowComparison] = useState(false);
  const [page, setPage] = useState(0);
  const PAGE_SIZE = 20;
  const f = useCharIndexFilter(dynastyMode);
  React.useEffect(() => { setPage(0); }, [f.filterHouse, f.filterGender, sortMode, sortPosition, dynastyMode]);

  const SCORE_KEYS  = CHAR_INDEX_SCORE_KEYS;
  const SCORE_NAMES = CHAR_INDEX_SCORE_NAMES;

  const DYNASTY_SCORE_KEYS_SET = new Set(['Hs','GM','MoC','MoL','MoS','MoW']);
  const getDynScore = (c, key) => {
    if (key === 'DR') return c.DR ?? null;
    if (key === 'Dragon') return c.isDragon ? (c.power ?? null) : null;
    if (key === 'Knight' || key === 'Squire') return c.isDragon ? null : (c.scores?.KG ?? null);
    if (key === 'Warden') return c.isDragon ? null : getSlotScore({ character: c, scoreKey: 'Warden' });
    if (DYNASTY_SCORE_KEYS_SET.has(key)) return getSlotScore({ character: c, scoreKey: key });
    return c.scores?.[key] ?? null;
  };

  const totalScore = c => {
    if (c.isDragon) return dynastyMode ? (c.power || 0) : 0;
    if (dynastyMode) {
      return SCORE_KEYS.reduce((s, k) => s + (getDynScore(c, k) || 0), 0) + (c.DR ?? 0);
    }
    return SCORE_KEYS.reduce((s, k) => s + (c.scores[k] || 0), 0);
  };

  // Dynasty sort options covering all 50 positions by their scoring category
  const DYNASTY_SORT_OPTS = [
    { k: 'R',      label: 'Ruler'                          },
    { k: 'Con',    label: 'Consort'                        },
    { k: 'Hr',     label: 'Heir'                           },
    { k: 'Hs',     label: 'House'                          },
    { k: 'H',      label: 'Hand'                           },
    { k: 'GM',     label: 'Grand Maester'                   },
    { k: 'MoC',    label: 'Master of Coin'                 },
    { k: 'MoL',    label: 'Master of Laws'                 },
    { k: 'MoS',    label: 'Master of Ships'                },
    { k: 'MoW',    label: 'Master of Whisperers'           },
    { k: 'AC',     label: 'Army Commander'                  },
    { k: 'Warden', label: 'Warden'                         },
    { k: 'KGC',    label: 'Kingsguard Commander'                   },
    { k: 'KG',     label: 'Kingsguard'                     },
    { k: 'Knight', label: 'Knight'                         },
    { k: 'Squire', label: 'Squire'                         },
    { k: 'DR',     label: 'Dragonrider'                    },
    { k: 'Dragon', label: 'Dragon'                         },
    { k: 'Ally',   label: 'Ally'                           },
    { k: 'Bank',   label: 'Bank'                           },
  ];
  const dynSortKeys   = DYNASTY_SORT_OPTS.map(o => o.k);
  const dynSortNames  = Object.fromEntries(DYNASTY_SORT_OPTS.map(o => [o.k, o.label]));
  const activeSortKeys  = dynastyMode ? dynSortKeys  : SCORE_KEYS;
  const activeSortNames = dynastyMode ? dynSortNames : SCORE_NAMES;

  const getPositionScore = (c, key) => dynastyMode ? getDynScore(c, key) : (c.scores?.[key] ?? null);

  function toggleExpanded(id) {
    setExpanded(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }

  const filtered = [...f.filtered].sort((a, b) => {
    if (sortMode === 'total') {
      const diff = totalScore(b) - totalScore(a);
      return diff !== 0 ? diff : a.name.localeCompare(b.name);
    }
    if (sortMode === 'position') {
      const sa = getPositionScore(a, sortPosition) ?? -1;
      const sb = getPositionScore(b, sortPosition) ?? -1;
      return sb !== sa ? sb - sa : a.name.localeCompare(b.name);
    }
    return a.name.localeCompare(b.name);
  });
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const safePage = Math.min(page, Math.max(0, totalPages - 1));
  const pageChars = filtered.slice(safePage * PAGE_SIZE, (safePage + 1) * PAGE_SIZE);

  if (showComparison) return <CharacterComparisonScreen onBack={() => setShowComparison(false)} dynastyMode={dynastyMode} />;

  return (
    <div className="app">
      <div className="scroll" style={{ flex: 1, padding: '12px' }}>
        {!embedded && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
            <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.1rem', color: 'var(--gold)', fontWeight: 700 }}>CHARACTER INDEX</div>
          </div>
        )}

        {/* Top action row: Dynasty toggle + Comparison */}
        <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
          <button
            onClick={() => { setDynastyMode(d => !d); f.setFilterHouse('All'); setSortPosition('R'); }}
            style={{ flex: 1, padding: '7px', fontFamily: 'Cinzel,serif', fontSize: '0.68rem', letterSpacing: '0.06em', background: dynastyMode ? 'linear-gradient(135deg,#1a1000,#2a1a00)' : 'var(--bg3)', border: `1px solid ${dynastyMode ? '#8a6000' : 'var(--border)'}`, color: dynastyMode ? '#f0c84a' : 'var(--text2)', borderRadius: 6, cursor: 'pointer' }}
          >
            {dynastyMode ? '👑 DYNASTY — ON' : '👑 DYNASTY — OFF'}
          </button>
          <button
            onClick={() => setShowComparison(true)}
            style={{ padding: '7px 14px', fontFamily: 'Cinzel,serif', fontSize: '0.68rem', letterSpacing: '0.06em', background: 'var(--bg3)', border: '1px solid var(--border)', color: 'var(--gold)', borderRadius: 6, cursor: 'pointer', whiteSpace: 'nowrap' }}
          >
            ⚖ Compare
          </button>
        </div>

        <CharIndexFilters {...f} />

        <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
          <select value={sortMode} onChange={e => setSortMode(e.target.value)}
            style={{ flex: 1, padding: '6px', background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text)', fontSize: '0.78rem' }}>
            <option value="alpha">Sort: A–Z</option>
            <option value="total">Sort: Overall Rating</option>
            <option value="position">Sort: By Position</option>
          </select>
          {sortMode === 'position' && (
            <select value={sortPosition} onChange={e => setSortPosition(e.target.value)}
              style={{ flex: 1, padding: '6px', background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text)', fontSize: '0.78rem' }}>
              {activeSortKeys.map(k => <option key={k} value={k}>{activeSortNames[k]}</option>)}
            </select>
          )}
        </div>

        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <div style={{ fontSize: '0.7rem', color: 'var(--text2)' }}>{filtered.length} characters{totalPages > 1 ? ` · Page ${safePage+1}/${totalPages}` : ''}</div>
          {expanded.size > 0 && (
            <button onClick={() => setExpanded(new Set())} style={{ fontSize: '0.6rem', color: 'var(--text2)', background: 'none', border: 'none', cursor: 'pointer', fontFamily: 'Cinzel,serif', padding: 0 }}>
              Collapse all ({expanded.size})
            </button>
          )}
        </div>

        {totalPages > 1 && (
          <div style={{ display: 'flex', gap: 6, marginBottom: 10, justifyContent: 'center' }}>
            <button className="btn btn-ghost btn-sm" disabled={safePage === 0} onClick={() => { setPage(0); setExpanded(new Set()); }}>«</button>
            <button className="btn btn-ghost btn-sm" disabled={safePage === 0} onClick={() => { setPage(p => p - 1); setExpanded(new Set()); }}>‹ Prev</button>
            <span style={{ fontSize: '0.72rem', color: 'var(--text2)', alignSelf: 'center', fontFamily: 'Cinzel,serif' }}>{safePage + 1} / {totalPages}</span>
            <button className="btn btn-ghost btn-sm" disabled={safePage >= totalPages - 1} onClick={() => { setPage(p => p + 1); setExpanded(new Set()); }}>Next ›</button>
            <button className="btn btn-ghost btn-sm" disabled={safePage >= totalPages - 1} onClick={() => { setPage(totalPages - 1); setExpanded(new Set()); }}>»</button>
          </div>
        )}

        {pageChars.map(c => {
          const isDragon = !!c.isDragon;
          const displayScore = totalScore(c);
          const isExpanded = expanded.has(c.id);
          return (
            <div key={c.id} className="card" style={{ marginBottom: 6, cursor: 'pointer' }} onClick={() => toggleExpanded(c.id)}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ width: 32, height: 32, borderRadius: '50%', background: 'var(--bg)', border: '2px solid var(--border)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1rem', flexShrink: 0 }}>
                  {isDragon ? '🐉' : (c.gender === 'M' ? '♂' : '♀')}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                    <div style={{ fontSize: '0.82rem', fontWeight: 700, color: 'var(--text)' }}>{c.name}</div>
                    {sortMode === 'total' && (
                      <div style={{ fontSize: '0.75rem', fontWeight: 700, fontFamily: 'Cinzel,serif', color: totalScoreColor(displayScore, isDragon ? 10 : (dynastyMode ? 112 : 100)) }}>
                        {isDragon ? `Power: ${(Math.floor(displayScore*10)/10).toFixed(1)}` : `Overall: ${(Math.floor(displayScore*10)/10).toFixed(1)}`}
                      </div>
                    )}
                    {sortMode === 'position' && (() => {
                      const sv = getPositionScore(c, sortPosition);
                      return sv != null ? <div style={{ fontSize: '0.75rem', fontWeight: 700, fontFamily: 'Cinzel,serif', color: scoreColor(sv) }}>{sv}</div> : null;
                    })()}
                  </div>
                  <div style={{ fontSize: '0.65rem', color: 'var(--text2)' }}>
                    {isDragon ? 'Dragon' : `${c.houses.join(' · ')} · Age ${window.getEffectiveAge(c)}`}
                  </div>
                </div>
                <div style={{ fontSize: '0.7rem', color: 'var(--text2)' }}>{isExpanded ? '▲' : '▼'}</div>
              </div>
              {isExpanded && (
                <div style={{ marginTop: 10, borderTop: '1px solid var(--border)', paddingTop: 10 }}>
                  {isDragon ? (
                    <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 8 }}>
                      <div style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: '0.55rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif', marginBottom: 2 }}>DRAGON POWER</div>
                        <div style={{ fontSize: '1.4rem', fontWeight: 700, color: scoreColor(c.power) }}>{c.power}</div>
                      </div>
                    </div>
                  ) : (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5,1fr)', gap: 6, marginBottom: 8 }}>
                      {activeSortKeys.filter(k => k !== 'Dragon').map(k => {
                        const isDynOnly = ['Hs','GM','MoC','MoL','MoS','MoW','Warden','Knight','Squire','DR'].includes(k);
                        const labelColor = isDynOnly ? '#f0c84a' : 'var(--text2)';
                        const sv = getPositionScore(c, k);
                        if (sv === null && isDynOnly && !dynastyMode) return null;
                        return (
                          <div key={k} style={{ textAlign: 'center' }}>
                            <div style={{ fontSize: '0.5rem', color: labelColor, fontFamily: 'Cinzel,serif', marginBottom: 2, lineHeight: 1.2 }}>{activeSortNames[k]}</div>
                            <div style={{ fontSize: '0.9rem', fontWeight: 700, color: sv != null ? scoreColor(sv) : 'var(--text2)' }}>{sv ?? '—'}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {c.notes && <div style={{ fontSize: '0.7rem', color: 'var(--text2)', fontStyle: 'italic' }}>{c.notes}</div>}
                </div>
              )}
            </div>
          );
        })}

        {totalPages > 1 && (
          <div style={{ display: 'flex', gap: 6, marginTop: 10, justifyContent: 'center' }}>
            <button className="btn btn-ghost btn-sm" disabled={safePage === 0} onClick={() => { setPage(0); setExpanded(new Set()); }}>«</button>
            <button className="btn btn-ghost btn-sm" disabled={safePage === 0} onClick={() => { setPage(p => p - 1); setExpanded(new Set()); }}>‹ Prev</button>
            <span style={{ fontSize: '0.72rem', color: 'var(--text2)', alignSelf: 'center', fontFamily: 'Cinzel,serif' }}>{safePage + 1} / {totalPages}</span>
            <button className="btn btn-ghost btn-sm" disabled={safePage >= totalPages - 1} onClick={() => { setPage(p => p + 1); setExpanded(new Set()); }}>Next ›</button>
            <button className="btn btn-ghost btn-sm" disabled={safePage >= totalPages - 1} onClick={() => { setPage(totalPages - 1); setExpanded(new Set()); }}>»</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Achievements ─────────────────────────────────────────────────────────────
function checkAchievements(gameData, allHistory, saveId) {
  const { modeKey, board, board2, isVersus, isCPU, numPlayers } = gameData;
  const chars = board.filter(s => s.character).map(s => s.character);
  const score = calcScore(board);
  const mode = GAME_MODES[modeKey];
  const chaosProgressVal = parseInt(localStorage.getItem(sk(saveId, 'chaosProgress')) || '0', 10) || 0;
  const pct = mode ? score / mode.maxScore : 0;
  // Count all P1 games (solo, CPU, multiplayer) toward thresholds
  const soloHistory = allHistory;
  const allGames = soloHistory.length;
  const isClassic = modeKey.startsWith('classic');
  const isEmpire = modeKey.startsWith('empire');
  const isDynasty = modeKey === 'dynasty';
  const dynastyScore = isDynasty ? board.reduce((sum, slot) => {
    if (!slot.character) return sum;
    if (slot.pairedWith) { const pair = board.find(s => s.positionId === slot.pairedWith); if (!pair?.character) return sum; }
    return sum + getSlotScore(slot);
  }, 0) : 0;

  function hasChar(id) { return chars.some(c => c.id === id); }
  function hasCharAny(ids) { return ids.some(id => chars.some(c => c.id === id)); }
  function allSameHouse(house) { return chars.length >= 5 && chars.every(c => c.houses.includes(house)); }
  function slotChar(posId) { return board.find(s => s.positionId === posId)?.character; }
  // dynasty: also check 'd-' prefixed slots, and classic slots for backwards compat
  function slotCharEither(posId) { return slotChar(posId) || slotChar('d-' + posId); }
  function slotScoreVal(posId) { const s = board.find(s => s.positionId === posId); return s ? getSlotScore(s) : 0; }
  function dynGroupScore(group) {
    return board.filter(s => s.group === group && s.character).reduce((sum, slot) => {
      if (slot.pairedWith) { const pair = board.find(s => s.positionId === slot.pairedWith); if (!pair?.character) return sum; }
      return sum + getSlotScore(slot);
    }, 0);
  }
  const jonIds = ['jon-snow-targ','jon-snow-stark','jon-snow-nw'];
  const hasJon = hasCharAny(jonIds);
  const jonSlotRuler = jonIds.includes(slotChar('ruler')?.id);
  const jonSlotHeir  = jonIds.includes(slotChar('heir')?.id);
  const allGamesInMode = (mk) => soloHistory.filter(g => g.modeKey === mk).length;
  const cpuGames = allHistory.filter(g => g.isCPU).length;
  const vsGames  = allHistory.filter(g => g.isVersus).length;
  const conqModes = (() => { const s = new Set(); for (const g of soloHistory) { const m = GAME_MODES[g.modeKey]; if (m && g.board && calcScore(g.board)/m.maxScore >= 0.94) s.add(g.modeKey); } return s; })();
  const filledBoard = board.filter(s => s.character);
  const empireAllHouse = (h) => isEmpire && filledBoard.length === 20 && filledBoard.every(s => s.character.houses.includes(h));

  const checks = {
    // Easy
    ach_first_game: true,
    ach_10_games: allGames >= 10,
    ach_25_games: allGames >= 25,
    ach_50_games: allGames >= 50,
    ach_75_games: allGames >= 75,
    ach_100_games: allGames >= 100,

    } else if (a.id.startsWith('ach_dyn_army_')) {
      const nm = _nm(a.id.slice('ach_dyn_army_'.length));
      checks[a.id] = isDynasty && ['d-army-cmd','d-kg-cmd'].some(pid => slotChar(pid)?.name === nm);
    }
  }

  const achKey = sk(saveId, 'achievements');
  const existing = JSON.parse(localStorage.getItem(achKey) || '{}');
  const newlyUnlocked = [];
  for (const [id, earned] of Object.entries(checks)) {
    if (earned && !existing[id]) {
      existing[id] = Date.now();
      newlyUnlocked.push(id);
    }
  }
  if (newlyUnlocked.length > 0) {
    localStorage.setItem(achKey, JSON.stringify(existing));
  }
  return newlyUnlocked;
}


// ─── Collector Achievement Checker ───────────────────────────────────────────
function checkCollectorAchievements(newSave, result) {
  const saveId = getActiveSaveId();
  if (!saveId) return [];
  const achKey = sk(saveId, 'achievements');
  const existing = JSON.parse(localStorage.getItem(achKey) || '{}');

  const stats = newSave.stats || {};
  const owned = newSave.owned || [];
  const ownedCards = owned.map(id => getCollCard(id)).filter(Boolean);
  const games  = stats.games  || 0;
  const wins   = stats.wins   || 0;
  const totalScore = stats.totalScore || 0;
  const gold   = newSave.gold || 0;
  const maxStreak = stats.maxWinStreak || 0;

  // Count cards by tier
  const tierCounts = { starter:0, uncommon:0, rare:0, hero:0, legendary:0, mythic:0 };
  ownedCards.forEach(c => { if (tierCounts[c.tier] !== undefined) tierCounts[c.tier]++; });
  const deckTier = deckTierLabel(owned);

  const { isWin, playerScore = 0, margin = 0, wager = 0, playerBoard = {}, rerollsUsed = 0 } = result || {};
  const boardCards = Object.values(playerBoard).filter(Boolean);
  const posScores = COLL_POS.map(pos => {
    const card = playerBoard[pos.id];
    return card ? Math.floor((card.scores?.[pos.id] || 0) * 10) / 10 : -1;
  });
  const filledScores = posScores.filter(s => s >= 0);
  const numTens = filledScores.filter(s => s >= 10).length;
  const allSevens = filledScores.length === COLL_POS.length && filledScores.every(s => s >= 7);

  // Check if board uses only starter/uncommon cards
  const starterOnly = boardCards.every(c => c.tier === 'starter' || c.tier === 'uncommon');

  // Check for 3+ same character (different variants) on the board
  const charCountMap = {};
  boardCards.forEach(c => { if (c.charId) charCountMap[c.charId] = (charCountMap[c.charId] || 0) + 1; });
  const hasTripleChar = Object.values(charCountMap).some(n => n >= 3);

  const checks = {
    ach_coll_first_game:    games >= 1,
    ach_coll_5_games:       games >= 5,
    ach_coll_10_games:      games >= 10,
    ach_coll_25_games:      games >= 25,
    ach_coll_50_games:      games >= 50,
    ach_coll_100_games:     games >= 100,
    ach_coll_first_win:     wins >= 1,
    ach_coll_5_wins:        wins >= 5,
    ach_coll_10_wins:       wins >= 10,
    ach_coll_25_wins:       wins >= 25,
    ach_coll_50_wins:       wins >= 50,
    ach_coll_score_50:      playerScore >= 50,
    ach_coll_score_60:      playerScore >= 60,
    ach_coll_score_70:      playerScore >= 70,
    ach_coll_score_80:      playerScore >= 80,
    ach_coll_score_90:      playerScore >= 90,
    ach_coll_perfect:       playerScore >= 100,
    ach_coll_win_5:         isWin && margin >= 5,
    ach_coll_win_10:        isWin && margin >= 10,
    ach_coll_win_20:        isWin && margin >= 20,
    ach_coll_win_30:        isWin && margin >= 30,
    ach_coll_streak_3:      maxStreak >= 3,
    ach_coll_streak_5:      maxStreak >= 5,
    ach_coll_streak_10:     maxStreak >= 10,
    ach_coll_wager_25:      isWin && wager >= 25,
    ach_coll_wager_50:      isWin && wager >= 50,
    ach_coll_wager_100:     isWin && wager >= 100,
    ach_coll_gold_100:      gold >= 100,
    ach_coll_gold_250:      gold >= 250,
    ach_coll_gold_500:      gold >= 500,
    ach_coll_gold_1000:     gold >= 1000,
    ach_coll_gold_2500:     gold >= 2500,
    ach_coll_gold_5000:     gold >= 5000,
    ach_coll_deck_30:       owned.length >= 30,
    ach_coll_deck_50:       owned.length >= 50,
    ach_coll_deck_100:      owned.length >= 100,
    ach_coll_deck_200:      owned.length >= 200,
    ach_coll_deck_500:      owned.length >= 500,
    ach_coll_deck_1000:     owned.length >= 1000,
    ach_coll_first_rare:    tierCounts.rare   >= 1,
    ach_coll_first_hero:    tierCounts.hero   >= 1,
    ach_coll_first_legend:  tierCounts.legendary >= 1,
    ach_coll_first_mythic:  tierCounts.mythic >= 1,
    ach_coll_5_uncommon:    tierCounts.uncommon >= 5,
    ach_coll_10_uncommon:   tierCounts.uncommon >= 10,
    ach_coll_25_uncommon:   tierCounts.uncommon >= 25,
    ach_coll_5_rare:        tierCounts.rare   >= 5,
    ach_coll_10_rare:       tierCounts.rare   >= 10,
    ach_coll_25_rare:       tierCounts.rare   >= 25,
    ach_coll_5_hero:        tierCounts.hero   >= 5,
    ach_coll_10_hero:       tierCounts.hero   >= 10,
    ach_coll_3_legend:      tierCounts.legendary >= 3,
    ach_coll_5_legend:      tierCounts.legendary >= 5,
    ach_coll_3_mythic:      tierCounts.mythic >= 3,
    ach_coll_tier_uncommon: ['uncommon','rare','hero','legendary','mythic'].includes(deckTier),
    ach_coll_tier_rare:     ['rare','hero','legendary','mythic'].includes(deckTier),
    ach_coll_tier_hero:     ['hero','legendary','mythic'].includes(deckTier),
    ach_coll_tier_legend:   ['legendary','mythic'].includes(deckTier),
    ach_coll_total_500:     totalScore >= 500,
    ach_coll_total_1000:    totalScore >= 1000,
    ach_coll_total_2500:    totalScore >= 2500,
    ach_coll_total_5000:    totalScore >= 5000,
    ach_coll_full_board:    filledScores.length >= COLL_POS.length,
    ach_coll_play_hero:     boardCards.some(c => c.tier === 'hero'),
    ach_coll_play_legend:   boardCards.some(c => c.tier === 'legendary'),
    ach_coll_play_mythic:   boardCards.some(c => c.tier === 'mythic'),
    ach_coll_win_mythic:    isWin && boardCards.some(c => c.tier === 'mythic'),
    ach_coll_10_pos:        numTens >= 1,
    ach_coll_5_tens:        numTens >= 5,
    ach_coll_sweep:         allSevens,
    ach_coll_no_reroll:     isWin && rerollsUsed === 0,
    ach_coll_starter_win:   isWin && starterOnly,
    ach_coll_all_same_char: hasTripleChar,
  };

  // ── Generated Collector milestones (every game mode) — must mirror the FAM
  //    table in achievements.js (same `ach_cm_<prefix>_<threshold>` id scheme). ──
  const godCount = ownedCards.filter(c => c.tier === 'god').length;
  const ms = newSave.modeStats || {};
  const _trad = ms.traditional || {}, _tour = ms.tourney || {}, _trial = ms.trial || {}, _got = ms.got || {}, _sk = ms.sevenK || {};
  const _hw = newSave.hw || {};
  const distinctChars  = new Set(ownedCards.map(c => c.charId)).size;
  const distinctHouses = new Set(ownedCards.flatMap(c => c.houses || [])).size;
  const totalPlacements = Object.values(newSave.cardStats || {}).reduce((s, r) => s + ((r && r.placements) || 0), 0);
  const allGames = (_trad.games||0)+(_tour.games||0)+(_hw.games||0)+(_got.games||0)+(_trial.games||0)+(_sk.games||0);
  const allWins  = (_trad.wins||0)+(_tour.wins||0)+(_hw.wins||0)+(_got.wins||0)+(_trial.wins||0);
  const CM_FAMILIES = [
    ['deck', owned.length, [25,40,60,80,100,125,150,200,250,300,400,500,750,1000,1500,2000]],
    ['gold', gold, [100,250,500,1000,2500,5000,7500,10000,15000,25000,50000,100000,250000,500000,750000,1000000]],
    ['unc', tierCounts.uncommon, [5,10,25,50,75,100]],
    ['rare', tierCounts.rare, [5,10,25,50,75]],
    ['hero', tierCounts.hero, [3,5,10,25,50]],
    ['leg', tierCounts.legendary, [1,3,5,10,25]],
    ['myth', tierCounts.mythic, [1,3,5,10,15,25]],
    ['god', godCount, [1,2,3,5]],
    ['tradg', _trad.games||0, [1,5,10,25,50,100,200,350,500,750,1000]],
    ['tradw', _trad.wins||0, [1,5,10,25,50,100,150,250,500]],
    ['trads', _trad.maxStreak||0, [3,5,10,15,20,25]],
    ['tourg', _tour.games||0, [1,5,10,25,50,100]],
    ['tourw', _tour.wins||0, [1,5,10,25,50]],
    ['tours', _tour.maxStreak||0, [3,5,10]],
    ['hwg', _hw.games||0, [1,5,10,25,50,100]],
    ['hww', _hw.wins||0, [1,5,10,25,50]],
    ['hws', _hw.maxStreak||0, [3,5,10]],
    ['gotp', _got.games||0, [1,5,10,25,50,100]],
    ['gotw', _got.wins||0, [1,5,10,25,50]],
    ['gotl', _got.losses||0, [1,5,10,25]],
    ['trialg', _trial.games||0, [1,5,10,25,50]],
    ['trialw', _trial.wins||0, [1,5,10,25]],
    ['trials', _trial.maxStreak||0, [3,5,10]],
    ['skg', _sk.games||0, [1,5,10,25,50]],
    ['skb', _sk.bingos||0, [1,5,10,25,50,100,250,500]],
    ['skbl', _sk.blackouts||0, [1,3,5,10]],
    ['skf', _sk.bestFilled||0, [10,15,20,22,24,25]],
    ['place', totalPlacements, [10,50,100,250,500,1000,2500,5000]],
    ['chars', distinctChars, [10,25,50,100,150,200,300,390]],
    ['houses', distinctHouses, [3,5,10,15,19]],
    ['allg', allGames, [10,25,50,100,250,500,1000,2000]],
    ['allw', allWins, [10,25,50,100,250,500]],
  ];
  CM_FAMILIES.forEach(([prefix, val, ths]) => ths.forEach(t => { checks[`ach_cm_${prefix}_${t}`] = (val || 0) >= t; }));

  const newlyUnlocked = [];
  for (const [id, earned] of Object.entries(checks)) {
    if (earned && !existing[id]) {
      existing[id] = Date.now();
      newlyUnlocked.push(id);
    }
  }
  if (newlyUnlocked.length > 0) localStorage.setItem(achKey, JSON.stringify(existing));
  return newlyUnlocked;
}

const HAND_CRAFTED_CATS = ['Easy','Medium','Hard','Uncommon','Rare','Epic','Legendary','Dynasty','Dynasty Consorts','Dynasty Council','Dynasty Army','Characters','Rulers','Hands','Heirs','Chaos Ladder','Collector'];
const CAT_ORDER = Object.fromEntries(HAND_CRAFTED_CATS.map((c, i) => [c, i]));
// Every achievement is viewable, paginated 20/page and filterable by category —
// including the per-character Rulers/Hands/Heirs/Characters/Dynasty achievements.
const DISPLAY_ACHIEVEMENTS = ACHIEVEMENTS;

const RARITY_SORT = { common: 0, uncommon: 1, rare: 2, epic: 3, legendary: 4 };
const DISPLAY_ACHIEVEMENTS_SORTED = [...DISPLAY_ACHIEVEMENTS].sort((a, b) => {
  const catA = CAT_ORDER[a.cat] ?? 99, catB = CAT_ORDER[b.cat] ?? 99;
  if (catA !== catB) return catA - catB;
  return (RARITY_SORT[a.rarity] ?? 0) - (RARITY_SORT[b.rarity] ?? 0);
});

function AchievementsScreen({ onBack, embedded, saveId }) {
  const unlocked = JSON.parse(localStorage.getItem(sk(saveId, 'achievements')) || '{}');
  const allUnlockedAchs = ACHIEVEMENTS.filter(a => !!unlocked[a.id]);
  const cats = [...new Set(DISPLAY_ACHIEVEMENTS_SORTED.map(a => a.cat))];
  const [activeCat, setActiveCat] = useState('All');
  const [showCompletedOnly, setShowCompletedOnly] = useState(false);
  const PAGE_SIZE = 20;
  const [page, setPage] = useState(0);
  const [search, setSearch] = useState('');

  // Special tabs: __unlocked__ shows earned, __locked__ shows unearned
  const isUnlockedTab = activeCat === '__unlocked__';
  const isLockedTab   = activeCat === '__locked__';
  const base = isUnlockedTab
    ? [...allUnlockedAchs].sort((a, b) => (unlocked[b.id] || 0) - (unlocked[a.id] || 0))
    : isLockedTab
      ? DISPLAY_ACHIEVEMENTS_SORTED.filter(a => !unlocked[a.id])
      : activeCat === 'All'
        ? DISPLAY_ACHIEVEMENTS_SORTED
        : DISPLAY_ACHIEVEMENTS_SORTED.filter(a => a.cat === activeCat);
  const filtered = (!isUnlockedTab && !isLockedTab && showCompletedOnly) ? base.filter(a => !!unlocked[a.id]) : base;
  // Character / text search — matches achievement name or description (the desc
  // contains the character name, e.g. "Place Jon Snow as Ruler").
  const q = search.trim().toLowerCase();
  const searched = q ? filtered.filter(a => a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q)) : filtered;

  const totalPages = Math.ceil(searched.length / PAGE_SIZE);
  const paginated = searched.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);

  const total = ACHIEVEMENTS.length;
  const earned = allUnlockedAchs.length; // only currently-valid achievements (ignore stale/removed ids)

  const rarityColor = { legendary: '#f0c44a', epic: '#a855f7', rare: '#3b82f6', uncommon: '#22c55e', common: 'var(--text2)' };

  function handleCat(c) { setActiveCat(c); setPage(0); }

  return (
    <div className="app">
      <div className="scroll" style={{ flex: 1, padding: '12px' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
          {!embedded && <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>}
          {!embedded && <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.1rem', color: 'var(--gold)', fontWeight: 700 }}>ACHIEVEMENTS</div>}
          <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
            {!isUnlockedTab && !isLockedTab && (
              <button
                onClick={() => { setShowCompletedOnly(v => !v); setPage(0); }}
                style={{ padding: '3px 8px', fontSize: '0.6rem', fontFamily: 'Cinzel,serif', background: showCompletedOnly ? 'var(--gold)' : 'var(--bg3)', color: showCompletedOnly ? '#000' : 'var(--text2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer', whiteSpace: 'nowrap' }}>
                {showCompletedOnly ? '✓ Completed' : 'Completed'}
              </button>
            )}
            <div style={{ fontSize: '0.7rem', color: 'var(--text2)' }}>{earned}/{total}</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 6, marginBottom: 10, alignItems: 'center' }}>
          <input value={search} onChange={e => { setSearch(e.target.value); setPage(0); }}
            placeholder="🔍 Search by character or achievement…"
            style={{ flex: 1, fontSize: '0.7rem', padding: '6px 10px', background: 'var(--bg2)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: 4, boxSizing: 'border-box' }} />
          {q && <span style={{ fontSize: '0.6rem', color: 'var(--text2)', whiteSpace: 'nowrap' }}>{searched.length} found</span>}
          {q && <button className="btn btn-ghost btn-sm" style={{ fontSize: '0.6rem' }} onClick={() => { setSearch(''); setPage(0); }}>Clear</button>}
        </div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap', marginBottom: 10 }}>
          {['All', ...cats].map(c => (
            <button key={c} onClick={() => handleCat(c)}
              style={{ padding: '3px 7px', fontSize: '0.58rem', fontFamily: 'Cinzel,serif', whiteSpace: 'nowrap', background: activeCat===c ? 'var(--gold)' : 'var(--bg3)', color: activeCat===c ? '#000' : 'var(--text2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }}>
              {c}
            </button>
          ))}
          <button onClick={() => handleCat('__unlocked__')}
            style={{ padding: '3px 7px', fontSize: '0.58rem', fontFamily: 'Cinzel,serif', whiteSpace: 'nowrap', background: isUnlockedTab ? '#22c55e' : 'var(--bg3)', color: isUnlockedTab ? '#000' : '#22c55e', border: '1px solid #22c55e', borderRadius: 4, cursor: 'pointer' }}>
            🏆 Unlocked ({earned})
          </button>
          <button onClick={() => handleCat('__locked__')}
            style={{ padding: '3px 7px', fontSize: '0.58rem', fontFamily: 'Cinzel,serif', whiteSpace: 'nowrap', background: isLockedTab ? '#64748b' : 'var(--bg3)', color: isLockedTab ? '#fff' : 'var(--text2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer' }}>
            🔒 Locked ({total - earned})
          </button>
        </div>
        {totalPages > 1 && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 10 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}>◀</button>
            <div style={{ fontSize: '0.65rem', color: 'var(--text2)' }}>{page+1}/{totalPages} ({filtered.length} total)</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page === totalPages-1}>▶</button>
          </div>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {paginated.map(a => {
            const isUnlocked = !!unlocked[a.id];
            return (
              <div key={a.id} className="card" style={{ opacity: isUnlocked ? 1 : 0.45, borderColor: isUnlocked ? rarityColor[a.rarity] : 'var(--border)' }}>
                <div style={{ fontSize: '1.5rem', marginBottom: 4 }}>{isUnlocked ? a.icon : '🔒'}</div>
                <div style={{ fontSize: '0.7rem', fontFamily: 'Cinzel,serif', fontWeight: 700, color: isUnlocked ? rarityColor[a.rarity] : 'var(--text2)', marginBottom: 2 }}>{a.name}</div>
                <div style={{ fontSize: '0.6rem', color: 'var(--text2)', lineHeight: 1.4 }}>{a.desc}</div>
                {isUnlocked && <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginTop: 4 }}>{new Date(unlocked[a.id]).toLocaleDateString()}</div>}
              </div>
            );
          })}
        </div>
        {totalPages > 1 && (
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginTop: 12 }}>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.max(0, p-1))} disabled={page === 0}>◀ Prev</button>
            <div style={{ flex: 1, textAlign: 'center', fontSize: '0.65rem', color: 'var(--text2)' }}>Page {page+1} of {totalPages}</div>
            <button className="btn btn-ghost btn-sm" onClick={() => setPage(p => Math.min(totalPages-1, p+1))} disabled={page === totalPages-1}>Next ▶</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MostPlayed ───────────────────────────────────────────────────────────────
function MostPlayedScreen({ onBack, embedded, initialModeFilter, saveId }) {
  const raw = localStorage.getItem(sk(saveId, 'history'));
  const allHistory = raw ? JSON.parse(raw) : [];
  const [charSort, setCharSort] = useState('count');
  const [houseSort, setHouseSort] = useState('count');
  const [modeFilter, setModeFilter] = useState(initialModeFilter || 'all');
  const [positionFilter, setPositionFilter] = useState('all');
  const [houseFilter, setHouseFilter] = useState('All');
  const [charPage, setCharPage] = useState(0);
  const [housePage, setHousePage] = useState(0);
  const STATS_PAGE = 20;

  const MODE_FILTER_TABS = [
    { key:'all',                label:'All Modes' },
    { key:'classic',            label:'Classic' },
    { key:'classic-hard',       label:'Classic (Hard)' },
    { key:'classic-random',     label:'Classic (Random)' },
    { key:'classic-hard-random',label:'Classic (Fate)' },
    { key:'empire',             label:'Empire' },
    { key:'empire-hard',        label:'Empire (Hard)' },
    { key:'empire-random',      label:'Empire (Random)' },
    { key:'empire-hard-random', label:'Empire (Fate)' },
    { key:'dynasty',            label:'Dynasty' },
  ];

  const POSITION_OPTS = [
    { key:'all', label:'All Positions' },
    { key:'R',   label:'Ruler' },
    { key:'H',   label:'Hand' },
    { key:'Hr',  label:'Heir' },
    { key:'Con', label:'Consort' },
    { key:'AC',  label:'Army Commander' },
    { key:'KG',  label:'Kingsguard' },
    { key:'KGC', label:'Kingsguard Commander' },
    { key:'SC',  label:'Small Council' },
    { key:'Ally',label:'Ally' },
    { key:'Bank',label:'Bank' },
  ];

  // P1-only solo games for stats
  const history = allHistory.filter(g => (g.numPlayers || 1) === 1 && !g.isVersus && !g.isCPU && (modeFilter === 'all' || g.modeKey === modeFilter));

  const charStats = {};
  const houseStats = {};

  // Seed all known houses with 0 so every house always appears
  for (const h of (window.HOUSES || [])) {
    houseStats[h.name] = { name: h.name, count: 0, points: 0, games: 0 };
  }

  for (const game of history) {
    const board = game.board || [];
    const seenHouses = new Set();
    for (const slot of board) {
      const c = slot.character;
      if (!c) continue;
      // Position filter
      if (positionFilter !== 'all' && slot.scoreKey !== positionFilter) continue;
      if (!charStats[c.id]) charStats[c.id] = { name: c.name, id: c.id, count: 0, points: 0, games: new Set() };
      charStats[c.id].count++;
      charStats[c.id].points += getSlotScore(slot);
      charStats[c.id].games.add(game.id || game.ts || Math.random());
      for (const h of (c.houses || [])) {
        if (!houseFilter || houseFilter === 'All' || h === houseFilter) {
          if (!houseStats[h]) houseStats[h] = { name: h, count: 0, points: 0, games: 0 };
          houseStats[h].count++;
          houseStats[h].points += getSlotScore(slot);
        }
      }
    }
  }

  // Convert games Set to count for PPG
  const charList = Object.values(charStats).map(c => ({
    ...c,
    gameCount: c.games instanceof Set ? c.games.size : 1,
    ppg: c.count > 0 ? (c.points / c.count) : 0,
  }));

  const sortFn = (key) => (a, b) => {
    if (key === 'count') return b.count - a.count || a.name.localeCompare(b.name);
    if (key === 'points') return b.points - a.points || a.name.localeCompare(b.name);
    if (key === 'ppg') return b.ppg - a.ppg || a.name.localeCompare(b.name);
    return a.name.localeCompare(b.name);
  };

  const houseSortFn = (key) => (a, b) =>
    key === 'count' ? (b.count - a.count || a.name.localeCompare(b.name))
                    : (b.points - a.points || a.name.localeCompare(b.name));

  const topChars  = charList.sort(sortFn(charSort));
  const topHouses = Object.values(houseStats).sort(houseSortFn(houseSort));

  const charTotalPages  = Math.ceil(topChars.length / STATS_PAGE);
  const houseTotalPages = Math.ceil(topHouses.length / STATS_PAGE);
  const pagedChars  = topChars.slice(charPage * STATS_PAGE, (charPage + 1) * STATS_PAGE);
  const pagedHouses = topHouses.slice(housePage * STATS_PAGE, (housePage + 1) * STATS_PAGE);

          </div>
        )}
        <div style={{ display:'flex', flexWrap:'wrap', gap:4, marginBottom:10 }}>
          {MODE_FILTER_TABS.map(t => (
            <button key={t.key} onClick={() => { setModeFilter(t.key); setCharPage(0); setHousePage(0); }}
              style={{ padding:'5px 10px', borderRadius:5, border:'1px solid',

                background: modeFilter === t.key ? 'var(--gold)' : 'var(--bg3)',
                color: modeFilter === t.key ? '#1a1a2e' : 'var(--text2)',
                fontFamily:'Cinzel,serif', fontSize:'0.63rem', cursor:'pointer',
                fontWeight: modeFilter === t.key ? 700 : 400, whiteSpace: 'nowrap' }}
            >{t.label}</button>
          ))}
        </div>
        <div style={{ display:'flex', gap:6, marginBottom:10 }}>
          <select value={positionFilter} onChange={e => { setPositionFilter(e.target.value); setCharPage(0); }} style={{ ...selectStyle, flex:1 }}>
            {POSITION_OPTS.map(o => <option key={o.key} value={o.key}>{o.label}</option>)}
          </select>
          <select value={houseFilter} onChange={e => { setHouseFilter(e.target.value); setCharPage(0); }} style={{ ...selectStyle, flex:1 }}>
            {allHouseNames.map(h => <option key={h} value={h}>{h}</option>)}
          </select>
        </div>
        <div style={{ fontSize:'0.62rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:10 }}>
          Solo (P1) stats only · {history.length} game{history.length !== 1 ? 's' : ''}
        </div>
        {allHistory.length === 0 ? (
          <div style={{ textAlign: 'center', color: 'var(--text2)', marginTop: 40 }}>No games played yet.</div>
        ) : (
          <>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)' }}>TOP CHARACTERS {topChars.length > 0 ? `(${topChars.length})` : ''}</div>
              <select value={charSort} onChange={e => { setCharSort(e.target.value); setCharPage(0); }} style={selectStyle}>
                <option value="count">Most Drafted</option>
                <option value="points">Most Points</option>
                <option value="ppg">Best PPG</option>
              </select>
            </div>
            {charTotalPages > 1 && (
              <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8 }}>
                <button className="btn btn-ghost btn-sm" disabled={charPage===0} onClick={() => setCharPage(p=>p-1)}>‹</button>
                <span style={{ fontSize:'0.65rem', color:'var(--text2)', flex:1, textAlign:'center' }}>Page {charPage+1}/{charTotalPages}</span>
                <button className="btn btn-ghost btn-sm" disabled={charPage>=charTotalPages-1} onClick={() => setCharPage(p=>p+1)}>›</button>
              </div>
            )}
            {pagedChars.map(c => (
              <div key={c.id || c.name} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6, padding:'6px 10px', background:'var(--bg3)', borderRadius:6 }}>
                <div style={{ flex:1, fontSize:'0.78rem', color:'var(--text)' }}>{c.name}</div>
                <div style={{ fontSize:'0.65rem', color:'var(--text2)' }}>{c.count}×</div>
                <div style={{ fontSize:'0.65rem', fontFamily:'Cinzel,serif', color:'var(--gold2)', minWidth:38, textAlign:'right' }}>{Math.floor(c.ppg*10)/10} ppg</div>

              <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8, marginTop:4 }}>
                <button className="btn btn-ghost btn-sm" disabled={charPage===0} onClick={() => setCharPage(p=>p-1)}>‹ Prev</button>
                <span style={{ fontSize:'0.65rem', color:'var(--text2)', flex:1, textAlign:'center' }}>{charPage+1}/{charTotalPages}</span>
                <button className="btn btn-ghost btn-sm" disabled={charPage>=charTotalPages-1} onClick={() => setCharPage(p=>p+1)}>Next ›</button>

            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8, marginTop:16 }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'var(--gold)' }}>HOUSES</div>
              <select value={houseSort} onChange={e => { setHouseSort(e.target.value); setHousePage(0); }} style={selectStyle}>

                <option value="points">Most Points</option>
              </select>
            </div>
            {houseTotalPages > 1 && (
              <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8 }}>
                <button className="btn btn-ghost btn-sm" disabled={housePage===0} onClick={() => setHousePage(p=>p-1)}>‹</button>
                <span style={{ fontSize:'0.65rem', color:'var(--text2)', flex:1, textAlign:'center' }}>Page {housePage+1}/{houseTotalPages}</span>

// ─── LadderScreen ────────────────────────────────────────────────────────────
function LadderScreen({ onBack, onChallenge, progress }) {
  const rungs = window.CHAOS_RUNGS || [];
  const totalRungs = rungs.length;
  const pct = totalRungs > 0 ? Math.min(progress / totalRungs, 1) : 0;
  const [expandedRung, setExpandedRung] = useState(null);

  // Compute all lineups once (memoized) for previews
  const allLineups = React.useMemo(() => {
    const result = {};
    for (const rung of rungs) {
      result[rung.id] = buildChaosLineup(rung.house, rung.topN, rung.fromBottom, rung.pinned, rung.members);
    }
    return result;
  }, []);

  const SK_LABELS = { R:'Ruler',H:'Hand',Hr:'Heir',AC:'Commander',KG:'Kingsguard',KGC:'Kingsguard Commander',SC:'Small Council',Bank:'Bank',Ally:'Ally',Con:'Consort' };
  const SK = ['R','H','Hr','AC','KG','KGC','SC','Bank','Ally','Con'];

  function renderPreview(rung) {
    const lineup = allLineups[rung.id] || {};
    const r  = CHARACTERS.find(c => c.id === lineup['R']);
    const co = CHARACTERS.find(c => c.id === lineup['Con']);
    const hr = CHARACTERS.find(c => c.id === lineup['Hr']);
    // Show the full name (minus any trailing "(epithet)") — a bare first word like "The",
    // "Khal" or "Grey" doesn't identify The Night King, Khal Drogo or Grey Worm.
    const pName = c => c ? c.name.replace(/\s*\([^)]*\)\s*$/, '').trim() : '?';
    return (
      <div style={{ marginTop: 8, padding: '8px 10px', background: 'rgba(0,0,0,0.2)', borderRadius: 6 }}>
        <div style={{ fontSize: '0.58rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif', marginBottom: 5, letterSpacing: '0.06em' }}>LINEUP PREVIEW</div>
        <div style={{ display: 'flex', justifyContent: 'space-around', marginBottom: 4, gap: 6 }}>
          <div style={{ textAlign: 'center', flex: 1 }}>
            <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginBottom: 2 }}>RULER</div>
            <div style={{ fontSize: '0.68rem', color: '#d4a0f0', fontFamily: 'Cinzel,serif' }}>{pName(r)}</div>
          </div>
          <div style={{ textAlign: 'center', flex: 1 }}>
            <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginBottom: 2 }}>CONSORT</div>
            <div style={{ fontSize: '0.68rem', color: '#d4a0f0', fontFamily: 'Cinzel,serif' }}>{pName(co)}</div>
          </div>
        </div>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: '0.55rem', color: 'var(--text2)', marginBottom: 2 }}>HEIR</div>
          <div style={{ fontSize: '0.68rem', color: '#d4a0f0', fontFamily: 'Cinzel,serif' }}>{pName(hr)}</div>
        </div>
      </div>
    );
  }

  function renderFullLineup(rung) {
    const lineup = allLineups[rung.id] || {};
    return (
      <div style={{ marginTop: 8, padding: '8px 10px', background: 'rgba(0,0,0,0.2)', borderRadius: 6 }}>
        <div style={{ fontSize: '0.58rem', color: 'var(--gold)', fontFamily: 'Cinzel,serif', marginBottom: 5, letterSpacing: '0.06em' }}>FULL LINEUP (REVEALED)</div>
        {SK.map(k => {
          const char = CHARACTERS.find(c => c.id === lineup[k]);
          if (!char) return null;
          const mockSlot = { character: char, scoreKey: k };
          const s = getSlotScore(mockSlot);
          return (
            <div key={k} style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3, fontSize:'0.65rem' }}>
              <span style={{ color:'var(--text2)', fontFamily:'Cinzel,serif', fontSize:'0.55rem', width:72, flexShrink:0 }}>{SK_LABELS[k]}</span>
              <span style={{ flex:1 }}>{char.name}</span>
              <span style={{ fontFamily:'Cinzel,serif', fontWeight:700, color: scoreColor(s) }}>{s}</span>
            </div>
          );
        })}
        <div style={{ borderTop:'1px solid var(--border)', marginTop:4, paddingTop:4, fontFamily:'Cinzel,serif', fontSize:'0.65rem', color:'var(--gold)', textAlign:'right' }}>
          Total: {SK.reduce((sum, k) => { const ch = CHARACTERS.find(c => c.id === lineup[k]); return sum + (ch ? getSlotScore({ character: ch, scoreKey: k }) : 0); }, 0)}/100
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="nav-bar">
        <div className="nav-side">
          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        </div>
        <div style={{ flex: 1, textAlign: 'center' }}>
          <div className="nav-title">🪜 CHAOS LADDER</div>
          <div style={{ fontSize: '0.6rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif' }}>
            {progress >= totalRungs ? 'ALL RUNGS CONQUERED' : `${progress} / ${totalRungs} CONQUERED`}
          </div>
        </div>
        <div className="nav-side" />
      </div>

      <div className="scroll" style={{ flex: 1 }}>
        <div style={{ padding: '10px 14px 4px' }}>
          <div style={{ height: 4, background: 'var(--bg3)', borderRadius: 2, overflow: 'hidden', border: '1px solid var(--border)' }}>
            <div style={{ height: '100%', width: `${pct * 100}%`, background: 'linear-gradient(90deg,#6a2a8a,#a050d0)', transition: 'width 0.4s' }} />
          </div>
        </div>

        <div style={{ padding: '6px 14px 20px' }}>
          {rungs.map((rung, i) => {
            const done   = i < progress;
            const cur    = i === progress;
            const locked = i > progress;
            const isExpanded = expandedRung === rung.id;
            return (
              <div key={rung.id} style={{
                padding: '10px 12px', marginBottom: 6,
                background: cur ? 'rgba(106,42,138,0.18)' : 'var(--bg2)',
                border: `1px solid ${cur ? '#8a3aaa' : done ? 'var(--gold)' : 'var(--border)'}`,
                borderRadius: 8,
              }}>
                {/* Header row */}
                <div
                  style={{ display:'flex', alignItems:'center', gap:12, cursor: 'pointer' }}
                  onClick={() => setExpandedRung(isExpanded ? null : rung.id)}
                >
                  <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.65rem', color: done ? 'var(--gold)' : cur ? '#c080f0' : 'var(--text2)', minWidth:28 }}>
                    {String(rung.id).padStart(2,'0')}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.72rem', color: done ? 'var(--gold)' : cur ? '#d4a0f0' : 'var(--text2)', fontWeight: (done||cur) ? 700 : 400 }}>
                      {rung.emoji} {rung.label}
                    </div>
                    <div style={{ fontSize:'0.62rem', color:'var(--text2)', marginTop:1 }}>vs House {rung.house}</div>
                  </div>
                  {done && <span style={{ fontSize:'0.75rem' }}>✓</span>}
                  {locked && <span style={{ fontSize:'0.75rem', opacity:0.5 }}>🔒</span>}
                  <span style={{ fontSize:'0.6rem', color:'var(--text2)' }}>{isExpanded ? '▲' : '▼'}</span>
                </div>

                {/* Expanded content */}
                {isExpanded && (
                  <div>
                    {done ? renderFullLineup(rung) : renderPreview(rung)}
                    <div style={{ marginTop: 8, display:'flex', gap:8 }}>
                      {cur && (
                        <button
                          className="btn btn-sm"
                          style={{ flex:1, background:'linear-gradient(135deg,#4a1a6a,#7a2aaa)', border:'1px solid #8a3aaa', color:'#d4a0f0', fontFamily:'Cinzel,serif', fontSize:'0.65rem', padding:'7px 12px' }}
                          onClick={() => onChallenge(rung)}
                        >⚔ CHALLENGE</button>
                      )}
                      {done && (
                        <button
                          className="btn btn-sm"
                          style={{ flex:1, background:'var(--bg3)', border:'1px solid var(--border)', color:'var(--text2)', fontFamily:'Cinzel,serif', fontSize:'0.65rem', padding:'7px 12px' }}
                          onClick={() => onChallenge(rung)}
                        >↺ REPLAY</button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── ChaosEndScreen ───────────────────────────────────────────────────────────
function ChaosEndScreen({ rung, board, opponentBoard, opponentScore, isWin, progress, totalRungs, onRetry, onNext, onLadder, onHome, newAchievements }) {
  const playerScore = calcScore(board);
  const ft = x => Math.floor(x * 10) / 10;
  const [viewTab, setViewTab] = useState('player');
  const achData = (newAchievements || []).map(id => ACHIEVEMENTS.find(a => a.id === id)).filter(Boolean);

  useEffect(() => { isWin ? AudioManager.playVictory() : AudioManager.playDefeat(); }, []);

  function renderLineup(brd, totalSc, color, label) {
    if (!brd || !brd.length) return (
      <div style={{ textAlign:'center', color:'var(--text2)', padding:24, fontSize:'0.78rem' }}>No lineup data</div>
    );
    return (
      <div className="card" style={{ borderColor: color }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.78rem', color, fontWeight:700, marginBottom:8 }}>{label}</div>
        {brd.map(slot => {
          const sc = getSlotScore(slot);
          return (
            <div key={slot.slotId} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, fontSize:'0.78rem' }}>
              <div style={{ width:90, fontSize:'0.6rem', color:'var(--text2)', fontFamily:'Cinzel,serif', flexShrink:0 }}>{slot.positionName}</div>
              <div style={{ flex:1, color: slot.character ? 'var(--text)' : 'var(--text2)', fontStyle: slot.character ? 'normal' : 'italic', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                {slot.character ? slot.character.name : '— empty —'}
              </div>
              {slot.character && (
                <div style={{ fontFamily:'Cinzel,serif', fontWeight:700, minWidth:24, textAlign:'right', color:scoreColor(sc), flexShrink:0 }}>{ft(sc)}</div>
              )}
            </div>
          );
        })}
        <div style={{ marginTop:8, paddingTop:8, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--text2)' }}>TOTAL</div>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.3rem', fontWeight:700, color:totalScoreColor(totalSc, 100) }}>
            {ft(totalSc)}<span style={{ fontSize:'0.75rem', color:'var(--text2)' }}>/100</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <div className="scroll" style={{ flex:1, padding:'16px 14px 24px' }}>
        <div style={{ textAlign:'center', marginBottom:16 }}>
          <div style={{ fontSize:'2.2rem', marginBottom:6 }}>{isWin ? '⚔' : '☠'}</div>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color: isWin ? 'var(--gold2)' : '#e05555', fontWeight:700, letterSpacing:'0.1em' }}>

          <div style={{ fontSize:'0.7rem', color:'var(--text2)', marginTop:4, fontFamily:'Cinzel,serif' }}>

        <div style={{ display:'flex', gap:10, marginBottom:12 }}>
          <div style={{ flex:1, background:'var(--bg2)', border:`1px solid ${isWin ? 'var(--gold)' : 'var(--border)'}`, borderRadius:8, padding:'10px 12px', textAlign:'center' }}>
            <div style={{ fontSize:'0.6rem', color:'var(--text2)', fontFamily:'Cinzel,serif', marginBottom:4 }}>YOUR SCORE</div>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.5rem', fontWeight:700, color:totalScoreColor(playerScore, 100) }}>{ft(playerScore)}<span style={{ fontSize:'0.7rem', color:'var(--text2)' }}>/100</span></div>

            <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.5rem', fontWeight:700, color:totalScoreColor(opponentScore, 100) }}>{ft(opponentScore)}<span style={{ fontSize:'0.7rem', color:'var(--text2)' }}>/100</span></div>
          </div>

        <div style={{ display:'flex', gap:6, marginBottom:10 }}>

            { key:'player',   label:'YOUR LINEUP',              activeColor:'var(--gold)', activeText:'#000' },

            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--gold)', marginBottom:6 }}>🏆 ACHIEVEMENTS UNLOCKED</div>
            {achData.map(a => (
              <div key={a.id} style={{ fontSize:'0.72rem', color:'var(--text)', marginBottom:3 }}>{a.icon} {a.name}</div>

        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          {isWin && progress < totalRungs && (
            <button className="btn btn-gold" style={{ width:'100%', padding:14, fontSize:'0.85rem' }} onClick={onNext}>
              ⚔ NEXT RUNG ({progress + 1} / {totalRungs}) ⚔

          )}
          {isWin && progress >= totalRungs && (
            <div style={{ textAlign:'center', fontFamily:'Cinzel,serif', color:'var(--gold2)', fontSize:'0.9rem', padding:12 }}>
              🏆 ALL 50 RUNGS CONQUERED — THE CHAOS IS YOURS 🏆
            </div>
          )}
          {!isWin && (
            <button className="btn btn-gold" style={{ width:'100%', padding:12 }} onClick={onRetry}>↺ TRY AGAIN</button>
          )}
          <button className="btn" style={{ width:'100%', padding:10 }} onClick={onLadder}>🪜 LADDER</button>
          <button className="btn btn-ghost" style={{ width:'100%' }} onClick={onHome}>⌂ Home</button>
        </div>
      </div>
    </div>
  );
}

// ─── Chaos Achievements ───────────────────────────────────────────────────────
function checkChaosAchievements(rung, newProgress, saveId) {
  const achKey = sk(saveId, 'achievements');
  const stored = JSON.parse(localStorage.getItem(achKey) || '{}');
  const unlocked = [];
  function check(id) {
    if (!stored[id]) { unlocked.push(id); stored[id] = Date.now(); }
  }
  if (newProgress >= 1)  check('ach_chaos_first');
  if (newProgress >= 10) check('ach_chaos_10');
  if (newProgress >= 25) check('ach_chaos_25');
  if (newProgress >= 50) check('ach_chaos_50');
  if (newProgress >= 50) check('ach_chaos_all');
  const houseMap = {
    "Night's Watch": 'ach_chaos_nw', Frey: 'ach_chaos_frey', Other: 'ach_chaos_other',
    Velaryon: 'ach_chaos_velaryon', Tyrell: 'ach_chaos_tyrell', Baratheon: 'ach_chaos_baratheon',
    Blackfyre: 'ach_chaos_blackfyre', Essos: 'ach_chaos_essos', Martell: 'ach_chaos_martell',
    Lannister: 'ach_chaos_lannister', Stark: 'ach_chaos_stark', Bannermen: 'ach_chaos_bannermen',
    Targaryen: 'ach_chaos_targaryen',
  };
  if (houseMap[rung.house]) check(houseMap[rung.house]);
  if (unlocked.length > 0) localStorage.setItem(achKey, JSON.stringify(stored));

    const variants = base ? getCollCards().filter(c => c.charId === base.charId && c.tier === targetTier) : [];
    if (variants.length) { newBase = variants[Math.floor(Math.random() * variants.length)].id; newDev = 0; }
  }
  return collBuildId({ baseId: newBase, god: newGod, dev: newDev, mod: newMod });
}

// Add a card to an owned[] list. Owning a card no longer blocks it from pools;
// acquiring a duplicate MERGES the two into one card of the next tier up
// (Mythic+Mythic -> God). Returns { owned, evolved, card, from }.
// Evolve a CHARACTER to the tier ABOVE `fromTier` (God above Mythic) — a clean variant at that
// tier, or a doubled Mythic for God. Prefers a variant the player doesn't already own.
function collEvolveToTierAbove(charId, fromTier, owned) {
  if (fromTier === 'god') return null; // already the ceiling
  const ownedBases = new Set((owned || []).map(collStripId));
  const pickFrom = arr => { const pref = arr.filter(c => !ownedBases.has(c.id)); const a = pref.length ? pref : arr; return a[Math.floor(Math.random() * a.length)]; };
  if (fromTier === 'mythic') {
    const myths = getCollCards().filter(c => c.charId === charId && c.tier === 'mythic');
    if (!myths.length) return null;
    return pickFrom(myths).id + '__god';
  }
  const nextTier = COLL_TIER_ORDER[collTierRank(fromTier) + 1];
  if (!nextTier) return null;
  const pool = getCollCards().filter(c => c.charId === charId && c.tier === nextTier);
  if (!pool.length) return null;
  return pickFrom(pool).id;
}

function collAcquire(owned, cardId) {
  owned = owned || [];
  const card = getCollCard(cardId);
  if (!card) return { owned: owned.slice(), evolved: false, card: null };
  // Evolve triggers on the SAME VARIANT (same name), regardless of either copy's mods or current
  // displayed tier (#2). The result is the tier ABOVE the higher of the two copies' tiers.
  const baseId = collStripId(cardId);
  const matchIdx = owned.findIndex(id => collStripId(id) === baseId);
  if (matchIdx < 0) {
    return { owned: [...owned, cardId], evolved: false, card };
  }
  const existing = getCollCard(owned[matchIdx]) || card;
  const hiTier = collTierRank(existing.tier) >= collTierRank(card.tier) ? existing.tier : card.tier;
  const targetId = collEvolveToTierAbove(card.charId, hiTier, owned);
  if (!targetId) {
    return { owned: owned.slice(), evolved: false, card: existing }; // at the ceiling — dup absorbed
  }
  const newOwned = owned.slice();
  newOwned.splice(matchIdx, 1); // consume the existing copy
  newOwned.push(targetId);      // add the evolved card (clean, tier above the higher copy)
  return { owned: newOwned, evolved: true, card: getCollCard(targetId), from: existing };
}

// Record each card PLACED on the player's board this game into the per-card stats (keyed by base
// variant, so mods/evolves don't fragment a card's history). Tracks placements, wins, total points.
function collRecordCardStats(prev, playerBoard, won, scoreKey) {
  const cs = { ...(prev || {}) };
  Object.entries(playerBoard || {}).forEach(([posId, card]) => {
    if (!card) return;
    const key = collStripId(card.id);
    const e = cs[key] ? { ...cs[key] } : { placements: 0, wins: 0, points: 0 };
    e.placements += 1;
    if (won) e.wins += 1;
    // scoreKey override = Trial of Seven (every seat scores Kingsguard, not the seat id).
    e.points = Math.round((e.points + ((card.scores && card.scores[scoreKey || posId]) || 0)) * 10) / 10;
    cs[key] = e;
  });
  return cs;
}

function gotRandomTierCard(tier) { const pool = getCollCards().filter(c => c.tier === tier); return pool.length ? pool[Math.floor(Math.random()*pool.length)] : null; }
function gotMassEvolve(owned) { return (owned||[]).map(id => { const c=getCollCard(id); const t=c&&collEvolveTargetId(c,owned); return t||id; }); }
function gotMassDevolve(owned) { return (owned||[]).map(id => { const c=getCollCard(id); const t=c&&collDevolveTargetId(c); return t||id; }); }
function gotMassDegrade(owned) { return (owned||[]).map(id => collApplyMod(id, -3)); }
function gotHighestIndex(owned) { let bi=-1, bo=-Infinity; (owned||[]).forEach((id,i) => { const c=getCollCard(id); const o=c?(c.overall||0):-Infinity; if (o>bo){ bo=o; bi=i; } }); return bi; }
function gotEligibleHouses(owned) { const set=new Set(); (owned||[]).forEach(id => { const c=getCollCard(id); ((c&&c.houses)||[]).forEach(h => set.add(h)); }); return [...set]; }
// Wipe one random House from the deck; if that would drop below 20 cards, remove only the
// highest-Overall of that House until exactly 20 remain.
function gotGenocide(owned) {
  owned = (owned||[]).slice();
  const houses = gotEligibleHouses(owned);
  if (!houses.length) return { owned, house:null, removed:0 };
  const house = houses[Math.floor(Math.random()*houses.length)];
  const inHouse = owned.map((id,i) => ({ i, card:getCollCard(id) })).filter(x => x.card && (x.card.houses||[]).includes(house));
  const maxRemovable = Math.max(0, owned.length - 20);
  const toRemove = inHouse.length <= maxRemovable ? inHouse
    : inHouse.slice().sort((a,b) => (b.card.overall||0) - (a.card.overall||0)).slice(0, maxRemovable);
  const rm = new Set(toRemove.map(x => x.i));
  return { owned: owned.filter((_,i) => !rm.has(i)), house, removed: toRemove.length };
}

// Player's average deck overall → tier label
function deckTierLabel(owned) {
  if (!owned || owned.length === 0) return 'starter';
  const cards = owned.map(id => getCollCard(id)).filter(Boolean);
  if (!cards.length) return 'starter';
  // Deck tier = the deck's average card rarity. Overall is now a position-total
  // (its per-tier averages are too compressed to classify a deck reliably), so we
  // average the stored card tiers instead — robust and independent of Overall.
  // Rounding reproduces the old avg-Overall behaviour (a deck levels up once its
  // average card rarity passes the halfway point toward the next tier).
  const ORDER = ['starter','uncommon','rare','hero','legendary','mythic'];
  const avgIdx = cards.reduce((s, c) => s + (c.tier === 'god' ? 5 : Math.max(0, ORDER.indexOf(c.tier))), 0) / cards.length;
  return ORDER[Math.max(0, Math.min(5, Math.round(avgIdx)))] || 'starter';
}

function deckAvgOverall(owned) {
  if (!owned || !owned.length) return 45;
  const cards = owned.map(id => getCollCard(id)).filter(Boolean);
  if (!cards.length) return 45;
  return cards.reduce((s, c) => s + (c.overall || 0), 0) / cards.length;
}

function seededRandColl(seed) {
  let h = 2166136261 >>> 0;
  for (let i = 0; i < seed.length; i++) { h ^= seed.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }
  return h / 4294967295;
}

// Draw a random card from pool weighted by tier probability
function weightedDraw(pool, probs, excludeIds, seed) {
  const TIER_ORDER = ['starter','uncommon','rare','hero','legendary','mythic'];
  const r = seededRandColl(seed + Date.now() + Math.random());
  let cumProb = 0;
  let chosenTier = TIER_ORDER[0];
  for (const [tier, prob] of Object.entries(probs)) {
    cumProb += prob;
    if (r < cumProb) { chosenTier = tier; break; }
  }
  const eligible = pool.filter(c => c.tier === chosenTier && !excludeIds.has(c.id));
  if (!eligible.length) {
    const any = pool.filter(c => !excludeIds.has(c.id));
    if (!any.length) return null;
    return any[Math.floor(Math.random() * any.length)];
  }
  return eligible[Math.floor(Math.random() * eligible.length)];
}

// Generate store showcase (5 cards: starter, uncommon, rare, hero, then 2 random-tier)
function genStoreShowcase(save) {
  const all = getCollCards();
  const available = all; // owned cards may re-appear now (duplicates Evolve)
  const showcase = [];
  const used = new Set();
  const fixed = ['starter','uncommon','rare','hero'];
  fixed.forEach(tier => {
    const pool = available.filter(c => c.tier === tier && !used.has(c.id));
    if (pool.length) { const c = pool[Math.floor(Math.random()*pool.length)]; showcase.push(c.id); used.add(c.id); }
  });
  // Last 2 positions have variable tiers
  const varProbs = [{starter:.50,uncommon:.20,rare:.10,hero:.08,legendary:.06,mythic:.06},
                    {starter:.50,uncommon:.20,rare:.10,hero:.08,legendary:.06,mythic:.06}];
  varProbs.forEach((probs, i) => {
    const c = weightedDraw(available.filter(c=>!used.has(c.id)), probs, used, 'showcase'+i);
    if (c) { showcase.push(c.id); used.add(c.id); }
  });
  return showcase;
}

// Deterministic "win pull" — transform CPU board cards into tiered versions
function genWinPullCards(cpuCards, save) {
  const all = getCollCards();
  const owned = new Set(save.owned || []);
  const probs = {starter:.50,uncommon:.10,rare:.10,hero:.10,legendary:.05,mythic:.05};
  const result = [];
  const usedIds = new Set(); // only dedupe within this pull; owned cards may appear (Evolve)
  cpuCards.forEach((card, i) => {
    // Find a card for the same charId at a randomly determined tier
    const r = Math.random();
    let cumP = 0; let chosenTier = 'starter';
    for (const [t, p] of Object.entries(probs)) { cumP += p; if (r < cumP) { chosenTier = t; break; } }
    const opts = all.filter(c => c.charId === card.charId && c.tier === chosenTier && !usedIds.has(c.id));
    let picked = opts.length ? opts[Math.floor(Math.random()*opts.length)] : null;
    if (!picked) {
      const any = all.filter(c => c.charId === card.charId && !usedIds.has(c.id));
      picked = any.length ? any[Math.floor(Math.random()*any.length)] : null;
    }
    if (!picked) {
      const any2 = all.filter(c => !usedIds.has(c.id));
      picked = any2.length ? any2[Math.floor(Math.random()*any2.length)] : null;
    }
    if (picked) { result.push(picked); usedIds.add(picked.id); }
    else result.push(null);
  });
  return result;
}
