// ─── EndScreen ───────────────────────────────────────────────────────────────
function computeOptimalBoard(board) {
  const chars = board.filter(s => s.character).map(s => s.character);
  if (chars.length === 0) return null;
  const slots = board.map(s => ({ ...s }));
  const n = chars.length;

  // Small boards (Classic ≤ 6): try every permutation and pick best valid
  if (n <= 6) {
    let bestBoard = null, bestScore = -1;
    const idx = chars.map((_, i) => i);
    function permute(arr, l) {
      if (l === n) {
        const testBoard = slots.map((slot, i) => ({ ...slot, character: chars[arr[i]] }));
        if (checkBoardConstraints(testBoard).length > 0) return;
        const sc = calcScore(testBoard);
        if (sc > bestScore) { bestScore = sc; bestBoard = testBoard.map(s => ({ ...s })); }
        return;
      }
      for (let i = l; i < n; i++) {
        [arr[l], arr[i]] = [arr[i], arr[l]];
        permute(arr, l + 1);
        [arr[l], arr[i]] = [arr[i], arr[l]];
      }
    }
    permute(idx.slice(), 0);
    return bestBoard;
  }

  // Large boards: character-first greedy — each char claims its best remaining slot.
  // Sort chars by their peak opportunity (highest scorer first) so top chars lock in
  // their best slot before lower scorers compete.
  const slotTaken = new Array(slots.length).fill(false);
  const assignment = new Array(slots.length).fill(null); // slot index → char

  const charsSorted = [...chars].map(c => {
    let peak = -1;
    for (let i = 0; i < slots.length; i++) {
      const sc = getSlotScore({ ...slots[i], character: c });
      if (sc > peak) peak = sc;
    }
    return { c, peak };
  }).sort((a, b) => b.peak - a.peak);

  for (const { c } of charsSorted) {
    let bestIdx = -1, bestSc = -1;
    for (let i = 0; i < slots.length; i++) {
      if (slotTaken[i]) continue;
      const sc = getSlotScore({ ...slots[i], character: c });
      if (sc > bestSc) { bestSc = sc; bestIdx = i; }
    }
    if (bestIdx >= 0) { slotTaken[bestIdx] = true; assignment[bestIdx] = c; }
  }

  const result = slots.map((slot, i) => ({ ...slot, character: assignment[i] || null }));

  // Repair: if constraints still violated, swap ruler↔heir and/or consort
  if (checkBoardConstraints(result).length > 0) {
    const rulerIdx  = result.findIndex(s => s.positionId === 'ruler');
    const heirIdx   = result.findIndex(s => s.positionId === 'heir');
    const consortIdx = result.findIndex(s => s.positionId === 'consort');

    // Fix ruler/heir age
    if (rulerIdx >= 0 && heirIdx >= 0) {
      const ru = result[rulerIdx].character;
      const he = result[heirIdx].character;
      if (ru && he && getEffectiveAge(he) >= getEffectiveAge(ru)) {
        result[rulerIdx] = { ...result[rulerIdx], character: he };
        result[heirIdx]  = { ...result[heirIdx],  character: ru };
      }
    }
    // Fix consort gender (must be opposite of ruler)
    if (rulerIdx >= 0 && consortIdx >= 0) {
      const ru = result[rulerIdx].character;
      const co = result[consortIdx].character;
      if (ru && co && ru.gender === co.gender) {
        // Find nearest non-ruler, non-heir slot character of opposite gender to swap with consort
        const targetGender = ru.gender === 'M' ? 'F' : 'M';
        const swapIdx = result.findIndex((s, i) =>
          i !== rulerIdx && i !== heirIdx && i !== consortIdx &&
          s.character && s.character.gender === targetGender
        );
        if (swapIdx >= 0) {
          const tmp = result[consortIdx].character;
          result[consortIdx] = { ...result[consortIdx], character: result[swapIdx].character };
          result[swapIdx]    = { ...result[swapIdx],    character: tmp };
        }
      }
    }
  }
  return result;
}

// Dynasty-mode optimizer: assigns characters to slots to maximize CATEGORY WINS (3-of-4)
// rather than total score, cross-referencing the human board to know what scores to beat.
function computeOptimalDynastyBoard(board, humanBoard) {
  const chars = board.filter(s => s.character).map(s => s.character);
  if (chars.length === 0) return null;

  const slots = board.map(s => ({ ...s, character: null }));
  const n = slots.length;

  // Human category scores (targets to beat)
  const humanGS = {};
  for (const g of DYNASTY_GROUPS) {
    humanGS[g] = humanBoard
      ? humanBoard.filter(s => s.group === g).reduce((sum, s) => sum + getDynastySlotScore(s, humanBoard), 0)
      : 0;
  }

  // Safe score for char in slot (returns -1 for hard constraint violations)
  const scoreCS = (char, slot) => {
    if (slot.dragonOnly && !char.isDragon) return -1;
    if (!slot.dragonOnly && char.isDragon) return -1;
    if (slot.dragonriderConstraint && (!char.DR || char.isDragon)) return -1;
    return getSlotScore({ ...slot, character: char });
  };

  // Evaluate an assignment array against human board (wins = primary, total = secondary)
  const evalAssign = (assign) => {
    const tb = slots.map((s, i) => ({ ...s, character: assign[i] || null }));
    let wins = 0, total = 0;
    for (const g of DYNASTY_GROUPS) {
      const sc = tb.filter(s => s.group === g).reduce((sum, s) => sum + getDynastySlotScore(s, tb), 0);
      total += sc;
      if (sc > humanGS[g]) wins++;
    }
    return wins * 10000 + total;
  };

  // Slots per category
  const catIdxs = {};
  for (const g of DYNASTY_GROUPS) {
    catIdxs[g] = slots.map((s, i) => ({ s, i })).filter(x => x.s.group === g).map(x => x.i);
  }

  // Phase 1: greedy assignment — least-flexible chars first, win-targeting weighting
  const assignment = new Array(n).fill(null);
  const usedCharIds = new Set();
  const usedSlotIdx = new Set();
  const myGS = {};
  for (const g of DYNASTY_GROUPS) myGS[g] = 0;

  // Sort chars: fewest viable category options first (specialists placed before generalists)
  const sorted = [...chars].map(c => {
    let opts = 0;
    for (const g of DYNASTY_GROUPS) {
      if (catIdxs[g].some(i => scoreCS(c, slots[i]) >= 4.0)) opts++;
    }
    return { c, opts };
  }).sort((a, b) => a.opts - b.opts);

  for (const { c: char } of sorted) {
    let bestScore = -Infinity, bestIdx = -1;
    for (let si = 0; si < n; si++) {
      if (usedSlotIdx.has(si)) continue;
      const slot = slots[si];
      const g = slot.group;
      const base = scoreCS(char, slot);
      if (base < 0) continue;

      const newCat = myGS[g] + base;
      const behind = humanGS[g] - myGS[g];
      const alreadyWin = myGS[g] > humanGS[g];

      let bonus = 0;
      if (!alreadyWin && newCat > humanGS[g]) bonus = 600;       // flips category
      else if (!alreadyWin && behind > 0) bonus = (base / Math.max(behind, 0.1)) * 300;
      else if (alreadyWin) bonus = 30;

      // Penalty for over-filling one category (balance across all 4)
      const filled = catIdxs[g].filter(i => usedSlotIdx.has(i)).length;
      const total  = catIdxs[g].length;
      const pct = total > 0 ? filled / total : 0;
      if (pct > 0.5) bonus -= (pct - 0.5) * 300;

      const composite = base + bonus;
      if (composite > bestScore) { bestScore = composite; bestIdx = si; }
    }
    if (bestIdx >= 0) {
      assignment[bestIdx] = char;
      usedCharIds.add(char.id);
      usedSlotIdx.add(bestIdx);
      const g = slots[bestIdx].group;
      if (g) myGS[g] += Math.max(0, scoreCS(char, slots[bestIdx]));
    }
  }

  // Phase 2: pairwise swap improvement — keep swapping if it increases category wins or total score
  const filledIdxs = assignment.map((c, i) => c ? i : -1).filter(i => i >= 0);
  let improved = true, passes = 0;
  while (improved && passes < 8) {
    improved = false; passes++;
    const base = evalAssign(assignment);
    for (let ai = 0; ai < filledIdxs.length; ai++) {
      for (let aj = ai + 1; aj < filledIdxs.length; aj++) {
        const i = filledIdxs[ai], j = filledIdxs[aj];
        const ci = assignment[i], cj = assignment[j];
        if (cj && scoreCS(cj, slots[i]) < 0) continue;
        if (ci && scoreCS(ci, slots[j]) < 0) continue;
        const swapped = [...assignment];
        swapped[i] = cj; swapped[j] = ci;
        if (evalAssign(swapped) > base) {
          assignment[i] = cj; assignment[j] = ci; improved = true;
        }
      }
    }
  }

  return slots.map((s, i) => ({ ...s, character: assignment[i] || null }));
}

const DYNASTY_GROUPS = ['House','Council','Army','Kingdom'];

// Returns the effective score for a slot, applying dragon/dragonrider pair rule:
// neither DR nor Dragon score counts unless BOTH paired slots are occupied.
function getDynastySlotScore(slot, board) {
  if (!slot.character) return 0;
  if (slot.pairedWith && board) {
    const paired = board.find(s => s.slotId === slot.pairedWith || s.positionId === slot.pairedWith);
    if (!paired?.character) return 0; // pair incomplete — no score
  }
  return getSlotScore(slot);
}

// Sort a set of numbered slots (e.g. d-house-1..12) descending by score,
// keeping linked pairs together. Returns a new board with swapped characters.
function dynastySortSlots(board, slotIds, linkedPairs) {
  // linkedPairs: [[primaryId, secondaryId], ...] — secondary follows primary
  const primaryIds = new Set(slotIds.filter(id => !linkedPairs?.some(p => p[1] === id)));
  const secondary = new Map(linkedPairs?.map(p => [p[0], p[1]]) || []);

  const scoredPrimary = slotIds
    .filter(id => primaryIds.has(id))
    .map(id => {
      const slot = board.find(s => s.slotId === id);
      const score = slot ? getDynastySlotScore(slot, board) : 0;
      return { id, slot, score, char: slot?.character || null, secChar: null };
    });

  // Attach linked secondary character to its primary
  scoredPrimary.forEach(p => {
    if (secondary.has(p.id)) {
      const secSlot = board.find(s => s.slotId === secondary.get(p.id));
      p.secChar = secSlot?.character || null;
    }
  });

  // Sort descending by score; tiebreak by total char score across all positions
  const totalCharScore = char => {
    if (!char) return 0;
    return board.reduce((sum, s) => s.character?.id === char.id ? sum + getDynastySlotScore(s, board) : sum, 0);
  };
  scoredPrimary.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return totalCharScore(b.char) - totalCharScore(a.char);
  });

  // Re-assign characters in the sorted order into the original slot positions
  const newBoard = board.map(s => ({ ...s }));
  const orderedPrimaryIds = slotIds.filter(id => primaryIds.has(id));
  scoredPrimary.forEach((p, i) => {
    const targetPrimId = orderedPrimaryIds[i];
    const targetPrimSlot = newBoard.find(s => s.slotId === targetPrimId);
    if (targetPrimSlot) targetPrimSlot.character = p.char;

    if (secondary.has(targetPrimId)) {
      const targetSecId = secondary.get(targetPrimId);
      const targetSecSlot = newBoard.find(s => s.slotId === targetSecId);
      // Find where this primary's secondary ID came from
      const originalPrimId = orderedPrimaryIds[i];
      const originalSecId = secondary.get(p.id); // p.id = original primary ID before sort
      if (targetSecSlot) targetSecSlot.character = p.secChar;
    }
  });
  return newBoard;
}

// Apply all dynasty end-screen sorting to a board
function sortDynastyBoard(board) {
  let b = board;
  // House 1-12 (no pairs)
  b = dynastySortSlots(b, ['d-house-1','d-house-2','d-house-3','d-house-4','d-house-5','d-house-6',
                             'd-house-7','d-house-8','d-house-9','d-house-10','d-house-11','d-house-12'], null);
  // Kingsguard 1-6
  b = dynastySortSlots(b, ['d-kg-1','d-kg-2','d-kg-3','d-kg-4','d-kg-5','d-kg-6'], null);
  // Knight 1-4 with paired Squires
  b = dynastySortSlots(b,
    ['d-knight-1','d-squire-1','d-knight-2','d-squire-2','d-knight-3','d-squire-3','d-knight-4','d-squire-4'],
    [['d-knight-1','d-squire-1'],['d-knight-2','d-squire-2'],['d-knight-3','d-squire-3'],['d-knight-4','d-squire-4']]);
  // Dragonrider 1-2 with paired Dragons
  b = dynastySortSlots(b,
    ['d-dr-1','d-dragon-1','d-dr-2','d-dragon-2'],
    [['d-dr-1','d-dragon-1'],['d-dr-2','d-dragon-2']]);
  // Warden 1-4
  b = dynastySortSlots(b, ['d-warden-1','d-warden-2','d-warden-3','d-warden-4'], null);
  // Ally 1-4
  b = dynastySortSlots(b, ['d-ally-1','d-ally-2','d-ally-3','d-ally-4'], null);
  return b;
}

function calcDynastyGroupScores(board) {
  const gs = { House:0, Council:0, Army:0, Kingdom:0 };
  if (!board) return gs;
  board.forEach(slot => {
    if (slot.group && slot.character) gs[slot.group] = (gs[slot.group]||0) + getDynastySlotScore(slot, board);
  });
  return gs;
}

function EndScreen({ modeKey, boards: propBoards, board: legacyBoard, board2: legacyBoard2, numPlayers: propNumPlayers, cpuPlayers: propCpuPlayers, isVersus, isCPU, showScores, newAchievements, onHome, onPlayAgain, saveId }) {
  // Support both new boards[] format and legacy board/board2
  const boards = propBoards || [legacyBoard, legacyBoard2].filter(Boolean);
  const numPlayers = propNumPlayers || boards.length || 1;
  const cpuPlayers = propCpuPlayers || [false, ...(isCPU ? [true] : isVersus ? [false] : [])];
  const [showOptimalIdx, setShowOptimalIdx] = useState(-1); // which player's optimal is shown
  const [showBoardIdx, setShowBoardIdx] = useState(0); // which board to view in CPU/multi mode
  const [showAchTab, setShowAchTab] = useState(false); // toggle achievements panel
  const [rosterSort, setRosterSort] = useState('position'); // 'position' | 'score'
  const mode = GAME_MODES[modeKey];
  const isDynasty = !!mode?.isDynasty;
  const displayBoards = isDynasty ? boards.map(b => sortDynastyBoard(b || [])) : boards;
  const floorTenth = x => Math.floor(x * 10) / 10;
  const scores = displayBoards.map(b => floorTenth(isDynasty
    ? b.reduce((sum, slot) => sum + getDynastySlotScore(slot, b), 0)
    : calcScore(b || [])));
  const p1Score = scores[0] || 0;
  const hasOpponent = numPlayers > 1;
  const tiers = scores.map(s => getTier(s, mode.maxScore));
  const p1Tier = tiers[0];

  // Dynasty group scores and winner override logic
  const dynastyGroupScores = isDynasty ? displayBoards.map(b => calcDynastyGroupScores(b)) : null;
  const dynastyGroupWins = isDynasty && hasOpponent ? DYNASTY_GROUPS.map(g => {
    const groupScores = dynastyGroupScores.map(gs => gs[g] || 0);
    const maxGS = Math.max(...groupScores);
    const winnerOfGroup = maxGS === 0 ? -1 : groupScores.indexOf(maxGS);
    return groupScores.filter(s => s === maxGS).length > 1 ? -1 : winnerOfGroup; // -1 = tie
  }) : null;

  // 3-of-4 group wins override for dynasty
  let winnerIdx = hasOpponent ? scores.indexOf(Math.max(...scores)) : 0;
  if (isDynasty && hasOpponent && dynastyGroupWins && numPlayers === 2) {
    const p0Groups = dynastyGroupWins.filter(w => w === 0).length;
    const p1Groups = dynastyGroupWins.filter(w => w === 1).length;
    if (p0Groups >= 3) winnerIdx = 0;
    else if (p1Groups >= 3) winnerIdx = 1;
  }
  const isTie = hasOpponent && scores.every(s => s === scores[0]);
  const optimalBoards = boards.map(b => b ? computeOptimalBoard(b) : null);
  const optimalScores = optimalBoards.map(ob => ob ? floorTenth(calcScore(ob)) : 0);
  const achData = (newAchievements || []).map(id => ACHIEVEMENTS.find(a => a.id === id)).filter(Boolean);
  const PLAYER_COLORS_END = ['var(--gold)', 'var(--p2)', '#2d9c4f', '#d4a017'];

  // Play victory/defeat stinger once on mount
  useEffect(() => {
    const isWin = !hasOpponent || winnerIdx === 0;
    if (isWin) AudioManager.playVictory();
    else AudioManager.playDefeat();
  }, []);

  function sortedRoster(brd) {
    const scSlots = brd.filter(s => s.positionId === 'small-council').sort((a,b) => getSlotScore(b)-getSlotScore(a));
    const kgSlots = brd.filter(s => s.positionId === 'kingsguard').sort((a,b) => getSlotScore(b)-getSlotScore(a));
    let sci = 0, kgi = 0;
    return brd.map(s => {
      if (s.positionId === 'small-council') return scSlots[sci++];
      if (s.positionId === 'kingsguard') return kgSlots[kgi++];
      return s;
    });
  }

  function renderRoster(brd, label, color) {
    let displayBrd = isDynasty ? brd : sortedRoster(brd);
    if (isDynasty && rosterSort === 'score') {
      displayBrd = [...displayBrd].sort((a, b) => getDynastySlotScore(b, brd) - getDynastySlotScore(a, brd));
    }
    const totalSc = isDynasty
      ? floorTenth(brd.reduce((s, slot) => s + getDynastySlotScore(slot, brd), 0))
      : floorTenth(calcScore(brd));
    return (
      <div className="card" style={{ borderColor: color, width: '100%' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 8 }}>
          <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.78rem', color, fontWeight: 700 }}>{label}</div>
          {isDynasty && (
            <div style={{ display:'flex', gap:4 }}>
              {['position','score'].map(s => (
                <button key={s} onClick={() => setRosterSort(s)}
                  style={{ padding:'2px 7px', fontSize:'0.58rem', fontFamily:'Cinzel,serif', background: rosterSort===s ? color : 'var(--bg)', color: rosterSort===s ? '#000' : 'var(--text2)', border:`1px solid ${color}`, borderRadius:4, cursor:'pointer' }}>
                  {s === 'position' ? 'Position' : 'Score ↓'}
                </button>
              ))}
            </div>
          )}
        </div>
        {displayBrd.map(slot => {
          const score = isDynasty ? getDynastySlotScore(slot, brd) : getSlotScore(slot);
          const unpaired = isDynasty && slot.pairedWith && score === 0 && !!slot.character;
          const rawScore = unpaired ? getSlotScore(slot) : null;
          return (
            <div key={slot.slotId} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, fontSize: '0.78rem' }}>
              <div style={{ width: 80, fontSize: '0.6rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif', flexShrink: 0 }}>{slot.positionName}</div>
              <div style={{ flex: 1, color: slot.character ? 'var(--text)' : 'var(--text2)', fontStyle: slot.character ? 'normal' : 'italic' }}>
                {slot.character ? slot.character.name : '— empty —'}
                {unpaired && <span style={{ fontSize: '0.55rem', color: '#e05555', marginLeft: 4 }}>(no dragon)</span>}
              </div>
              {slot.character && (
                <div style={{ fontFamily: 'Cinzel,serif', fontWeight: 700, width: 20, textAlign: 'right', color: unpaired ? '#e05555' : scoreColor(score), textDecoration: unpaired ? 'line-through' : 'none' }}>{unpaired ? (Math.floor(rawScore*10)/10) : (Math.floor(score*10)/10)}</div>
              )}
            </div>
          );
        })}
        <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.7rem', color: 'var(--text2)' }}>TOTAL</div>
          <div style={{ fontFamily: 'Cinzel,serif', fontSize: '1.3rem', fontWeight: 700, color: totalScoreColor(totalSc, mode.maxScore) }}>
            {totalSc}<span style={{ fontSize: '0.75rem', color: 'var(--text2)' }}>/{mode.maxScore}</span>
          </div>
        </div>
      </div>
    );
  }

  function renderOptimal(brd, ob, os, playerScore, playerIdx) {
    if (!ob || os <= playerScore) return null;
    const isOpen = showOptimalIdx === playerIdx;
    return (
      <div style={{ width: '100%' }}>
        <button className="btn btn-ghost btn-sm" style={{ width: '100%', marginBottom: 8 }} onClick={() => setShowOptimalIdx(isOpen ? -1 : playerIdx)}>
          {isOpen ? '▲ Hide' : '▼ Show'} Optimal{numPlayers > 1 ? ` (${cpuLabel(cpuPlayers, playerIdx)})` : ''} ({os}/{mode.maxScore})
        </button>
        {isOpen && (
          <div className="card" style={{ borderColor: '#6a3a8a' }}>
            <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.75rem', color: '#a855f7', marginBottom: 8, fontWeight: 700 }}>⚡ OPTIMAL PLACEMENT</div>
            {ob.map(slot => {
              const sc = getSlotScore(slot);
              const actual = brd.find(s => s.positionId === slot.positionId);
              const changed = actual?.character?.id !== slot.character?.id;
              return (
                <div key={slot.slotId} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, fontSize: '0.75rem' }}>
                  <div style={{ width: 80, fontSize: '0.58rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif', flexShrink: 0 }}>{slot.positionName}</div>
                  <div style={{ flex: 1, color: changed ? '#a855f7' : 'var(--text2)' }}>{slot.character ? slot.character.name : '—'}</div>
                  <div style={{ fontFamily: 'Cinzel,serif', fontWeight: 700, width: 20, textAlign: 'right', color: scoreColor(sc) }}>{Math.floor(sc*10)/10}</div>
                </div>
              );
            })}
            <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between' }}>
              <div style={{ fontSize: '0.7rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif' }}>MAX POSSIBLE</div>
              <div style={{ fontFamily: 'Cinzel,serif', fontWeight: 700, color: '#a855f7' }}>{os}/{mode.maxScore}</div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="app">
      <div className="scroll" style={{ flex: 1 }}>
        <div className="end-screen">
          <div className="ornament">✦ ✦ ✦</div>
          {hasOpponent ? (
            <h1 style={{ color: !isTie && winnerIdx === 0 ? 'var(--gold2)' : !isTie && winnerIdx !== 0 ? '#e05555' : 'var(--text)' }}>
              {isTie ? 'DRAW' : winnerIdx === 0 ? 'VICTORY' : 'DEFEAT'}
            </h1>
          ) : (
            <h1>GAME OVER</h1>
          )}
          <div style={{ fontSize: '0.78rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif' }}>{mode.name.toUpperCase()}</div>

          <div style={{ display: 'flex', width: '100%', borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border2)', marginBottom: 4 }}>
            <button onClick={() => setShowAchTab(false)} style={{ flex: 1, padding: '7px 0', fontSize: '0.6rem', fontFamily: 'Cinzel,serif', border: 'none', cursor: 'pointer', background: !showAchTab ? 'var(--gold)' : 'var(--bg2)', color: !showAchTab ? '#000' : 'var(--text2)', fontWeight: !showAchTab ? 700 : 400 }}>⚔ SCORECARD</button>
            <button onClick={() => setShowAchTab(true)} style={{ flex: 1, padding: '7px 0', fontSize: '0.6rem', fontFamily: 'Cinzel,serif', border: 'none', cursor: 'pointer', background: showAchTab === true ? 'var(--gold)' : 'var(--bg2)', color: showAchTab === true ? '#000' : 'var(--text2)', fontWeight: showAchTab === true ? 700 : 400 }}>🏆 NEW ({achData.length})</button>
          </div>

          {showAchTab === true ? (
            <div style={{ width: '100%', background: 'linear-gradient(135deg,#1a1000,#2a1800)', border: '1px solid var(--gold)', borderRadius: 8, padding: 12 }}>
              <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.75rem', color: 'var(--gold)', marginBottom: 8 }}>🏆 ACHIEVEMENTS UNLOCKED THIS GAME</div>
              {achData.length === 0 && <div style={{ fontSize: '0.65rem', color: 'var(--text2)', textAlign: 'center', padding: '8px 0' }}>No new achievements this game.</div>}
              {achData.map(a => (
                <div key={a.id} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                  <span style={{ fontSize: '1.2rem' }}>{a.icon}</span>
                  <div>
                    <div style={{ fontSize: '0.72rem', fontWeight: 700, color: 'var(--gold2)' }}>{a.name}</div>
                    <div style={{ fontSize: '0.62rem', color: 'var(--text2)' }}>{a.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          ) : hasOpponent ? (() => {
              const ORDINALS = ['1st','2nd','3rd','4th'];
              // Sort player indices by descending score (highest = leftmost column)
              const sortedIdxs = [...boards.keys()].sort((a, b) => scores[b] - scores[a]);
              // Compute placement rank with tie handling
              const ranks = Array(boards.length);
              let curRank = 1;
              for (let j = 0; j < sortedIdxs.length; j++) {
                if (j > 0 && scores[sortedIdxs[j]] < scores[sortedIdxs[j - 1]]) curRank = j + 1;
                ranks[sortedIdxs[j]] = curRank;
              }
              const winnerLabel = isTie ? null : playerLabel(cpuPlayers, winnerIdx);
              return (
                <>
                  {/* Score comparison row — sorted highest → lowest */}
                  <div className="vs-compare" style={{ width: '100%' }}>
                    {sortedIdxs.map(i => {
                      const sc = scores[i];
                      const tier = tiers[i];
                      const playerLabel = cpuPlayers[i] ? `CPU ${getCpuNum(cpuPlayers, i)}` : `Player ${i+1}`;
                      const color = PLAYER_COLORS_END[i] || 'var(--p2)';
                      const rank = ranks[i];
                      const ordinal = ORDINALS[rank - 1] || `${rank}th`;
                      return (
                        <div key={i} className="vs-col">
                          <div style={{ fontSize: '0.52rem', color, fontFamily: 'Cinzel,serif', fontWeight: 700, textAlign: 'center', paddingTop: 4, letterSpacing: '0.06em' }}>{ordinal}</div>
                          <div className="vs-col-header" style={{ background: color, color: i === 0 ? '#000' : '#fff' }}>{playerLabel}</div>
                          <div style={{ padding: '12px 8px', textAlign: 'center' }}>
                            <div style={{ fontFamily: 'Cinzel,serif', fontSize: numPlayers > 2 ? '1.5rem' : '2rem', color, fontWeight: 700 }}>{sc}</div>
                            <div style={{ fontSize: '0.7rem', color: 'var(--text2)' }}>/ {mode.maxScore}</div>
                            <div className="tier-badge" style={{ color: tier.color, borderColor: tier.color, marginTop: 8, fontSize: numPlayers >= 4 ? '0.45rem' : '0.6rem', padding: numPlayers >= 4 ? '2px 4px' : undefined, letterSpacing: numPlayers >= 4 ? '0.04em' : undefined }}>{tier.name}</div>
                            {isDynasty && dynastyGroupScores && dynastyGroupWins && (
                              <div style={{ marginTop: 6, display: 'flex', flexDirection: 'column', gap: 2 }}>
                                {DYNASTY_GROUPS.map(g => {
                                  const gScore = Math.floor((dynastyGroupScores[i][g] || 0) * 10) / 10;
                                  const won = dynastyGroupWins[DYNASTY_GROUPS.indexOf(g)] === i;
                                  return (
                                    <div key={g} style={{ fontSize: '0.52rem', fontFamily: 'Cinzel,serif', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '1px 2px', background: won ? 'rgba(255,215,0,0.12)' : 'transparent', borderRadius: 3 }}>
                                      <span style={{ color: won ? 'var(--gold)' : 'var(--text2)' }}>{won ? '👑 ' : ''}{g}</span>
                                      <span style={{ color: won ? 'var(--gold2)' : 'var(--text2)', fontWeight: won ? 700 : 400 }}>{gScore}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div className="winner-crown">
                    {isTie ? '🤝 TIE GAME' : `🏆 ${winnerLabel} wins!`}
                  </div>
                  {isDynasty && !isTie && dynastyGroupWins && numPlayers === 2 && (() => {
                    const p0g = dynastyGroupWins.filter(w => w === 0).length;
                    const p1g = dynastyGroupWins.filter(w => w === 1).length;
                    const dominated = Math.max(p0g, p1g) >= 3;
                    return dominated ? (
                      <div style={{ fontSize: '0.65rem', color: 'var(--gold)', fontFamily: 'Cinzel,serif', textAlign: 'center', marginTop: -4, marginBottom: 4 }}>
                        ⚔ Won {Math.max(p0g,p1g)} of 4 groups — dynasty dominance!
                      </div>
                    ) : null;
                  })()}
                  {/* Board viewer — buttons in rank order */}
                  <div style={{ display: 'flex', width: '100%', borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border2)' }}>
                    {sortedIdxs.map(i => {
                      const color = PLAYER_COLORS_END[i] || 'var(--p2)';
                      const isActive = showBoardIdx === i;
                      return (
                        <button key={i} onClick={() => setShowBoardIdx(i)}
                          style={{ flex: 1, padding: '7px 0', fontSize: '0.65rem', fontFamily: 'Cinzel,serif', fontWeight: 700, letterSpacing: '0.04em', border: 'none', cursor: 'pointer',
                            background: isActive ? color : 'var(--bg2)',
                            color: isActive ? (i === 0 ? '#000' : '#fff') : 'var(--text2)', transition: 'background 0.2s' }}>
                          <div>{cpuLabel(cpuPlayers, i)}</div>
                          <div style={{ fontSize: '0.48rem', opacity: 0.8, marginTop: 1 }}>{ORDINALS[ranks[i]-1]}</div>
                        </button>
                      );
                    })}
                  </div>
                  {displayBoards[showBoardIdx] && renderRoster(displayBoards[showBoardIdx], cpuPlayers[showBoardIdx] ? `CPU ${showBoardIdx+1} ROSTER` : `PLAYER ${showBoardIdx+1} ROSTER`, PLAYER_COLORS_END[showBoardIdx] || 'var(--p2)')}
                  {!isDynasty && displayBoards[showBoardIdx] && !cpuPlayers[showBoardIdx] && renderOptimal(displayBoards[showBoardIdx], optimalBoards[showBoardIdx], optimalScores[showBoardIdx], scores[showBoardIdx], showBoardIdx)}
                </>
              );
            })()
          : (
            <>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontFamily: 'Cinzel,serif', fontSize: '3rem', color: totalScoreColor(p1Score, mode.maxScore), fontWeight: 700 }}>{p1Score}</div>
                <div style={{ fontSize: '0.85rem', color: 'var(--text2)' }}>out of {mode.maxScore}</div>
              </div>
              <div className="tier-badge glow" style={{ color: p1Tier.color, borderColor: p1Tier.color }}>
                ✦ {p1Tier.name} ✦
              </div>
              {isDynasty && dynastyGroupScores && (
                <div className="card" style={{ width: '100%', padding: '10px 14px' }}>
                  <div style={{ fontFamily: 'Cinzel,serif', fontSize: '0.7rem', color: 'var(--gold)', marginBottom: 8, fontWeight: 700 }}>GROUP BREAKDOWN</div>
                  {[...DYNASTY_GROUPS].sort((a,b) => (dynastyGroupScores[0][b]||0)-(dynastyGroupScores[0][a]||0)).map(g => {
                    const gScore = Math.floor((dynastyGroupScores[0][g] || 0) * 10) / 10;
                    const pct = p1Score > 0 ? Math.round((dynastyGroupScores[0][g] || 0) / p1Score * 100) : 0;
                    const barW = p1Score > 0 ? Math.round((dynastyGroupScores[0][g] || 0) / p1Score * 100) : 0;
                    return (
                      <div key={g} style={{ marginBottom: 8 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3, fontSize: '0.78rem' }}>
                          <span style={{ fontFamily: 'Cinzel,serif', color: 'var(--text2)' }}>{g}</span>
                          <span style={{ fontFamily: 'Cinzel,serif', fontWeight: 700, color: 'var(--text)' }}>{gScore} <span style={{ color:'var(--text2)', fontWeight:400, fontSize:'0.7rem' }}>({pct}%)</span></span>
                        </div>
                        <div style={{ height: 4, background: 'var(--bg)', borderRadius: 2, overflow: 'hidden' }}>
                          <div style={{ width: `${barW}%`, height: '100%', background: 'var(--gold)', borderRadius: 2 }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              {displayBoards[0] && renderRoster(displayBoards[0], 'YOUR ROSTER', 'var(--gold)')}
              {!isDynasty && renderOptimal(displayBoards[0], optimalBoards[0], optimalScores[0], p1Score, 0)}
            </>
          )}

          <div style={{ fontSize: '0.6rem', color: 'var(--text2)', fontFamily: 'Cinzel,serif', letterSpacing: '0.06em', textAlign: 'center' }}>
            {showScores ? '👁 Played with Character Scores visible' : '🔒 Played with Character Scores hidden'}
          </div>

          <div style={{ display: 'flex', gap: 10, width: '100%', flexWrap: 'wrap' }}>
            {onPlayAgain && <button className="btn btn-gold flex1" onClick={onPlayAgain}>⚔ Play Again</button>}
            <button className="btn btn-ghost flex1" onClick={onHome}>🏠 Back to Home</button>
          </div>
          <div className="ornament">⚔ · ✦ · ⚔</div>
        </div>
      </div>
    </div>
  );
}

// ─── GameHistoryDetail ───────────────────────────────────────────────────────
function GameHistoryDetail({ game, onBack }) {
  const [showBoardIdx, setShowBoardIdx] = useState(0);
  const [showOptimalIdx, setShowOptimalIdx] = useState(-1);
  const mode = GAME_MODES[game.modeKey];
  if (!mode) return null;
  const boards = game.boards || [game.board, game.board2].filter(Boolean);
  const numPlayers = game.numPlayers || boards.length || 1;
  const cpuPlayers = game.cpuPlayers || [false, ...(game.isCPU ? Array(numPlayers-1).fill(true) : game.isVersus ? Array(numPlayers-1).fill(false) : [])];
  const floorTenth = x => Math.floor(x * 10) / 10;
  const scores = boards.map(b => floorTenth(calcScore(b || [])));
  const tiers = scores.map(s => getTier(s, mode.maxScore));
  const ORDINALS = ['1st','2nd','3rd','4th'];
  const PLAYER_COLORS_END = ['var(--gold)', 'var(--p2)', '#2d9c4f', '#d4a017'];
  const sortedIdxs = [...boards.keys()].sort((a,b) => scores[b]-scores[a]);
  const ranks = Array(boards.length);
  let curRank = 1;
  for (let j = 0; j < sortedIdxs.length; j++) {
    if (j > 0 && scores[sortedIdxs[j]] < scores[sortedIdxs[j-1]]) curRank = j+1;
    ranks[sortedIdxs[j]] = curRank;
  }
  const optimalBoards = boards.map(b => b ? computeOptimalBoard(b) : null);
  const optimalScores = optimalBoards.map(ob => ob ? floorTenth(calcScore(ob)) : 0);

  function sortedRoster(brd) {
    const scSlots = brd.filter(s => s.positionId === 'small-council').sort((a,b) => getSlotScore(b)-getSlotScore(a));
    const kgSlots = brd.filter(s => s.positionId === 'kingsguard').sort((a,b) => getSlotScore(b)-getSlotScore(a));
    let sci = 0, kgi = 0;
    return brd.map(s => {
      if (s.positionId === 'small-council') return scSlots[sci++];
      if (s.positionId === 'kingsguard') return kgSlots[kgi++];
      return s;
    });
  }

  function renderRoster(brd, label, color) {
    const displayBrd = sortedRoster(brd);
    return (
      <div className="card" style={{ borderColor: color, width: '100%' }}>
        <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.78rem', color, marginBottom:8, fontWeight:700 }}>{label}</div>
        {displayBrd.map(slot => {
          const sc = getSlotScore(slot);
          return (
            <div key={slot.slotId} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, fontSize:'0.78rem' }}>
              <div style={{ width:80, fontSize:'0.6rem', color:'var(--text2)', fontFamily:'Cinzel,serif', flexShrink:0 }}>{slot.positionName}</div>
              <div style={{ flex:1, color:slot.character ? 'var(--text)' : 'var(--text2)', fontStyle:slot.character ? 'normal' : 'italic' }}>
                {slot.character ? slot.character.name : '— empty —'}
              </div>
              {slot.character && <div style={{ fontFamily:'Cinzel,serif', fontWeight:700, width:20, textAlign:'right', color:scoreColor(sc) }}>{sc}</div>}
            </div>
          );
        })}
        <div style={{ marginTop:8, paddingTop:8, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.7rem', color:'var(--text2)' }}>TOTAL</div>
          <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.3rem', fontWeight:700, color:totalScoreColor(floorTenth(calcScore(brd)), mode.maxScore) }}>
            {floorTenth(calcScore(brd))}<span style={{ fontSize:'0.75rem', color:'var(--text2)' }}>/{mode.maxScore}</span>
          </div>
        </div>
      </div>
    );
  }

  function renderOptimal(brd, ob, os, playerScore, playerIdx) {
    if (!ob || os <= playerScore) return null;
    const isOpen = showOptimalIdx === playerIdx;
    return (
      <div style={{ width:'100%' }}>
        <button className="btn btn-ghost btn-sm" style={{ width:'100%', marginBottom:8 }} onClick={() => setShowOptimalIdx(isOpen ? -1 : playerIdx)}>
          {isOpen ? '▲ Hide' : '▼ Show'} Optimal{numPlayers > 1 ? ` (${cpuLabel(cpuPlayers, playerIdx)})` : ''} ({os}/{mode.maxScore})
        </button>
        {isOpen && (
          <div className="card" style={{ borderColor:'#6a3a8a' }}>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.75rem', color:'#a855f7', marginBottom:8, fontWeight:700 }}>⚡ OPTIMAL PLACEMENT</div>
            {ob.map(slot => {
              const sc = getSlotScore(slot);
              const actual = brd.find(s => s.positionId === slot.positionId);
              const changed = actual?.character?.id !== slot.character?.id;
              return (
                <div key={slot.slotId} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, fontSize:'0.75rem' }}>
                  <div style={{ width:80, fontSize:'0.58rem', color:'var(--text2)', fontFamily:'Cinzel,serif', flexShrink:0 }}>{slot.positionName}</div>
                  <div style={{ flex:1, color:changed ? '#a855f7' : 'var(--text2)' }}>{slot.character ? slot.character.name : '—'}</div>
                  <div style={{ fontFamily:'Cinzel,serif', fontWeight:700, width:20, textAlign:'right', color:scoreColor(sc) }}>{sc}</div>
                </div>
              );
            })}
            <div style={{ marginTop:8, paddingTop:8, borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between' }}>
              <div style={{ fontSize:'0.7rem', color:'var(--text2)', fontFamily:'Cinzel,serif' }}>MAX POSSIBLE</div>
              <div style={{ fontFamily:'Cinzel,serif', fontWeight:700, color:'#a855f7' }}>{os}/{mode.maxScore}</div>
            </div>
          </div>
        )}
      </div>
    );
  }

  const hasOpponent = numPlayers > 1;
  const winnerIdx = hasOpponent ? scores.indexOf(Math.max(...scores)) : 0;
  const isTie = hasOpponent && scores.every(s => s === scores[0]);
  const winnerLabel = isTie ? null : playerLabel(cpuPlayers, winnerIdx);

  return (
    <div className="app">
      <div className="scroll" style={{ flex:1 }}>
        <div className="content">
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
            <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
            <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.72rem', color:'var(--text2)' }}>
              {mode.name} · {new Date(game.date).toLocaleString()}
            </div>
          </div>
          {hasOpponent ? (
            <>
              <div className="vs-compare" style={{ width:'100%' }}>
                {sortedIdxs.map(i => {
                  const color = PLAYER_COLORS_END[i] || 'var(--p2)';
                  const ordinal = ORDINALS[ranks[i]-1] || `${ranks[i]}th`;
                  return (
                    <div key={i} className="vs-col">
                      <div style={{ fontSize:'0.52rem', color, fontFamily:'Cinzel,serif', fontWeight:700, textAlign:'center', paddingTop:4, letterSpacing:'0.06em' }}>{ordinal}</div>
                      <div className="vs-col-header" style={{ background:color, color:i===0?'#000':'#fff' }}>{playerLabel(cpuPlayers, i)}</div>
                      <div style={{ padding:'12px 8px', textAlign:'center' }}>
                        <div style={{ fontFamily:'Cinzel,serif', fontSize:numPlayers>2?'1.5rem':'2rem', color, fontWeight:700 }}>{scores[i]}</div>
                        <div style={{ fontSize:'0.7rem', color:'var(--text2)' }}>/ {mode.maxScore}</div>
                        <div className="tier-badge" style={{ color:tiers[i].color, borderColor:tiers[i].color, marginTop:8, fontSize:numPlayers>=4?'0.45rem':'0.6rem', padding:numPlayers>=4?'2px 4px':undefined }}>{tiers[i].name}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <div className="winner-crown">{isTie ? '🤝 TIE GAME' : `🏆 ${winnerLabel} wins!`}</div>
              <div style={{ display:'flex', width:'100%', borderRadius:6, overflow:'hidden', border:'1px solid var(--border2)' }}>
                {sortedIdxs.map(i => {
                  const color = PLAYER_COLORS_END[i] || 'var(--p2)';
                  const isActive = showBoardIdx === i;
                  return (
                    <button key={i} onClick={() => setShowBoardIdx(i)} style={{ flex:1, padding:'7px 0', fontSize:'0.65rem', fontFamily:'Cinzel,serif', fontWeight:700, letterSpacing:'0.04em', border:'none', cursor:'pointer', background:isActive?color:'var(--bg2)', color:isActive?(i===0?'#000':'#fff'):'var(--text2)', transition:'background 0.2s' }}>
                      <div>{cpuLabel(cpuPlayers, i)}</div>
                      <div style={{ fontSize:'0.48rem', opacity:0.8, marginTop:1 }}>{ORDINALS[ranks[i]-1]}</div>
                    </button>
                  );
                })}
              </div>
              {boards[showBoardIdx] && renderRoster(boards[showBoardIdx], cpuPlayers[showBoardIdx] ? `CPU ${showBoardIdx+1} ROSTER` : `PLAYER ${showBoardIdx+1} ROSTER`, PLAYER_COLORS_END[showBoardIdx] || 'var(--p2)')}
              {boards[showBoardIdx] && !cpuPlayers[showBoardIdx] && renderOptimal(boards[showBoardIdx], optimalBoards[showBoardIdx], optimalScores[showBoardIdx], scores[showBoardIdx], showBoardIdx)}
            </>
          ) : (
            <>
              <div style={{ textAlign:'center', marginBottom:12 }}>
                <div style={{ fontFamily:'Cinzel,serif', fontSize:'3rem', color:totalScoreColor(scores[0], mode.maxScore), fontWeight:700 }}>{scores[0]}</div>
                <div style={{ fontSize:'0.85rem', color:'var(--text2)' }}>/ {mode.maxScore}</div>
                <div className="tier-badge" style={{ color:tiers[0].color, borderColor:tiers[0].color, margin:'8px auto', display:'inline-block' }}>{tiers[0].name}</div>
              </div>
              {boards[0] && renderRoster(boards[0], 'YOUR ROSTER', 'var(--gold)')}
              {boards[0] && renderOptimal(boards[0], optimalBoards[0], optimalScores[0], scores[0], 0)}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── HistoryScreen ───────────────────────────────────────────────────────────
function HistoryScreen({ onBack, embedded, initialTab, saveId }) {
  const history = JSON.parse(localStorage.getItem(sk(saveId, 'history')) || '[]');
  const chaosCompletions = JSON.parse(localStorage.getItem(sk(saveId, 'chaosCompletions')) || '{}');
  const MODE_TABS = [
    { key:'classic',             label:'⚔ CLASSIC',       sigil:'🐺' },
    { key:'classic-hard',        label:'💀 C.(HARD)',      sigil:'🦁' },
    { key:'classic-random',      label:'🎲 C.(RANDOM)',    sigil:'☀️' },
    { key:'classic-hard-random', label:'🌑 C.(FATE)',      sigil:'🦅' },
    { key:'empire',              label:'👑 EMPIRE',        sigil:'🐉' },
    { key:'empire-hard',         label:'⚔ E.(HARD)',       sigil:'🦌' },
    { key:'empire-random',       label:'🌹 E.(RANDOM)',    sigil:'🌹' },
    { key:'empire-hard-random',  label:'🌑 E.(FATE)',      sigil:'🦑' },
    { key:'chaos',               label:'🪜 CHAOS',         sigil:'🪜' },
    { key:'dynasty',             label:'🐲 DYNASTY',        sigil:'🐲' },
  ];

  const [tab, setTab] = useState(initialTab || 'classic');
  const [histFilter, setHistFilter] = useState('solo'); // 'solo' | 'versus' | 'cpu'
  const [detailGame, setDetailGame] = useState(null);

  function clearCurrent() {
    if (tab === 'chaos') {
      if (!confirm('Clear all Chaos Ladder first-win history? (Progress is separate and won\'t be reset)')) return;
      localStorage.removeItem(sk(saveId, 'chaosCompletions'));
      window.location.reload();
      return;
    }
    if (tab === 'dynasty') {
      if (!confirm('Clear all Dynasty history?')) return;
      const rest = history.filter(g => g.modeKey !== 'dynasty');
      localStorage.setItem(sk(saveId, 'history'), JSON.stringify(rest));
      window.location.reload();
      return;
    }
    const filterLabel = histFilter === 'versus' ? ' Local VS' : histFilter === 'cpu' ? ' vs CPU' : '';
    if (!confirm('Clear all ' + (GAME_MODES[tab]?.name || tab) + filterLabel + ' history?')) return;
    const rest = history.filter(g => {
      if (g.modeKey !== tab) return true;
      if (histFilter === 'solo')    return g.isVersus || g.isCPU;
      if (histFilter === 'versus')  return !g.isVersus;
      if (histFilter === 'cpu')     return !g.isCPU;
      return false;
    });
    localStorage.setItem(sk(saveId, 'history'), JSON.stringify(rest));
    window.location.reload();
  }

  function renderGameItem(game, i) {
    var mode = GAME_MODES[game.modeKey];
    if (!mode) return null;
    var p1Score = calcScore(game.board);
    var p1Tier = getTier(p1Score, mode.maxScore);
    var p2Score = game.board2 ? calcScore(game.board2) : null;
    var p2Tier = p2Score !== null ? getTier(p2Score, mode.maxScore) : null;
    return (
      <div key={i} className="history-item" style={{ borderLeft: '3px solid ' + p1Tier.color, cursor:'pointer' }} onClick={() => setDetailGame(game)}>
        <div className="history-item-header">
          <div>
            <div style={{ fontSize:'0.68rem', color:'var(--text2)' }}>{new Date(game.date).toLocaleString()}{game.isVersus ? ' · VS' : ''}{game.isCPU ? ' · CPU' : ''}</div>
            <div style={{ fontSize:'0.58rem', color:'var(--text2)', marginTop:2, fontStyle:'italic' }}>Tap to view full scorecard →</div>
          </div>
          <div style={{ textAlign:'right' }}>
            {game.isVersus || game.isCPU ? (
              <>
                <div style={{ fontSize:'0.75rem', color:'var(--p1)' }}>P1: {p1Score}/{mode.maxScore} <span style={{ fontSize:'0.58rem', color:p1Tier.color }}>{p1Tier.name}</span></div>
                {p2Score !== null && <div style={{ fontSize:'0.75rem', color:'var(--p2)' }}>{game.isCPU ? 'CPU' : 'P2'}: {p2Score}/{mode.maxScore} <span style={{ fontSize:'0.58rem', color:p2Tier.color }}>{p2Tier.name}</span></div>}
              </>
            ) : (
              <>
                <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:'var(--gold2)' }}>{p1Score}<span style={{ fontSize:'0.68rem', color:'var(--text2)' }}>/{mode.maxScore}</span></div>
                <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.68rem', color:p1Tier.color }}>{p1Tier.name}</div>
              </>
            )}
          </div>
        </div>
        <div className="history-roster">
          {(game.isVersus || game.isCPU) && <div style={{ fontSize:'0.6rem', color:'var(--p1)', fontFamily:'Cinzel,serif', marginBottom:3, letterSpacing:'0.06em' }}>PLAYER 1</div>}
          {game.board.filter(s => s.character).map(s => {
            var sc = getSlotScore(s);
            return (
              <div key={s.slotId} style={{ display:'flex', alignItems:'center', gap:4, marginBottom:2, fontSize:'0.7rem' }}>
                <span style={{ color:'var(--text2)', width:82, flexShrink:0, fontSize:'0.58rem', fontFamily:'Cinzel,serif' }}>{s.positionName}</span>
                <span style={{ flex:1 }}>{s.character.name}</span>
                <span style={{ color: scoreColor(sc), fontFamily:'Cinzel,serif', fontWeight:700, width:14, textAlign:'right' }}>{Math.floor(sc*10)/10}</span>
              </div>
            );
          })}
          {game.board2 && game.board2.filter(s => s.character).length > 0 && (
            <>
              <div style={{ fontSize:'0.6rem', color:'var(--p2)', fontFamily:'Cinzel,serif', margin:'6px 0 3px', letterSpacing:'0.06em' }}>{game.isCPU ? 'CPU' : 'PLAYER 2'}</div>
              {game.board2.filter(s => s.character).map(s => {
                var sc = getSlotScore(s);
                return (
                  <div key={s.slotId} style={{ display:'flex', alignItems:'center', gap:4, marginBottom:2, fontSize:'0.7rem' }}>
                    <span style={{ color:'var(--text2)', width:82, flexShrink:0, fontSize:'0.58rem', fontFamily:'Cinzel,serif' }}>{s.positionName}</span>
                    <span style={{ flex:1 }}>{s.character.name}</span>
                    <span style={{ color: scoreColor(sc), fontFamily:'Cinzel,serif', fontWeight:700, width:14, textAlign:'right' }}>{Math.floor(sc*10)/10}</span>
                  </div>
                );
              })}
            </>
          )}
        </div>
      </div>
    );
  }

  function renderDynastyGameItem(game, i) {
    const boards = game.boards || [game.board].filter(Boolean);
    const cpu = game.cpuPlayers || [false];
    const scores = boards.map(b => Math.floor(calcScore(b || []) * 10) / 10);
    const sorted = [...scores.keys()].sort((a, b) => scores[b] - scores[a]);
    return (
      <div key={i} className="history-item" style={{ borderLeft: '3px solid var(--gold)', cursor: 'pointer' }} onClick={() => setDetailGame(game)}>
        <div className="history-item-header">
          <div>
            <div style={{ fontSize: '0.68rem', color: 'var(--text2)' }}>{new Date(game.date).toLocaleString()}</div>
            <div style={{ fontSize: '0.58rem', color: 'var(--text2)', marginTop: 2, fontStyle: 'italic' }}>Tap to view full scorecard →</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            {sorted.map(idx => (
              <div key={idx} style={{ fontSize: '0.72rem', color: idx === 0 ? 'var(--p1)' : 'var(--text2)' }}>
                {playerLabel(cpu, idx)}: {Math.floor(scores[idx]*10)/10}/500
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  function renderModeGames(modeKey) {
    if (modeKey === 'chaos') return renderChaosHistory();
    if (modeKey === 'dynasty') {
      const games = history.filter(g => g.modeKey === 'dynasty').sort((a, b) => b.date - a.date);
      if (games.length === 0) return <div style={{ textAlign: 'center', color: 'var(--text2)', marginTop: 40, fontStyle: 'italic' }}>No Dynasty games yet.</div>;
      return games.map((g, i) => renderDynastyGameItem(g, i));
    }
    const all = history.filter(g => g.modeKey === modeKey && GAME_MODES[g.modeKey]);
    const games = all.filter(g => {
      if (histFilter === 'solo')   return !g.isVersus && !g.isCPU;
      if (histFilter === 'versus') return !!g.isVersus;
      if (histFilter === 'cpu')    return !!g.isCPU;
      return true;
    });
    const filterLabel = histFilter === 'versus' ? 'Local VS' : histFilter === 'cpu' ? 'vs CPU' : 'Solo';
    if (games.length === 0) return <div style={{ textAlign:'center', color:'var(--text2)', marginTop:40, fontStyle:'italic' }}>No {filterLabel} {GAME_MODES[modeKey]?.name || modeKey} games yet.</div>;
    const sorted = [...games].sort((a,b) => {
      const m = GAME_MODES[modeKey];
      return (calcScore(b.board)/m.maxScore) - (calcScore(a.board)/m.maxScore);
    });
    return sorted.map((g, i) => renderGameItem(g, i));
  }

  function renderChaosHistory() {
    const rungs = window.CHAOS_RUNGS || [];
    const completed = rungs.filter(r => chaosCompletions[r.id]);
    if (completed.length === 0) return <div style={{ textAlign:'center', color:'var(--text2)', marginTop:40, fontStyle:'italic' }}>No Chaos Ladder rungs completed yet.</div>;
    const SK_LABELS = { R:'Ruler',H:'Hand',Hr:'Heir',AC:'Commander',KG:'Kingsguard',KGC:'Kingsguard Commander',SC:'Small Council',Bank:'Bank',Ally:'Ally',Con:'Consort' };
    return completed.map(rung => {
      const comp = chaosCompletions[rung.id];
      const board = comp.board;
      const score = calcScore(board);
      return (
        <div key={rung.id} className="history-item" style={{ borderLeft:'3px solid var(--gold)' }}>
          <div className="history-item-header">
            <div>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'0.72rem', color:'#d4a0f0' }}>🪜 Rung {rung.id} — {rung.label}</div>
              <div style={{ fontSize:'0.62rem', color:'var(--text2)', marginTop:2 }}>vs House {rung.house} · {new Date(comp.date).toLocaleDateString()}</div>
            </div>
            <div style={{ textAlign:'right' }}>
              <div style={{ fontFamily:'Cinzel,serif', fontSize:'1.1rem', color:'var(--gold2)' }}>{Math.floor(score*10)/10}<span style={{ fontSize:'0.68rem', color:'var(--text2)' }}>/100</span></div>
              <div style={{ fontSize:'0.62rem', color:'var(--gold)' }}>FIRST WIN</div>
            </div>
          </div>
          <div className="history-roster">
            {board.filter(s => s.character).map(s => {
              const sc = getSlotScore(s);
              return (
                <div key={s.slotId} style={{ display:'flex', alignItems:'center', gap:4, marginBottom:2, fontSize:'0.7rem' }}>
                  <span style={{ color:'var(--text2)', width:82, flexShrink:0, fontSize:'0.58rem', fontFamily:'Cinzel,serif' }}>{SK_LABELS[s.scoreKey] || s.positionName}</span>

                  <span style={{ color: scoreColor(sc), fontFamily:'Cinzel,serif', fontWeight:700, width:14, textAlign:'right' }}>{Math.floor(sc*10)/10}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    });
  }

  if (detailGame) {
    if (detailGame.modeKey === 'dynasty') {
      return <EndScreen
        modeKey="dynasty"
        boards={detailGame.boards}
        numPlayers={detailGame.numPlayers || (detailGame.boards || []).length || 1}
        cpuPlayers={detailGame.cpuPlayers || [false]}
        isVersus={detailGame.isVersus}
        isCPU={detailGame.isCPU}
        showScores={true}
        newAchievements={[]}
        onHome={() => setDetailGame(null)}
        onPlayAgain={null}
        saveId={saveId}
      />;
    }
    return <GameHistoryDetail game={detailGame} onBack={() => setDetailGame(null)} />;
  }

  return (
    <div className="history-screen">
      <div className="history-header">
        {!embedded && <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>}
        <h2 style={{ flex: 1, textAlign: 'center' }}>HISTORY</h2>
        <button className="btn btn-ghost btn-sm" onClick={clearCurrent}>Clear</button>
      </div>
      <div style={{ padding:'10px 12px', background:'var(--bg2)', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
        <select
          value={tab}
          onChange={e => { setTab(e.target.value); setHistFilter('solo'); }}
          style={{ width:'100%', padding:'8px 10px', background:'var(--bg3)', border:'1px solid var(--border)', borderRadius:6, color:'var(--gold)', fontFamily:'Cinzel,serif', fontSize:'0.8rem', letterSpacing:'0.04em', cursor:'pointer' }}
        >
          {MODE_TABS.map(t => (
            <option key={t.key} value={t.key}>{t.sigil} {t.label.replace(/^[^ ]+ /,'')}</option>
          ))}
        </select>
        {tab !== 'chaos' && tab !== 'dynasty' && (() => {
          const allModeGames = history.filter(g => g.modeKey === tab && GAME_MODES[g.modeKey]);
          const hasVersus = allModeGames.some(g => g.isVersus);
          const hasCPU    = allModeGames.some(g => g.isCPU);
          const filters = [
            { key:'solo',    label:'Solo' },
            ...(hasVersus ? [{ key:'versus', label:'Local VS' }] : []),
            ...(hasCPU    ? [{ key:'cpu',    label:'vs CPU' }]   : []),
          ];
          const modeGames = allModeGames.filter(g => {
            if (histFilter === 'solo')   return !g.isVersus && !g.isCPU;
            if (histFilter === 'versus') return !!g.isVersus;
            if (histFilter === 'cpu')    return !!g.isCPU;
            return true;
          });
          const count = modeGames.length;
          const modeMax = GAME_MODES[tab]?.maxScore || 0;
          // Use persistent average for solo P1 games (survives history clear)
          let avg = null;
          if (histFilter === 'solo') {
            const avgs = JSON.parse(localStorage.getItem(sk(saveId, 'p1Averages')) || '{}');
            const pa = avgs[tab];
            avg = pa && pa.count > 0 ? (Math.floor(pa.sum / pa.count * 10) / 10).toFixed(1) : null;
          } else if (count > 0) {
            avg = (Math.floor(modeGames.reduce((s, g) => s + (g.board ? calcScore(g.board) : 0), 0) / count * 10) / 10).toFixed(1);
          }
          return (
            <>
              {filters.length > 1 && (
                <div style={{ display:'flex', gap:6, marginTop:8 }}>
                  {filters.map(f => (
                    <button
                      key={f.key}
                      onClick={() => setHistFilter(f.key)}
                      style={{
                        flex:1, padding:'4px 0', borderRadius:5, border:'1px solid',
                        borderColor: histFilter === f.key ? 'var(--gold)' : 'var(--border)',
                        background: histFilter === f.key ? 'var(--gold)' : 'var(--bg3)',
                        color: histFilter === f.key ? '#1a1a2e' : 'var(--text2)',
                        fontFamily:'Cinzel,serif', fontSize:'0.65rem', letterSpacing:'0.04em',
                        cursor:'pointer', fontWeight: histFilter === f.key ? 700 : 400,
                      }}
                    >{f.label}</button>
                  ))}
                </div>
              )}
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:6, fontSize:'0.68rem', color:'var(--text2)' }}>
                <span>{count} game{count !== 1 ? 's' : ''} · highest to lowest</span>
                {avg !== null && (
                  <span style={{ fontFamily:'Cinzel,serif', color: totalScoreColor(parseFloat(avg), modeMax) }}>
                    avg {avg}<span style={{ color:'var(--text2)', fontFamily:'inherit' }}>/{modeMax}</span>
                  </span>
                )}
              </div>
            </>
          );
        })()}
        {tab === 'chaos' && (
          <div style={{ marginTop:6, fontSize:'0.68rem', color:'var(--text2)' }}>
            {Object.keys(chaosCompletions).length} rung{Object.keys(chaosCompletions).length !== 1 ? 's' : ''} completed · first winning lineup per rung
          </div>
        )}
      </div>
      <div className="history-list">
        {renderModeGames(tab)}
      </div>
    </div>
  );
}

const CHAR_INDEX_SCORE_NAMES = {
  R:'Ruler', H:'Hand', Hr:'Heir', AC:'Army Cmdr',
  KG:'Kingsguard', KGC:'Kingsguard Commander', SC:'Small Council',
  Bank:'Bank', Ally:'Ally', Con:'Consort',

  MoL:'Master of Laws', MoS:'Master of Ships', MoW:'Master of Whisperers',

function CharIndexFilters({ search, setSearch, filterGender, setFilterGender, filterHouse, setFilterHouse, houseNames, compact }) {
  const inp = { width: '100%', padding: compact ? '5px 8px' : '8px 12px', background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text)', fontSize: compact ? '0.72rem' : '0.82rem', boxSizing: 'border-box' };
  const sel = { flex: 1, padding: compact ? '4px' : '6px', background: 'var(--bg3)', border: '1px solid var(--border)', borderRadius: 6, color: 'var(--text)', fontSize: compact ? '0.68rem' : '0.78rem' };
  return (
    <>
      <input type="text" placeholder="Search characters..." value={search} onChange={e => setSearch(e.target.value)} style={{ ...inp, marginBottom: 6 }} />
      <div style={{ display: 'flex', gap: 6, marginBottom: compact ? 4 : 6 }}>
        <select value={filterGender} onChange={e => setFilterGender(e.target.value)} style={sel}>
          <option value="All">All Genders</option>
          <option value="M">Male</option>
          <option value="F">Female</option>
        </select>
        <select value={filterHouse} onChange={e => setFilterHouse(e.target.value)} style={sel}>
          {houseNames.map(h => <option key={h} value={h}>{h}</option>)}
        </select>
      </div>
    </>
  );
}

function useCharIndexFilter(dynastyMode) {
  const [search, setSearch] = useState('');
  const [filterHouse, setFilterHouse] = useState('All');
  const [filterGender, setFilterGender] = useState('All');
  const nonDragonHouseNames = ['All', ...Array.from(new Set(CHARACTERS.filter(c => !c.isDragon).flatMap(c => c.houses))).sort()];
  const houseNames = ['All', 'Dragon', ...nonDragonHouseNames.slice(1)];
  const filtered = CHARACTERS.filter(c => {
    if (!search && filterGender === 'All' && filterHouse === 'All') return true;
    const matchSearch = !search || c.name.toLowerCase().includes(search.toLowerCase());
    const matchGender = filterGender === 'All' || c.gender === filterGender;
    const matchHouse = filterHouse === 'All' || c.houses.includes(filterHouse);
    return matchSearch && matchGender && matchHouse;
  }).sort((a, b) => a.name.localeCompare(b.name));
  return { search, setSearch, filterHouse, setFilterHouse, filterGender, setFilterGender, houseNames, filtered };
}

function CharacterComparisonScreen({ onBack, dynastyMode }) {
  const MAX_SLOTS = 4;
  const [slots, setSlots] = useState([null, null, null, null]);
  const [activeSlot, setActiveSlot] = useState(0);
  const f = useCharIndexFilter(dynastyMode);

  const SCORE_KEYS  = CHAR_INDEX_SCORE_KEYS;
  const SCORE_NAMES = CHAR_INDEX_SCORE_NAMES;
  const DYN_KEY_SET = new Set(['Hs','GM','MoC','MoL','MoS','MoW','Warden']);
  const getDynScore = (c, key) => {
    if (key === 'DR') return c.DR ?? null;
    if (key === 'Dragon') return c.isDragon ? (c.power ?? null) : null;
    if (key === 'Knight' || key === 'Squire') return c.isDragon ? null : (c.scores?.KG ?? null);
    if (DYN_KEY_SET.has(key)) return c.isDragon ? null : getSlotScore({ character: c, scoreKey: key });
    return c.scores?.[key] ?? null;
  };

  function pickChar(c) {
    setSlots(prev => { const n = [...prev]; n[activeSlot] = c; return n; });
    // Auto-advance to next empty slot
    const next = slots.findIndex((s, i) => i > activeSlot && s === null);
    if (next !== -1) setActiveSlot(next);
  }

  function clearSlot(i) { setSlots(prev => { const n = [...prev]; n[i] = null; return n; }); }

  const filled = slots.filter(Boolean);
  const SLOT_COLORS = ['var(--gold)', 'var(--p2)', '#2d9c4f', '#d4a017'];

  return (
    <div className="app" style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>

      <div style={{ padding: '10px 12px 0', flexShrink: 0 }}>

          <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>

        {/* Slot selector chips */}
        <div style={{ display: 'flex', gap: 5, marginBottom: 8 }}>
          {slots.map((s, i) => (
            <button key={i} onClick={() => setActiveSlot(i)}
              style={{ flex: 1, padding: '5px 2px', borderRadius: 6, border: `2px solid ${activeSlot === i ? SLOT_COLORS[i] : 'var(--border2)'}`, background: activeSlot === i ? 'rgba(0,0,0,0.4)' : 'var(--bg3)', cursor: 'pointer', position: 'relative', minWidth: 0 }}>
